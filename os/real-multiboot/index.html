<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050816">
  <meta name="color-scheme" content="dark">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>GORICS Linux GUI OS</title>
  <link rel="stylesheet" href="./styles.css?v=20260708-r6-responsive">
</head>
<body>
  <main class="iso-app">
    <aside class="control-rail" aria-label="멀티부트 제어판">
      <header class="hero">
        <div class="hero-copy">
          <span class="badge">REAL MULTIBOOT CONSOLE</span>
          <h1>GORICS Linux GUI OS</h1>
          <p>실제 ISO를 브라우저에서 부팅합니다. 화면을 누르면 키보드와 포인터 입력이 활성화됩니다.</p>
        </div>
        <div class="actions" aria-label="가상 머신 제어">
          <button id="boot-btn" type="button">Run ISO</button>
          <button id="stop-btn" type="button" class="secondary" disabled>Stop</button>
          <button id="fullscreen-btn" type="button" class="secondary">Fullscreen</button>
        </div>
      </header>

      <section class="panel info" aria-labelledby="source-title">
        <div class="panel-heading">
          <h2 id="source-title">ISO source</h2>
          <span class="status-dot" aria-hidden="true"></span>
        </div>
        <code id="iso-url">loading</code>
      </section>

      <section class="panel log-panel" aria-labelledby="log-title">
        <div class="panel-heading">
          <h2 id="log-title">Boot log</h2>
          <span class="live-label">LIVE</span>
        </div>
        <pre id="log" role="log" aria-live="polite">[ready] GORICS Linux GUI ISO page. 20260708-r6 responsive UI</pre>
      </section>
    </aside>

    <section class="screen-wrap" aria-label="가상 머신 화면">
      <div id="screen" class="screen" tabindex="0" aria-label="GORICS Linux 가상 화면"></div>
    </section>
  </main>

  <script src="./diagnostics.js?v=20260708-r6-responsive"></script>
  <script src="./chunk-fetch-timeout.js?v=20260708-r6-responsive"></script>
  <script src="./chunk-router-v4.js?v=20260708-r6-responsive"></script>
  <script src="./app.js?v=20260708-r6-responsive"></script>
  <script src="./responsive.js?v=20260708-r6-responsive"></script>
</body>
</html>
