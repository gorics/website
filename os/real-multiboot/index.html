<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GORICS Real GUI OS Multiboot</title>
  <link rel="stylesheet" href="./styles.css?v=20260705-gui2" />
</head>
<body>
  <main class="app">
    <header>
      <h1>GORICS Real GUI OS Multiboot</h1>
      <p>
        실제 Linux/Windows/DOS 이미지를 브라우저 x86 VM(v86)에서 부팅합니다.
        기본값은 그래픽 화면 확인용 Damn Small Linux GUI ISO입니다. 콘솔 Linux가 필요하면 Buildroot를 선택하세요.
      </p>
    </header>

    <section class="panel">
      <label for="os-select">부팅할 OS 선택</label>
      <select id="os-select"></select>
      <div class="actions">
        <button id="boot-btn">선택한 OS 부팅</button>
        <button id="stop-btn" class="danger">중지</button>
        <button id="fullscreen-btn" class="secondary">전체화면</button>
      </div>
      <p class="hint" id="preset-detail">프리셋 정보를 불러오는 중...</p>
      <p class="hint">페이지가 열리면 GUI 확인용 Linux ISO가 자동 부팅됩니다. 첫 화면까지 시간이 걸릴 수 있습니다.</p>
    </section>

    <section class="panel status-panel">
      <h2>상태 로그</h2>
      <pre id="log" aria-live="polite">[ready] 실제 GUI OS 런처 준비 완료.</pre>
    </section>

    <section class="screen-wrap">
      <div id="screen" class="screen"></div>
    </section>
  </main>

  <script src="./app.js?v=20260705-gui2"></script>
</body>
</html>
