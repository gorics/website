<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GORICS Real Linux ISO Launcher</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>GORICS Real Linux ISO Launcher</h1>
      <p>
        HTML로 만든 가짜 OS가 아니라, 사이트 안의 <code>os/linux/1/linux.iso</code> 실제 ISO 파일을
        브라우저 x86 VM(v86)에서 CD-ROM으로 부팅합니다.
      </p>
    </header>

    <section class="panel">
      <label for="os-select">부팅할 OS 선택</label>
      <select id="os-select"></select>
      <div class="actions">
        <button id="boot-btn">선택한 OS 부팅</button>
        <button id="stop-btn" class="danger">중지</button>
        <button id="fullscreen-btn" class="secondary">전체화면</button>
      </div>
      <p class="hint" id="preset-detail">프리셋 정보를 불러오는 중...</p>
      <p class="hint">브라우저 제한 때문에 v86 호환 32-bit/레거시 BIOS 계열 이미지를 우선 실행합니다.</p>
    </section>

    <section class="panel status-panel">
      <h2>상태 로그</h2>
      <pre id="log" aria-live="polite">[ready] 실제 ISO 런처 준비 완료.</pre>
    </section>

    <section class="screen-wrap">
      <div id="screen" class="screen"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
