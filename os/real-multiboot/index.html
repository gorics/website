<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GORICS Real Linux ISO Launcher</title>
  <link rel="stylesheet" href="./styles.css?v=20260705-real1" />
</head>
<body>
  <main class="app">
    <header>
      <h1>GORICS Real Linux ISO Launcher</h1>
      <p>
        HTML로 만든 가짜 OS가 아니라, 실제 Linux/Windows/DOS 이미지를 브라우저 x86 VM(v86)에서 부팅합니다.
        기본값은 안정 부팅용 실제 Linux이며, 모든 기본 프리셋은 검증된 v86 테스트 이미지를 사용합니다.
      </p>
    </header>

    <section class="panel">
      <label for="os-select">부팅할 OS 선택</label>
      <select id="os-select"></select>
      <div class="actions">
        <button id="boot-btn">선택한 OS 부팅</button>
        <button id="stop-btn" class="danger">중지</button>
        <button id="fullscreen-btn" class="secondary">전체화면</button>
      </div>
      <p class="hint" id="preset-detail">프리셋 정보를 불러오는 중...</p>
      <p class="hint">페이지가 열리면 안정 부팅용 Buildroot Linux가 자동 부팅됩니다.</p>
    </section>

    <section class="panel status-panel">
      <h2>상태 로그</h2>
      <pre id="log" aria-live="polite">[ready] 실제 OS 런처 준비 완료.</pre>
    </section>

    <section class="screen-wrap">
      <div id="screen" class="screen"></div>
    </section>
  </main>

  <script src="./app.js?v=20260705-real1"></script>
</body>
</html>
