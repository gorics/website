<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050816" />
  <title>GORICS GUI OS</title>
  <link rel="stylesheet" href="./styles.css?v=20260706-gorics-gui-os-v1" />
</head>
<body>
  <div class="boot" id="boot-screen" aria-live="polite">
    <div class="boot-card">
      <div class="boot-logo">G</div>
      <div>
        <strong>GORICS GUI OS</strong>
        <span id="boot-line">kernel shell loading...</span>
      </div>
    </div>
  </div>

  <main class="os" id="gorics-os" aria-label="GORICS GUI OS desktop">
    <header class="topbar">
      <button class="system-button" id="launcher-toggle" type="button" aria-label="앱 런처 열기">▦</button>
      <div class="brand"><span class="mark">G</span><span>GORICS GUI OS</span><em>custom shell</em></div>
      <div class="top-status">
        <span id="network-pill">● ONLINE</span>
        <span id="clock">--:--</span>
      </div>
    </header>

    <section class="desktop" id="desktop" aria-label="desktop shortcuts">
      <button class="desktop-icon" data-open="files"><span>🗂️</span><b>Files</b></button>
      <button class="desktop-icon" data-open="browser"><span>🌐</span><b>Browser</b></button>
      <button class="desktop-icon" data-open="terminal"><span>⌨️</span><b>Terminal</b></button>
      <button class="desktop-icon" data-open="notes"><span>📝</span><b>Notes</b></button>
      <button class="desktop-icon" data-open="study"><span>📚</span><b>Study</b></button>
      <button class="desktop-icon" data-open="system"><span>⚙️</span><b>System</b></button>
      <button class="desktop-icon" data-open="vm"><span>🖥️</span><b>VM</b></button>
    </section>

    <aside class="launcher" id="launcher" aria-label="app launcher">
      <div class="launcher-head">
        <b>GORICS Apps</b>
        <input id="app-search" placeholder="검색: browser, note, calc..." autocomplete="off" />
      </div>
      <div class="launcher-grid" id="launcher-grid"></div>
    </aside>

    <section class="widgets" aria-label="system widgets">
      <article class="widget hero-widget">
        <div class="kicker">MAIN OS</div>
        <h1>직접 만든 Gorics GUI OS</h1>
        <p>외부 DSL·FreeDOS·Windows 이미지 없이, GitHub Pages에서 바로 실행되는 자체 데스크톱 OS 셸.</p>
        <div class="quick-actions">
          <button data-open="browser">인터넷</button>
          <button data-open="terminal">터미널</button>
          <button data-open="files">파일</button>
          <button data-open="vm">실제 VM</button>
        </div>
      </article>
      <article class="widget stat-widget">
        <span>창</span><b id="window-count">0</b>
      </article>
      <article class="widget stat-widget">
        <span>저장소</span><b>localStorage</b>
      </article>
    </section>

    <section class="window-layer" id="window-layer" aria-label="open windows"></section>

    <nav class="dock" aria-label="dock">
      <button data-open="launcher" title="Launcher">▦</button>
      <button data-open="files" title="Files">🗂️</button>
      <button data-open="browser" title="Browser">🌐</button>
      <button data-open="terminal" title="Terminal">⌨️</button>
      <button data-open="notes" title="Notes">📝</button>
      <button data-open="calc" title="Calculator">🧮</button>
      <button data-open="system" title="System">⚙️</button>
      <button data-open="vm" title="Real VM">🖥️</button>
    </nav>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="./app.js?v=20260706-gorics-gui-os-v2"></script>
</body>
</html>
