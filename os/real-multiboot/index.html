<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GORICS Web Linux GUI OS</title>
  <link rel="stylesheet" href="./styles.css?v=20260706-unified-os1" />
</head>
<body>
  <main class="app">
    <header>
      <div class="eyebrow">ONE BOOT · ONE OS · WEB LINUX GUI</div>
      <h1>GORICS Web Linux GUI OS</h1>
      <p>여러 OS 선택 화면을 없애고 하나의 통합 Linux GUI OS 실행 화면으로 정리했습니다.</p>
    </header>
    <section class="panel">
      <div class="service-badge" id="service-mode">단일 통합 OS</div>
      <label for="os-select" style="position:absolute;left:-9999px">부팅 대상</label>
      <select id="os-select" style="position:absolute;left:-9999px;width:1px;height:1px" aria-hidden="true"></select>
      <div class="boot-label">부팅 대상</div>
      <div class="boot-target" id="boot-target">GORICS Web Linux GUI OS</div>
      <div class="actions"><button id="boot-btn" type="button">통합 OS 실행</button><button id="stop-btn" type="button" class="danger">정지</button><button id="fullscreen-btn" type="button" class="secondary">전체화면</button></div>
      <p class="hint" id="preset-detail">단일 통합 부팅 정보를 불러오는 중...</p>
    </section>
    <section class="panel status-panel"><h2>상세 로그</h2><pre id="log" aria-live="polite">[ready] GORICS Unified Web Linux OS ready.</pre></section>
    <section class="screen-wrap"><div id="screen" class="screen" tabindex="0"></div></section>
  </main>
  <script src="./app.js?v=20260706-unified-os1"></script>
</body>
</html>
