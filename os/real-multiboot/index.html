<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GORICS Real Linux ISO Launcher</title>
  <link rel="stylesheet" href="./styles.css?v=20260703-fix2" />
</head>
<body>
  <main class="app">
    <header>
      <h1>GORICS Real Linux ISO Launcher</h1>
      <p>
        HTML로 만든 가짜 OS가 아니라, 실제 Linux ISO/CD-ROM 이미지를 브라우저 x86 VM(v86)에서 부팅합니다.
        기본값은 v86에서 검증된 ISO이며, 사이트 내부 <code>os/linux/1/linux.iso</code>도 선택할 수 있습니다.
      </p>
    </header>

    <section class="panel">
      <label for="os-select">부팅할 OS 선택</label>
      <select id="os-select"></select>
      <div class="actions">
        <button id="boot-btn">선택한 OS 부팅</button>
        <button id="stop-btn" class="danger">중지</button>
        <button id="fullscreen-btn" class="secondary">전체화면</button>
      </div>
      <p class="hint" id="preset-detail">프리셋 정보를 불러오는 중...</p>
      <p class="hint">페이지가 열리면 자동 부팅합니다. 검은 화면이면 중지 후 Buildroot Linux를 선택하세요.</p>
    </section>

    <section class="panel status-panel">
      <h2>상태 로그</h2>
      <pre id="log" aria-live="polite">[ready] 실제 ISO 런처 준비 완료.</pre>
    </section>

    <section class="screen-wrap">
      <div id="screen" class="screen"></div>
    </section>
  </main>

  <script src="./app.js?v=20260703-fix2"></script>
</body>
</html>
