
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Browser Linux</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #11182d;
      --panel-2: #0f172a;
      --line: #24304f;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Inter, Pretendard, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #142042 0%, var(--bg) 45%);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    .topbar {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(8, 12, 24, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    .wrap {
      width: min(1100px, calc(100% - 24px));
      margin: 18px auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      flex: 1;
    }
    .card {
      background: linear-gradient(180deg, rgba(17,24,45,.96), rgba(10,16,32,.96));
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 16px 50px rgba(0,0,0,.32);
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--warn);
      box-shadow: 0 0 14px rgba(245,158,11,.45);
      flex: none;
    }
    .dot.ready {
      background: var(--good);
      box-shadow: 0 0 14px rgba(34,197,94,.45);
    }
    .dot.error {
      background: var(--bad);
      box-shadow: 0 0 14px rgba(239,68,68,.45);
    }
    .status-text { font-weight: 700; }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      background: #16203a;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .primary {
      background: linear-gradient(180deg, #2463eb, #1d4ed8);
      border-color: #2f62e8;
    }
    .danger {
      background: linear-gradient(180deg, #8b1d1d, #7f1d1d);
      border-color: #a12e2e;
    }
    .terminal {
      background: #060b15;
      padding: 18px;
      min-height: 420px;
      max-height: 62vh;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      line-height: 1.45;
    }
    .terminal .muted { color: #7f8ea8; }
    .terminal .blue { color: #60a5fa; }
    .terminal .green { color: #4ade80; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
      background: var(--panel-2);
    }
    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      background: #0b1224;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 12px;
    }
    .prompt {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #4ade80;
      font-weight: 800;
      flex: none;
    }
    input {
      width: 100%;
      min-width: 0;
      background: transparent;
      color: var(--text);
      border: 0;
      outline: 0;
      padding: 14px 0;
      font: inherit;
    }
    .hint {
      padding: 12px 16px 16px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--line);
      background: rgba(15,23,42,.55);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59,130,246,.12);
      color: #93c5fd;
      border: 1px solid rgba(59,130,246,.28);
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    @media (max-width: 720px) {
      .toolbar { grid-template-columns: 1fr; }
      .terminal { min-height: 360px; max-height: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">브라우저 Linux</div>
    <div class="sub">index.html 하나만 GitHub Pages에 올리면 부팅되는 실제 Linux 명령 실행기</div>
  </div>

  <main class="wrap">
    <section class="card">
      <div class="status-row">
        <div class="status-left">
          <div id="dot" class="dot"></div>
          <div>
            <div id="statusText" class="status-text">초기화 중...</div>
            <div class="sub" id="statusSub">에뮬레이터와 Linux 커널을 불러오는 중</div>
          </div>
        </div>
        <div class="actions">
          <span class="badge" id="timer">0.00s</span>
          <button id="clearBtn">출력 지우기</button>
          <button id="reloadBtn" class="danger">재부팅</button>
        </div>
      </div>

      <div id="terminal" class="terminal"><span class="muted">부팅 중...
10~30초 정도 걸릴 수 있음.
</span></div>

      <div class="toolbar">
        <div class="input-wrap">
          <div class="prompt">$</div>
          <input id="cmd" type="text" placeholder="예: uname -a, ls, cat /etc/os-release" disabled />
        </div>
        <button id="runBtn" class="primary" disabled>실행</button>
      </div>

      <div class="hint">
        추천 명령: <code>uname -a</code>, <code>cat /etc/os-release</code>, <code>ls /</code>, <code>free</code>, <code>ps</code>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/v86@0.5.44/build/libv86.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const terminal = $("terminal");
    const cmd = $("cmd");
    const runBtn = $("runBtn");
    const clearBtn = $("clearBtn");
    const reloadBtn = $("reloadBtn");
    const dot = $("dot");
    const statusText = $("statusText");
    const statusSub = $("statusSub");
    const timer = $("timer");

    let emulator = null;
    let ready = false;
    let waiting = false;
    let outputBuffer = "";
    let commandOutput = "";
    let bootStart = performance.now();
    let timerHandle = null;
    const promptRegex = /% $/;
    const MAX_OUTPUT = 60000;

    function setStatus(kind, title, sub) {
      dot.className = "dot" + (kind ? " " + kind : "");
      statusText.textContent = title;
      statusSub.textContent = sub;
    }

    function scrollBottom() {
      terminal.scrollTop = terminal.scrollHeight;
    }

    function append(text) {
      terminal.textContent += text;
      scrollBottom();
    }

    function replace(text) {
      terminal.textContent = text;
      scrollBottom();
    }

    function startClock() {
      timerHandle = setInterval(() => {
        timer.textContent = ((performance.now() - bootStart) / 1000).toFixed(2) + "s";
      }, 50);
    }

    function stopClock() {
      if (timerHandle) clearInterval(timerHandle);
      timerHandle = null;
    }

    function bootLinux() {
      bootStart = performance.now();
      startClock();
      setStatus("", "초기화 중...", "에뮬레이터와 Linux 커널을 불러오는 중");

      emulator = new V86({
        wasm_path: "https://cdn.jsdelivr.net/npm/v86@0.5.44/build/v86.wasm",
        memory_size: 64 * 1024 * 1024,
        vga_memory_size: 2 * 1024 * 1024,
        bios: {
          url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/seabios.bin"
        },
        vga_bios: {
          url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/vgabios.bin"
        },
        bzimage: {
          url: "https://static.simonwillison.net/static/cors-allow/2026/buildroot-bzimage68.bin"
        },
        autostart: true,
        disable_keyboard: true,
        disable_mouse: true
      });

      emulator.add_listener("emulator-started", () => {
        setStatus("", "Linux 부팅 중...", "BusyBox/Buildroot 셸이 뜰 때까지 기다리는 중");
      });

      emulator.add_listener("serial0-output-byte", (byte) => {
        const char = String.fromCharCode(byte);
        if (char === "\r") return;

        outputBuffer += char;
        if (outputBuffer.length > 4096) {
          outputBuffer = outputBuffer.slice(-4096);
        }

        if (!ready && promptRegex.test(outputBuffer)) {
          ready = true;
          cmd.disabled = false;
          runBtn.disabled = false;
          stopClock();
          setStatus("ready", "Linux 준비 완료", "명령어를 입력하면 실제 Linux 셸에서 실행됨");
          replace("Linux booted successfully.\n실행 가능한 실제 Linux 셸이 준비됨.\n\n");
          cmd.focus();
          return;
        }

        if (waiting) {
          if (commandOutput.length < MAX_OUTPUT) {
            commandOutput += char;
          }
          if (promptRegex.test(outputBuffer)) {
            waiting = false;
            cmd.disabled = false;
            runBtn.disabled = false;
            const lines = commandOutput.split("\n");
            const resultLines = lines.slice(1).filter(line => !promptRegex.test(line));
            let result = resultLines.join("\n").replace(/\n+$/, "");
            if (result) append(result + "\n");
            append("\n");
            commandOutput = "";
            cmd.focus();
          }
        }
      });
    }

    function runCommand() {
      const value = cmd.value.trim();
      if (!value || !ready || waiting) return;
      waiting = true;
      outputBuffer = "";
      commandOutput = "";
      append("$ " + value + "\n");
      cmd.disabled = true;
      runBtn.disabled = true;
      emulator.serial0_send(value + "\n");
      cmd.value = "";
    }

    runBtn.addEventListener("click", runCommand);
    cmd.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runCommand();
    });
    clearBtn.addEventListener("click", () => replace(""));
    reloadBtn.addEventListener("click", () => location.reload());

    bootLinux();
  </script>
</body>
</html>
