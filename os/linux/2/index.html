<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>브라우저 Linux</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0b1020;
      color: #e5e7eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .sub {
      color: #aab3c5;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .panel {
      background: #111827;
      border: 1px solid #263041;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .toolbar {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid #263041;
      background: #0f172a;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      color: white;
    }
    .btn-run { background: #2563eb; }
    .btn-clear { background: #374151; }
    .btn-reboot { background: #dc2626; }
    .terminal {
      height: 500px;
      overflow: auto;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      background: #020617;
    }
    .ok { color: #86efac; }
    .err { color: #fca5a5; }
    .muted { color: #94a3b8; }
    .inputbox {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid #263041;
      background: #0f172a;
    }
    textarea {
      width: 100%;
      min-height: 78px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: #e5e7eb;
      padding: 12px;
      font: inherit;
      outline: none;
    }
    .hint {
      padding: 0 12px 12px;
      color: #94a3b8;
      font-size: 13px;
      background: #0f172a;
    }
    iframe {
      width: 0;
      height: 0;
      border: 0;
      position: absolute;
      left: -9999px;
      top: -9999px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">브라우저 Linux</div>
    <div class="sub">
      index.html 하나만 GitHub Pages에 올리면 부팅되는 실제 Linux 명령 실행기<br>
      Linux 준비 완료 시 명령어를 입력하면 실제 셸로 전달됨
    </div>

    <div class="panel">
      <div class="toolbar">
        <button class="btn-clear" id="clearBtn">출력 지우기</button>
        <button class="btn-reboot" id="rebootBtn">재부팅</button>
      </div>

      <div class="terminal" id="terminal"></div>

      <div class="inputbox">
        <textarea id="cmd" spellcheck="false" placeholder='예: uname -a, ls, cat /etc/os-release&#10;여러 줄 붙여넣기도 가능'></textarea>
        <button class="btn-run" id="runBtn">실행</button>
      </div>
      <div class="hint">Shift+Enter = 줄바꿈, Enter = 실행</div>
    </div>

    <!-- 예시용 숨김 iframe -->
    <!-- 네가 실제 Linux를 띄우는 iframe/webvm/v86 iframe이 있다면 id="linuxFrame"만 맞추면 됨 -->
    <iframe id="linuxFrame" src="about:blank"></iframe>
  </div>

  <script>
    const term = document.getElementById('terminal');
    const cmdEl = document.getElementById('cmd');
    const runBtn = document.getElementById('runBtn');
    const clearBtn = document.getElementById('clearBtn');
    const rebootBtn = document.getElementById('rebootBtn');
    const linuxFrame = document.getElementById('linuxFrame');

    let linuxReady = true; // 네 환경에 맞게 실제 ready 신호로 바꿔도 됨
    let busy = false;

    function print(text = '', cls = '') {
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = text;
      term.appendChild(line);
      term.scrollTop = term.scrollHeight;
    }

    function printHtml(html, cls = '') {
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.innerHTML = html;
      term.appendChild(line);
      term.scrollTop = term.scrollHeight;
    }

    function bootMessage() {
      term.innerHTML = '';
      print('Linux booted successfully.', 'ok');
      print('실행 가능한 실제 Linux 셸이 준비됨.', 'ok');
      print('');
      print('추천 명령: uname -a, cat /etc/os-release, ls /, free, ps', 'muted');
      print('');
    }

    bootMessage();

    async function sendCommandToRealShell(command) {
      // 핵심: "화면에만 출력" 말고 실제 셸 stdin으로 보내야 함
      // 아래는 최대한 여러 방식에 대응하는 범용 코드
      const cmdWithNewline = command.endsWith('\n') ? command : command + '\n';

      // 1) postMessage 기반
      try {
        linuxFrame.contentWindow?.postMessage({
          type: 'linux-command',
          command: cmdWithNewline
        }, '*');
      } catch (e) {}

      // 2) 전역 shell 객체가 있는 경우
      if (window.shell && typeof window.shell.write === 'function') {
        window.shell.write(cmdWithNewline);
        return true;
      }

      // 3) 전역 pty 객체가 있는 경우
      if (window.pty && typeof window.pty.write === 'function') {
        window.pty.write(cmdWithNewline);
        return true;
      }

      // 4) wasm tty 입력 함수가 있는 경우
      if (window.termProcess && typeof window.termProcess.input === 'function') {
        window.termProcess.input(cmdWithNewline);
        return true;
      }

      // 5) writer API 기반
      if (window.shellWriter && typeof window.shellWriter.write === 'function') {
        await window.shellWriter.write(cmdWithNewline);
        return true;
      }

      // 6) Module 기반 커스텀 훅
      if (window.Module && typeof window.Module.sendToShell === 'function') {
        window.Module.sendToShell(cmdWithNewline);
        return true;
      }

      // 아무것도 없으면 실패
      return false;
    }

    async function runCommand() {
      if (busy) return;
      const raw = cmdEl.value;
      if (!raw.trim()) return;

      if (!linuxReady) {
        print('[error] Linux가 아직 준비되지 않음', 'err');
        return;
      }

      busy = true;
      runBtn.disabled = true;

      try {
        // 여러 줄 붙여넣기 대응
        const lines = raw.replace(/\r\n/g, '\n').split('\n');
        for (const line of lines) {
          const command = line.trim();
          if (!command) continue;

          print('$ ' + command);

          const ok = await sendCommandToRealShell(command);
          if (!ok) {
            print('[error] 실제 셸로 명령 전달 실패', 'err');
            print('[hint] 지금 페이지는 명령을 화면에만 찍고 있었을 가능성이 큼', 'muted');
            break;
          }
        }

        cmdEl.value = '';
      } catch (e) {
        print('[error] ' + (e?.message || String(e)), 'err');
      } finally {
        busy = false;
        runBtn.disabled = false;
        cmdEl.focus();
      }
    }

    runBtn.addEventListener('click', runCommand);

    cmdEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        runCommand();
      }
    });

    clearBtn.addEventListener('click', () => {
      term.innerHTML = '';
    });

    rebootBtn.addEventListener('click', () => {
      linuxReady = false;
      term.innerHTML = '';
      print('재부팅 중...', 'muted');

      setTimeout(() => {
        linuxReady = true;
        bootMessage();
      }, 1200);
    });

    // 실제 Linux iframe/worker 쪽에서 출력 보내주면 여기서 받아서 터미널에 표시
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data) return;

      if (data.type === 'linux-output') {
        print(String(data.output ?? ''));
      } else if (data.type === 'linux-error') {
        print(String(data.error ?? ''), 'err');
      } else if (data.type === 'linux-ready') {
        linuxReady = true;
        print('Linux 준비 완료', 'ok');
      }
    });
  </script>
</body>
</html>
