<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linux 8 - Buildroot Serial Real Boot</title>
  <link rel="stylesheet" href="../../real-os/launcher.css?v=20260705-gui2" />
</head>
<body>
  <main>
    <section class="card">
      <h1 id="title"></h1>
      <p id="desc"></p>
      <div class="actions"><button id="boot-btn">부팅</button><button id="stop-btn" class="danger">중지</button><button id="full-btn" class="secondary">전체화면</button></div>
      <pre id="log">[ready]</pre>
    </section>
    <section class="card" id="screen-wrap"><div id="screen"></div></section>
  </main>
  <script>
    window.REAL_OS_CONFIG = {
      name: 'Linux 8 (Buildroot Serial Console, Real VM)',
      description: 'Buildroot 커널을 serial/tty0 콘솔 출력으로 부팅합니다.',
      memory: 192 * 1024 * 1024,
      vgaMemory: 8 * 1024 * 1024,
      boot: {
        bzimage: { url: 'https://i.copy.sh/buildroot-bzimage68.bin', async: true },
        cmdline: 'rw root=/dev/ram0 console=ttyS0 console=tty0 init=/sbin/init'
      }
    };
  </script>
  <script src="../../real-os/launcher.js?v=20260705-gui2"></script>
</body>
</html>
