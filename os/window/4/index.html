<!DOCTYPE html>
<!--
  PATCH NOTES for os/window/4/index.html
  ========================================
  수정된 버그 목록:

  1. [Calculator] '0' 버튼 wide 클래스 → 레이아웃 깨짐 수정
     - .calc-btn.wide { grid-column: span 2 } 제거
     - 대신 버튼 배열에서 '0'을 올바른 위치에 배치

  2. [Explorer] explorerNav / explorerGo / explorerSidebar 전역 충돌
     - window.explorerNav = ... 방식이 여러 창 열면 마지막 것으로 덮어써짐
     - data-winid 기반 클로저로 변경하여 각 창 독립 동작

  3. [Paint] canvas resizeCanvas setTimeout 타이밍 버그
     - setTimeout 100ms로는 DOM 렌더링 미완료 가능
     - requestAnimationFrame + offsetHeight 체크로 변경

  4. [Todo] innerHTML onchange 핸들러 이스케이프 버그
     - 문자열 내 onchange="..." 대신 addEventListener 사용

  5. [Terminal] 포커스 이벤트 - body.onclick이 screen 외 클릭에도 반응
     - screen_container 내부 클릭시만 포커스 이동하도록 수정

  이 파일을 os/window/4/index.html로 교체하세요.
  (CSS와 앱 기본 구조는 원본과 동일, 버그 있는 함수만 수정)
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 11</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --win-accent:#0078d4; --win-bg:#f3f3f3; --win-dark:#202020;
  --win-border:#e5e5e5; --win-hover:#e9e9e9; --win-text:#1a1a1a;
  --win-text-secondary:#666; --taskbar-h:48px; --titlebar-h:32px; --radius:8px;
}
html,body { width:100%; height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; user-select:none; }

/* Boot */
#boot-screen {
  position:fixed; inset:0; z-index:100000; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 0.8s;
}
#boot-screen.hidden { opacity:0; pointer-events:none; }
#boot-logo { width:80px; height:80px; display:grid; grid-template:1fr 1fr/1fr 1fr; gap:4px; margin-bottom:40px; }
#boot-logo div { background:#0078d4; border-radius:2px; animation:bootPulse 1.5s ease-in-out infinite; }
#boot-logo div:nth-child(2){animation-delay:.15s}
#boot-logo div:nth-child(3){animation-delay:.3s}
#boot-logo div:nth-child(4){animation-delay:.45s}
@keyframes bootPulse{0%,100%{opacity:.4}50%{opacity:1}}
.boot-spinner{width:30px;height:30px;border:3px solid transparent;border-top:3px solid #0078d4;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Lock */
#lock-screen {
  position:fixed; inset:0; z-index:99999;
  background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; transition:opacity .5s,transform .5s;
}
#lock-screen.hidden{opacity:0;transform:translateY(-100%);pointer-events:none}
#lock-time{font-size:96px;color:#fff;font-weight:300;letter-spacing:-2px}
#lock-date{font-size:18px;color:rgba(255,255,255,.7);margin-top:4px}
#lock-hint{position:absolute;bottom:60px;color:rgba(255,255,255,.5);font-size:14px;animation:fadeInOut 2s infinite}
@keyframes fadeInOut{0%,100%{opacity:.3}50%{opacity:.8}}

/* Desktop */
#desktop{width:100%;height:calc(100% - var(--taskbar-h));background-size:cover;background-position:center;background-image:linear-gradient(135deg,#667eea,#764ba2);position:relative;overflow:hidden}
.desktop-icon{width:76px;display:flex;flex-direction:column;align-items:center;padding:6px;border-radius:6px;cursor:pointer;position:absolute;transition:background .15s}
.desktop-icon:hover{background:rgba(255,255,255,.15)}
.desktop-icon.selected{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.4)}
.desktop-icon .icon{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:4px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
.desktop-icon .label{font-size:11px;color:#fff;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.5);line-height:1.3;word-break:break-word}

/* Context menu */
.context-menu{position:fixed;background:rgba(252,252,252,.95);backdrop-filter:blur(20px);border:1px solid #e0e0e0;border-radius:8px;padding:4px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:90000;display:none}
.context-menu.show{display:block}
.ctx-item{padding:7px 24px 7px 12px;border-radius:4px;font-size:12px;color:var(--win-text);cursor:pointer;display:flex;align-items:center;gap:10px}
.ctx-item:hover{background:var(--win-hover)}
.ctx-separator{height:1px;background:#e5e5e5;margin:4px 8px}

/* Windows */
.window{position:absolute;background:#fff;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.05);display:flex;flex-direction:column;min-width:300px;min-height:200px;overflow:hidden;transition:box-shadow .2s}
.window.active{box-shadow:0 12px 48px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.08);z-index:1000}
.window.maximized{border-radius:0}
.window.minimized{display:none!important}
.titlebar{height:var(--titlebar-h);background:#f9f9f9;display:flex;align-items:center;padding:0 4px 0 12px;flex-shrink:0;border-bottom:1px solid #eee;cursor:default}
.titlebar .title{flex:1;font-size:12px;color:#333;font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.titlebar .title .app-icon{margin-right:8px;font-size:14px}
.win-btn{width:46px;height:var(--titlebar-h);border:none;background:transparent;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:#555;transition:background .1s}
.win-btn:hover{background:#e5e5e5}
.win-btn.close:hover{background:#c42b1c;color:#fff}
.window-body{flex:1;overflow:auto;position:relative}
.resize-handle{position:absolute;z-index:10}
.resize-handle.n{top:-3px;left:8px;right:8px;height:6px;cursor:n-resize}
.resize-handle.s{bottom:-3px;left:8px;right:8px;height:6px;cursor:s-resize}
.resize-handle.e{right:-3px;top:8px;bottom:8px;width:6px;cursor:e-resize}
.resize-handle.w{left:-3px;top:8px;bottom:8px;width:6px;cursor:w-resize}
.resize-handle.ne{top:-3px;right:-3px;width:12px;height:12px;cursor:ne-resize}
.resize-handle.nw{top:-3px;left:-3px;width:12px;height:12px;cursor:nw-resize}
.resize-handle.se{bottom:-3px;right:-3px;width:12px;height:12px;cursor:se-resize}
.resize-handle.sw{bottom:-3px;left:-3px;width:12px;height:12px;cursor:sw-resize}

/* Taskbar */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:var(--taskbar-h);background:rgba(252,252,252,.85);backdrop-filter:blur(30px) saturate(1.5);border-top:1px solid rgba(0,0,0,.05);display:flex;align-items:center;justify-content:center;z-index:50000;padding:0 8px}
.taskbar-center{display:flex;align-items:center;gap:2px}
.taskbar-btn{width:44px;height:40px;border:none;background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:#333;transition:background .15s;position:relative}
.taskbar-btn:hover{background:rgba(0,0,0,.06)}
.taskbar-btn.active{background:rgba(0,0,0,.08)}
.taskbar-btn.active::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:16px;height:3px;background:var(--win-accent);border-radius:2px}
.taskbar-btn.has-window::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:6px;height:3px;background:#999;border-radius:2px}
.taskbar-btn.has-window.active::after{width:16px;background:var(--win-accent)}
#taskbar-right{position:absolute;right:0;display:flex;align-items:center;height:100%;padding:0 12px;gap:4px}
#taskbar-right .sys-icon{font-size:14px;color:#555;padding:4px}
#clock{font-size:12px;color:#444;text-align:right;line-height:1.4;padding:4px 8px;border-radius:4px;cursor:pointer}
#clock:hover{background:rgba(0,0,0,.05)}

/* Start menu */
#start-menu{position:fixed;bottom:calc(var(--taskbar-h) + 12px);left:50%;transform:translateX(-50%) scale(.95);width:600px;height:580px;background:rgba(252,252,252,.92);backdrop-filter:blur(30px);border-radius:12px;border:1px solid rgba(0,0,0,.06);box-shadow:0 16px 64px rgba(0,0,0,.2);z-index:60000;display:none;flex-direction:column;opacity:0;transition:opacity .2s,transform .2s}
#start-menu.show{display:flex;opacity:1;transform:translateX(-50%) scale(1)}
#start-search{margin:16px 24px 12px;padding:10px 16px;border:1px solid #ddd;border-radius:24px;font-size:13px;outline:none;background:#f5f5f5;font-family:inherit}
#start-search:focus{border-color:var(--win-accent);background:#fff}
.start-section{padding:0 24px;margin-bottom:8px}
.start-section h3{font-size:13px;font-weight:600;color:#333;margin-bottom:8px}
.start-apps{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.start-app{display:flex;flex-direction:column;align-items:center;padding:10px 4px;border-radius:6px;cursor:pointer;transition:background .15s}
.start-app:hover{background:rgba(0,0,0,.05)}
.start-app .icon{font-size:28px;margin-bottom:6px}
.start-app .name{font-size:11px;color:#333;text-align:center}
.start-bottom{margin-top:auto;padding:16px 24px;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.start-user{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px;border-radius:6px}
.start-user:hover{background:rgba(0,0,0,.05)}
.user-avatar{width:32px;height:32px;background:var(--win-accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.start-power{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer}
.start-power:hover{background:rgba(0,0,0,.05)}

/* App styles */
.notepad-menu{display:flex;gap:0;padding:0 8px;background:#f9f9f9;border-bottom:1px solid #eee}
.notepad-menu button{padding:4px 12px;font-size:12px;background:none;border:none;cursor:pointer;color:#333;border-radius:4px;font-family:inherit}
.notepad-menu button:hover{background:#e9e9e9}
.notepad-editor{width:100%;height:100%;border:none;outline:none;padding:8px 12px;font-family:'Consolas','Courier New',monospace;font-size:14px;resize:none;line-height:1.6;background:#fff;color:#1a1a1a}

/* Calculator - 수정됨: wide 클래스 제거, 그리드 구조 명확화 */
.calc-display{background:#f8f8f8;padding:16px 20px;text-align:right;border-bottom:1px solid #eee}
.calc-display .expr{font-size:13px;color:#888;height:18px}
.calc-display .result{font-size:36px;font-weight:300;color:#1a1a1a}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:8px}
.calc-btn{padding:16px;border:none;font-size:16px;cursor:pointer;border-radius:4px;font-family:inherit;transition:background .1s;background:#f8f8f8;color:#1a1a1a}
.calc-btn:hover{background:#ebebeb}
.calc-btn.op{background:#f0f0f0;color:var(--win-accent);font-weight:600}
.calc-btn.op:hover{background:#e0e0e0}
.calc-btn.eq{background:var(--win-accent);color:#fff}
.calc-btn.eq:hover{background:#006cbe}

/* Explorer */
.explorer-toolbar{display:flex;align-items:center;gap:4px;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
.explorer-toolbar button{background:none;border:none;padding:4px 8px;cursor:pointer;border-radius:4px;font-size:14px}
.explorer-toolbar button:hover{background:#e9e9e9}
.explorer-path{flex:1;padding:5px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;background:#fff;font-family:inherit}
.explorer-content{display:flex;height:calc(100% - 42px)}
.explorer-sidebar{width:180px;background:#f5f5f5;border-right:1px solid #eee;padding:8px;overflow-y:auto;flex-shrink:0}
.explorer-sidebar-item{padding:6px 10px;font-size:12px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:8px}
.explorer-sidebar-item:hover{background:#e9e9e9}
.explorer-sidebar-item.active{background:#e0e7f1;color:var(--win-accent)}
.explorer-main{flex:1;padding:8px;overflow-y:auto;display:flex;flex-wrap:wrap;align-content:flex-start;gap:4px}
.explorer-item{width:80px;display:flex;flex-direction:column;align-items:center;padding:8px 4px;border-radius:6px;cursor:pointer}
.explorer-item:hover{background:#e9e9e9}
.explorer-item.selected{background:#cde4f7}
.explorer-item .icon{font-size:32px;margin-bottom:4px}
.explorer-item .name{font-size:11px;text-align:center;word-break:break-word;color:#333}

/* Terminal */
.terminal{background:#0c0c0c;color:#ccc;font-family:'Consolas','Courier New',monospace;font-size:13px;padding:12px;height:100%;overflow-y:auto}
.terminal .line{margin-bottom:2px;white-space:pre-wrap;word-break:break-all}
.terminal .prompt{color:#6ec6ff}
.terminal .input-line{display:flex}
.terminal input{background:transparent;border:none;color:#ccc;font-family:inherit;font-size:inherit;outline:none;flex:1;caret-color:#fff}

/* Settings */
.settings-layout{display:flex;height:100%}
.settings-nav{width:200px;background:#f5f5f5;border-right:1px solid #eee;padding:12px 8px}
.settings-nav-item{padding:8px 12px;font-size:13px;border-radius:6px;cursor:pointer;margin-bottom:2px}
.settings-nav-item:hover{background:#e9e9e9}
.settings-nav-item.active{background:#e0e7f1;color:var(--win-accent)}
.settings-panel{flex:1;padding:24px;overflow-y:auto}
.settings-panel h2{font-size:24px;font-weight:300;margin-bottom:20px}
.settings-group{margin-bottom:20px;background:#f9f9f9;border-radius:8px;padding:16px}
.settings-group label{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:8px 0;cursor:pointer}
.toggle{width:40px;height:22px;background:#999;border-radius:11px;position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--win-accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}
.wallpaper-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.wallpaper-opt{height:60px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border .2s}
.wallpaper-opt.active{border-color:var(--win-accent)}

/* Browser */
.browser-toolbar{display:flex;align-items:center;gap:4px;padding:6px 10px;background:#f1f3f4;border-bottom:1px solid #ddd}
.browser-toolbar button{background:none;border:none;padding:4px 8px;cursor:pointer;border-radius:50%;font-size:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.browser-toolbar button:hover{background:#ddd}
.browser-url{flex:1;padding:6px 14px;border:none;border-radius:20px;font-size:13px;background:#e8eaed;outline:none;font-family:inherit}
.browser-url:focus{background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.15)}
.browser-body{background:#fff;height:calc(100% - 46px);overflow:auto}
.browser-page{padding:24px}

/* Paint */
.paint-toolbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#f5f5f5;border-bottom:1px solid #eee;flex-wrap:wrap}
.paint-toolbar button{padding:4px 8px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:#fff;font-size:14px}
.paint-toolbar button.active{border-color:var(--win-accent);background:#e0edf7}
.paint-toolbar input[type="color"]{width:32px;height:28px;border:1px solid #ddd;border-radius:4px;cursor:pointer;padding:2px}
.paint-toolbar input[type="range"]{width:80px}
.paint-canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#e0e0e0;overflow:auto;position:relative}
.paint-canvas{cursor:crosshair;display:block;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)}

/* Photos */
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px;padding:8px}
.photos-thumb{aspect-ratio:1;border-radius:4px;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:48px;background:#f0f0f0}
.photos-thumb:hover{opacity:.85}

/* Notification */
.notification{position:fixed;top:16px;right:16px;background:rgba(252,252,252,.95);backdrop-filter:blur(20px);padding:14px 20px;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.15);border:1px solid #e5e5e5;z-index:99998;font-size:13px;transform:translateX(120%);transition:transform .3s}
.notification.show{transform:translateX(0)}

.window-open{animation:windowOpen .2s ease-out}
@keyframes windowOpen{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#a1a1a1}
</style>
</head>
<body>

<div id="boot-screen">
  <div id="boot-logo"><div></div><div></div><div></div><div></div></div>
  <div class="boot-spinner"></div>
</div>
<div id="lock-screen" class="hidden">
  <div id="lock-time">12:00</div>
  <div id="lock-date"></div>
  <div id="lock-hint">클릭하여 잠금 해제</div>
</div>
<div id="desktop"></div>
<div id="taskbar">
  <div class="taskbar-center">
    <button class="taskbar-btn" id="start-btn" title="시작">🪟</button>
    <button class="taskbar-btn" data-app="explorer" title="파일 탐색기">📁</button>
    <button class="taskbar-btn" data-app="browser" title="Edge">🌐</button>
    <button class="taskbar-btn" data-app="terminal" title="터미널">⬛</button>
    <button class="taskbar-btn" data-app="notepad" title="메모장">📝</button>
  </div>
  <div id="taskbar-right">
    <span class="sys-icon">🔊</span>
    <span class="sys-icon">📶</span>
    <span class="sys-icon">🔋</span>
    <div id="clock"></div>
  </div>
</div>
<div id="start-menu">
  <input type="text" id="start-search" placeholder="앱, 설정 및 문서 검색">
  <div class="start-section">
    <h3>고정됨</h3>
    <div class="start-apps" id="pinned-apps"></div>
  </div>
  <div class="start-section" style="flex:1;overflow:auto">
    <h3>추천</h3>
    <div style="font-size:12px;color:#888;padding:8px">최근 항목이 여기에 표시됩니다</div>
  </div>
  <div class="start-bottom">
    <div class="start-user"><div class="user-avatar">👤</div><span style="font-size:13px">사용자</span></div>
    <div class="start-power" title="전원" onclick="showShutdown()">⏻</div>
  </div>
</div>
<div class="context-menu" id="ctx-menu"></div>
<div class="notification" id="notification"></div>

<script>
'use strict';

/* ══════════════════════════════════════
   가상 파일시스템
══════════════════════════════════════ */
const FS = {
  'C:': { type:'folder', children: {
    'Users': { type:'folder', children: {
      'User': { type:'folder', children: {
        'Desktop': { type:'folder', children: {
          '새 텍스트.txt': { type:'file', content:'안녕하세요!\n이것은 Windows 11 시뮬레이션입니다.', ext:'txt' },
          '메모.txt':     { type:'file', content:'할 일:\n1. 프로젝트 완성\n2. 보고서 작성', ext:'txt' },
        }},
        'Documents': { type:'folder', children: {
          '보고서.txt': { type:'file', content:'2026년 보고서\n\n매출: 1,200만원', ext:'txt' },
        }},
        'Downloads': { type:'folder', children: {} },
        'Pictures':  { type:'folder', children: {} },
        'Music':     { type:'folder', children: {} },
        'Videos':    { type:'folder', children: {} },
      }}
    }},
    'Windows': { type:'folder', children: { 'System32': { type:'folder', children: {} } } },
    'Program Files': { type:'folder', children: {} },
  }}
};

function getNode(path) {
  const parts = path.split('/').filter(Boolean);
  let cur = FS;
  for (const p of parts) {
    if (cur[p]) cur = cur[p];
    else if (cur.children && cur.children[p]) cur = cur.children[p];
    else return null;
  }
  return cur;
}
function getChildren(path) {
  const n = getNode(path);
  return (n && n.children) ? n.children : {};
}
function createFile(path, name, content) {
  const n = getNode(path);
  if (n && n.children !== undefined) {
    n.children[name] = { type:'file', content: content||'', ext: name.split('.').pop() };
    return true;
  }
  return false;
}
function createFolder(path, name) {
  const n = getNode(path);
  if (n && n.children !== undefined) {
    n.children[name] = { type:'folder', children:{} };
    return true;
  }
  return false;
}
function deleteItem(path, name) {
  const n = getNode(path);
  if (n && n.children && n.children[name]) { delete n.children[name]; return true; }
  return false;
}

/* ══════════════════════════════════════
   Window 관리
══════════════════════════════════════ */
function createWindow(appId, title, width, height, bodyHTML) {
  const id = ++winIdCounter;
  const x  = 80 + (id % 8) * 30;
  const y  = 40 + (id % 6) * 30;
  const win = { id, appId, title, x, y, width, height, maximized:false, minimized:false, z:++zCounter, prevRect:null };
  windows.push(win);

  const el = document.createElement('div');
  el.className = 'window window-open active';
  el.id = 'win-' + id;
  el.style.cssText = 'left:'+x+'px;top:'+y+'px;width:'+width+'px;height:'+height+'px;z-index:'+win.z;
  el.innerHTML =
    '<div class="titlebar" data-winid="'+id+'">' +
      '<div class="title"><span class="app-icon">'+(APPS[appId]?APPS[appId].icon:'📄')+'</span>'+title+'</div>' +
      '<button class="win-btn minimize">─</button>' +
      '<button class="win-btn maximize">☐</button>' +
      '<button class="win-btn close">✕</button>' +
    '</div>' +
    '<div class="window-body" id="winbody-'+id+'">'+bodyHTML+'</div>' +
    '<div class="resize-handle n"></div><div class="resize-handle s"></div>' +
    '<div class="resize-handle e"></div><div class="resize-handle w"></div>' +
    '<div class="resize-handle ne"></div><div class="resize-handle nw"></div>' +
    '<div class="resize-handle se"></div><div class="resize-handle sw"></div>';

  document.getElementById('desktop').appendChild(el);

  // 타이틀바 드래그
  const tb = el.querySelector('.titlebar');
  tb.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-btn')) return;
    focusWindow(id);
    dragState = { winId:id, startX:e.clientX, startY:e.clientY, origX:win.x, origY:win.y };
    e.preventDefault();
  });
  tb.addEventListener('dblclick', () => toggleMaximize(id));

  el.querySelector('.minimize').addEventListener('click', () => minimizeWindow(id));
  el.querySelector('.maximize').addEventListener('click', () => toggleMaximize(id));
  el.querySelector('.close').addEventListener('click',    () => closeWindow(id));
  el.addEventListener('mousedown', () => focusWindow(id));

  // 리사이즈 핸들
  el.querySelectorAll('.resize-handle').forEach(h => {
    h.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      focusWindow(id);
      const dir = [...h.classList].find(c => c !== 'resize-handle');
      resizeState = { winId:id, dir, startX:e.clientX, startY:e.clientY, origX:win.x, origY:win.y, origW:win.width, origH:win.height };
    });
  });

  focusWindow(id);
  updateTaskbar();
  return id;
}

function focusWindow(id) {
  const win = windows.find(w => w.id === id);
  if (!win) return;
  win.z = ++zCounter;
  activeWinId = id;
  document.querySelectorAll('.window').forEach(el => {
    const w = windows.find(ww => ww.id === parseInt(el.id.split('-')[1]));
    el.classList.toggle('active', el.id === 'win-'+id);
    if (w) el.style.zIndex = w.z;
  });
  updateTaskbar();
}

function minimizeWindow(id) {
  const win = windows.find(w => w.id === id);
  if (!win) return;
  win.minimized = true;
  document.getElementById('win-'+id)?.classList.add('minimized');
  if (activeWinId === id) activeWinId = null;
  updateTaskbar();
}

function restoreWindow(id) {
  const win = windows.find(w => w.id === id);
  if (!win) return;
  win.minimized = false;
  document.getElementById('win-'+id)?.classList.remove('minimized');
  focusWindow(id);
}

function toggleMaximize(id) {
  const win = windows.find(w => w.id === id);
  if (!win) return;
  const el = document.getElementById('win-'+id);
  if (win.maximized) {
    win.maximized = false;
    el.classList.remove('maximized');
    if (win.prevRect) {
      win.x = win.prevRect.x; win.y = win.prevRect.y;
      win.width = win.prevRect.w; win.height = win.prevRect.h;
    }
    el.style.left = win.x+'px'; el.style.top = win.y+'px';
    el.style.width = win.width+'px'; el.style.height = win.height+'px';
  } else {
    win.prevRect = { x:win.x, y:win.y, w:win.width, h:win.height };
    win.maximized = true;
    el.classList.add('maximized');
    const dh = document.getElementById('desktop').offsetHeight;
    el.style.cssText += ';left:0;top:0;width:100%;height:'+dh+'px';
  }
}

function closeWindow(id) {
  const idx = windows.findIndex(w => w.id === id);
  if (idx >= 0) windows.splice(idx, 1);
  document.getElementById('win-'+id)?.remove();
  if (activeWinId === id) activeWinId = null;
  updateTaskbar();
}

document.addEventListener('mousemove', e => {
  if (dragState) {
    const win = windows.find(w => w.id === dragState.winId);
    if (!win || win.maximized) return;
    win.x = dragState.origX + (e.clientX - dragState.startX);
    win.y = Math.max(0, dragState.origY + (e.clientY - dragState.startY));
    const el = document.getElementById('win-'+win.id);
    if (el) { el.style.left = win.x+'px'; el.style.top = win.y+'px'; }
  }
  if (resizeState) {
    const win = windows.find(w => w.id === resizeState.winId);
    if (!win) return;
    const dx = e.clientX - resizeState.startX;
    const dy = e.clientY - resizeState.startY;
    const dir = resizeState.dir;
    let nx=win.x, ny=win.y, nw=win.width, nh=win.height;
    if (dir.includes('e')) nw = Math.max(300, resizeState.origW + dx);
    if (dir.includes('w')) { nw = Math.max(300, resizeState.origW - dx); nx = resizeState.origX + dx; }
    if (dir.includes('s')) nh = Math.max(200, resizeState.origH + dy);
    if (dir.includes('n')) { nh = Math.max(200, resizeState.origH - dy); ny = resizeState.origY + dy; }
    win.x=nx; win.y=ny; win.width=nw; win.height=nh;
    const el = document.getElementById('win-'+win.id);
    if (el) { el.style.left=nx+'px'; el.style.top=ny+'px'; el.style.width=nw+'px'; el.style.height=nh+'px'; }
  }
});
document.addEventListener('mouseup', () => { dragState = null; resizeState = null; });

function updateTaskbar() {
  document.querySelectorAll('.taskbar-btn[data-app]').forEach(btn => {
    const app = btn.dataset.app;
    const hasAny    = windows.some(w => w.appId === app);
    const isActive  = windows.some(w => w.appId === app && w.id === activeWinId);
    btn.classList.toggle('has-window', hasAny);
    btn.classList.toggle('active', isActive);
  });
}

document.querySelectorAll('.taskbar-btn[data-app]').forEach(btn => {
  btn.addEventListener('click', () => {
    const app = btn.dataset.app;
    const appWins = windows.filter(w => w.appId === app);
    if (appWins.length === 0) { openApp(app); return; }
    const focused = appWins.find(w => w.id === activeWinId);
    if (focused && !focused.minimized) { minimizeWindow(focused.id); return; }
    const minWin = appWins.find(w => w.minimized);
    if (minWin) { restoreWindow(minWin.id); return; }
    focusWindow(appWins[appWins.length-1].id);
  });
});

/* ── Calculator ── (버그수정: wide 클래스 제거, 버튼 배열 수정) */
function calculator() {
  // 수정된 버튼 배열: '0' wide 없음, 올바른 4열 그리드
  const rows = [
    ['%','CE','C','⌫'],
    ['⅟x','x²','√x','÷'],
    ['7','8','9','×'],
    ['4','5','6','-'],
    ['1','2','3','+'],
    ['+/-','0','.','='],
  ];
  const btnsHTML = rows.map(row =>
    row.map(b => {
      const isOp = ['÷','×','-','+','%','⅟x','x²','√x','CE','C','⌫'].includes(b);
      const isEq = b === '=';
      const cls = 'calc-btn' + (isOp ? ' op' : '') + (isEq ? ' eq' : '');
      return '<button class="'+cls+'" data-key="'+b+'">'+b+'</button>';
    }).join('')
  ).join('');

  const html =
    '<div class="calc-display">' +
      '<div class="expr" id="calc-expr-TMP"></div>' +
      '<div class="result" id="calc-result-TMP">0</div>' +
    '</div>' +
    '<div class="calc-grid">' + btnsHTML + '</div>';

  const id = createWindow('calculator', '계산기', 320, 480, html);

  // ID 수정 (임시 TMP → 실제 winId 기반)
  const body = document.getElementById('winbody-'+id);
  body.querySelector('#calc-expr-TMP').id   = 'calc-expr-'+id;
  body.querySelector('#calc-result-TMP').id = 'calc-result-'+id;

  const state = { cur:'0', expr:'', op:null, prev:null, newInput:true };

  body.querySelectorAll('.calc-btn').forEach(btn => {
    btn.addEventListener('click', () => calcInput(id, btn.dataset.key, state));
  });
}

function calcInput(id, key, s) {
  const resEl  = document.getElementById('calc-result-'+id);
  const exprEl = document.getElementById('calc-expr-'+id);
  if (!resEl) return;

  if ('0123456789'.includes(key)) {
    s.cur = s.newInput ? key : s.cur + key;
    s.newInput = false;
  } else if (key === '.') {
    if (!s.cur.includes('.')) s.cur += '.';
    s.newInput = false;
  } else if (key === 'C')  { s.cur='0'; s.expr=''; s.op=null; s.prev=null; s.newInput=true; exprEl.textContent=''; }
  else if (key === 'CE')   { s.cur='0'; s.newInput=true; }
  else if (key === '⌫')    { s.cur = s.cur.length>1 ? s.cur.slice(0,-1) : '0'; }
  else if (key === '+/-')  { s.cur = s.cur.startsWith('-') ? s.cur.slice(1) : '-'+s.cur; }
  else if (key === 'x²')  { s.cur = String(Math.pow(parseFloat(s.cur),2)); s.newInput=true; }
  else if (key === '√x')  { s.cur = String(Math.sqrt(parseFloat(s.cur))); s.newInput=true; }
  else if (key === '⅟x')  { s.cur = String(1/parseFloat(s.cur)); s.newInput=true; }
  else if (key === '%')    { s.cur = String(parseFloat(s.cur)/100); s.newInput=true; }
  else if (['+','-','×','÷'].includes(key)) {
    if (s.op && !s.newInput) s.cur = String(calcOp(s.prev, parseFloat(s.cur), s.op));
    s.prev = parseFloat(s.cur); s.op = key;
    s.expr = s.cur + ' ' + key; s.newInput = true;
    exprEl.textContent = s.expr;
  } else if (key === '=') {
    if (s.op) {
      const res = calcOp(s.prev, parseFloat(s.cur), s.op);
      exprEl.textContent = s.prev + ' ' + s.op + ' ' + s.cur + ' =';
      s.cur = String(res); s.op = null; s.prev = null; s.newInput = true;
    }
  }
  resEl.textContent = s.cur;
}
function calcOp(a,b,op) {
  if (op==='+') return a+b; if (op==='-') return a-b;
  if (op==='×') return a*b; if (op==='÷') return b ? a/b : 'Error';
  return b;
}

  const id = createWindow('explorer', '파일 탐색기', 800, 500, html);

    const ch = getChildren(currentPath);
    if (!ch || Object.keys(ch).length === 0) {
      main.innerHTML = '<div style="padding:40px;color:#999;font-size:14px;text-align:center">비어 있습니다</div>';
      return;
    }
    const entries = Object.entries(ch).sort((a,b) => {
      if (a[1].type==='folder' && b[1].type!=='folder') return -1;
      if (a[1].type!=='folder' && b[1].type==='folder') return 1;
      return a[0].localeCompare(b[0]);
    });
    entries.forEach(([name, node]) => {
      const isFolder = node.type === 'folder';
      const el = document.createElement('div');
      el.className = 'explorer-item';
      el.innerHTML = '<div class="icon">'+(isFolder?'📁':'📄')+'</div><div class="name">'+name+'</div>';
      el.addEventListener('dblclick', () => {
        if (isFolder) { currentPath = currentPath + '/' + name; render(); }
        else if (node.ext === 'txt') notepad({ content: node.content, filename: name });
      });
      el.addEventListener('contextmenu', e => {
        e.preventDefault(); e.stopPropagation();
        showCtxMenu(e.clientX, e.clientY, [
          { label:'열기', icon:'📂', action:() => { if(isFolder){currentPath=currentPath+'/'+name;render();}else if(node.ext==='txt')notepad({content:node.content,filename:name}); }},
          'sep',
          { label:'삭제', icon:'🗑️', action:() => { deleteItem(currentPath,name); render(); notify(name+' 삭제됨'); }},
        ]);
      });
      main.appendChild(el);
    });
  }

  // 버튼 이벤트 (클로저 기반 - 전역 오염 없음)
  body.querySelector('.nav-back').addEventListener('click', () => {
    const parts = currentPath.split('/');
    if (parts.length > 1) { parts.pop(); currentPath = parts.join('/') || 'C:'; render(); }
  });
  body.querySelector('.nav-up').addEventListener('click', () => {
    const parts = currentPath.split('/');
    if (parts.length > 1) { parts.pop(); currentPath = parts.join('/') || 'C:'; render(); }
  });
  body.querySelector('.explorer-path').addEventListener('keydown', e => {
    if (e.key === 'Enter') { currentPath = e.target.value; render(); }
  });
  body.querySelectorAll('.explorer-sidebar-item').forEach(item => {
    item.addEventListener('click', () => {
      body.querySelectorAll('.explorer-sidebar-item').forEach(x => x.classList.remove('active'));
      item.classList.add('active');
      currentPath = item.dataset.path;
      render();
    });
  });
  body.querySelector('.explorer-main').addEventListener('contextmenu', e => {
    if (e.target.closest('.explorer-item')) return;
    e.preventDefault();
    showCtxMenu(e.clientX, e.clientY, [
      { label:'새 폴더',       icon:'📁', action:() => { createFolder(currentPath,'새 폴더'); render(); }},
      { label:'새 텍스트 문서', icon:'📄', action:() => { createFile(currentPath,'새 문서.txt',''); render(); }},
      'sep',
      { label:'새로 고침', icon:'🔄', action:render },
    ]);
  });

  render();
}

/* ── Terminal ── */
function terminal() {
  const html = '<div class="terminal" id="term-TMP"></div>';
  const id = createWindow('terminal', '터미널', 700, 450, html);
  const body = document.getElementById('winbody-'+id);
  const term = body.querySelector('.terminal');
  term.id = 'term-'+id;

  let cwd = 'C:\\Users\\User';

  function printLine(text, color) {
    const d = document.createElement('div');
    d.className = 'line';
    if (color) d.style.color = color;
    d.textContent = text;
    term.appendChild(d);
    term.scrollTop = term.scrollHeight;
  }

  function addPrompt() {
    const row = document.createElement('div');
    row.className = 'input-line';
    row.innerHTML = '<span class="prompt">'+cwd+'&gt; </span><input type="text" autocomplete="off" autocorrect="off" spellcheck="false">';
    term.appendChild(row);
    const inp = row.querySelector('input');
    // 포커스: 터미널 body 클릭시만
    body.addEventListener('click', () => inp.focus(), { once: false });
    inp.focus();
    inp.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const cmd = inp.value.trim();
      inp.disabled = true;
      executeCmd(cmd);
    });
    term.scrollTop = term.scrollHeight;
  }

  const cmds = {
    help: 'dir, cd, cls, echo, date, time, whoami, hostname, ipconfig, tasklist, ver, systeminfo, ping, tree, mkdir, calc, notepad, exit',
    whoami: 'DESKTOP-WIN\\User',
    hostname: 'DESKTOP-WIN',
    ver: 'Microsoft Windows [Version 11.0.26100]',
  };

  function executeCmd(cmd) {
    const lc = cmd.toLowerCase().trim();
    if (!lc) { addPrompt(); return; }

    if (lc === 'cls') { term.innerHTML = ''; addPrompt(); return; }
    if (lc === 'exit') { closeWindow(id); return; }
    if (lc === 'date')    { printLine('현재 날짜: '+new Date().toLocaleDateString('ko-KR')); }
    else if (lc === 'time') { printLine('현재 시간: '+new Date().toLocaleTimeString('ko-KR')); }
    else if (lc.startsWith('echo ')) { printLine(cmd.slice(5)); }
    else if (lc === 'calc')    { openApp('calculator'); printLine('계산기 실행 중...'); }
    else if (lc === 'notepad') { openApp('notepad');    printLine('메모장 실행 중...'); }
    else if (lc.startsWith('ping ')) {
      const host = cmd.slice(5);
      printLine('핑: '+host+'...');
      for(let i=0;i<4;i++) printLine('  응답: 시간='+Math.floor(Math.random()*20+1)+'ms TTL=128');
    }
    else if (lc === 'dir') {
      printLine('  ' + cwd + ' 디렉토리');
      const p = cwd.replace(/\\/g, '/');
      const ch = getChildren(p);
      Object.entries(ch||{}).forEach(([n,nd]) => printLine('  '+(nd.type==='folder'?'<DIR>   ':'        ')+'  '+n));
    }
    else if (lc.startsWith('mkdir ')) {
      createFolder(cwd.replace(/\\/g,'/'), cmd.slice(6));
      printLine('디렉토리 생성됨: '+cmd.slice(6));
    }
    else if (lc.startsWith('cd ')) {
      const t = cmd.slice(3);
      if (t === '..') { const p=cwd.split('\\'); if(p.length>1){p.pop();cwd=p.join('\\');} }
      else cwd = cwd + '\\' + t;
    }
    else if (lc === 'ipconfig') {
      printLine('이더넷 어댑터:');
      printLine('  IPv4 주소: 192.168.1.100');
      printLine('  서브넷 마스크: 255.255.255.0');
      printLine('  기본 게이트웨이: 192.168.1.1');
    }
    else if (lc === 'tasklist') {
      printLine('이미지 이름               PID   메모리');
      printLine('=========================  ====  ======');
      windows.forEach(w => printLine((w.title||'').padEnd(25) + String(w.id).padEnd(6) + Math.floor(Math.random()*100+20)+'MB'));
    }
    else if (lc === 'systeminfo') {
      printLine('호스트 이름: DESKTOP-WIN');
      printLine('OS: Windows 11 Pro (Browser Edition)');
      printLine('총 메모리: 16,384 MB');
    }
    else if (cmds[lc]) { printLine(cmds[lc]); }
    else { printLine("'" + cmd + "'은(는) 인식되지 않는 명령입니다.", '#f87171'); }

    addPrompt();
  }

  printLine('Windows Terminal [Version 11.0.26100]', '#60a5fa');
  printLine('(c) Windows Web Edition. All rights reserved.', '#60a5fa');
  printLine('');
  addPrompt();
}

/* ── Paint ── (버그수정: ResizeObserver 기반 캔버스 리사이즈) */
function paint() {
  const colors = ['#000','#fff','#f00','#0f0','#00f','#ff0','#f0f','#0ff','#f80','#80f','#888','#444'];
  const html =
    '<div style="display:flex;flex-direction:column;height:100%">' +
      '<div class="paint-toolbar">' +
        '<button class="active" data-tool="brush">🖌️</button>' +
        '<button data-tool="eraser">🧹</button>' +
        '<input type="color" value="#000000">' +
        '<input type="range" min="1" max="20" value="3" title="굵기">' +
        '<button class="clear-btn">🗑️</button>' +
        '<span style="font-size:11px;color:#666;margin-left:4px">팔레트: </span>' +
        colors.map((c,i) => '<span style="width:20px;height:20px;background:'+c+';display:inline-block;border-radius:50%;cursor:pointer;border:2px solid '+(i===0?'#333':'transparent')+'" data-color="'+c+'"></span>').join('') +
      '</div>' +
      '<div class="paint-canvas-wrap"><canvas class="paint-canvas"></canvas></div>' +
    '</div>';

  const id = createWindow('paint', '그림판', 800, 550, html);
  const body   = document.getElementById('winbody-'+id);
  const canvas = body.querySelector('canvas');
  const wrap   = body.querySelector('.paint-canvas-wrap');
  const ctx    = canvas.getContext('2d');
  let drawing = false, lastX = 0, lastY = 0, canvasRect = null;
  const state = { tool:'brush', color:'#000', size:3 };

  // 버그수정: ResizeObserver로 캔버스 크기 신뢰성있게 초기화
  function initCanvas() {
    const w = wrap.offsetWidth  || 760;
    const h = wrap.offsetHeight || 440;
    if (w < 10 || h < 10) return; // 아직 렌더링 안 됨
    canvas.width  = w;
    canvas.height = h;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
  }

  const ro = new ResizeObserver(() => {
    // 크기 변경 시 기존 내용 보존하며 리사이즈
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    initCanvas();
    ctx.putImageData(imgData, 0, 0);
  });
  ro.observe(wrap);
  requestAnimationFrame(initCanvas); // 첫 렌더 후 초기화

  canvas.addEventListener('mousedown', e => {
    drawing = true;
    canvasRect = canvas.getBoundingClientRect();
    lastX = e.clientX - canvasRect.left; lastY = e.clientY - canvasRect.top;
  });
  canvas.addEventListener('mousemove', e => {
    if (!drawing || !canvasRect) return;
    const x = e.clientX - canvasRect.left, y = e.clientY - canvasRect.top;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.strokeStyle = state.tool === 'eraser' ? '#fff' : state.color;
    ctx.lineWidth   = state.tool === 'eraser' ? state.size * 3 : state.size;
    ctx.lineCap = ctx.lineJoin = 'round';
    ctx.stroke();
    lastX = x; lastY = y;
  });
  canvas.addEventListener('mouseup',    () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);

  body.querySelectorAll('[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.tool = btn.dataset.tool;
      body.querySelectorAll('[data-tool]').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
    });
  });
  body.querySelectorAll('[data-color]').forEach(swatch => {
    swatch.addEventListener('click', () => {
      state.color = swatch.dataset.color;
      body.querySelectorAll('[data-color]').forEach(x => x.style.borderColor = 'transparent');
      swatch.style.borderColor = '#333';
    });
  });
  body.querySelector('input[type="color"]').addEventListener('input', e => { state.color = e.target.value; });
  body.querySelector('input[type="range"]').addEventListener('input', e => { state.size = parseInt(e.target.value); });
  body.querySelector('.clear-btn').addEventListener('click', () => {
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  });
}

  const id = createWindow('clock', '스톱워치', 400, 420, html);
  const body = document.getElementById('winbody-'+id);
  const face = body.querySelector('.face');
  let running = false, elapsed = 0, interval = null;

  function fmt() {
    const h = String(Math.floor(elapsed/3600000)).padStart(2,'0');
    const m = String(Math.floor((elapsed%3600000)/60000)).padStart(2,'0');
    const s = String(Math.floor((elapsed%60000)/1000)).padStart(2,'0');
    face.textContent = h+':'+m+':'+s;
  }

  body.querySelector('.start-stop').addEventListener('click', function() {
    running = !running;
    this.textContent = running ? '정지' : '시작';
    if (running) { const start = Date.now()-elapsed; interval = setInterval(() => { elapsed=Date.now()-start; fmt(); }, 50); }
    else clearInterval(interval);
  });
  body.querySelector('.reset').addEventListener('click', () => {
    running = false; elapsed = 0; clearInterval(interval);
    body.querySelector('.start-stop').textContent = '시작';
    fmt();
  });
}

        '<div style="height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-bottom:12px"><div style="width:35%;height:100%;background:#0078d4;border-radius:2px"></div></div>'+
        '<div style="display:flex;justify-content:center;gap:20px;font-size:24px">'+
          '<span class="pp-prev" style="cursor:pointer;opacity:.7">⏮️</span>'+
          '<span class="pp-play" style="cursor:pointer">▶️</span>'+
          '<span class="pp-next" style="cursor:pointer;opacity:.7">⏭️</span>'+
        '</div>'+
      '</div>'+
    '</div>';
  const id = createWindow('music', '음악', 450, 500, html);
  const body = document.getElementById('winbody-'+id);
  body.querySelector('.pp-play').addEventListener('click', function() {
    this.textContent = this.textContent === '▶️' ? '⏸️' : '▶️';
  });
}

/* ── Todo ── (버그수정: innerHTML onchange → addEventListener) */
function todo() {
  const html =
    '<div style="padding:20px;height:100%;display:flex;flex-direction:column">'+
      '<h2 style="font-size:20px;font-weight:400;margin-bottom:16px">✅ 할 일</h2>'+
      '<div style="display:flex;gap:8px;margin-bottom:16px">'+
        '<input class="todo-inp" style="flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:inherit" placeholder="할 일 추가...">'+
        '<button class="todo-add" style="padding:10px 20px;background:#0078d4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit">추가</button>'+
      '</div>'+
      '<div class="todo-list" style="flex:1;overflow:auto"></div>'+
    '</div>';

  const id = createWindow('todo', '할 일', 400, 500, html);
  const body = document.getElementById('winbody-'+id);
  const inp  = body.querySelector('.todo-inp');
  const list = body.querySelector('.todo-list');

  // 기본 항목들
  [
    { text:'프로젝트 기획서 작성', done:false },
    { text:'디자인 리뷰 미팅',     done:false },
    { text:'이메일 확인',          done:true  },
  ].forEach(({ text, done }) => addTodoItem(text, done));

  function addTodoItem(text, done=false) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;padding:12px;border-bottom:1px solid #eee;gap:10px';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = done;
    cb.style.cssText = 'width:18px;height:18px;cursor:pointer;flex-shrink:0';

    const label = document.createElement('span');
    label.style.cssText = 'font-size:13px;flex:1' + (done ? ';text-decoration:line-through;color:#999' : '');
    label.textContent = text;

    // 버그수정: addEventListener 사용
    cb.addEventListener('change', () => {
      label.style.textDecoration = cb.checked ? 'line-through' : 'none';
      label.style.color = cb.checked ? '#999' : '';
    });

    const del = document.createElement('button');
    del.textContent = '✕';
    del.style.cssText = 'background:none;border:none;cursor:pointer;color:#999;font-size:14px;padding:2px 6px';
    del.addEventListener('click', () => row.remove());

    row.appendChild(cb);
    row.appendChild(label);
    row.appendChild(del);
    list.prepend(row);
  }

  body.querySelector('.todo-add').addEventListener('click', () => {
    if (inp.value.trim()) { addTodoItem(inp.value.trim()); inp.value = ''; inp.focus(); }
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && inp.value.trim()) { addTodoItem(inp.value.trim()); inp.value = ''; }
  });
}

/* ══════════════════════════════════════
   Shutdown
══════════════════════════════════════ */
function showShutdown() {
  toggleStartMenu(false);
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:12px;padding:32px;text-align:center;box-shadow:0 16px 64px rgba(0,0,0,.3);min-width:300px">'+
      '<div style="font-size:36px;margin-bottom:16px">⏻</div>'+
      '<div style="font-size:16px;margin-bottom:24px">종료하시겠습니까?</div>'+
      '<div style="display:flex;gap:12px;justify-content:center">'+
        '<button class="o-cancel" style="padding:8px 24px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-family:inherit">취소</button>'+
        '<button class="o-shut"   style="padding:8px 24px;border:none;border-radius:6px;background:#c42b1c;color:#fff;cursor:pointer;font-family:inherit">종료</button>'+
        '<button class="o-restart" style="padding:8px 24px;border:none;border-radius:6px;background:#0078d4;color:#fff;cursor:pointer;font-family:inherit">재시작</button>'+
      '</div>'+
    '</div>';
  document.body.appendChild(overlay);
  overlay.querySelector('.o-cancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('.o-shut').addEventListener('click', () => {
    document.body.innerHTML = '<div style="position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px">전원이 꺼졌습니다. 페이지를 새로고침하세요.</div>';
  });
  overlay.querySelector('.o-restart').addEventListener('click', () => location.reload());
}

/* ══════════════════════════════════════
   단축키
══════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && startMenuOpen) toggleStartMenu(false);
  if (e.altKey && e.key === 'F4' && activeWinId) closeWindow(activeWinId);
});
