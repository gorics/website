<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows Browser VM 2.0</title>
  <link rel="stylesheet" href="./styles.css?v=20260705-log1" />
  <script defer src="./app.js?v=20260705-log1"></script>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div>
        <h1>🪟 Windows Browser VM 2.0</h1>
        <p class="sub">v86 detailed diagnostics enabled.</p>
      </div>
      <div class="pill-row">
        <div class="pill">v86</div>
        <div class="pill">WebAssembly</div>
        <div class="pill">Verbose Log</div>
      </div>
    </section>

    <section class="panel machine">
      <div class="machine-top">
        <div>
          <div class="label">상태</div>
          <div class="status" id="status">초기화 중</div>
        </div>
        <div class="actions">
          <button id="focusBtn" type="button">포커스</button>
          <button id="fullBtn" type="button">전체화면</button>
          <button id="retryBtn" type="button">재시도</button>
        </div>
      </div>
      <div class="screen-wrap"><div id="screen_container"></div></div>
    </section>

    <section class="panel log-panel">
      <div class="log-head"><strong>상세 로그</strong></div>
      <pre id="log"></pre>
    </section>
  </div>
</body>
</html>
