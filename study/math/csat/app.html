<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2027 수학 14+ 학습소</title><style>body{margin:0;background:#07111f;color:#eef6ff;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}.wrap{max-width:1180px;margin:auto;padding:24px}.hero,.panel,.card,.view{border:1px solid #29405c;border-radius:22px;background:rgba(255,255,255,.07);padding:18px;margin:14px 0}h1{font-size:clamp(2rem,6vw,4.4rem);letter-spacing:-.06em}.tools{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.grid{display:grid;grid-template-columns:340px 1fr;gap:14px}.list{display:grid;gap:8px}.card{cursor:pointer}.card.on{outline:2px solid #5eead4}.pill{display:inline-block;border-radius:99px;padding:3px 8px;margin:2px;background:#14304b;color:#bfe3ff;font-size:.8rem;font-weight:800}.note{border:1px solid #29405c;border-radius:16px;padding:12px;margin:10px 0;background:#09182a}.note b{color:#5eead4}select,input,button{border-radius:12px;border:1px solid #29405c;background:#06111f;color:#eef6ff;padding:10px}button{cursor:pointer;font-weight:800}@media(max-width:900px){.grid,.tools{grid-template-columns:1fr}}</style></head><body><div class="wrap"><section class="hero"><h1>평가원 수학 14번급+ 학습소</h1><p>공통 14·15·20·21·22, 미적분 28·29·30만 배치. 64개 카드에 핵심 아이디어, 현실 풀이, 이상적 풀이, 얻어갈 점, 암기 포인트를 넣었다.</p></section><section class="panel"><div class="tools"><input id="kw" placeholder="검색" oninput="render()"><select id="held" onchange="render()"><option value="all">전체 시행</option></select><select id="sub" onchange="render()"><option value="all">전체 과목</option><option>공통</option><option>미적분</option></select><select id="num" onchange="render()"><option value="all">전체 번호</option><option>14</option><option>15</option><option>20</option><option>21</option><option>22</option><option>28</option><option>29</option><option>30</option></select><select id="sort" onchange="render()"><option value="default">기본</option><option value="hard">고난도 우선</option><option value="recent">최신순</option></select></div><p><b id="count">0</b>개 표시 · 완료 <b id="done">0</b> · 다시볼것 <b id="bad">0</b></p><button onclick="daily()">오늘의 12개</button> <button onclick="toggleBad()">다시볼것만</button> <button onclick="resetAll()">초기화</button></section><main class="grid"><section class="list" id="list"></section><section class="view" id="view">왼쪽에서 카드를 선택해라.</section></main></div><script>const EXAMS=[['2026학년도 9월 모의평가','2025년 9월 시행'],['2026학년도 6월 모의평가','2025년 6월 시행'],['2025학년도 대학수학능력시험','2024년 11월 시행'],['2025학년도 9월 모의평가','2024년 9월 시행'],['2025학년도 6월 모의평가','2024년 6월 시행'],['2024학년도 대학수학능력시험','2023년 11월 시행'],['2024학년도 9월 모의평가','2023년 9월 시행'],['2024학년도 6월 모의평가','2023년 6월 시행']];const T=[{no:14,sub:'공통',unit:'14번급 복합도형·그래프',tier:'상',idea:'조건을 도형·그래프의 좌표, 길이, 비율로 번역한다.',real:'변수 설정 → 조건 식화 → 부호·범위 검산',ideal:'그림을 좌표와 비율식으로 바꾼 뒤 최소 계산으로 끝낸다.',gain:'조건 번역이 끝나면 계산량이 줄어든다.',memo:'그림 → 식 순서 고정.'},{no:15,sub:'공통',unit:'15번급 함수 추론',tier:'상',idea:'극값·미분가능·절댓값 조건을 부호표로 읽는다.',real:'도함수 작성 → 근 후보 정리 → 부호표',ideal:'부호표로 구조를 먼저 고정하고 필요한 계수만 계산한다.',gain:'15번급은 구조 파악이 먼저다.',memo:'절댓값은 근 기준 구간 분리.'},{no:20,sub:'공통',unit:'20번급 빈칸 추론',tier:'상',idea:'빈칸 앞뒤 문장을 식으로 연결한다.',real:'앞문장 근거 → 빈칸 의미 → 뒷문장 검산',ideal:'논리 사슬을 끊지 않고 읽는다.',gain:'20번은 독해 순서가 점수를 가른다.',memo:'앞뒤 단위부터 맞춘다.'},{no:21,sub:'공통',unit:'21번 고난도',tier:'최상',idea:'모든 실수 조건을 항등식·부등식·등호 성립으로 바꾼다.',real:'차수 확인 → 부등식 함수화 → 등호 지점 찾기',ideal:'조건의 강도를 먼저 읽고 계수만 계산한다.',gain:'모든 실수 조건은 매우 강하다.',memo:'차수·계수·등호 성립부터.'},{no:22,sub:'공통',unit:'22번 고난도',tier:'최상',idea:'그래프·대칭·넓이 조건을 좌표로 밀어붙인다.',real:'좌표 설정 → 기울기/대칭 식화 → 넓이 계산',ideal:'좌표화 후 조건식을 일괄 정리한다.',gain:'22번은 좌표화 완성도가 중요하다.',memo:'대칭은 좌표 교환, 수선은 기울기 곱 -1.'},{no:28,sub:'미적분',unit:'미적분 28번급',tier:'상',idea:'합성·역함수·접선 조건을 미분 공식으로 정리한다.',real:'보조함수 설정 → 미분값 추적 → 범위 검산',ideal:'불필요한 전개 없이 미분값만 추적한다.',gain:'첫 줄은 함수 이름 붙이기다.',memo:'합성함수 미분은 바깥미분×안쪽미분.'},{no:29,sub:'미적분',unit:'미적분 29번급',tier:'상',idea:'수열·급수 조건은 수렴 조건과 정수 조건을 분리한다.',real:'공비 범위 → 정수 조건 → 합 계산',ideal:'가능한 공비를 먼저 제한한다.',gain:'조건을 분리해야 한다.',memo:'등비급수 수렴은 |r|<1, 합은 a/(1-r).'},{no:30,sub:'미적분',unit:'미적분 30번 고난도',tier:'최상',idea:'정의역·부호·미분가능 조건을 먼저 확정한다.',real:'정의역 확인 → 부호/극값 확인 → 최종 계산',ideal:'구조 조건을 모두 반영한 뒤 계산한다.',gain:'30번은 모든 조건을 써야 답이 나온다.',memo:'정의역, 부호, 미분가능 조건 생략 금지.'}];const DATA=EXAMS.flatMap((e,i)=>T.map(t=>({...t,exam:e[0],held:e[1],id:i+'-'+t.sub+'-'+t.no})));const $=x=>document.getElementById(x),KEY='math64';let picked=DATA[0].id,onlyBad=false,dailySet=null;const prog=JSON.parse(localStorage.getItem(KEY)||'{}');function save(){localStorage.setItem(KEY,JSON.stringify(prog))}function status(id){return prog[id]?.s||'none'}function init(){[...new Set(DATA.map(x=>x.held))].forEach(x=>held.innerHTML+=`<option>${x}</option>`);render()}function arr(){let k=kw.value.replace(/\s/g,''),a=DATA.filter(p=>(!k||(p.exam+p.held+p.sub+p.unit+p.no+p.idea).replace(/\s/g,'').includes(k))&&(held.value==='all'||p.held===held.value)&&(sub.value==='all'||p.sub===sub.value)&&(num.value==='all'||String(p.no)===num.value)&&(!onlyBad||status(p.id)==='bad')&&(!dailySet||dailySet.includes(p.id)));if(sort.value==='hard')a.sort((x,y)=>(y.tier==='최상')-(x.tier==='최상')||y.no-x.no);if(sort.value==='recent')a.sort((x,y)=>y.held.localeCompare(x.held,'ko'));return a}function render(){let a=arr();if(!a.find(x=>x.id===picked)&&a[0])picked=a[0].id;count.textContent=a.length;done.textContent=Object.values(prog).filter(x=>x.s==='done').length;bad.textContent=Object.values(prog).filter(x=>x.s==='bad').length;list.innerHTML=a.map(p=>`<article class="card ${p.id===picked?'on':''}" onclick="pick('${p.id}')"><span class="pill">${p.held}</span><span class="pill">${p.sub}</span><span class="pill">${p.no}번</span><h2>${p.exam} ${p.sub} ${p.no}번</h2><small>${p.unit} · ${p.tier} · ${status(p.id)==='done'?'완료 ✅':status(p.id)==='bad'?'다시볼것 🧯':'미풀이'}</small></article>`).join('');show()}function pick(id){picked=id;render()}function show(){let p=DATA.find(x=>x.id===picked);view.innerHTML=`<div class="meta"><span class="pill">${p.held}</span><span class="pill">${p.exam}</span><span class="pill">${p.sub}</span><span class="pill">${p.no}번</span></div><h2>${p.unit}</h2><div class="note"><b>핵심 아이디어</b><p>${p.idea}</p></div><div class="note"><b>현실 풀이</b><p>${p.real}</p></div><div class="note"><b>가장 이상적 풀이</b><p>${p.ideal}</p></div><div class="note"><b>얻어갈 점</b><p>${p.gain}</p></div><div class="note"><b>꼭 외워야 할 점</b><p>${p.memo}</p></div><button onclick="mark('done')">완료</button> <button onclick="mark('bad')">다시볼것</button> <button onclick="mark('none')">해제</button>`}function mark(s){if(s==='none')delete prog[picked];else prog[picked]={s,at:new Date().toISOString()};save();render()}function toggleBad(){onlyBad=!onlyBad;dailySet=null;render()}function daily(){dailySet=[...DATA].sort(()=>Math.random()-.5).slice(0,12).map(x=>x.id);onlyBad=false;render()}function resetAll(){localStorage.removeItem(KEY);location.reload()}window.onload=init;</script></body></html>
