<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="index,follow"><meta name="description" content="GORICS 뉴스 허브. latest.json overlay를 먼저 읽고 data.json 장기 보관 뉴스와 병합합니다."><link rel="alternate" type="application/rss+xml" title="GORICS HOT NEWS RSS" href="feed.xml"><title>GORICS NEWS</title><style>:root{color-scheme:dark;--bg:#070a12;--panel:#101827;--line:rgba(148,163,184,.24);--text:#e5edf8;--muted:#94a3b8;--blue:#60a5fa;--hot:#fb7185;--green:#34d399}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,rgba(96,165,250,.18),transparent 32rem),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}a{color:inherit;text-decoration:none}.wrap{width:min(1180px,calc(100% - 28px));margin:auto}.nav{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:22px 0}.brand{font-weight:950}.links{display:flex;gap:8px;overflow:auto}.links a,.btn,.tab,input,select{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.04);color:var(--text);font-weight:800}.links a.on,.tab.on,.btn.primary{background:linear-gradient(135deg,var(--blue),#a78bfa);color:#06101f;border-color:transparent}.hero,.card,.bar{border:1px solid var(--line);background:linear-gradient(180deg,rgba(16,24,39,.96),rgba(10,16,28,.96));border-radius:24px;padding:18px;margin:14px 0}.hero h1{font-size:clamp(2.4rem,7vw,5rem);line-height:.95;letter-spacing:-.06em;margin:8px 0}.muted{color:var(--muted);line-height:1.6}.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{border:1px solid var(--line);border-radius:14px;padding:10px 12px}.controls{display:grid;grid-template-columns:1fr auto auto;gap:10px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;padding-bottom:48px}.card{margin:0;display:flex;flex-direction:column;min-height:220px}.meta{display:flex;justify-content:space-between;gap:8px;color:#bfdbfe;font-size:.84rem}.card h2{font-size:1.1rem;line-height:1.45}.card footer{margin-top:auto;border-top:1px solid var(--line);padding-top:10px;color:var(--muted);display:flex;justify-content:space-between;gap:8px;font-size:.84rem}@media(max-width:760px){.nav{display:block}.links{margin-top:12px}.controls{grid-template-columns:1fr}.hero h1{font-size:3rem}}</style></head><body><nav class="wrap nav"><a class="brand" href="../">GORICS.CLOUD</a><div class="links"><a href="../">홈</a><a class="on" href="./">뉴스</a><a href="financial/">금융뉴스</a><a href="tech/">기술</a><a href="global/">국제</a><a href="politics/">정치</a><a href="play/">스포츠</a><a href="culture/">문화</a><a href="feed.xml">RSS</a></div></nav><header class="wrap hero"><p class="muted">DYNAMIC NEWS · latest.json → archive → index.json → data.json</p><h1>GORICS<br>NEWS</h1><p class="muted">최신 overlay를 먼저 읽고 장기 보관 data.json을 뒤에 병합합니다. URL·제목 기준 중복은 제거해 최신 카드가 먼저 보입니다.</p><div class="stats"><span class="stat">상태 <b id="state">연결 중</b></span><span class="stat">기사 <b id="total">-</b></span><span class="stat">테마 <b id="themeCount">-</b></span><span class="stat">갱신 <b id="updated">-</b></span></div></header><main class="wrap"><section class="bar"><div class="controls"><input id="q" placeholder="제목·요약·언론사 검색"><select id="sort"><option value="hot">HOT순</option><option value="latest">최신순</option></select><button id="reload" class="btn">다시 읽기</button></div><div id="tabs" class="tabs"></div><p id="status" class="muted">뉴스 데이터 연결 중입니다.</p></section><section id="grid" class="grid"></section></main><script>const ARCH=['latest-20260629-1533.json','latest-20260629-1508.json','latest-20260629-1409.json','latest-20260629-1307.json','latest-20260629-1235.json','latest-20260629-1209.json','latest-20260629-1107.json','latest-20260629-1033.json','latest-20260629-1007.json','latest-20260629-0908.json','latest-20260629-0809.json','latest-20260629-0706.json','latest-20260629-0635.json','latest-20260629-0610.json','latest-20260629-0536.json','latest-20260629-0510.json','latest-20260629-0409.json','latest-20260629-0336.json','latest-20260629-0310.json','latest-20260629-0208.json','latest-20260629-0108.json','latest-20260629-0010.json'];const SOURCES=['./latest.json',...ARCH.map(x=>'./'+x),'./index.json','./data.json'];const $=s=>document.querySelector(s),grid=$('#grid'),tabs=$('#tabs'),q=$('#q'),sort=$('#sort'),state=$('#state'),statusEl=$('#status');let ITEMS=[],CUR='all';const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const src=x=>typeof x.source==='object'?(x.source.name||'원문'):(x.source||'원문');function flat(p){if(!p)return[];let a=[];['allItems','items','posts','news'].forEach(k=>Array.isArray(p[k])&&a.push(...p[k]));if(p.byCategory)Object.values(p.byCategory).forEach(v=>Array.isArray(v)&&v.forEach(y=>{if(y&&typeof y==='object')a.push(y)}));return a}function norm(x){return{id:x.id,category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.theme||x.category||'뉴스',categoryIcon:x.categoryIcon||x.icon||'📰',title:x.title||x.name,description:x.description||x.summary||'',url:x.url||x.link,source:x.source||'원문',publishedAt:x.publishedAt||x.date||x.published_at||'',score:+(x.score??x.priority??0)||0,tags:x.tags||[]}}function dedupe(a){let u=new Set,t=new Set,o=[];for(const z of a.map(norm).filter(x=>x.title&&x.url)){let U=z.url.toLowerCase().replace(/[#?].*$/,'').replace(/\/$/,''),T=(z.title+'|'+src(z)).toLowerCase().replace(/\s+/g,' ');if(u.has(U)||t.has(T))continue;u.add(U);t.add(T);o.push(z)}return o}function dstr(v){let d=new Date(v);return isNaN(d)?(v||'-'):d.toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})}function card(x){return `<article class="card"><div class="meta"><span>${esc(x.categoryIcon)} ${esc(x.categoryName)}</span><b>HOT ${esc(x.score)}</b></div><h2><a target="_blank" rel="noopener noreferrer" href="${esc(x.url)}">${esc(x.title)}</a></h2><p class="muted">${esc(x.description||'요약 없음')}</p><footer><span>${esc(src(x))}</span><time>${esc(dstr(x.publishedAt))}</time></footer></article>`}function drawTabs(){let c={};ITEMS.forEach(x=>c[x.category]=(c[x.category]||0)+1);tabs.innerHTML='<button class="tab on" data-c="all">전체 '+ITEMS.length+'</button>'+Object.entries(c).map(([k,v])=>`<button class="tab" data-c="${esc(k)}">${esc(k)} ${v}</button>`).join('');tabs.onclick=e=>{if(e.target.dataset.c){CUR=e.target.dataset.c;tabs.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');render()}};$('#themeCount').textContent=Object.keys(c).length}function render(){let s=q.value.toLowerCase();let a=[...ITEMS].filter(x=>(CUR==='all'||x.category===CUR)&&(!s||(x.title+x.description+src(x)+(x.tags||[]).join()).toLowerCase().includes(s)));a.sort(sort.value==='latest'?(a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt):(a,b)=>b.score-a.score);grid.innerHTML=a.length?a.map(card).join(''):'<article class="card">표시할 뉴스 없음</article>';statusEl.textContent='표시 '+a.length+' / 전체 '+ITEMS.length}async function get(p){try{let r=await fetch(p+'?v='+Date.now(),{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}async function load(){state.textContent='연결 중';let docs=await Promise.all(SOURCES.map(get));ITEMS=dedupe(docs.flatMap(flat));state.textContent='정상';$('#total').textContent=ITEMS.length;$('#updated').textContent=dstr(docs.find(Boolean)?.generatedAt);drawTabs();render()}q.oninput=render;sort.onchange=render;$('#reload').onclick=load;load();</script></body></html>
