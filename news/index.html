<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="index,follow"><meta name="description" content="GORICS HOT NEWS. 공개 뉴스 링크 기반 테마별 핫뉴스 피드입니다."><link rel="alternate" type="application/rss+xml" title="GORICS HOT NEWS RSS" href="feed.xml"><title>GORICS HOT NEWS</title>
<style>
:root{color-scheme:light;--bg:#fff;--soft:#f7fafc;--card:#fff;--text:#102033;--muted:#667789;--line:rgba(16,32,51,.12);--mint:#16b98f;--blue:#2f7cf6;--hot:#ff6b6b;--shadow:0 18px 55px rgba(27,74,110,.1)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#fff;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif}a{color:inherit;text-decoration:none}button,input{font:inherit}.wrap{width:min(1220px,calc(100% - 32px));margin:0 auto}.topbar{position:sticky;top:12px;z-index:40;display:grid;grid-template-columns:auto minmax(220px,440px) auto;align-items:center;gap:12px;margin:12px auto 0;padding:12px 14px;border:1px solid var(--line);border-radius:28px;background:rgba(255,255,255,.94);backdrop-filter:blur(18px);box-shadow:0 12px 34px rgba(27,74,110,.07)}.brand{display:flex;align-items:center;gap:12px;font-weight:950;letter-spacing:-.04em;white-space:nowrap}.logo{display:grid;place-items:center;width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,var(--mint),var(--blue));color:white;font-weight:950}.search{width:100%;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--text);padding:13px 18px;outline:0}.search:focus{border-color:rgba(47,124,246,.5);box-shadow:0 0 0 4px rgba(47,124,246,.12)}.nav{display:flex;justify-content:flex-end;gap:8px;overflow:auto}.nav a{white-space:nowrap;border-radius:999px;padding:10px 14px;color:var(--muted);font-weight:850}.nav a:hover,.nav a.active{background:var(--soft);color:var(--text)}.hero{margin-top:34px}.hero-main{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:34px;background:#fff;box-shadow:var(--shadow);padding:clamp(28px,5vw,56px)}.hero-main:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(22,185,143,.09),rgba(47,124,246,.08),transparent 64%);pointer-events:none}.eyebrow{position:relative;z-index:1;display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:var(--soft);color:var(--muted);font-size:.82rem;font-weight:900;letter-spacing:.06em}.hero h1{position:relative;z-index:1;margin:18px 0 14px;font-size:clamp(3.5rem,9vw,7.7rem);line-height:.88;letter-spacing:-.085em}.hero p{position:relative;z-index:1;margin:0;max-width:780px;color:var(--muted);line-height:1.68;font-size:1.05rem}.stats{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:9px;margin-top:20px}.stat{border-radius:999px;background:var(--soft);border:1px solid var(--line);padding:8px 11px;color:var(--muted);font-weight:800}.stat b{color:var(--text)}.topten{margin:22px 0 18px;border:1px solid var(--line);border-radius:28px;background:#fff;box-shadow:var(--shadow);padding:18px}.topten-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:12px}.topten h2{margin:0;letter-spacing:-.04em;font-size:clamp(1.35rem,3vw,2rem)}.topten p{margin:0;color:var(--muted);font-size:.92rem;text-align:right}.rank{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:0;padding:0;list-style:none}.rank li{min-height:92px;border:1px solid var(--line);border-radius:20px;background:var(--soft);padding:12px;display:grid;grid-template-columns:28px 1fr;gap:8px;align-content:start}.rank b{color:var(--blue);font-size:1.1rem}.rank a{color:var(--text);font-weight:850;line-height:1.35;font-size:.9rem}.rank a:hover{color:var(--blue)}.tabs{display:flex;gap:8px;overflow:auto;margin:18px 0}.tab{white-space:nowrap;border:1px solid var(--line);border-radius:999px;padding:10px 14px;background:#fff;color:var(--muted);font-weight:900;cursor:pointer}.tab.active,.tab:hover{background:linear-gradient(135deg,var(--mint),var(--blue));border-color:transparent;color:white}.section-title{display:flex;justify-content:space-between;align-items:end;gap:12px;margin:8px 0 14px}.section-title h2{margin:0;letter-spacing:-.04em;font-size:clamp(1.45rem,3vw,2.15rem)}.section-title p{margin:0;color:var(--muted);font-size:.92rem;text-align:right}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;padding-bottom:100px}.card{position:relative;min-height:282px;padding:16px;border:1px solid var(--line);border-radius:26px;background:#fff;box-shadow:var(--shadow);transition:.18s;display:flex;flex-direction:column}.card:hover{transform:translateY(-4px);border-color:rgba(47,124,246,.42)}.art{display:grid;place-items:center;aspect-ratio:1;border-radius:20px;margin-bottom:14px;background:var(--soft);font-size:2.45rem}.go{position:absolute;right:22px;top:calc(100% - 134px);display:grid;place-items:center;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--mint),var(--blue));color:white;font-weight:950;opacity:0;transform:translateY(10px);transition:.18s}.card:hover .go{opacity:1;transform:translateY(0)}.card h3{margin:0 0 9px;font-size:1rem;line-height:1.4;letter-spacing:-.03em}.desc{margin:0;color:var(--muted);line-height:1.54;font-size:.9rem;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}.meta{margin-top:auto;padding-top:14px;display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:.78rem}.source{color:var(--blue);font-weight:900}.empty{display:none;margin:0 0 100px;padding:34px;border:1px dashed var(--line);border-radius:22px;text-align:center;color:var(--muted)}.player{position:fixed;left:50%;bottom:12px;z-index:45;transform:translateX(-50%);width:min(1220px,calc(100% - 24px));display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);box-shadow:0 16px 45px rgba(27,74,110,.1)}.ticker{overflow:hidden;white-space:nowrap;color:var(--muted)}.ticker b{color:var(--mint);margin-right:10px}.dock{display:flex;gap:8px}.dock a{white-space:nowrap;border-radius:999px;padding:9px 12px;color:var(--muted);font-weight:850}.dock a.active,.dock a:hover{background:var(--soft);color:var(--text)}@media(max-width:1080px){.topbar{grid-template-columns:1fr}.nav{justify-content:flex-start}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.rank{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:720px){.wrap{width:min(100% - 22px,1220px)}.topbar{border-radius:24px}.brand span:last-child{display:none}.hero{margin-top:22px}.hero-main,.topten{border-radius:26px;padding:23px}.hero h1{font-size:clamp(3rem,17vw,4.8rem)}.topten-head,.section-title{display:block}.topten p,.section-title p{text-align:left;margin-top:5px}.rank{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr;gap:10px}.card{min-height:245px;padding:14px}.player{grid-template-columns:1fr;border-radius:22px}.dock{justify-content:center}.dock a{font-size:.9rem;padding:8px 10px}}
</style></head><body>
<header class="topbar wrap"><a class="brand" href="../"><span class="logo">G</span><span>GORICS NEWS</span></a><input id="search" class="search" placeholder="뉴스 제목·요약·언론사 검색" autocomplete="off"><nav class="nav"><a href="../">인덱스</a><a class="active" href="./">뉴스</a><a href="feed.xml">RSS</a></nav></header>
<main class="wrap"><section class="hero"><div class="hero-main"><span class="eyebrow">GORICS HOT NEWS</span><h1>HOT<br>NEWS</h1><p>흰색 배경의 깔끔한 뉴스 대시보드입니다. TOP 10을 먼저 보고, 아래에서 카테고리와 검색으로 전체 뉴스를 탐색하세요.</p><div class="stats"><span class="stat">총 기사 <b id="total">0</b></span><span class="stat">테마 <b id="themeCount">0</b></span><span class="stat">업데이트 <b id="updated">-</b></span></div></div></section><section class="topten"><div class="topten-head"><h2>🔥 TOP 10</h2><p>가장 먼저 확인할 주요 뉴스입니다.</p></div><ol id="rank" class="rank"></ol></section><section id="tabs" class="tabs"></section><div class="section-title"><h2>전체 뉴스</h2><p>검색어와 테마 필터가 바로 적용됩니다.</p></div><section id="grid" class="grid"></section><div id="empty" class="empty">검색 결과가 없습니다.</div></main><div class="player"><div id="ticker" class="ticker"><b>LIVE</b>뉴스 데이터를 불러오는 중...</div><nav class="dock"><a href="../">홈</a><a class="active" href="./">뉴스</a><a href="feed.xml">RSS</a></nav></div>
<script>
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),fmt=iso=>{const d=new Date(iso);return isNaN(d)?'-':new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(d)};let data={allItems:[],categories:[]},current='all';
function card(x){return `<article class="card" data-category="${esc(x.category)}" data-text="${esc((x.title+' '+x.description+' '+(x.source?.name||'')+' '+x.categoryName).toLowerCase())}"><a class="go" href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">↗</a><div class="art">${esc(x.categoryIcon||'🗞️')}</div><h3><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${esc(x.title)}</a></h3><p class="desc">${esc(x.description||'원문에서 전체 내용을 확인하세요.')}</p><div class="meta"><span class="source">${esc(x.source?.name||'원문')}</span><time datetime="${esc(x.publishedAt)}">${esc(fmt(x.publishedAt))}</time></div></article>`}
function draw(){const items=data.allItems||[];$('total').textContent=String(data.total||items.length);$('themeCount').textContent=String((data.categories||[]).length);$('updated').textContent=data.generatedAt?fmt(data.generatedAt):'-';$('grid').innerHTML=items.map(card).join('');$('rank').innerHTML=items.slice(0,10).map((x,i)=>`<li><b>${i+1}</b><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${esc(x.title)}</a></li>`).join('');$('ticker').innerHTML='<b>LIVE</b>'+esc(items.slice(0,8).map(x=>x.title).join(' · '));$('tabs').innerHTML=`<button class="tab active" data-filter="all">전체 ${items.length}</button>`+(data.categories||[]).map(c=>`<button class="tab" data-filter="${esc(c.id)}">${esc(c.icon)} ${esc(c.name)} ${c.count}</button>`).join('');document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');current=t.dataset.filter;apply()});apply()}
function apply(){const term=$('search').value.trim().toLowerCase();let n=0;document.querySelectorAll('.card').forEach(c=>{const ok=(current==='all'||c.dataset.category===current)&&(!term||c.dataset.text.includes(term));c.style.display=ok?'':'none';if(ok)n++});$('empty').style.display=n?'none':'block'}
$('search').oninput=apply;fetch('data.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(j=>{data=j;draw()}).catch(e=>{$('ticker').textContent='뉴스 데이터를 불러오지 못했습니다.';console.error(e)});
</script></body></html>
