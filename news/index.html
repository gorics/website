<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="index,follow"><meta name="description" content="GORICS 뉴스 허브. latest.json overlay를 먼저 읽고 data.json 장기 데이터를 병합합니다."><title>GORICS NEWS</title><style>:root{color-scheme:dark;--bg:#070a12;--panel:#101827;--line:rgba(148,163,184,.24);--text:#e5edf8;--muted:#94a3b8;--blue:#60a5fa;--hot:#fb7185}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,rgba(96,165,250,.2),transparent 32rem),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif}a{color:inherit;text-decoration:none}.wrap{width:min(1180px,calc(100% - 28px));margin:0 auto}.nav{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:22px 0}.brand{font-weight:950}.links{display:flex;gap:8px;overflow:auto}.links a{white-space:nowrap;border:1px solid transparent;border-radius:999px;padding:9px 12px;color:var(--muted);font-weight:850}.links a:hover,.links a.on{border-color:var(--line);background:rgba(255,255,255,.05);color:var(--text)}.hero,.toolbar,.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(16,24,39,.96),rgba(10,16,28,.96));border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.3)}.hero{padding:28px;margin:12px 0 18px}.hero h1{margin:0 0 10px;font-size:clamp(2.5rem,8vw,5rem);line-height:.95;letter-spacing:-.07em}.muted{color:var(--muted);line-height:1.65}.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.stat{border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:rgba(255,255,255,.035)}.toolbar{position:sticky;top:0;z-index:5;margin-bottom:16px;padding:16px;background:rgba(7,10,18,.92);backdrop-filter:blur(16px)}input,select,button{border:1px solid var(--line);background:#080d16;color:var(--text);border-radius:14px;padding:11px 12px}button{cursor:pointer;font-weight:900}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tab{border-radius:999px}.tab.on{border-color:var(--blue);background:rgba(96,165,250,.15)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(285px,1fr));gap:14px;padding-bottom:54px}.card{padding:18px;min-height:210px;display:flex;flex-direction:column}.meta{display:flex;justify-content:space-between;gap:8px;color:#bfdbfe;font-size:.86rem}.card h2{font-size:1.08rem;line-height:1.45}.card p{margin:0}.card small{margin-top:auto;padding-top:12px;color:#8b96a8}</style></head><body><nav class="wrap nav"><a class="brand" href="../">GORICS.CLOUD</a><div class="links"><a href="../">홈</a><a class="on" href="./">뉴스</a><a href="financial/">금융뉴스</a><a href="tech/">기술</a><a href="global/">국제</a><a href="politics/">정치</a><a href="play/">스포츠</a><a href="culture/">문화</a></div></nav><header class="wrap hero"><h1>GORICS<br>NEWS</h1><p class="muted">latest.json overlay를 먼저 읽고 data.json 장기 데이터를 뒤에 병합합니다. URL/제목 기준으로 중복 제거해 최신 항목을 앞에 표시합니다.</p><div class="stats"><div class="stat">상태 <b id="state">연결 중</b></div><div class="stat">기사 <b id="total">-</b></div><div class="stat">테마 <b id="themeCount">-</b></div><div class="stat">갱신 <b id="updated">-</b></div></div></header><main class="wrap"><section class="toolbar"><input id="q" placeholder="제목·요약·언론사 검색"><select id="sort"><option value="hot">HOT순</option><option value="latest">최신순</option></select><button id="retry">다시 읽기</button><div id="tabs" class="tabs"></div><p id="status" class="muted">데이터 연결 중</p></section><section id="grid" class="grid"></section></main><script>const SOURCES=['./latest.json','./index.json','./data.json'];const $=s=>document.querySelector(s),grid=$('#grid'),tabs=$('#tabs'),q=$('#q'),sort=$('#sort'),state=$('#state'),statusEl=$('#status');let ITEMS=[],CUR='all',UPDATED='';const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const sourceName=x=>typeof x.source==='object'?(x.source.name||'원문'):(x.source||'원문');function flat(p){if(!p)return[];let a=[];['allItems','items','posts','news'].forEach(k=>Array.isArray(p[k])&&a.push(...p[k]));if(p.byCategory)Object.values(p.byCategory).forEach(v=>Array.isArray(v)&&v.forEach(y=>y&&typeof y==='object'&&a.push(y)));return a}function norm(x){return{id:x.id,category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.theme||x.category||'뉴스',categoryIcon:x.categoryIcon||x.icon||'📰',title:x.title||x.name,description:x.description||x.summary||'',url:x.url||x.link,source:x.source||'원문',publishedAt:x.publishedAt||x.date||x.published_at||'',score:+(x.score??x.priority??0)||0,tags:x.tags||[]}}function dedupe(a){let u=new Set,t=new Set,o=[];for(const z of a.map(norm).filter(x=>x.title&&x.url)){let U=z.url.toLowerCase().replace(/[#?].*$/,'').replace(/\/$/,''),T=(z.title+'|'+sourceName(z)).toLowerCase().replace(/\s+/g,' ');if(u.has(U)||t.has(T))continue;u.add(U);t.add(T);o.push(z)}return o}function dstr(s){let d=new Date(s);return isNaN(d)?(s||'-'):d.toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})}function card(x){return `<article class="card"><div class="meta"><span>${esc(x.categoryIcon)} ${esc(x.categoryName)}</span><b>HOT ${esc(x.score)}</b></div><h2><a target="_blank" rel="noopener noreferrer" href="${esc(x.url)}">${esc(x.title)}</a></h2><p class="muted">${esc(x.description||'요약 없음')}</p><small>${esc(sourceName(x))} · ${esc(dstr(x.publishedAt))}</small></article>`}function drawTabs(){let c={};ITEMS.forEach(x=>c[x.category]=(c[x.category]||0)+1);tabs.innerHTML='<button class="tab on" data-c="all">전체 '+ITEMS.length+'</button>'+Object.entries(c).map(([k,v])=>`<button class="tab" data-c="${esc(k)}">${esc(k)} ${v}</button>`).join('');tabs.onclick=e=>{if(e.target.dataset.c){CUR=e.target.dataset.c;tabs.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');render()}}}function render(){let s=q.value.toLowerCase();let a=[...ITEMS].filter(x=>(CUR==='all'||x.category===CUR)&&(!s||(x.title+x.description+sourceName(x)+(x.tags||[]).join()).toLowerCase().includes(s)));a.sort(sort.value==='latest'?(a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt):(a,b)=>b.score-a.score);grid.innerHTML=a.length?a.map(card).join(''):'<article class="card">표시할 뉴스 없음</article>';statusEl.textContent='표시 '+a.length+' / 전체 '+ITEMS.length;state.textContent='정상';$('#total').textContent=ITEMS.length;$('#themeCount').textContent=Object.keys(ITEMS.reduce((m,x)=>(m[x.category]=1,m),{})).length;$('#updated').textContent=dstr(UPDATED)}async function get(p){try{let r=await fetch(p+'?v='+Date.now(),{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}async function load(){state.textContent='연결 중';let docs=await Promise.all(SOURCES.map(get));UPDATED=(docs.find(x=>x&&x.generatedAt)||{}).generatedAt||'';ITEMS=dedupe(docs.flatMap(flat));drawTabs();render()}q.oninput=render;sort.onchange=render;$('#retry').onclick=load;load();</script></body></html>
