<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GORICS NEWS</title>
<style>
:root{color-scheme:dark;--bg:#070a12;--panel:#101827;--line:rgba(148,163,184,.25);--text:#e5edf8;--muted:#94a3b8;--blue:#60a5fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{width:min(1160px,calc(100% - 28px));margin:auto}a{color:inherit;text-decoration:none}.nav{display:flex;justify-content:space-between;gap:12px;padding:20px 0}.links{display:flex;gap:8px;overflow:auto}.links a,.tab,.btn{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.04)}.hero,.card,.toolbar{border:1px solid var(--line);background:linear-gradient(180deg,rgba(16,24,39,.96),rgba(10,16,28,.96));border-radius:22px}.hero{padding:28px;margin:12px 0 16px}h1{font-size:clamp(2.4rem,7vw,5rem);letter-spacing:-.07em;line-height:.95;margin:0 0 10px}.muted,p{color:var(--muted);line-height:1.6}.toolbar{position:sticky;top:0;z-index:3;padding:14px;margin-bottom:14px;background:rgba(7,10,18,.9);backdrop-filter:blur(16px)}input,select{border:1px solid var(--line);border-radius:14px;background:#080d16;color:var(--text);padding:12px}.controls{display:grid;grid-template-columns:1fr auto;gap:10px}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.tab.active{border-color:var(--blue)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;padding-bottom:40px}.card{padding:18px}.chip{display:inline-block;border:1px solid rgba(96,165,250,.35);border-radius:999px;padding:6px 9px;color:#bfdbfe}.card h2{font-size:1.1rem;line-height:1.45}.meta{display:flex;justify-content:space-between;color:#7d8797;font-size:.84rem;border-top:1px solid var(--line);padding-top:10px;margin-top:14px}@media(max-width:760px){.grid,.controls{grid-template-columns:1fr}.nav{display:block}.links{margin-top:12px}}
</style>
</head>
<body>
<nav class="wrap nav"><b>GORICS NEWS</b><div class="links"><a href="../">홈</a><a href="./">뉴스</a><a href="financial/">금융뉴스</a><a href="tech/">기술</a><a href="global/">국제</a><a href="politics/">정치</a><a href="play/">스포츠</a><a href="culture/">문화</a></div></nav>
<header class="wrap hero"><h1>GORICS<br>NEWS</h1><p>latest.json overlay를 먼저 읽고 data.json 장기 데이터와 병합해 최신순으로 표시합니다. URL/제목 기준으로 중복 제거하며 기존 뉴스는 보존됩니다.</p><p id="state" class="muted">데이터 연결 중</p></header>
<main class="wrap"><section class="toolbar"><div class="controls"><input id="q" placeholder="제목·요약·출처 검색"><select id="sort"><option value="latest">최신순</option><option value="hot">HOT순</option></select></div><div id="tabs" class="tabs"></div></section><section id="grid" class="grid"></section></main>
<script>
const $=id=>document.getElementById(id), grid=$('grid'), tabs=$('tabs'), q=$('q'), sort=$('sort'), state=$('state');let items=[], current='all';
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function flatten(p){let arr=[]; if(!p) return arr; ['allItems','items','posts','news'].forEach(k=>{if(Array.isArray(p[k])) arr=arr.concat(p[k]);}); if(p.byCategory&&typeof p.byCategory==='object') Object.values(p.byCategory).forEach(v=>{if(Array.isArray(v)) arr=arr.concat(v);}); return arr.filter(x=>x&&x.title&&(x.url||x.link));}
function key(x){return (x.url||x.link||'').trim().toLowerCase() || ((x.title||'').replace(/\s+/g,' ').trim().toLowerCase()+'|'+String(x.source?.name||x.source||'').toLowerCase());}
function merge(list){const seen=new Set(), out=[]; list.forEach(x=>{const k=key(x); if(!seen.has(k)){seen.add(k); out.push(x);}}); return out;}
async function get(path){try{const r=await fetch(path+'?v='+Date.now(),{cache:'no-store'}); return r.ok?await r.json():null;}catch(e){return null;}}
function cats(){const m={}; items.forEach(x=>{const id=x.category||x.categoryName||'news'; m[id] ||= {id,name:x.categoryName||x.category_ko||id,icon:x.categoryIcon||'📰',count:0}; m[id].count++;}); return Object.values(m);}
function card(x){const d=x.publishedAt||x.date||x.published_at||''; return `<article class="card"><span class="chip">${esc(x.categoryIcon||'📰')} ${esc(x.categoryName||x.category_ko||x.category||'뉴스')}</span><h2><a target="_blank" rel="noopener noreferrer" href="${esc(x.url||x.link)}">${esc(x.title)}</a></h2><p>${esc(x.description||x.summary||'요약 없음')}</p><div class="meta"><span>${esc(x.source?.name||x.source||'원문')}</span><span>${esc(d)}</span></div></article>`;}
function render(){const term=q.value.trim().toLowerCase(); let arr=[...items].filter(x=>(current==='all'||x.category===current||x.categoryName===current)&&(!term||(x.title+' '+(x.description||x.summary||'')+' '+(x.source?.name||x.source||'')).toLowerCase().includes(term))); arr.sort(sort.value==='hot'?((a,b)=>(b.score||b.priority||0)-(a.score||a.priority||0)):((a,b)=>new Date(b.publishedAt||b.date||0)-new Date(a.publishedAt||a.date||0))); grid.innerHTML=arr.length?arr.map(card).join(''):'<article class="card"><h2>표시할 뉴스가 없습니다</h2></article>'; state.textContent=`총 ${items.length}건 · 현재 ${arr.length}건 표시`;}
function drawTabs(){const cs=cats(); tabs.innerHTML=`<button class="tab active" data-id="all">전체 ${items.length}</button>`+cs.map(c=>`<button class="tab" data-id="${esc(c.id)}">${esc(c.icon)} ${esc(c.name)} ${c.count}</button>`).join(''); tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tabs.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');current=b.dataset.id;render();});}
async function load(){const latest=await get('./latest.json'), base=await get('./data.json'); items=merge([...flatten(latest),...flatten(base)]); drawTabs(); render();}
q.oninput=render; sort.onchange=render; load();
</script>
</body>
</html>
