<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="index,follow">
  <meta name="description" content="GORICS HOT NEWS. 공개 뉴스 링크 기반 테마별 핫뉴스 피드입니다.">
  <link rel="alternate" type="application/rss+xml" title="GORICS HOT NEWS RSS" href="feed.xml">
  <title>GORICS HOT NEWS</title>
  <style>
    :root{color-scheme:dark;--bg:#000;--surface:#121212;--card:#181818;--card2:#242424;--text:#fff;--muted:#a7a7a7;--line:rgba(255,255,255,.09);--green:#1ed760;--hot:#ff4b4b;--shadow:0 30px 100px rgba(0,0,0,.55)}
    @media(prefers-color-scheme:light){:root{color-scheme:light;--bg:#f3f6f4;--surface:#fff;--card:#fff;--card2:#edf4ef;--text:#101010;--muted:#66706a;--line:rgba(16,16,16,.1);--green:#168d42;--hot:#d92d20;--shadow:0 22px 70px rgba(0,0,0,.14)}}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:linear-gradient(180deg,#214b2d 0,#121212 330px,var(--bg) 72%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif}a{color:inherit;text-decoration:none}button,input{font:inherit}.wrap{width:min(1220px,calc(100% - 32px));margin:0 auto}.topbar{position:sticky;top:10px;z-index:40;display:grid;grid-template-columns:auto minmax(220px,430px) auto;align-items:center;gap:12px;margin:10px auto 0;padding:10px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(18,18,18,.84);backdrop-filter:blur(18px)}.brand{display:flex;align-items:center;gap:12px;font-weight:950;letter-spacing:-.04em;white-space:nowrap}.logo{display:grid;place-items:center;width:42px;height:42px;border-radius:50%;background:var(--green);color:#001b09;font-weight:950}.search{width:100%;border:0;border-radius:999px;background:#fff;color:#000;padding:13px 18px;outline:0}.nav{display:flex;justify-content:flex-end;gap:8px;overflow:auto}.nav a{white-space:nowrap;border-radius:999px;padding:10px 14px;color:var(--muted);font-weight:850}.nav a:hover,.nav a.active{background:#fff;color:#000}.hero{display:grid;grid-template-columns:190px minmax(0,1fr);gap:28px;align-items:end;margin-top:34px;padding:42px 0 24px}.cover{display:grid;place-items:center;aspect-ratio:1;border-radius:22px;background:linear-gradient(135deg,#0f3,#096,#111);box-shadow:var(--shadow);font-size:4.5rem}.kind{color:var(--muted);font-weight:900;font-size:.86rem;letter-spacing:.08em}.hero h1{margin:8px 0 10px;font-size:clamp(3.3rem,9vw,7.5rem);line-height:.86;letter-spacing:-.085em}.hero p{margin:0;max-width:780px;color:var(--muted);line-height:1.65;font-size:1.03rem}.stats{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px}.stat{border-radius:999px;background:rgba(0,0,0,.28);border:1px solid var(--line);padding:8px 11px;color:var(--muted);font-weight:800}.stat b{color:var(--text)}.playrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:8px 0 22px}.play{display:grid;place-items:center;width:58px;height:58px;border-radius:50%;background:var(--green);color:#001b09;font-weight:950;font-size:1.4rem;box-shadow:0 18px 48px rgba(30,215,96,.28)}.chip{border:1px solid var(--line);border-radius:999px;padding:11px 14px;background:rgba(255,255,255,.05);color:var(--muted);font-weight:850}.tabs{display:flex;gap:8px;overflow:auto;padding:0 0 18px}.tab{white-space:nowrap;border:0;border-radius:999px;padding:10px 14px;background:var(--card);color:var(--muted);font-weight:900;cursor:pointer}.tab.active,.tab:hover{background:#fff;color:#000}.section-title{display:flex;justify-content:space-between;align-items:end;gap:12px;margin:8px 0 14px}.section-title h2{margin:0;letter-spacing:-.04em;font-size:clamp(1.4rem,3vw,2.1rem)}.section-title p{margin:0;color:var(--muted);font-size:.9rem;text-align:right}.layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:16px;align-items:start}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;padding-bottom:100px}.card{position:relative;min-height:280px;padding:15px;border-radius:20px;background:var(--card);border:1px solid var(--line);transition:.18s;display:flex;flex-direction:column}.card:hover{background:var(--card2);transform:translateY(-4px)}.art{display:grid;place-items:center;aspect-ratio:1;border-radius:16px;margin-bottom:14px;background:linear-gradient(135deg,#18351f,var(--green));font-size:2.5rem;box-shadow:0 16px 35px rgba(0,0,0,.2)}.go{position:absolute;right:22px;top:calc(100% - 132px);display:grid;place-items:center;width:44px;height:44px;border-radius:50%;background:var(--green);color:#001b09;font-weight:950;opacity:0;transform:translateY(10px);transition:.18s}.card:hover .go{opacity:1;transform:translateY(0)}.card h3{margin:0 0 9px;font-size:1rem;line-height:1.38;letter-spacing:-.03em}.desc{margin:0;color:var(--muted);line-height:1.52;font-size:.9rem;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}.meta{margin-top:auto;padding-top:14px;display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:.78rem}.source{color:var(--green);font-weight:900}.rankbox{position:sticky;top:86px;border:1px solid var(--line);border-radius:22px;background:rgba(18,18,18,.82);padding:16px;backdrop-filter:blur(18px)}.rankbox h3{margin:0 0 12px}.rank{display:grid;gap:10px;margin:0;padding:0;list-style:none}.rank li{display:grid;grid-template-columns:24px 1fr;gap:8px;align-items:start;color:var(--muted);font-size:.88rem;line-height:1.35}.rank b{color:var(--green)}.rank a:hover{color:var(--text)}.empty{display:none;margin:0 0 100px;padding:34px;border:1px dashed var(--line);border-radius:18px;text-align:center;color:var(--muted)}.player{position:fixed;left:50%;bottom:12px;z-index:45;transform:translateX(-50%);width:min(1220px,calc(100% - 24px));display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--line);border-radius:999px;background:rgba(0,0,0,.88);backdrop-filter:blur(20px)}.ticker{overflow:hidden;white-space:nowrap;color:var(--muted)}.ticker b{color:var(--green);margin-right:10px}.dock{display:flex;gap:8px}.dock a{white-space:nowrap;border-radius:999px;padding:9px 12px;color:var(--muted);font-weight:850}.dock a.active,.dock a:hover{background:#fff;color:#000}@media(max-width:1080px){.layout{grid-template-columns:1fr}.rankbox{position:relative;top:auto}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.topbar{grid-template-columns:1fr}.nav{justify-content:flex-start}.hero{grid-template-columns:150px 1fr}}@media(max-width:640px){.wrap{width:min(100% - 22px,1220px)}.topbar{border-radius:24px}.brand span:last-child{display:none}.hero{display:block;margin-top:22px}.cover{width:132px;margin-bottom:20px}.hero h1{font-size:clamp(3rem,17vw,4.8rem)}.playrow{display:grid}.play{width:100%;height:52px;border-radius:999px}.section-title{display:block}.section-title p{text-align:left;margin-top:5px}.grid{grid-template-columns:1fr 1fr;gap:10px}.card{min-height:245px}.rankbox{display:none}.player{grid-template-columns:1fr;border-radius:22px}.dock{justify-content:center}.dock a{font-size:.9rem;padding:8px 10px}}
  </style>
</head>
<body>
  <header class="topbar wrap"><a class="brand" href="../"><span class="logo">G</span><span>GORICS NEWS</span></a><input id="search" class="search" placeholder="뉴스 제목·요약·언론사 검색" autocomplete="off"><nav class="nav"><a href="../">인덱스</a><a class="active" href="./">뉴스</a><a href="feed.xml">RSS</a></nav></header>
  <main class="wrap"><section class="hero"><div class="cover">🗞️</div><div><div class="kind">NEWS PLAYLIST</div><h1>HOT<br>NEWS</h1><p>사이드바 없이 상단 검색, 카테고리 탭, 우측 TOP 10 패널로 정리한 GORICS HOT NEWS입니다. 카드를 누르면 원문으로 이동합니다.</p><div class="stats"><span class="stat">총 기사 <b id="total">0</b></span><span class="stat">테마 <b id="themeCount">0</b></span><span class="stat">업데이트 <b id="updated">-</b></span></div></div></section><div class="playrow"><a class="play" href="#newsGrid">▶</a><span class="chip">PUBLIC RSS</span><span class="chip">NO LOGIN</span></div><section id="tabs" class="tabs"></section><div class="section-title"><h2>오늘의 뉴스 믹스</h2><p>검색어와 테마 필터가 바로 적용됩니다.</p></div><section class="layout"><div><section id="grid" class="grid"></section><div id="empty" class="empty">검색 결과가 없습니다.</div></div><aside class="rankbox"><h3>🔥 TOP 10</h3><ol id="rank" class="rank"></ol></aside></section></main>
  <div class="player"><div id="ticker" class="ticker"><b>LIVE</b>뉴스 데이터를 불러오는 중...</div><nav class="dock"><a href="../">홈</a><a class="active" href="./">뉴스</a><a href="feed.xml">RSS</a></nav></div>
  <script>
    const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),fmt=iso=>{const d=new Date(iso);return isNaN(d)?'-':new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(d)};let data={allItems:[],categories:[]},current='all';
    function card(x){return `<article class="card" data-category="${esc(x.category)}" data-text="${esc((x.title+' '+x.description+' '+(x.source?.name||'')+' '+x.categoryName).toLowerCase())}"><a class="go" href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">▶</a><div class="art">${esc(x.categoryIcon||'🗞️')}</div><h3><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${esc(x.title)}</a></h3><p class="desc">${esc(x.description||'원문에서 전체 내용을 확인하세요.')}</p><div class="meta"><span class="source">${esc(x.source?.name||'원문')}</span><time datetime="${esc(x.publishedAt)}">${esc(fmt(x.publishedAt))}</time></div></article>`}
    function draw(){const items=data.allItems||[];$('total').textContent=String(data.total||items.length);$('themeCount').textContent=String((data.categories||[]).length);$('updated').textContent=data.generatedAt?fmt(data.generatedAt):'-';$('grid').innerHTML=items.map(card).join('');$('rank').innerHTML=items.slice(0,10).map((x,i)=>`<li><b>${i+1}</b><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${esc(x.title)}</a></li>`).join('');$('ticker').innerHTML='<b>LIVE</b>'+esc(items.slice(0,8).map(x=>x.title).join(' · '));$('tabs').innerHTML=`<button class="tab active" data-filter="all">전체 ${items.length}</button>`+(data.categories||[]).map(c=>`<button class="tab" data-filter="${esc(c.id)}">${esc(c.icon)} ${esc(c.name)} ${c.count}</button>`).join('');document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');current=t.dataset.filter;apply()});apply()}
    function apply(){const term=$('search').value.trim().toLowerCase();let n=0;document.querySelectorAll('.card').forEach(c=>{const ok=(current==='all'||c.dataset.category===current)&&(!term||c.dataset.text.includes(term));c.style.display=ok?'':'none';if(ok)n++});$('empty').style.display=n?'none':'block'}
    $('search').oninput=apply;fetch('data.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(j=>{data=j;draw()}).catch(e=>{$('ticker').textContent='뉴스 데이터를 불러오지 못했습니다.';console.error(e)});
  </script>
</body>
</html>
