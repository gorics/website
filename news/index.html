<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="index,follow"><meta name="description" content="GORICS 뉴스 허브. latest overlay와 data.json을 병합해 최신 공개 뉴스를 표시합니다."><title>GORICS NEWS</title><style>:root{color-scheme:dark;--bg:#070a12;--panel:#101827;--line:rgba(148,163,184,.24);--text:#e5edf8;--muted:#94a3b8;--blue:#60a5fa;--green:#34d399;--hot:#fb7185}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,rgba(96,165,250,.2),transparent 32rem),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif}a{color:inherit;text-decoration:none}.wrap{width:min(1180px,calc(100% - 28px));margin:0 auto}.nav{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:22px 0}.brand{font-weight:950}.links{display:flex;gap:8px;overflow:auto}.links a,.btn,.tab,input,select{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.04);color:var(--text);font-weight:850}.links a.on,.tab.on{background:#2563eb}.hero,.toolbar,.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(16,24,39,.96),rgba(10,16,28,.96));border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.3)}.hero{padding:28px;margin:12px 0 18px}.hero h1{margin:8px 0;font-size:clamp(2.8rem,7vw,5.4rem);line-height:.9;letter-spacing:-.08em}.muted{color:var(--muted);line-height:1.65}.toolbar{position:sticky;top:0;z-index:5;padding:16px;margin-bottom:16px;background:rgba(7,10,18,.92);backdrop-filter:blur(16px)}.controls{display:grid;grid-template-columns:1fr auto auto;gap:10px}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;padding-bottom:54px}.card{padding:18px;min-height:210px;display:flex;flex-direction:column}.meta{display:flex;justify-content:space-between;gap:8px;color:#bfdbfe;font-size:.86rem}.score{color:#fecdd3}.card h2{font-size:1.12rem;line-height:1.45;margin:15px 0 10px}.card p{margin:0}.card footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;color:#7d8797;font-size:.84rem}.notice{border:1px solid rgba(250,204,21,.25);border-radius:18px;background:rgba(250,204,21,.08);color:#fde68a;padding:14px;margin:0 0 18px}.error{border-color:rgba(251,113,133,.45);background:rgba(251,113,133,.08)}@media(max-width:860px){.nav{display:block}.links{margin-top:12px}.grid,.controls{grid-template-columns:1fr}}</style></head><body><nav class="wrap nav"><a class="brand" href="../">GORICS.CLOUD</a><div class="links"><a href="../">홈</a><a class="on" href="./">뉴스</a><a href="financial/">금융뉴스</a><a href="tech/">기술</a><a href="global/">국제</a><a href="politics/">정치</a><a href="play/">스포츠</a><a href="culture/">문화</a></div></nav><header class="wrap hero"><div class="muted">DYNAMIC NEWS · latest.json + data.json</div><h1>GORICS<br>NEWS</h1><p class="muted">최신 overlay를 먼저 읽고 장기 보관용 data.json을 뒤에 병합합니다. URL/제목 기준으로 중복을 제거해 최신 항목을 앞에 표시합니다.</p><p id="state" class="muted">연결 중</p></header><main class="wrap"><p class="notice">⚠️ 기존 뉴스는 삭제하지 않고 overlay 우선 병합으로 표시합니다.</p><section class="toolbar"><div class="controls"><input id="q" placeholder="제목·요약·언론사 검색"><select id="sort"><option value="hot">HOT순</option><option value="latest">최신순</option></select><button id="reload" class="btn" type="button">다시 읽기</button></div><div id="tabs" class="tabs"></div></section><section id="grid" class="grid"></section></main><script>const SOURCES=['./latest.json','./data.json'];const $=s=>document.querySelector(s),grid=$('#grid'),tabs=$('#tabs'),q=$('#q'),sort=$('#sort'),state=$('#state');let ITEMS=[],CUR='all';const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const src=x=>typeof x.source==='object'?(x.source.name||'원문'):(x.source||'원문');function flat(p){if(!p)return[];let a=[];['allItems','items','posts','news'].forEach(k=>Array.isArray(p[k])&&a.push(...p[k]));if(p.byCategory)Object.values(p.byCategory).forEach(v=>Array.isArray(v)&&v.forEach(y=>{if(y&&typeof y==='object')a.push(y)}));return a}function norm(x){return{id:x.id,category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.theme||x.category||'뉴스',categoryIcon:x.categoryIcon||x.icon||'📰',title:x.title||x.name,description:x.description||x.summary||'',url:x.url||x.link,source:x.source||'원문',publishedAt:x.publishedAt||x.date||x.published_at||'',score:+(x.score??x.priority??0)||0,tags:x.tags||[]}}function dedupe(a){let u=new Set,t=new Set,o=[];for(const z of a.map(norm).filter(x=>x.title&&x.url)){let U=z.url.toLowerCase().replace(/[#?].*$/,'').replace(/\/$/,'');let T=(z.title+'|'+src(z)).toLowerCase().replace(/\s+/g,' ');if(u.has(U)||t.has(T))continue;u.add(U);t.add(T);o.push(z)}return o}function card(x){let d=new Date(x.publishedAt),ds=isNaN(d)?(x.publishedAt||'-'):d.toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});return `<article class="card"><div class="meta"><span>${esc(x.categoryIcon)} ${esc(x.categoryName)}</span><b class="score">HOT ${esc(x.score)}</b></div><h2><a target="_blank" rel="noopener noreferrer" href="${esc(x.url)}">${esc(x.title)}</a></h2><p class="muted">${esc(x.description||'요약 없음')}</p><footer><span>${esc(src(x))}</span><time>${esc(ds)}</time></footer></article>`}function drawTabs(){let c={};ITEMS.forEach(x=>c[x.category]=(c[x.category]||0)+1);tabs.innerHTML='<button class="tab on" data-c="all">전체 '+ITEMS.length+'</button>'+Object.entries(c).map(([k,v])=>`<button class="tab" data-c="${esc(k)}">${esc(k)} ${v}</button>`).join('');tabs.onclick=e=>{if(e.target.dataset.c){CUR=e.target.dataset.c;tabs.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');render()}}}function render(){let s=q.value.toLowerCase();let a=[...ITEMS].filter(x=>(CUR==='all'||x.category===CUR)&&(!s||(x.title+x.description+src(x)+(x.tags||[]).join()).toLowerCase().includes(s)));a.sort(sort.value==='latest'?(a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt):(a,b)=>b.score-a.score);grid.innerHTML=a.length?a.map(card).join(''):'<article class="card error"><h2>표시할 뉴스가 없습니다</h2></article>';state.textContent='표시 '+a.length+' / 전체 '+ITEMS.length}async function get(p){try{let r=await fetch(p+'?v='+Date.now(),{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}async function load(){state.textContent='데이터 연결 중';let docs=await Promise.all(SOURCES.map(get));ITEMS=dedupe(docs.flatMap(flat));drawTabs();render()}q.oninput=render;sort.onchange=render;$('#reload').onclick=load;load();</script></body></html>
