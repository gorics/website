<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="index,follow"><meta name="description" content="GORICS 뉴스 허브. latest.json overlay와 data.json base를 병합해 표시합니다."><title>GORICS NEWS</title><style>:root{color-scheme:dark;--bg:#070a12;--panel:#101827;--line:rgba(148,163,184,.24);--text:#e5edf8;--muted:#94a3b8;--blue:#60a5fa;--green:#34d399;--hot:#fb7185}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,rgba(96,165,250,.18),transparent 32rem),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif}a{color:inherit;text-decoration:none}.wrap{width:min(1180px,calc(100% - 28px));margin:0 auto}.nav{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:22px 0}.brand{font-weight:950}.links{display:flex;gap:8px;overflow:auto}.links a,.btn,.tab,input,select{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.04);color:var(--text);font-weight:850}.links a.on,.tab.on{background:rgba(96,165,250,.22);border-color:rgba(96,165,250,.5)}.hero,.bar,.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(16,24,39,.96),rgba(10,16,28,.96));border-radius:22px}.hero{padding:28px;margin:10px 0 16px}.hero h1{font-size:clamp(2.5rem,7vw,5.2rem);letter-spacing:-.07em;line-height:.95;margin:8px 0}.muted{color:var(--muted);line-height:1.6}.bar{position:sticky;top:0;z-index:5;padding:14px;margin-bottom:14px;background:rgba(7,10,18,.9);backdrop-filter:blur(14px)}.controls{display:grid;grid-template-columns:1fr auto auto;gap:10px}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;padding-bottom:50px}.card{padding:18px;min-height:210px;display:flex;flex-direction:column}.meta{display:flex;justify-content:space-between;gap:8px}.chip,.score{border-radius:999px;padding:6px 9px;font-size:.78rem;font-weight:950}.chip{background:rgba(96,165,250,.12);color:#dbeafe}.score{background:rgba(251,113,133,.12);color:#fecdd3}.card h2{font-size:1.1rem;line-height:1.45;margin:14px 0 10px}.card p{margin:0}.card footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;color:#7d8797;font-size:.84rem}.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.stat{border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:rgba(255,255,255,.035)}@media(max-width:820px){.nav{display:block}.links{margin-top:12px}.grid,.controls{grid-template-columns:1fr}}</style></head><body><nav class="wrap nav"><a class="brand" href="../">GORICS.CLOUD</a><div class="links"><a href="../">홈</a><a class="on" href="./">뉴스</a><a href="financial/">금융뉴스</a><a href="tech/">기술</a><a href="global/">국제</a><a href="politics/">정치</a><a href="play/">스포츠</a><a href="culture/">문화</a></div></nav><header class="wrap hero"><p class="muted">latest.json overlay → data.json base 순서로 병합하고 URL/제목 기준으로 중복 제거합니다.</p><h1>GORICS NEWS</h1><div class="stats"><span class="stat">상태 <b id="state">연결 중</b></span><span class="stat">기사 <b id="total">-</b></span><span class="stat">테마 <b id="themeCount">-</b></span><span class="stat">갱신 <b id="updated">-</b></span></div></header><main class="wrap"><section class="bar"><div class="controls"><input id="q" placeholder="제목·요약·언론사 검색"><select id="sort"><option value="hot">HOT순</option><option value="latest">최신순</option></select><button id="reload" class="btn" type="button">다시 읽기</button></div><div id="tabs" class="tabs"></div><p id="status" class="muted">뉴스 데이터 연결 중입니다.</p></section><section id="grid" class="grid"></section></main><script>const SOURCES=['./latest.json','./data.json'];const $=s=>document.querySelector(s),grid=$('#grid'),tabs=$('#tabs'),q=$('#q'),sort=$('#sort'),state=$('#state'),statusEl=$('#status');let ITEMS=[],CUR='all';const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const src=x=>typeof x.source==='object'?(x.source.name||'원문'):(x.source||'원문');function flat(p){if(!p)return[];let a=[];['allItems','items','posts','news'].forEach(k=>Array.isArray(p[k])&&a.push(...p[k]));if(p.byCategory)Object.values(p.byCategory).forEach(v=>Array.isArray(v)&&v.forEach(y=>{if(y&&typeof y==='object')a.push(y)}));return a}function norm(x){return{id:x.id||'',category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.theme||x.category||'뉴스',categoryIcon:x.categoryIcon||x.icon||'📰',title:x.title||x.name||'',description:x.description||x.summary||'',url:x.url||x.link||'',source:x.source||'원문',publishedAt:x.publishedAt||x.date||x.published_at||'',score:+(x.score??x.priority??0)||0,tags:x.tags||[]}}function dedupe(a){let u=new Set,t=new Set,o=[];for(const z of a.map(norm).filter(x=>x.title&&x.url)){let U=z.url.toLowerCase().replace(/[#?].*$/,'').replace(/\/$/,''),T=(z.title+'|'+src(z)).toLowerCase().replace(/\s+/g,' ');if(u.has(U)||t.has(T))continue;u.add(U);t.add(T);o.push(z)}return o}function date(v){let d=new Date(v);return isNaN(d)?(v||'-'):d.toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})}function card(x){return `<article class="card"><div class="meta"><span class="chip">${esc(x.categoryIcon)} ${esc(x.categoryName)}</span><span class="score">HOT ${esc(x.score)}</span></div><h2><a target="_blank" rel="noopener noreferrer" href="${esc(x.url)}">${esc(x.title)}</a></h2><p class="muted">${esc(x.description||'요약 없음')}</p><footer><span>${esc(src(x))}</span><time>${esc(date(x.publishedAt))}</time></footer></article>`}function drawTabs(){let cats=[...new Set(ITEMS.map(x=>x.category))];tabs.innerHTML='<button class="tab on" data-c="all">전체 '+ITEMS.length+'</button>'+cats.map(c=>`<button class="tab" data-c="${esc(c)}">${esc(ITEMS.find(x=>x.category===c)?.categoryIcon||'📰')} ${esc(ITEMS.find(x=>x.category===c)?.categoryName||c)} ${ITEMS.filter(x=>x.category===c).length}</button>`).join('');tabs.onclick=e=>{if(e.target.dataset.c){CUR=e.target.dataset.c;tabs.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');render()}}}function render(){let s=q.value.toLowerCase();let a=[...ITEMS].filter(x=>(CUR==='all'||x.category===CUR)&&(!s||(x.title+x.description+src(x)+(x.tags||[]).join()).toLowerCase().includes(s)));a.sort(sort.value==='latest'?(a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt):(a,b)=>b.score-a.score);grid.innerHTML=a.length?a.map(card).join(''):'<article class="card"><h2>표시할 뉴스가 없습니다</h2><p class="muted">검색어나 테마를 바꿔보세요.</p></article>';statusEl.textContent='표시 '+a.length+' / 전체 '+ITEMS.length}async function get(p){try{let r=await fetch(p+'?v='+Date.now(),{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}async function load(){state.textContent='연결 중';let docs=await Promise.all(SOURCES.map(get));ITEMS=dedupe(docs.flatMap(flat));state.textContent=ITEMS.length?'정상':'실패';$('#total').textContent=ITEMS.length;$('#themeCount').textContent=[...new Set(ITEMS.map(x=>x.category))].length;$('#updated').textContent=date(docs.find(Boolean)?.generatedAt||docs.find(Boolean)?.generated_at);drawTabs();render()}q.oninput=render;sort.onchange=render;$('#reload').onclick=load;load();</script></body></html>
