<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="index,follow">
<meta name="description" content="GORICS HOT NEWS. 공개 뉴스 링크 기반 테마별 핫뉴스 피드입니다.">
<link rel="alternate" type="application/rss+xml" title="GORICS HOT NEWS RSS" href="feed.xml">
<title>GORICS HOT NEWS</title>
<style>
:root{color-scheme:light;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--link:#2563eb;--bg:#fff;--soft:#f9fafb}*{box-sizing:border-box}body{margin:0;background:#fff;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif}.wrap{width:min(1080px,calc(100% - 32px));margin:0 auto;padding:28px 0 56px}a{color:inherit;text-decoration:none}header{display:grid;grid-template-columns:1fr minmax(240px,420px);gap:16px;align-items:end;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:22px}.brand a{color:var(--muted);font-size:.92rem}.brand h1{margin:4px 0 0;font-size:clamp(2.4rem,7vw,4.8rem);line-height:.95;letter-spacing:-.07em}.search{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);padding:13px 14px;outline:0}.search:focus{border-color:var(--link)}.stats{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 22px}.stat,.tab{border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);padding:8px 11px;font-size:.92rem}.stat b{color:var(--text)}section{margin:0 0 26px}.section-title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin-bottom:10px}h2{margin:0;font-size:1.4rem;letter-spacing:-.03em}.hint{margin:0;color:var(--muted);font-size:.92rem;text-align:right}.rank{margin:0;padding:0;list-style:none;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0 22px;border-top:1px solid var(--line)}.rank li{display:grid;grid-template-columns:32px 1fr;gap:10px;padding:13px 0;border-bottom:1px solid var(--line);line-height:1.4}.rank b{color:var(--link)}.rank a:hover,.item h3 a:hover{color:var(--link)}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:2px}.tab{cursor:pointer;white-space:nowrap}.tab.active,.tab:hover{background:var(--text);color:#fff;border-color:var(--text)}.list{border-top:1px solid var(--line)}.item{display:grid;grid-template-columns:1fr auto;gap:18px;padding:18px 0;border-bottom:1px solid var(--line)}.item h3{margin:0 0 8px;font-size:1.08rem;line-height:1.42}.desc{margin:0;color:var(--muted);line-height:1.55}.meta{margin-top:10px;color:var(--muted);font-size:.86rem}.source{color:var(--link);font-weight:700}.go{align-self:center;color:var(--link);font-weight:800}.empty{display:none;padding:28px 0;color:var(--muted);text-align:center}@media(max-width:760px){.wrap{width:min(100% - 24px,1080px);padding-top:22px}header{grid-template-columns:1fr}.rank{grid-template-columns:1fr}.section-title{display:block}.hint{text-align:left;margin-top:4px}.item{grid-template-columns:1fr}.go{display:none}}
</style>
</head>
<body>
<main class="wrap">
<header><div class="brand"><a href="../">← GORICS.CLOUD</a><h1>HOT NEWS</h1></div><input id="search" class="search" placeholder="뉴스 검색" autocomplete="off"></header>
<div class="stats"><span class="stat">총 기사 <b id="total">0</b></span><span class="stat">테마 <b id="themeCount">0</b></span><span class="stat">업데이트 <b id="updated">-</b></span><a class="stat" href="feed.xml">RSS</a></div>
<section aria-labelledby="topTitle"><div class="section-title"><h2 id="topTitle">TOP 10</h2><p class="hint">먼저 볼 뉴스</p></div><ol id="rank" class="rank"></ol></section>
<section aria-label="카테고리"><div id="tabs" class="tabs"></div></section>
<section aria-labelledby="allTitle"><div class="section-title"><h2 id="allTitle">전체 뉴스</h2><p class="hint">검색/카테고리 필터 적용</p></div><div id="grid" class="list"></div><div id="empty" class="empty">검색 결과가 없습니다.</div></section>
</main>
<script>
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),fmt=iso=>{const d=new Date(iso);return isNaN(d)?'-':new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(d)};let data={allItems:[],categories:[]},current='all';
function item(x){return `<article class="item" data-category="${esc(x.category)}" data-text="${esc((x.title+' '+x.description+' '+(x.source?.name||'')+' '+x.categoryName).toLowerCase())}"><div><h3><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${esc(x.title)}</a></h3><p class="desc">${esc(x.description||'원문에서 전체 내용을 확인하세요.')}</p><div class="meta"><span class="source">${esc(x.source?.name||'원문')}</span> · <time datetime="${esc(x.publishedAt)}">${esc(fmt(x.publishedAt))}</time></div></div><a class="go" href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">열기</a></article>`}
function draw(){const items=data.allItems||[];$('total').textContent=String(data.total||items.length);$('themeCount').textContent=String((data.categories||[]).length);$('updated').textContent=data.generatedAt?fmt(data.generatedAt):'-';$('grid').innerHTML=items.map(item).join('');$('rank').innerHTML=items.slice(0,10).map((x,i)=>`<li><b>${i+1}</b><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${esc(x.title)}</a></li>`).join('');$('tabs').innerHTML=`<button class="tab active" data-filter="all">전체 ${items.length}</button>`+(data.categories||[]).map(c=>`<button class="tab" data-filter="${esc(c.id)}">${esc(c.name)} ${c.count}</button>`).join('');document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');current=t.dataset.filter;apply()});apply()}
function apply(){const term=$('search').value.trim().toLowerCase();let n=0;document.querySelectorAll('.item').forEach(c=>{const ok=(current==='all'||c.dataset.category===current)&&(!term||c.dataset.text.includes(term));c.style.display=ok?'':'none';if(ok)n++});$('empty').style.display=n?'none':'block'}
$('search').oninput=apply;fetch('data.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(j=>{data=j;draw()}).catch(e=>{console.error(e);$('empty').style.display='block';$('empty').textContent='뉴스 데이터를 불러오지 못했습니다.'});
</script>
</body>
</html>
