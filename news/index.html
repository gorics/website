<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index,follow" />
  <meta name="description" content="개인정보를 자동 제거한 테마별 핫뉴스 링크 허브. 매시간 GitHub Actions로 갱신됩니다." />
  <title>GORICS HOT NEWS</title>
  <style>
    :root { color-scheme: dark; --bg:#071018; --panel:#0e1a25; --line:#22364a; --text:#e6edf3; --muted:#9fb0c0; --accent:#58a6ff; --ok:#3fb950; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at top left,#13243a,var(--bg) 45%); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif; padding:24px; }
    main { width:min(760px,100%); background:rgba(14,26,37,.9); border:1px solid var(--line); border-radius:28px; padding:36px; box-shadow:0 18px 60px rgba(0,0,0,.32); }
    .kicker { color:var(--ok); font-weight:800; letter-spacing:.08em; font-size:.82rem; }
    h1 { font-size:clamp(2.2rem,8vw,4.8rem); line-height:.95; margin:14px 0 18px; }
    p { color:var(--muted); line-height:1.75; }
    code { color:#c8e1ff; background:#132435; border:1px solid var(--line); border-radius:8px; padding:2px 6px; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <main>
    <div class="kicker">AUTO UPDATED EVERY HOUR · PRIVACY REDACTED</div>
    <h1>GORICS<br />HOT NEWS</h1>
    <p>뉴스 자동 업데이트 시스템이 설치되었습니다. GitHub Actions가 <code>7 * * * *</code> 스케줄로 매시간 공개 RSS 뉴스를 수집해 이 페이지를 테마별 핫뉴스 허브로 자동 교체합니다.</p>
    <p>이메일, 전화번호, 주민등록번호, 카드번호, IP, 세부 주소 패턴은 생성 단계에서 자동 비공개 처리됩니다. 첫 실행은 워크플로 추가 직후 또는 다음 정각대에 반영됩니다. ⚡</p>
    <p><a href="../">메인으로 이동</a></p>
  </main>
</body>
</html>
