<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="index,follow"><meta name="description" content="GORICS 뉴스 허브. latest overlay를 먼저 읽고 data.json을 병합합니다."><link rel="alternate" type="application/rss+xml" title="GORICS HOT NEWS RSS" href="feed.xml"><title>GORICS NEWS</title><style>:root{color-scheme:dark;--bg:#070a12;--panel:#101827;--line:rgba(148,163,184,.24);--text:#e5edf8;--muted:#94a3b8;--blue:#60a5fa;--hot:#fb7185}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,rgba(96,165,250,.2),transparent 32rem),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}a{color:inherit;text-decoration:none}.wrap{width:min(1180px,calc(100% - 28px));margin:0 auto}.nav{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:22px 0}.brand{font-weight:950}.links{display:flex;gap:8px;overflow:auto}.links a,.btn,.tab,input,select{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.04);color:var(--text);font-weight:800}.links a.on,.tab.on{background:#2563eb}.hero,.card,.bar{border:1px solid var(--line);background:linear-gradient(180deg,rgba(16,24,39,.96),rgba(10,16,28,.96));border-radius:22px;padding:18px;margin:14px 0}.hero h1{font-size:clamp(2.5rem,8vw,5rem);letter-spacing:-.08em;line-height:.9;margin:10px 0}.muted{color:var(--muted);line-height:1.6}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;padding-bottom:50px}.card h2{font-size:1.1rem;line-height:1.45}.meta{display:flex;justify-content:space-between;gap:8px;color:#bfdbfe;font-size:.85rem}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.controls{display:flex;gap:8px;flex-wrap:wrap}.search{min-width:260px;flex:1}.error{border-color:rgba(251,113,133,.5)}</style></head><body><nav class="wrap nav"><a class="brand" href="../">GORICS.CLOUD</a><div class="links"><a class="on" href="./">뉴스</a><a href="financial/">금융뉴스</a><a href="tech/">기술</a><a href="global/">국제</a><a href="politics/">정치</a><a href="play/">스포츠</a><a href="culture/">문화</a><a href="feed.xml">RSS</a></div></nav><header class="wrap hero"><p class="muted">DYNAMIC NEWS · latest.json + data.json</p><h1>GORICS<br>NEWS</h1><p class="muted">최신 overlay를 먼저 읽고 장기 보관 데이터는 뒤에 병합합니다. URL/제목 기준으로 중복 제거해 최신 카드가 먼저 보입니다.</p><p id="state">연결 중</p></header><main class="wrap"><section class="bar"><div class="controls"><input id="q" class="search" placeholder="제목·요약·언론사 검색"><select id="sort"><option value="hot">HOT순</option><option value="latest">최신순</option></select><button id="reload" class="btn" type="button">다시 읽기</button></div><div id="tabs" class="tabs"></div></section><section id="grid" class="grid"></section></main><script>const SOURCES=['./latest.json','./index.json','./data.json'];const $=s=>document.querySelector(s),grid=$('#grid'),tabs=$('#tabs'),q=$('#q'),sort=$('#sort'),state=$('#state');let ITEMS=[],CUR='all';const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const src=x=>typeof x.source==='object'?(x.source.name||'원문'):(x.source||'원문');const sc=x=>+(x.score??x.priority??0)||0;const dt=x=>x.publishedAt||x.date||x.published_at||'';function flat(p){if(!p)return[];let a=[];['allItems','items','posts','news'].forEach(k=>Array.isArray(p[k])&&a.push(...p[k]));if(p.byCategory)Object.values(p.byCategory).forEach(v=>Array.isArray(v)&&v.forEach(y=>{if(y&&typeof y==='object')a.push(y)}));return a}function norm(x){return{id:x.id,category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.theme||x.category||'뉴스',categoryIcon:x.categoryIcon||x.icon||'📰',title:x.title||x.name,description:x.description||x.summary||'',url:x.url||x.link,source:x.source||'원문',publishedAt:dt(x),score:sc(x),tags:x.tags||[]}}function dedupe(a){let u=new Set,t=new Set,o=[];for(const z of a.map(norm).filter(x=>x.title&&x.url)){let U=z.url.toLowerCase().replace(/\/$/,''),T=(z.title+'|'+src(z)).toLowerCase().replace(/\s+/g,' ');if(u.has(U)||t.has(T))continue;u.add(U);t.add(T);o.push(z)}return o}function card(x){let d=new Date(x.publishedAt),ds=isNaN(d)?(x.publishedAt||'-'):d.toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});return `<article class="card"><div class="meta"><span>${esc(x.categoryIcon)} ${esc(x.categoryName)}</span><b>HOT ${esc(x.score)}</b></div><h2><a target="_blank" rel="noopener noreferrer" href="${esc(x.url)}">${esc(x.title)}</a></h2><p class="muted">${esc(x.description||'요약 없음')}</p><p class="muted">${esc(src(x))} · ${esc(ds)}</p></article>`}function draw(){let cats=[...new Set(ITEMS.map(x=>x.category))];tabs.innerHTML='<button class="tab on" data-c="all">전체 '+ITEMS.length+'</button>'+cats.map(c=>`<button class="tab" data-c="${esc(c)}">${esc(c)} ${ITEMS.filter(x=>x.category===c).length}</button>`).join('');tabs.onclick=e=>{if(e.target.dataset.c){CUR=e.target.dataset.c;tabs.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');render()}};render()}function render(){let s=q.value.toLowerCase();let a=[...ITEMS].filter(x=>(CUR==='all'||x.category===CUR)&&(!s||(x.title+x.description+src(x)+(x.tags||[]).join()).toLowerCase().includes(s)));a.sort(sort.value==='latest'?(a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt):(a,b)=>b.score-a.score);grid.innerHTML=a.length?a.map(card).join(''):'<article class="card error">표시할 뉴스 없음</article>';state.textContent='표시 '+a.length+' / 전체 '+ITEMS.length}async function get(p){try{let r=await fetch(p+'?v='+Date.now(),{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}async function load(){state.textContent='연결 중';let docs=await Promise.all(SOURCES.map(get));ITEMS=dedupe(docs.flatMap(flat));draw()}q.oninput=render;sort.onchange=render;$('#reload').onclick=load;load();</script></body></html>
