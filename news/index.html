<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="index,follow">
<meta name="description" content="GORICS 동적 뉴스 허브. latest.json overlay와 data.json을 병합해 표시합니다.">
<link rel="alternate" type="application/rss+xml" title="GORICS HOT NEWS RSS" href="feed.xml">
<title>GORICS NEWS</title>
<style>
body{margin:0;background:#070a12;color:#e5edf8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif}a{color:inherit;text-decoration:none}.wrap{max-width:1180px;margin:auto;padding:18px}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a,.tab,button,input,select{border:1px solid #334155;background:#111827;color:#e5edf8;border-radius:999px;padding:9px 12px;text-decoration:none}.on,.tab.on{background:#2563eb}.hero,.card,.bar{border:1px solid #334155;background:#0f172a;border-radius:20px;padding:18px;margin:14px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}.card{margin:0}.muted{color:#94a3b8}.meta{display:flex;justify-content:space-between;gap:8px;color:#93c5fd;font-size:.85rem}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
</style>
</head>
<body>
<main class="wrap">
<nav class="nav"><a href="../">GORICS.CLOUD</a><a class="on" href="./">뉴스</a><a href="financial/">금융</a><a href="tech/">기술</a><a href="global/">국제</a><a href="politics/">정치</a><a href="play/">스포츠</a><a href="culture/">문화</a><a href="feed.xml">RSS</a></nav>
<section class="hero"><h1>GORICS NEWS</h1><p class="muted">latest.json overlay를 먼저 읽고 data.json을 뒤에 병합합니다. allItems, items, posts, news와 byCategory fallback을 모두 지원합니다.</p><p id="state">연결 중</p></section>
<section class="bar"><input id="q" placeholder="검색"><select id="sort"><option value="hot">HOT순</option><option value="latest">최신순</option></select><button id="reload">다시 읽기</button><div id="tabs" class="tabs"></div></section>
<section id="grid" class="grid"></section>
</main>
<script>
const SOURCES=['./latest.json','./data.json'];
const $=s=>document.querySelector(s),grid=$('#grid'),tabs=$('#tabs'),q=$('#q'),sort=$('#sort'),state=$('#state');
let ITEMS=[],CUR='all';
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const src=x=>typeof x.source==='object'?(x.source.name||'원문'):(x.source||'원문');
const dt=x=>x.publishedAt||x.date||x.published_at||'';
const score=x=>+(x.score??x.priority??0)||0;
function flat(p){if(!p)return[];let a=[];['allItems','items','posts','news'].forEach(k=>Array.isArray(p[k])&&a.push(...p[k]));if(p.byCategory)Object.values(p.byCategory).forEach(v=>Array.isArray(v)&&v.forEach(y=>{if(y&&typeof y==='object')a.push(y)}));return a;}
function norm(x){return{id:x.id,category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.theme||x.category||'뉴스',categoryIcon:x.categoryIcon||x.icon||'📰',title:x.title||x.name,description:x.description||x.summary||'',url:x.url||x.link,source:x.source||'원문',publishedAt:dt(x),score:score(x),tags:x.tags||[]}}
function dedupe(a){let u=new Set,t=new Set,o=[];for(const z of a.map(norm).filter(x=>x.title&&x.url)){let U=z.url.toLowerCase().replace(/\/$/,''),T=(z.title+'|'+src(z)).toLowerCase().replace(/\s+/g,' ');if(u.has(U)||t.has(T))continue;u.add(U);t.add(T);o.push(z)}return o}
function card(x){let d=new Date(x.publishedAt),ds=isNaN(d)?'-':d.toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});return `<article class=card><div class=meta><span>${esc(x.categoryIcon)} ${esc(x.categoryName)}</span><b>HOT ${x.score}</b></div><h2><a target=_blank rel=noopener href="${esc(x.url)}">${esc(x.title)}</a></h2><p class=muted>${esc(x.description||'요약 없음')}</p><p class=muted>${esc(src(x))} · ${esc(ds)}</p></article>`}
function draw(){let cats=[...new Set(ITEMS.map(x=>x.category))];tabs.innerHTML='<button class="tab on" data-c="all">전체 '+ITEMS.length+'</button>'+cats.map(c=>`<button class=tab data-c="${esc(c)}">${esc(c)} ${ITEMS.filter(x=>x.category===c).length}</button>`).join('');tabs.onclick=e=>{if(e.target.dataset.c){CUR=e.target.dataset.c;tabs.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');render()}};render()}
function render(){let s=q.value.toLowerCase();let a=[...ITEMS].filter(x=>(CUR==='all'||x.category===CUR)&&(!s||(x.title+x.description+src(x)+(x.tags||[]).join()).toLowerCase().includes(s)));a.sort(sort.value==='latest'?(a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt):(a,b)=>b.score-a.score);grid.innerHTML=a.length?a.map(card).join(''):'<article class=card>표시할 뉴스 없음</article>';state.textContent='표시 '+a.length+' / 전체 '+ITEMS.length}
async function get(p){try{let r=await fetch(p+'?v='+Date.now(),{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}
async function load(){state.textContent='loading';let docs=await Promise.all(SOURCES.map(get));ITEMS=dedupe(docs.flatMap(flat));draw()}
q.oninput=render;sort.onchange=render;$('#reload').onclick=load;load();
</script>
</body>
</html>
