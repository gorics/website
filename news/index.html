<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="index,follow">
<meta name="description" content="GORICS 동적 뉴스 허브. latest.json overlay와 data.json을 병합해 최신 공개 뉴스를 표시합니다.">
<link rel="alternate" type="application/rss+xml" title="GORICS HOT NEWS RSS" href="feed.xml">
<title>GORICS NEWS</title>
<style>
:root{color-scheme:dark;--bg:#070a12;--panel:#101827;--line:rgba(148,163,184,.24);--text:#e5edf8;--muted:#94a3b8;--blue:#60a5fa;--green:#34d399;--hot:#fb7185;--violet:#a78bfa;--gold:#facc15}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,rgba(96,165,250,.2),transparent 32rem),radial-gradient(circle at 90% 0,rgba(251,113,133,.13),transparent 30rem),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif}a{color:inherit;text-decoration:none}button,input,select{font:inherit}.wrap{width:min(1180px,calc(100% - 28px));margin:0 auto}.nav{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:22px 0}.brand{font-weight:950;letter-spacing:-.04em}.links{display:flex;gap:8px;overflow:auto}.links a{white-space:nowrap;border:1px solid transparent;border-radius:999px;padding:9px 12px;color:var(--muted);font-weight:850}.links a:hover,.links a.on{border-color:var(--line);background:rgba(255,255,255,.05);color:var(--text)}.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin:12px 0 18px}.panel,.card,.box,.toolbar{border:1px solid var(--line);background:linear-gradient(180deg,rgba(16,24,39,.96),rgba(10,16,28,.96));border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.3)}.lead{padding:clamp(22px,4vw,34px)}.kicker{color:var(--green);font-weight:950;letter-spacing:.08em;font-size:.82rem}.lead h1{margin:12px 0 12px;font-size:clamp(2.6rem,8vw,5.8rem);line-height:.92;letter-spacing:-.08em}.desc{margin:0;color:var(--muted);line-height:1.7}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}.btn{border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-weight:950;background:rgba(255,255,255,.04);cursor:pointer}.btn.primary{background:linear-gradient(135deg,var(--blue),var(--violet));border-color:transparent;color:#050816}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}.stat{border:1px solid var(--line);border-radius:16px;padding:13px;background:rgba(255,255,255,.035)}.stat span{display:block;color:var(--muted);font-size:.82rem}.stat b{display:block;margin-top:5px}.box,.toolbar{padding:18px}.rank{display:grid;gap:9px;margin:0;padding:0;list-style:none}.rank li{display:grid;grid-template-columns:28px 1fr;gap:8px;color:var(--muted);line-height:1.42}.rank b{color:var(--hot)}.notice{margin:0 0 18px;border:1px solid rgba(250,204,21,.25);border-radius:18px;background:rgba(250,204,21,.08);color:#fde68a;padding:14px;line-height:1.6}.toolbar{position:sticky;top:0;z-index:5;margin-bottom:16px;background:rgba(7,10,18,.9);backdrop-filter:blur(16px)}.controls{display:grid;grid-template-columns:1fr auto auto;gap:10px}.search,.select{border:1px solid var(--line);background:#080d16;color:var(--text);border-radius:14px;padding:12px 13px;outline:none}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.tab{border:1px solid var(--line);border-radius:999px;padding:8px 11px;color:#cbd5e1;background:rgba(255,255,255,.04);font-weight:850;cursor:pointer}.tab.active{border-color:var(--blue);color:#fff}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;padding-bottom:54px}.card{padding:18px;min-height:220px;display:flex;flex-direction:column}.meta{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.chip,.score{border-radius:999px;padding:6px 9px;font-size:.78rem;font-weight:950}.chip{border:1px solid rgba(96,165,250,.3);background:rgba(96,165,250,.12);color:#cfe2ff}.score{border:1px solid rgba(251,113,133,.35);background:rgba(251,113,133,.12);color:#fecdd3}.card h2{font-size:1.12rem;line-height:1.45;margin:15px 0 10px}.card p{margin:0;color:var(--muted);line-height:1.62}.card footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;color:#7d8797;font-size:.84rem}.muted{color:var(--muted)}.error{border-color:rgba(251,113,133,.45);background:rgba(251,113,133,.08)}@media(max-width:860px){.nav{display:block}.links{margin-top:12px}.hero,.grid,.controls{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<nav class="wrap nav"><a class="brand" href="../">GORICS.CLOUD</a><div class="links"><a href="../">홈</a><a class="on" href="./">뉴스</a><a href="financial/">금융뉴스</a><a href="../study/">스터디</a><a href="../pdf/">PDF</a><a href="feed.xml">RSS</a></div></nav>
<header class="wrap hero"><section class="panel lead"><div class="kicker">DYNAMIC NEWS · LATEST + DATA</div><h1>GORICS<br>NEWS</h1><p class="desc"><b>news/latest.json</b> overlay를 먼저 읽고 <b>news/data.json</b>을 뒤에 병합해 기존 뉴스와 최신 뉴스를 함께 표시합니다.</p><div class="actions"><a class="btn primary" href="financial/">💹 금융 뉴스</a><a class="btn" href="feed.xml">📡 RSS</a><button class="btn" id="retryTop" type="button">🔄 다시 읽기</button></div><div class="stats"><div class="stat"><span>상태</span><b id="state">연결 중</b></div><div class="stat"><span>기사</span><b id="total">-</b></div><div class="stat"><span>테마</span><b id="themeCount">-</b></div><div class="stat"><span>갱신</span><b id="updated">-</b></div></div></section><aside class="box"><h2>🔥 TOP</h2><ol id="rank" class="rank"><li><b>·</b><span class="muted">데이터 연결 중</span></li></ol></aside></header>
<main class="wrap"><p class="notice">⚠️ 개인정보 패턴은 생성 단계에서 비공개 처리됩니다. 이 페이지는 로컬 방문자 추적/쿠키/분석 스크립트를 넣지 않습니다.</p><section class="toolbar"><div class="controls"><input id="q" class="search" placeholder="제목·요약·언론사 검색"><select id="sort" class="select"><option value="hot">HOT순</option><option value="latest">최신순</option></select><button id="retry" class="btn" type="button">다시 읽기</button></div><div id="tabs" class="tabs"></div><div id="status" class="muted" style="margin-top:10px">뉴스 데이터 연결 중입니다.</div></section><section id="grid" class="grid"></section></main>
<script>
const SOURCES=['./latest-20260627-2107.json','./latest-20260627-2033.json','./latest-20260627-2007.json','./latest-20260627-1908.json','./latest-20260627-1833.json','./latest-20260627-1808.json','./latest.json','./data.json'];
const grid=document.getElementById('grid'),tabs=document.getElementById('tabs'),rank=document.getElementById('rank'),statusEl=document.getElementById('status'),q=document.getElementById('q'),sort=document.getElementById('sort');let items=[],current='all',generatedAt='';
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const sourceName=x=>typeof x.source==='object'?(x.source.name||'원문'):(x.source||'원문');
const date=iso=>{const d=new Date(iso);return isNaN(d)?(iso||'-'):new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(d)};
function flat(p){if(!p)return[];let a=[];['allItems','items','posts','news'].forEach(k=>Array.isArray(p[k])&&a.push(...p[k]));if(p.byCategory)Object.values(p.byCategory).forEach(v=>Array.isArray(v)&&v.forEach(y=>{if(y&&typeof y==='object')a.push(y)}));return a}
function norm(x){return{id:x.id,category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.theme||x.category||'뉴스',categoryIcon:x.categoryIcon||x.icon||'📰',title:x.title||x.name,description:x.description||x.summary||'',url:x.url||x.link,source:x.source||'원문',publishedAt:x.publishedAt||x.date||x.published_at||'',score:+(x.score??x.priority??0)||0,tags:x.tags||[]}}
function dedupe(a){const urls=new Set(),titles=new Set(),out=[];for(const z of a.map(norm).filter(x=>x.title&&x.url)){const U=z.url.toLowerCase().replace(/[#?].*$/,'').replace(/\/$/,'');const T=(z.title+'|'+sourceName(z)).toLowerCase().replace(/\s+/g,' ');if(urls.has(U)||titles.has(T))continue;urls.add(U);titles.add(T);out.push(z)}return out}
function cats(){const map=new Map();items.forEach(x=>{const id=x.category||x.categoryName||'news';if(!map.has(id))map.set(id,{id,name:x.categoryName||id,icon:x.categoryIcon||'📰',count:0});map.get(id).count++});return [...map.values()]}
function card(x){return '<article class="card"><div class="meta"><span class="chip">'+esc(x.categoryIcon||'📰')+' '+esc(x.categoryName||x.category||'뉴스')+'</span><span class="score">HOT '+esc(x.score||0)+'</span></div><h2><a target="_blank" rel="noopener noreferrer" href="'+esc(x.url||x.link)+'">'+esc(x.title)+'</a></h2><p>'+esc(x.description||x.summary||'요약 없음')+'</p><footer><span>'+esc(sourceName(x))+'</span><time>'+esc(date(x.publishedAt||x.published_at))+'</time></footer></article>'}
function render(){const term=q.value.trim().toLowerCase();let arr=[...items];arr.sort(sort.value==='latest'?(a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt):(a,b)=>(b.score||0)-(a.score||0));arr=arr.filter(x=>(current==='all'||x.category===current)&&(!term||(x.title+' '+(x.description||'')+' '+sourceName(x)+' '+(x.tags||[]).join(' ')).toLowerCase().includes(term)));grid.innerHTML=arr.length?arr.map(card).join(''):'<article class="card error"><h2>표시할 뉴스가 없습니다</h2><p>검색어 또는 테마를 바꿔보세요.</p></article>';statusEl.textContent='현재 '+arr.length+'개 표시';}
function draw(){const categoryList=cats();document.getElementById('state').textContent='정상';document.getElementById('total').textContent=String(items.length);document.getElementById('themeCount').textContent=String(categoryList.length);document.getElementById('updated').textContent=date(generatedAt);rank.innerHTML=items.slice(0,8).map((x,i)=>'<li><b>'+(i+1)+'</b><a target="_blank" rel="noopener noreferrer" href="'+esc(x.url)+'">'+esc(x.title)+'</a></li>').join('');tabs.innerHTML='<button class="tab active" data-id="all">전체 '+items.length+'</button>'+categoryList.map(c=>'<button class="tab" data-id="'+esc(c.id)+'">'+esc(c.icon)+' '+esc(c.name)+' '+esc(c.count)+'</button>').join('');tabs.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{tabs.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');current=btn.dataset.id;render();});render();}
async function get(path){try{const r=await fetch(path+'?v='+Date.now(),{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}
async function load(){document.getElementById('state').textContent='연결 중';statusEl.textContent='latest overlay → latest.json → data.json 병합 중입니다.';grid.innerHTML='';try{const docs=await Promise.all(SOURCES.map(get));generatedAt=(docs.find(Boolean)||{}).generatedAt||'';items=dedupe(docs.flatMap(flat));if(!items.length)throw new Error('empty data');draw();}catch(e){document.getElementById('state').textContent='실패';statusEl.textContent='데이터 연결 실패: '+e.message;grid.innerHTML='<article class="card error"><h2>뉴스 데이터 연결 실패</h2><p>무한 로딩 대신 여기서 멈췄습니다. 다시 읽기를 누르거나 금융뉴스/RSS로 이동하세요.</p><div class="actions"><button class="btn" onclick="load()">다시 읽기</button><a class="btn" href="financial/">금융뉴스</a><a class="btn" href="feed.xml">RSS</a></div></article>';rank.innerHTML='<li><b>!</b><span>데이터 연결 실패</span></li>';}}
q.oninput=render;sort.onchange=render;document.getElementById('retry').onclick=load;document.getElementById('retryTop').onclick=load;load();
</script>
</body>
</html>
