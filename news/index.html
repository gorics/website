<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="index,follow"><meta name="description" content="GORICS 동적 뉴스 허브. latest.json과 data.json을 병합해 표시합니다."><title>GORICS NEWS</title><style>:root{color-scheme:dark;--bg:#070a12;--panel:#101827;--line:#334155;--text:#e5edf8;--muted:#94a3b8;--blue:#60a5fa}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,rgba(96,165,250,.18),transparent 32rem),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif}a{color:inherit;text-decoration:none}.wrap{width:min(1180px,calc(100% - 28px));margin:auto}.nav{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:20px 0}.brand{font-weight:950}.links{display:flex;gap:8px;flex-wrap:wrap}.links a,.btn,.tab,input,select{border:1px solid var(--line);background:#111827;color:var(--text);border-radius:999px;padding:9px 12px}.on,.tab.on,.btn.primary{background:#2563eb}.hero,.bar,.card{border:1px solid var(--line);background:rgba(15,23,42,.95);border-radius:22px;padding:18px;margin:14px 0}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.hero h1{font-size:clamp(2.4rem,7vw,5.2rem);line-height:.9;margin:8px 0;letter-spacing:-.07em}.muted,p{color:var(--muted);line-height:1.6}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{border:1px solid var(--line);border-radius:14px;padding:10px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;padding-bottom:44px}.card{margin:0}.meta{display:flex;justify-content:space-between;gap:8px;color:#bfdbfe}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.controls{display:grid;grid-template-columns:1fr auto auto;gap:8px}.rank{display:grid;gap:8px;margin:0;padding-left:22px}@media(max-width:760px){.hero,.controls,.stats{grid-template-columns:1fr}.nav{display:block}.links{margin-top:10px}}</style></head><body><nav class="wrap nav"><a class="brand" href="../">GORICS.CLOUD</a><div class="links"><a href="../">홈</a><a class="on" href="./">뉴스</a><a href="financial/">금융뉴스</a><a href="tech/">기술</a><a href="global/">국제</a><a href="politics/">정치</a><a href="play/">스포츠</a><a href="culture/">문화</a><a href="feed.xml">RSS</a></div></nav><header class="wrap hero"><section><div class="muted">DYNAMIC NEWS · LATEST + DATA</div><h1>GORICS<br>NEWS</h1><p><b>latest.json</b>을 먼저 읽고 <b>data.json</b>을 뒤에 병합합니다. URL과 제목 기준으로 중복 제거 후 최신 항목을 위에 표시합니다.</p><p><a class="btn primary" href="financial/">💹 금융 뉴스</a> <button class="btn" id="retryTop">🔄 다시 읽기</button></p><div class="stats"><div class="stat"><span class="muted">상태</span><b id="state">연결 중</b></div><div class="stat"><span class="muted">기사</span><b id="total">-</b></div><div class="stat"><span class="muted">테마</span><b id="themeCount">-</b></div><div class="stat"><span class="muted">갱신</span><b id="updated">-</b></div></div></section><aside><h2>🔥 TOP</h2><ol id="rank" class="rank"><li>데이터 연결 중</li></ol></aside></header><main class="wrap"><section class="bar"><div class="controls"><input id="q" placeholder="제목·요약·언론사 검색"><select id="sort"><option value="hot">HOT순</option><option value="latest">최신순</option></select><button id="retry" class="btn">다시 읽기</button></div><div id="tabs" class="tabs"></div><p id="status">뉴스 데이터 연결 중입니다.</p></section><section id="grid" class="grid"></section></main><script>const SOURCES=['./latest.json','./index.json','./data.json'];const $=s=>document.querySelector(s),grid=$('#grid'),tabs=$('#tabs'),rank=$('#rank'),q=$('#q'),sort=$('#sort'),statusEl=$('#status');let items=[],current='all',generatedAt='';const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const src=x=>typeof x.source==='object'?(x.source.name||'원문'):(x.source||'원문');const dt=x=>x.publishedAt||x.date||x.published_at||'';const score=x=>+(x.score??x.priority??0)||0;const date=iso=>{let d=new Date(iso);return isNaN(d)?(iso||'-'):d.toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})};function flat(p){if(!p)return[];let a=[];['allItems','items','posts','news'].forEach(k=>Array.isArray(p[k])&&a.push(...p[k]));if(p.byCategory)Object.values(p.byCategory).forEach(v=>Array.isArray(v)&&v.forEach(y=>{if(y&&typeof y==='object')a.push(y)}));return a}function norm(x){return{id:x.id,category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.theme||x.category||'뉴스',categoryIcon:x.categoryIcon||x.icon||'📰',title:x.title||x.name,description:x.description||x.summary||'',url:x.url||x.link,source:x.source||'원문',publishedAt:dt(x),score:score(x),tags:x.tags||[]}}function dedupe(a){let u=new Set,t=new Set,o=[];for(const z of a.map(norm).filter(x=>x.title&&x.url)){let U=z.url.toLowerCase().replace(/\/$/,''),T=(z.title+'|'+src(z)).toLowerCase().replace(/\s+/g,' ');if(u.has(U)||t.has(T))continue;u.add(U);t.add(T);o.push(z)}return o}function cats(){let m=new Map();items.forEach(x=>{let k=x.category;if(!m.has(k))m.set(k,{id:k,name:x.categoryName,icon:x.categoryIcon,count:0});m.get(k).count++});return [...m.values()]}function card(x){return `<article class="card"><div class="meta"><span>${esc(x.categoryIcon)} ${esc(x.categoryName)}</span><b>HOT ${esc(x.score)}</b></div><h2><a target="_blank" rel="noopener noreferrer" href="${esc(x.url)}">${esc(x.title)}</a></h2><p>${esc(x.description||'요약 없음')}</p><p class="muted">${esc(src(x))} · ${esc(date(x.publishedAt))}</p></article>`}function render(){let s=q.value.toLowerCase();let a=[...items].filter(x=>(current==='all'||x.category===current)&&(!s||(x.title+x.description+src(x)+(x.tags||[]).join()).toLowerCase().includes(s)));a.sort(sort.value==='latest'?(a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt):(a,b)=>b.score-a.score);grid.innerHTML=a.length?a.map(card).join(''):'<article class="card">표시할 뉴스 없음</article>';statusEl.textContent='현재 '+a.length+'개 표시'}function draw(){let c=cats();$('#state').textContent='정상';$('#total').textContent=items.length;$('#themeCount').textContent=c.length;$('#updated').textContent=date(generatedAt);rank.innerHTML=items.slice(0,8).map((x,i)=>`<li><a target="_blank" rel="noopener noreferrer" href="${esc(x.url)}">${i+1}. ${esc(x.title)}</a></li>`).join('');tabs.innerHTML='<button class="tab on" data-id="all">전체 '+items.length+'</button>'+c.map(x=>`<button class="tab" data-id="${esc(x.id)}">${esc(x.icon)} ${esc(x.name)} ${x.count}</button>`).join('');tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tabs.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');current=b.dataset.id;render()});render()}async function get(p){try{let r=await fetch(p+'?v='+Date.now(),{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}async function load(){try{$('#state').textContent='연결 중';let docs=await Promise.all(SOURCES.map(get));generatedAt=(docs.find(Boolean)||{}).generatedAt||(docs.find(Boolean)||{}).generated_at||'';items=dedupe(docs.flatMap(flat));draw()}catch(e){$('#state').textContent='실패';statusEl.textContent='데이터 연결 실패: '+e.message;grid.innerHTML='<article class="card">뉴스 데이터 연결 실패</article>'}}q.oninput=render;sort.onchange=render;$('#retry').onclick=load;$('#retryTop').onclick=load;load();</script></body></html>
