<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="index,follow"><meta name="description" content="GORICS 동적 뉴스 허브. latest.json을 우선 읽고 data.json을 병합합니다."><title>GORICS NEWS</title><style>:root{color-scheme:dark;--bg:#070a12;--panel:#101827;--line:rgba(148,163,184,.24);--text:#e5edf8;--muted:#94a3b8;--blue:#60a5fa;--hot:#fb7185}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}a{color:inherit}.wrap{width:min(1180px,calc(100% - 28px));margin:0 auto}.nav,.links,.controls,.tabs{display:flex;gap:10px;flex-wrap:wrap}.nav{justify-content:space-between;align-items:center;padding:22px 0}.brand{font-weight:950;text-decoration:none}.links a,.btn,.tab,input,select{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:#111827;color:var(--text);text-decoration:none}.on,.tab.on,.btn.primary{background:#2563eb}.hero,.card,.toolbar{border:1px solid var(--line);background:var(--panel);border-radius:22px;padding:18px;margin:14px 0}.hero h1{font-size:clamp(2.4rem,7vw,5rem);line-height:.95;letter-spacing:-.06em;margin:8px 0}.muted{color:var(--muted);line-height:1.6}.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:rgba(255,255,255,.04)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;padding-bottom:50px}.card{margin:0}.meta{display:flex;justify-content:space-between;gap:8px;color:#bfdbfe;font-size:.85rem}.score{color:#fecdd3}.card h2{font-size:1.08rem;line-height:1.45}.error{border-color:rgba(251,113,133,.5)}</style></head><body><nav class="wrap nav"><a class="brand" href="../">GORICS.CLOUD</a><div class="links"><a href="../">홈</a><a class="on" href="./">뉴스</a><a href="financial/">금융뉴스</a><a href="tech/">기술</a><a href="global/">국제</a><a href="politics/">정치</a><a href="play/">스포츠</a><a href="culture/">문화</a></div></nav><header class="wrap hero"><p class="muted">DYNAMIC NEWS · LATEST FIRST</p><h1>GORICS<br>NEWS</h1><p class="muted"><b>latest.json</b>을 먼저 읽고 <b>data.json</b>을 뒤에 병합합니다. allItems, items, posts, news, byCategory fallback을 모두 지원합니다.</p><div class="stats"><div class="stat">상태 <b id="state">연결 중</b></div><div class="stat">기사 <b id="total">-</b></div><div class="stat">테마 <b id="themeCount">-</b></div><div class="stat">갱신 <b id="updated">-</b></div></div></header><main class="wrap"><section class="toolbar"><div class="controls"><input id="q" placeholder="제목·요약·언론사 검색"><select id="sort"><option value="hot">HOT순</option><option value="latest">최신순</option></select><button id="reload" class="btn" type="button">다시 읽기</button><a class="btn primary" href="financial/">금융뉴스</a></div><div id="tabs" class="tabs" style="margin-top:12px"></div><p id="status" class="muted">뉴스 데이터 연결 중입니다.</p></section><section id="grid" class="grid"></section></main><script>const SOURCES=['./latest.json','./latest-20260624-0108.json','./latest-20260624-0007.json','./latest-20260623-2310.json','./latest-20260623-2206.json','./data.json'];const $=s=>document.querySelector(s),grid=$('#grid'),tabs=$('#tabs'),q=$('#q'),sort=$('#sort'),state=$('#state'),statusEl=$('#status');let ITEMS=[],CUR='all';const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const src=x=>typeof x.source==='object'?(x.source.name||'원문'):(x.source||'원문');function flat(p){if(!p)return[];let a=[];['allItems','items','posts','news'].forEach(k=>Array.isArray(p[k])&&a.push(...p[k]));if(p.byCategory)Object.values(p.byCategory).forEach(v=>Array.isArray(v)&&a.push(...v));return a}function norm(x){return{id:x.id,category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.theme||x.category||'뉴스',categoryIcon:x.categoryIcon||x.icon||'📰',title:x.title||x.name,description:x.description||x.summary||'',url:x.url||x.link,source:x.source||'원문',publishedAt:x.publishedAt||x.date||x.published_at||'',score:+(x.score??x.priority??0)||0,tags:x.tags||[]}}function dedupe(a){let u=new Set,t=new Set,o=[];for(const z of a.map(norm).filter(x=>x.title&&x.url)){let U=z.url.toLowerCase().replace(/\/$/,''),T=(z.title+'|'+src(z)).toLowerCase().replace(/\s+/g,' ');if(u.has(U)||t.has(T))continue;u.add(U);t.add(T);o.push(z)}return o}function date(v){let d=new Date(v);return isNaN(d)?(v||'-'):d.toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})}function card(x){return `<article class="card"><div class="meta"><span>${esc(x.categoryIcon)} ${esc(x.categoryName)}</span><b class="score">HOT ${esc(x.score)}</b></div><h2><a target="_blank" rel="noopener noreferrer" href="${esc(x.url)}">${esc(x.title)}</a></h2><p class="muted">${esc(x.description||'요약 없음')}</p><p class="muted">${esc(src(x))} · ${esc(date(x.publishedAt))}</p></article>`}function draw(){const cats=[...new Map(ITEMS.map(x=>[x.category,{id:x.category,name:x.categoryName,icon:x.categoryIcon,count:ITEMS.filter(y=>y.category===x.category).length}])).values()];$('#total').textContent=ITEMS.length;$('#themeCount').textContent=cats.length;$('#updated').textContent=date(new Date().toISOString());tabs.innerHTML='<button class="tab on" data-c="all">전체 '+ITEMS.length+'</button>'+cats.map(c=>`<button class="tab" data-c="${esc(c.id)}">${esc(c.icon)} ${esc(c.name)} ${c.count}</button>`).join('');tabs.onclick=e=>{if(e.target.dataset.c){CUR=e.target.dataset.c;tabs.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');render()}};render()}function render(){let s=q.value.toLowerCase();let a=[...ITEMS].filter(x=>(CUR==='all'||x.category===CUR)&&(!s||(x.title+x.description+src(x)+(x.tags||[]).join()).toLowerCase().includes(s)));a.sort(sort.value==='latest'?(a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt):(a,b)=>b.score-a.score);grid.innerHTML=a.length?a.map(card).join(''):'<article class="card error"><h2>표시할 뉴스가 없습니다</h2></article>';statusEl.textContent='표시 '+a.length+' / 전체 '+ITEMS.length}async function get(p){try{let r=await fetch(p+'?v='+Date.now(),{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}async function load(){state.textContent='연결 중';let docs=await Promise.all(SOURCES.map(get));ITEMS=dedupe(docs.flatMap(flat));state.textContent='정상';draw()}q.oninput=render;sort.onchange=render;$('#reload').onclick=load;load();</script></body></html>
