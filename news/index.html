<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="index,follow">
<meta name="description" content="GORICS HOT NEWS. 공개 뉴스 링크 기반 테마별 핫뉴스 피드입니다.">
<link rel="alternate" type="application/rss+xml" title="GORICS HOT NEWS RSS" href="feed.xml">
<title>GORICS HOT NEWS</title>
<style>
:root{color-scheme:light;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--soft:#f9fafb;--blue:#2563eb;--green:#059669;--red:#dc2626;--shadow:0 10px 30px rgba(17,24,39,.06)}*{box-sizing:border-box}body{margin:0;background:#fff;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif}a{color:inherit;text-decoration:none}button,input{font:inherit}.wrap{width:min(1120px,calc(100% - 32px));margin:0 auto;padding:24px 0 56px}.top{display:grid;grid-template-columns:1fr minmax(280px,480px);gap:18px;align-items:end;padding-bottom:18px;border-bottom:1px solid var(--line)}.brand a{color:var(--muted);font-size:.92rem}.brand h1{margin:5px 0 0;font-size:clamp(2.6rem,7vw,5.2rem);line-height:.95;letter-spacing:-.07em}.brand p{margin:8px 0 0;color:var(--muted);line-height:1.55}.searchbox{display:grid;gap:8px}.search{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);padding:14px 15px;outline:0}.search:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.1)}.help{margin:0;color:var(--muted);font-size:.9rem}.summary{display:grid;grid-template-columns:repeat(3,1fr) auto;gap:10px;margin:18px 0 22px}.stat{border:1px solid var(--line);border-radius:16px;background:var(--soft);padding:14px}.stat span{display:block;color:var(--muted);font-size:.85rem}.stat b{display:block;margin-top:4px;font-size:1.2rem}.rss{display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:16px;padding:14px 16px;color:var(--blue);font-weight:800}.section{margin-bottom:26px}.section-head{display:flex;justify-content:space-between;gap:12px;align-items:end;margin-bottom:12px}.section-head h2{margin:0;font-size:1.45rem;letter-spacing:-.03em}.section-head p{margin:0;color:var(--muted);font-size:.92rem;text-align:right}.rank{margin:0;padding:0;list-style:none;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.rank li{border:1px solid var(--line);border-radius:16px;background:#fff;padding:13px;min-height:112px;box-shadow:var(--shadow)}.rank b{display:block;color:var(--blue);margin-bottom:8px}.rank a{font-weight:800;line-height:1.38;font-size:.92rem}.rank a:hover,.item h3 a:hover{color:var(--blue)}.filterbar{display:grid;gap:10px}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:2px}.tab{white-space:nowrap;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);padding:9px 12px;font-weight:800;cursor:pointer}.tab.active,.tab:hover{background:var(--text);border-color:var(--text);color:#fff}.filter-status{display:flex;justify-content:space-between;align-items:center;gap:12px;border:1px solid var(--line);border-radius:16px;background:var(--soft);padding:12px 14px;color:var(--muted);font-size:.92rem}.reset{border:0;background:transparent;color:var(--blue);font-weight:800;cursor:pointer;padding:0}.list{display:grid;gap:12px}.item{display:grid;grid-template-columns:1fr auto;gap:18px;border:1px solid var(--line);border-radius:18px;background:#fff;padding:18px;box-shadow:var(--shadow)}.item h3{margin:0 0 8px;font-size:1.08rem;line-height:1.42}.desc{margin:0;color:var(--muted);line-height:1.55}.meta{margin-top:10px;color:var(--muted);font-size:.86rem}.source{color:var(--green);font-weight:800}.go{align-self:center;border:1px solid var(--line);border-radius:999px;padding:9px 12px;color:var(--blue);font-weight:800}.go:hover{background:var(--soft)}.empty{display:none;border:1px dashed var(--line);border-radius:18px;background:var(--soft);padding:28px;text-align:center;color:var(--muted)}.empty b{display:block;color:var(--text);margin-bottom:6px}@media(max-width:980px){.rank{grid-template-columns:repeat(2,minmax(0,1fr))}.summary{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){.wrap{width:min(100% - 24px,1120px);padding-top:22px}.top{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}.rank{grid-template-columns:1fr}.section-head{display:block}.section-head p{text-align:left;margin-top:4px}.filter-status{display:block}.reset{margin-top:8px}.item{grid-template-columns:1fr}.go{width:max-content}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><div class="brand"><a href="../">← GORICS.CLOUD로 돌아가기</a><h1>HOT NEWS</h1><p>먼저 TOP 10을 보고, 검색이나 카테고리로 필요한 뉴스만 골라보세요.</p></div><div class="searchbox"><input id="search" class="search" placeholder="예: AI, 경제, 정치, 스포츠" autocomplete="off"><p class="help">제목, 요약, 언론사 이름으로 검색할 수 있습니다.</p></div></header>
<section class="summary" aria-label="뉴스 상태"><div class="stat"><span>전체 기사</span><b id="total">0</b></div><div class="stat"><span>카테고리</span><b id="themeCount">0</b></div><div class="stat"><span>마지막 업데이트</span><b id="updated">-</b></div><a class="rss" href="feed.xml">RSS 보기</a></section>
<section class="section" aria-labelledby="topTitle"><div class="section-head"><h2 id="topTitle">TOP 10</h2><p>지금 먼저 볼 주요 뉴스입니다.</p></div><ol id="rank" class="rank"></ol></section>
<section class="section filterbar" aria-label="뉴스 필터"><div id="tabs" class="tabs"></div><div class="filter-status"><span id="visibleInfo">뉴스 데이터를 불러오는 중입니다.</span><button id="reset" class="reset" type="button">검색/필터 초기화</button></div></section>
<section class="section" aria-labelledby="allTitle"><div class="section-head"><h2 id="allTitle">전체 뉴스</h2><p>카드를 누르면 원문으로 이동합니다.</p></div><div id="grid" class="list"></div><div id="empty" class="empty"><b>결과가 없습니다</b>다른 검색어를 입력하거나 필터를 초기화해보세요.</div></section>
</main>
<script>
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),fmt=iso=>{const d=new Date(iso);return isNaN(d)?'-':new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(d)};let data={allItems:[],categories:[]},current='all';
function item(x){return `<article class="item" data-category="${esc(x.category)}" data-text="${esc((x.title+' '+x.description+' '+(x.source?.name||'')+' '+x.categoryName).toLowerCase())}"><div><h3><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${esc(x.title)}</a></h3><p class="desc">${esc(x.description||'원문에서 전체 내용을 확인하세요.')}</p><div class="meta"><span class="source">${esc(x.source?.name||'원문')}</span> · <time datetime="${esc(x.publishedAt)}">${esc(fmt(x.publishedAt))}</time></div></div><a class="go" href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">원문 보기</a></article>`}
function draw(){const items=data.allItems||[];$('total').textContent=String(data.total||items.length);$('themeCount').textContent=String((data.categories||[]).length);$('updated').textContent=data.generatedAt?fmt(data.generatedAt):'-';$('grid').innerHTML=items.map(item).join('');$('rank').innerHTML=items.slice(0,10).map((x,i)=>`<li><b>${i+1}</b><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${esc(x.title)}</a></li>`).join('');$('tabs').innerHTML=`<button class="tab active" data-filter="all">전체 ${items.length}</button>`+(data.categories||[]).map(c=>`<button class="tab" data-filter="${esc(c.id)}">${esc(c.icon||'')} ${esc(c.name)} ${c.count}</button>`).join('');document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');current=t.dataset.filter;apply()});apply()}
function apply(){const term=$('search').value.trim().toLowerCase();let n=0;document.querySelectorAll('.item').forEach(c=>{const ok=(current==='all'||c.dataset.category===current)&&(!term||c.dataset.text.includes(term));c.style.display=ok?'':'none';if(ok)n++});$('empty').style.display=n?'none':'block';$('visibleInfo').textContent=`현재 ${n}개 뉴스가 표시됩니다${term?' · 검색어: '+$('search').value.trim():''}${current!=='all'?' · 카테고리 적용':''}.`}
$('search').oninput=apply;$('reset').onclick=()=>{$('search').value='';current='all';document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('active',i===0));apply()};fetch('data.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(j=>{data=j;draw()}).catch(e=>{console.error(e);$('visibleInfo').textContent='뉴스 데이터를 불러오지 못했습니다.';$('empty').style.display='block'});
</script>
</body>
</html>
