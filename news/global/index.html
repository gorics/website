<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="index,follow"><title>GORICS GLOBAL NEWS</title><style>:root{color-scheme:dark;--bg:#070a12;--panel:#101827;--line:rgba(148,163,184,.24);--text:#e5edf8;--muted:#94a3b8;--blue:#60a5fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}a{color:inherit;text-decoration:none}.wrap{width:min(1100px,calc(100% - 28px));margin:0 auto}.nav{display:flex;justify-content:space-between;gap:12px;padding:22px 0}.nav a{color:var(--muted);font-weight:900}.hero,.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(16,24,39,.96),rgba(10,16,28,.96));border-radius:24px}.hero{padding:28px;margin:10px 0 16px}.k{color:#34d399;font-weight:950}.hero h1{font-size:clamp(2.4rem,7vw,5rem);line-height:.95;letter-spacing:-.07em;margin:10px 0}.desc{color:var(--muted);line-height:1.7}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;padding-bottom:50px}.card{padding:18px;min-height:210px;display:flex;flex-direction:column}.card h2{font-size:1.12rem;line-height:1.45}.card p{color:var(--muted);line-height:1.65}.meta,.foot{display:flex;justify-content:space-between;gap:10px;color:#8fa1b8;font-size:.86rem}.chip{border:1px solid rgba(96,165,250,.3);border-radius:999px;padding:6px 9px;color:#cfe2ff}.foot{margin-top:auto;border-top:1px solid var(--line);padding-top:12px}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><nav class="wrap nav"><a href="../">← 전체 뉴스</a><a href="../financial/">금융 뉴스</a></nav><header class="wrap hero"><div class="k">GLOBAL · WORLD</div><h1>GLOBAL<br>NEWS</h1><p class="desc">국제 뉴스만 모아 표시합니다. 기존 data.json과 latest.json을 함께 읽습니다.</p><p id="status" class="desc">불러오는 중</p></header><main id="grid" class="wrap grid"></main><script>const CATEGORY=['world','global'];const $=s=>document.querySelector(s),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),date=iso=>{const d=new Date(iso);return isNaN(d)?'-':new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit'}).format(d)};function flat(p){let a=[];if(Array.isArray(p?.allItems))a=p.allItems;else if(Array.isArray(p?.items))a=p.items;else if(Array.isArray(p?.posts))a=p.posts;else if(Array.isArray(p?.news))a=p.news;else if(p?.byCategory)a=Object.values(p.byCategory).flat();return a.filter(x=>x&&x.title&&(x.url||x.link)).map(x=>({category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.category||'뉴스',categoryIcon:x.categoryIcon||'📰',title:x.title,description:x.description||x.summary||'원문에서 전체 내용을 확인하세요.',url:x.url||x.link,source:typeof x.source==='string'?{name:x.source}:x.source||{name:'원문'},publishedAt:x.publishedAt||x.published_at||x.date,score:Number(x.score||x.priority||0)}));}function merge(ps){const seen=new Set(),o=[];for(const p of ps.filter(Boolean))for(const x of flat(p)){const k=x.url||x.title;if(seen.has(k))continue;seen.add(k);o.push(x)}return o}async function j(u,r=false){const x=await fetch(u+'?v='+Date.now(),{cache:'no-store'});if(!x.ok){if(r)throw Error(u+' '+x.status);return null}return x.json()}function card(x){return `<article class="card"><div class="meta"><span class="chip">${esc(x.categoryIcon)} ${esc(x.categoryName)}</span><span>HOT ${esc(x.score)}</span></div><h2><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${esc(x.title)}</a></h2><p>${esc(x.description)}</p><div class="foot"><span>${esc(x.source?.name||'원문')}</span><time>${esc(date(x.publishedAt))}</time></div></article>`}Promise.all([j('../latest.json'),j('../data.json',true)]).then(([l,b])=>{const arr=merge([l,b]).filter(x=>CATEGORY.includes(x.category)).sort((a,b)=>(b.score||0)-(a.score||0)||new Date(b.publishedAt)-new Date(a.publishedAt));$('#status').textContent='총 '+arr.length+'개 표시';$('#grid').innerHTML=arr.map(card).join('')||'<article class="card"><h2>표시할 뉴스가 없습니다</h2></article>'}).catch(e=>{$('#status').textContent='데이터 연결 실패: '+e.message})</script></body></html>
