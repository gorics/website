<!doctype html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GORICS CATEGORY NEWS</title><style>body{margin:0;background:#070a12;color:#e5edf8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif}.wrap{max-width:1100px;margin:auto;padding:18px}a{color:inherit}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a,button,input,select{border:1px solid #334155;background:#111827;color:#e5edf8;border-radius:999px;padding:9px 12px;text-decoration:none}.on{background:#2563eb}.hero,.bar,.card{border:1px solid #334155;background:#0f172a;border-radius:18px;padding:16px;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}.card{margin:0}p,small{color:#94a3b8}</style></head>
<body><main class=wrap><nav class=nav><a href="../../">홈</a><a href="../">전체</a><a href="../financial/">금융</a><a href="../tech/">기술</a><a href="../global/">국제</a><a href="../politics/">정치</a><a href="../play/">스포츠</a><a href="../culture/">문화</a></nav><section class=hero><h1 id=title>카테고리 뉴스</h1><p>../latest.json을 먼저, ../data.json을 뒤에 병합하고 byCategory fallback을 지원합니다.</p><p id=state>연결 중</p></section><section class=bar><input id=q placeholder="검색"><select id=sort><option value=hot>HOT순</option><option value=latest>최신순</option></select><button id=reload>다시 읽기</button></section><section id=grid class=grid></section></main>
<script>
const PATH=location.pathname,MAP={tech:['AI·과학기술',['tech','ai','과학기술','기술','openai','google','samsung','anthropic']],global:['국제',['world','global','국제','세계','이란','미국','g7','우크라이나']],politics:['정치',['politics','정치','trump','법원','정부','대통령','의회']],play:['스포츠',['sports','play','스포츠','축구','월드컵','fifa','world cup']],culture:['문화·엔터',['culture','문화','엔터','영화','음악','helen mirren','ai 영화']]};
const KEY=Object.keys(MAP).find(k=>PATH.includes('/'+k+'/'))||'global',TITLE=MAP[KEY][0],ALIASES=MAP[KEY][1];document.title='GORICS '+TITLE+' NEWS';document.querySelector('#title').textContent=TITLE;
const $=s=>document.querySelector(s),grid=$('#grid'),q=$('#q'),sort=$('#sort'),state=$('#state'),A=ALIASES.map(x=>x.toLowerCase());
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const src=x=>typeof x.source==='object'?(x.source.name||'원문'):(x.source||'원문'),dt=x=>x.publishedAt||x.date||x.published_at||'',score=x=>+(x.score??x.priority??0)||0;
function flat(p){if(!p)return[];let a=[];['allItems','items','posts','news'].forEach(k=>Array.isArray(p[k])&&a.push(...p[k]));if(p.byCategory)Object.values(p.byCategory).forEach(v=>Array.isArray(v)&&a.push(...v));return a}
function norm(x){return{category:x.category||x.theme||'news',categoryName:x.categoryName||x.category_ko||x.theme||x.category||'뉴스',categoryIcon:x.categoryIcon||x.icon||'📰',title:x.title||x.name,description:x.description||x.summary||'',url:x.url||x.link,source:x.source||'원문',publishedAt:dt(x),score:score(x),tags:x.tags||[]}}
function hit(x){let h=(x.category+' '+x.categoryName+' '+x.title+' '+x.description+' '+(x.tags||[]).join(' ')).toLowerCase();return A.some(a=>h.includes(a))}
function dedupe(a){let u=new Set,t=new Set,o=[];for(const z of a.map(norm).filter(x=>x.title&&x.url&&hit(x))){let U=z.url.toLowerCase(),T=(z.title+'|'+src(z)).toLowerCase();if(u.has(U)||t.has(T))continue;u.add(U);t.add(T);o.push(z)}return o}
function card(x){return `<article class=card><b>${esc(x.categoryIcon)} ${esc(x.categoryName)} · HOT ${x.score}</b><h2><a target=_blank rel=noopener href="${esc(x.url)}">${esc(x.title)}</a></h2><p>${esc(x.description||'요약 없음')}</p><small>${esc(src(x))} · ${esc(new Date(x.publishedAt).toLocaleString('ko-KR',{timeZone:'Asia/Seoul'}))}</small></article>`}
function render(){let s=q.value.toLowerCase();let a=[...ITEMS].filter(x=>!s||(x.title+x.description+src(x)).toLowerCase().includes(s));a.sort(sort.value==='latest'?(a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt):(a,b)=>b.score-a.score);grid.innerHTML=a.length?a.map(card).join(''):'<article class=card>표시할 뉴스 없음</article>';state.textContent=TITLE+' '+a.length+'개'}
async function get(p){try{let r=await fetch(p+'?v='+Date.now(),{cache:'no-store'});return r.ok?await r.json():null}catch(e){return null}}
let ITEMS=[];async function load(){state.textContent='loading';let l=await get('../latest.json'),b=await get('../data.json');ITEMS=dedupe([...flat(l),...flat(b)]);render()}q.oninput=render;sort.onchange=render;$('#reload').onclick=load;load();</script></body></html>
