<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDEX OF GORICS.CLOUD</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0c10;
            --panel: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --border: #30363d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }

        .header h1 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-bar {
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border);
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            outline: none;
        }

        .list-container {
            max-height: 600px;
            overflow-y: auto;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            transition: background 0.2s;
        }

        .item:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        .item-icon {
            margin-right: 15px;
            color: #8b949e;
        }

        .item-info {
            flex-grow: 1;
        }

        .item-name {
            font-weight: 600;
            display: block;
        }

        .item-path {
            font-size: 0.75rem;
            color: #8b949e;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: #21262d;
            border: 1px solid var(--border);
        }

        #loading {
            padding: 40px;
            text-align: center;
            color: var(--accent);
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i data-lucide="folder-search"></i> GORICS.CLOUD EXPLORER</h1>
            <span id="count" class="badge">0 Items Found</span>
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search directories or files..." oninput="filterList()">
        </div>

        <div id="loading">
            <i data-lucide="loader-2" class="spin"></i> 탐색 중...
        </div>

        <div id="list" class="list-container"></div>
    </div>

    <script>
        let allItems = [];
        const TARGET_URL = 'https://gorics.cloud/';
        const PROXY = 'https://api.allorigins.win/get?url=';

        async function fetchIndex() {
            const listElement = document.getElementById('list');
            const loading = document.getElementById('loading');
            
            try {
                // CORS 우회 프록시를 통한 HTML Fetch
                const response = await fetch(PROXY + encodeURIComponent(TARGET_URL));
                const data = await response.json();
                const html = data.contents;

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = doc.querySelectorAll('a');

                links.forEach(link => {
                    const href = link.getAttribute('href');
                    const text = link.textContent.trim();

                    // 유효한 경로만 필터링
                    if (href && !href.startsWith('?') && !href.startsWith('#')) {
                        const isDir = href.endsWith('/');
                        const fullUrl = href.startsWith('http') ? href : TARGET_URL + href;
                        
                        allItems.push({
                            name: text || href,
                            path: fullUrl,
                            isDir: isDir
                        });
                    }
                });

                renderList(allItems);
                loading.style.display = 'none';
            } catch (err) {
                loading.innerHTML = '<span style="color: #f85149">데이터를 불러오지 못했습니다. 서버 상태를 확인하세요.</span>';
            }
        }

        function renderList(items) {
            const listElement = document.getElementById('list');
            const countElement = document.getElementById('count');
            listElement.innerHTML = '';
            countElement.innerText = `${items.length} Items Found`;

            items.forEach(item => {
                const icon = item.isDir ? 'folder' : 'file-text';
                const el = document.createElement('a');
                el.href = item.path;
                el.target = "_blank";
                el.className = 'item';
                el.innerHTML = `
                    <div class="item-icon"><i data-lucide="${icon}"></i></div>
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-path">${item.path}</span>
                    </div>
                    <i data-lucide="external-link" size="16" style="opacity: 0.3"></i>
                `;
                listElement.appendChild(el);
            });
            lucide.createIcons();
        }

        function filterList() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allItems.filter(i => 
                i.name.toLowerCase().includes(term) || i.path.toLowerCase().includes(term)
            );
            renderList(filtered);
        }

        fetchIndex();
    </script>

    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
    </style>
</body>
</html>
