<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GORICS.CLOUD FULL_SCRAPER v1.0</title>
    <style>
        :root { --cmd-green: #00ff41; --cmd-bg: #0d0d0d; }
        body { background: var(--cmd-bg); color: var(--cmd-green); font-family: 'Courier New', Courier, monospace; padding: 30px; margin: 0; }
        .terminal { border: 1px solid var(--cmd-green); padding: 20px; min-height: 80vh; overflow-y: auto; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        .log-entry { margin: 5px 0; border-left: 2px solid #333; padding-left: 10px; }
        .path { color: #fff; font-weight: bold; }
        .status-scanning { color: #ffff00; }
        .status-done { color: #00ff41; font-weight: bold; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        button { background: var(--cmd-green); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.8; }
        .stats { margin-top: 10px; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="startFullCrawl()">사이트 전체 스캔 시작</button>
        <div id="counter" class="stats">탐색된 경로: 0 | 대기열: 0</div>
    </div>

    <div class="terminal" id="terminal">
        [SYSTEM] 준비 완료. '스캔 시작' 버튼을 누르면 gorics.cloud 전체 탐색을 시작합니다.
    </div>

<script>
    const TARGET_DOMAIN = 'gorics.cloud';
    const START_URL = 'https://gorics.cloud/';
    const PROXY_BASE = 'https://api.allorigins.win/get?url=';
    
    let visitedPaths = new Set();
    let queue = [];
    let isScanning = false;

    async function fetchPage(url) {
        try {
            const response = await fetch(PROXY_BASE + encodeURIComponent(url));
            if (!response.ok) return null;
            const data = await response.json();
            return data.contents;
        } catch (e) {
            return null;
        }
    }

    function log(message, type = '') {
        const term = document.getElementById('terminal');
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    function updateStats() {
        document.getElementById('counter').innerText = 
            `탐색된 경로: ${visitedPaths.size} | 대기열: ${queue.length}`;
    }

    async function startFullCrawl() {
        if (isScanning) return;
        isScanning = true;
        visitedPaths.clear();
        queue = [START_URL];
        
        log(`[START] ${TARGET_DOMAIN} 탐색을 시작합니다...`, 'status-scanning');

        while (queue.length > 0) {
            const currentUrl = queue.shift();
            if (visitedPaths.has(currentUrl)) continue;

            visitedPaths.add(currentUrl);
            updateStats();
            log(`탐색 중: <span class="path">${currentUrl}</span>`);

            const html = await fetchPage(currentUrl);
            if (!html) {
                log(`[FAIL] 접근 불가: ${currentUrl}`, 'error');
                continue;
            }

            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const links = doc.querySelectorAll('a');

            links.forEach(link => {
                let href = link.getAttribute('href');
                if (!href) return;

                // 절대 경로로 변환
                try {
                    const absolute = new URL(href, currentUrl).href;
                    // 외부 도메인 제외 및 중복 제외
                    if (absolute.includes(TARGET_DOMAIN) && !visitedPaths.has(absolute) && !queue.includes(absolute)) {
                        // 앵커나 파라미터 제거하여 순수 경로만 추출
                        const cleanUrl = absolute.split('#')[0].split('?')[0];
                        queue.push(cleanUrl);
                    }
                } catch (e) {}
            });
            
            // 브라우저 과부하 방지를 위한 미세 지연
            await new Promise(r => setTimeout(r, 100));
        }

        isScanning = false;
        log(`[COMPLETE] ${TARGET_DOMAIN} 전체 스캔 완료. 총 ${visitedPaths.size}개의 유효 경로를 발견했습니다.`, 'status-done');
    }
</script>

</body>
</html>
