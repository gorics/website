<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gorics.cloud | Celestial Linktree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: rgba(129, 140, 248, 0.4);
            --secondary-glow: rgba(192, 132, 252, 0.3);
        }

        body {
            font-family: 'Noto Sans KR', 'Outfit', sans-serif;
            background: #020617;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #f8fafc;
            overflow: hidden;
        }

        /* --- 신비로운 배경 효과 --- */
        .universe-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* 부드러운 오로라/네뷸라 효과 */
        .nebula {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
            transition: transform 0.2s ease-out;
        }

        /* 움직이는 별들 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- 카드 디자인 --- */
        .mystic-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            padding: 3rem 2rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.02);
            animation: floatCard 6s infinite ease-in-out;
            z-index: 10;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* 로고 시머 효과 */
        .brand-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.75rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 30%, #818cf8 50%, #fff 70%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            letter-spacing: -1px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* --- 버튼 스타일 --- */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem;
            margin: 1.2rem 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 400;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .link-btn:hover {
            background: rgba(129, 140, 248, 0.15);
            border-color: rgba(129, 140, 248, 0.5);
            color: #fff;
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(129, 140, 248, 0.3);
        }

        .link-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .link-btn:hover::after {
            opacity: 1;
        }

        .tiktok-icon {
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }

        /* 하단 텍스트 스타일 */
        .footer-info {
            margin-top: 2rem;
            font-size: 10px;
            color: rgba(148, 163, 184, 0.5);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <!-- 배경 요소 -->
    <div class="universe-bg" id="universe"></div>
    <div class="nebula" id="nebula"></div>

    <div class="mystic-card">
        <!-- 간판 -->
        <h1 class="brand-logo">gorics.cloud</h1>
        <p class="text-slate-400 text-sm mt-2 mb-10 tracking-[0.3em] font-light uppercase opacity-80">One Peace Universe</p>

        <!-- 링크 리스트 -->
        <div class="space-y-3">
            <!-- 틱톡 링크 (요청하신 @lemontree919 계정) -->
            <a href="https://www.tiktok.com/@lemontree919" target="_blank" class="link-btn group">
                <svg class="tiktok-icon mr-3 transition-transform group-hover:rotate-[15deg]" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.17-2.89-.6-4.13-1.47V13.3c0 1.97-.5 3.98-1.78 5.48-1.43 1.74-3.72 2.71-5.96 2.5-2.65-.16-5.06-2-5.95-4.51-.98-2.66-.4-5.83 1.54-7.85 1.55-1.72 3.95-2.58 6.22-2.19v4.18c-1.12-.2-2.31.06-3.15.86-1.12 1-1.39 2.82-.55 4.07.72 1.16 2.19 1.75 3.5 1.41 1.09-.23 1.95-1.22 2.06-2.32.06-1.58.03-3.17.04-4.75V0h-.24z"/>
                </svg>
                <span class="tracking-wide">@one_peace TikTok</span>
            </a>

            <!-- 공부 중임을 나타내는 신비로운 플레이스홀더 -->
            <div class="link-btn opacity-25 cursor-default group">
                <span class="text-xs italic group-hover:text-indigo-300 transition-colors">Study in Progress... ✍️</span>
            </div>
        </div>

        <!-- 하단 푸터 -->
        <footer class="footer-info">
            &copy; GORICS.CLOUD 
        </footer>
    </div>

    <script>
        // 배경 별 생성 로직
        const universe = document.getElementById('universe');
        const starCount = 100;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 1.5 + 1 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            universe.appendChild(star);
        }

        // 오로라(Nebula) 마우스 인터랙션
        const nebula = document.getElementById('nebula');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let nebulaX = mouseX, nebulaY = mouseY;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // 부드러운 애니메이션 루프
        function animate() {
            // Easing 적용 (0.05 속도로 부드럽게 추적)
            nebulaX += (mouseX - nebulaX) * 0.05;
            nebulaY += (mouseY - nebulaY) * 0.05;
            
            nebula.style.transform = `translate(${nebulaX - 300}px, ${nebulaY - 300}px)`;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
