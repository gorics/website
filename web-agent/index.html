<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Web Agent Workbench</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#667085;--line:#d0d5dd;--blue:#155eef;--ok:#067647;--bad:#b42318;--warn:#b54708}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#eef4ff,#fff);font-family:system-ui,-apple-system,Segoe UI,Apple SD Gothic Neo,Noto Sans KR,sans-serif;color:var(--text)}main{max-width:1080px;margin:auto;padding:28px 16px 70px}.banner{border:1px solid #84caff;background:#eff8ff;border-radius:16px;padding:14px 16px;margin-bottom:18px}.banner b{color:#175cd3}h1{font-size:clamp(30px,6vw,54px);margin:8px 0 4px}.sub{margin:0 0 20px;color:var(--muted)}.grid{display:grid;grid-template-columns:1fr;gap:16px}@media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}.card{background:var(--card);border:1px solid #e4e7ec;border-radius:18px;padding:18px;box-shadow:0 12px 35px rgba(16,24,40,.08)}textarea{width:100%;min-height:330px;border:1px solid var(--line);border-radius:14px;padding:14px;font:14px ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.55;resize:vertical}button{border:1px solid var(--blue);background:var(--blue);color:#fff;border-radius:12px;padding:10px 13px;margin:8px 6px 0 0;font-weight:800;cursor:pointer}.ghost{background:white;color:var(--blue)}.danger{background:#b42318;border-color:#b42318}.pill{display:inline-flex;gap:6px;align-items:center;border:1px solid #e4e7ec;border-radius:999px;padding:7px 10px;margin:4px 6px 4px 0;background:#f9fafb;color:#344054;font-size:13px}.ok{color:var(--ok)}.bad{color:var(--bad)}.warn{color:var(--warn)}.source{border:1px solid #e4e7ec;border-radius:14px;padding:13px;margin:10px 0;background:#fcfcfd}.source h3{font-size:16px;margin:0 0 6px}.source a{color:#155eef;word-break:break-all}.source p{white-space:pre-wrap;color:#344054;margin:8px 0}pre{white-space:pre-wrap;word-break:break-word;background:#101828;color:#f9fafb;border-radius:14px;padding:14px;max-height:370px;overflow:auto}.small{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<main>
<div class="banner"><b>공인 접속용 버전</b> — 컨테이너 172.* 주소가 외부에서 안 열릴 때 쓰는 GitHub Pages 앱. 네 폰 브라우저에서 바로 열 수 있다.</div>
<h1>Web Agent Workbench</h1>
<p class="sub">검색서비스 출력 / view-source 텍스트 → 출처 카드 → 검증 리포트</p>
<div class="grid">
<section class="card"><h2>입력</h2><textarea id="input"></textarea><button onclick="loadSample()">샘플 넣기</button><button onclick="generate()">보고서 생성</button><button class="ghost" onclick="copyReport()">보고서 복사</button><button class="ghost" onclick="downloadReport()">HTML 저장</button><button class="danger" onclick="clearAll()">비우기</button><p class="small">외부 API 호출 없음. 붙여넣은 텍스트는 브라우저 안에서만 처리됨.</p></section>
<section class="card"><h2>검증</h2><div id="checks"></div><h2>출처 카드</h2><div id="cards"></div></section>
</div>
<section class="card" style="margin-top:16px"><h2>JSON 리포트</h2><pre id="json">ready</pre></section>
</main>
<script>
const sample=`교육부 2027학년도 대학수학능력시험 기본계획 (https://www.moe.go.kr)
L10: 2027학년도 대학수학능력시험은 2026. 11. 19. 시행한다.
L11: 성적 통지일은 2026. 12. 11.로 예정되어 있다.

정책브리핑 2027학년도 수능 시행기본계획 (https://www.korea.kr)
L22: 6월 모의평가와 9월 모의평가를 통해 수험생에게 준비 기회를 제공한다.

EBSi 2027 수능 학습 안내 (https://www.ebsi.co.kr)
L35: 한국교육과정평가원 관련 자료와 연계하여 수능 정보를 확인할 수 있다.`;
const required=['2027학년도','2026. 11. 19','6월','9월','2026. 12. 11','한국교육과정평가원'];
const $=id=>document.getElementById(id);function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function parseSources(raw){const blocks=raw.split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);return blocks.map((block,i)=>{const lines=block.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);const first=lines[0]||`Source ${i+1}`;const m=first.match(/https?:\/\/[^\s)]+/);const url=m?m[0]:'';const title=(first.replace(/\(https?:\/\/[^)]+\)/,'').replace(/https?:\/\/\S+/,'').trim())||`Source ${i+1}`;const text=(lines.slice(1).join('\n')||block).replace(/^L\d+:\s*/gm,'');return{title,url,text}})}
function generate(){const raw=$('input').value;const sources=parseSources(raw);const checks=Object.fromEntries(required.map(k=>[k,raw.includes(k)]));$('checks').innerHTML=required.map(k=>`<span class="pill"><span class="${checks[k]?'ok':'bad'}">●</span>${esc(k)}</span>`).join('');$('cards').innerHTML=sources.length?sources.map((s,i)=>`<article class="source"><h3>${i+1}. ${esc(s.title)}</h3>${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noreferrer">${esc(s.url)}</a>`:''}<p>${esc(s.text)}</p></article>`).join(''):'<p class="warn">출처 블록 없음</p>';const report={ok:true,url:location.href,generatedAt:new Date().toISOString(),sourceCount:sources.length,lineCount:raw.split(/\r?\n/).filter(Boolean).length,checks,sources};$('json').textContent=JSON.stringify(report,null,2);return report}
function loadSample(){$('input').value=sample;generate()}function clearAll(){$('input').value='';$('checks').innerHTML='';$('cards').innerHTML='';$('json').textContent='ready'}async function copyReport(){const r=generate();await navigator.clipboard.writeText(JSON.stringify(r,null,2));alert('복사됨')}function downloadReport(){generate();const html='<!doctype html><meta charset="utf-8"><pre>'+esc($('json').textContent)+'</pre>';const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download='web-agent-report.html';a.click();URL.revokeObjectURL(a.href)}
loadSample();
</script>
</body>
</html>
