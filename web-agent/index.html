<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Web Agent Workbench</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f5f7fb;color:#172033;margin:0}main{max-width:900px;margin:auto;padding:32px 18px}.card{background:white;border:1px solid #e4e7ec;border-radius:14px;padding:18px;margin:14px 0}textarea{width:100%;min-height:260px;border:1px solid #d0d5dd;border-radius:10px;padding:12px;font:13px ui-monospace,monospace}button{padding:10px 12px;border-radius:10px;border:1px solid #155eef;background:#155eef;color:white}pre{white-space:pre-wrap;background:#f8f9fc;border-radius:10px;padding:12px}.muted{color:#667085}.ok{color:#067647}.bad{color:#b42318}
</style>
</head>
<body><main>
<h1>Web Agent Workbench</h1>
<p class="muted">영구 GitHub Pages 버전. 검색서비스 출력 또는 JSON을 붙여 넣고 브라우저에서 바로 구조화한다.</p>
<div class="card"><textarea id="raw">교육부 2027학년도 대학수학능력시험 시행기본계획 발표 (https://www.moe.go.kr/)
L12: 2027학년도 대학수학능력시험은 2026. 11. 19.에 시행한다.
L18: 성적 통지는 2026. 12. 11.로 예정되어 있다.

한국교육과정평가원 안내 (https://www.kice.re.kr/)
L31: 6월 모의평가와 9월 모의평가를 확인한다.</textarea><br><br><button onclick="run()">렌더</button></div>
<div class="card"><h2>결과</h2><div id="out"></div></div>
</main><script>
function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function run(){const t=document.getElementById('raw').value;let obj;try{obj=JSON.parse(t)}catch(e){const lines=t.split(/\n/);const sources=[];let cur=null;for(const x of lines){const line=x.trim();if(!line)continue;const u=line.match(/https?:\/\/[^\s)]+/);const l=line.match(/^L\d+:\s*(.*)$/);if(u){cur={title:line.replace(u[0],'').replace(/[()]/g,'').trim()||u[0],url:u[0],lines:[]};sources.push(cur)}else if(l&&cur){cur.lines.push(l[1])}else{if(!cur){cur={title:line,url:'',lines:[]};sources.push(cur)}else cur.lines.push(line)}}obj={sources}}
const corpus=JSON.stringify(obj);const checks=['2027학년도','2026. 11. 19','6월','9월','2026. 12. 11','한국교육과정평가원'];document.getElementById('out').innerHTML='<p>sources: '+(obj.sources||[]).length+'</p>'+checks.map(k=>'<span class="'+(corpus.includes(k)?'ok':'bad')+'">'+k+' '+(corpus.includes(k)?'✓':'✗')+'</span>').join('<br>')+'<pre>'+esc(JSON.stringify(obj,null,2))+'</pre>'}
run();
</script></body></html>
