name: Watch Static Multiboot Deploy

on:
  workflow_run:
    workflows:
      - Deploy static content to Pages
    types:
      - completed

permissions:
  actions: write
  contents: write

concurrency:
  group: watch-static-multiboot-deploy
  cancel-in-progress: false

jobs:
  record-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record static deployment result
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          result = {
              'workflow': 'Deploy static content to Pages',
              'run_id': int(os.environ['RUN_ID']),
              'run_attempt': int(os.environ['RUN_ATTEMPT']),
              'conclusion': os.environ['CONCLUSION'],
              'head_sha': os.environ['HEAD_SHA'],
              'run_url': os.environ['RUN_URL'],
              'recorded_at': datetime.now(timezone.utc).isoformat(),
          }
          Path('os/iso/latest-static-pages-run.json').write_text(json.dumps(result, indent=2) + '\n')
          print(json.dumps(result, indent=2))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add os/iso/latest-static-pages-run.json
          git commit -m 'Record latest static Pages run [skip ci]' || true
          git push origin HEAD:main

      - name: Dispatch graphical V5 verification
        if: github.event.workflow_run.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'verify-real-multiboot-v5.yml',
              ref: 'main'
            });

      - name: Require deployment success
        if: github.event.workflow_run.conclusion != 'success'
        run: |
          echo 'Static Pages deployment failed: ${{ github.event.workflow_run.html_url }}'
          exit 1
