name: Consolidate Pages To Final V3

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/consolidate-pages-to-final-v3.yml'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Disable legacy Pages deployers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for workflow in \
            static.yml \
            deploy-real-multiboot-final.yml \
            deploy-real-multiboot-final-v2.yml \
            deploy-final-multiboot-stable.yml; do
            echo "disable legacy workflow: $workflow"
            gh workflow disable "$workflow" --repo "$GITHUB_REPOSITORY" || true
          done

      - name: Cancel queued or active legacy deploy runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json databaseId,workflowName,status,conclusion,url \
            > /tmp/all-runs.json
          python3 - <<'PY' > /tmp/legacy-run-ids.txt
          import json
          from pathlib import Path

          legacy = {
              'Deploy static content to Pages',
              'Deploy And Verify Real Multiboot Final',
              'Deploy And Verify Real Multiboot Final V2',
              'Deploy Final Multiboot Stable',
          }
          for run in json.loads(Path('/tmp/all-runs.json').read_text()):
              if run.get('workflowName') in legacy and run.get('status') in {'queued', 'in_progress', 'waiting', 'pending', 'requested'}:
                  print(run['databaseId'])
          PY
          while read -r run_id; do
            test -n "$run_id" || continue
            echo "cancel legacy Pages run: $run_id"
            gh run cancel "$run_id" --repo "$GITHUB_REPOSITORY" || true
          done < /tmp/legacy-run-ids.txt

      - name: Dispatch sole final V3 deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow enable deploy-real-multiboot-final-v3.yml --repo "$GITHUB_REPOSITORY"
          gh workflow run deploy-real-multiboot-final-v3.yml --repo "$GITHUB_REPOSITORY" --ref main
          sleep 5
          gh run list --repo "$GITHUB_REPOSITORY" \
            --workflow deploy-real-multiboot-final-v3.yml --limit 5 \
            --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url,event \
            > /tmp/final-v3-runs.json

      - name: Record consolidation state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow list --repo "$GITHUB_REPOSITORY" --all --json name,path,state \
            > /tmp/workflows.json
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          workflows = json.loads(Path('/tmp/workflows.json').read_text())
          runs = json.loads(Path('/tmp/final-v3-runs.json').read_text())
          watched = {
              '.github/workflows/static.yml',
              '.github/workflows/deploy-real-multiboot-final.yml',
              '.github/workflows/deploy-real-multiboot-final-v2.yml',
              '.github/workflows/deploy-final-multiboot-stable.yml',
              '.github/workflows/deploy-real-multiboot-final-v3.yml',
          }
          payload = {
              'recorded_at': datetime.now(timezone.utc).isoformat(),
              'workflows': [item for item in workflows if item.get('path') in watched],
              'v3_runs': runs,
          }
          Path('/tmp/pages-consolidation-status.json').write_text(json.dumps(payload, indent=2) + '\n')
          print(json.dumps(payload, indent=2))
          PY

          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 20); do
            git reset --hard
            git clean -fd
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p os/iso
            cp /tmp/pages-consolidation-status.json os/iso/pages-consolidation-status.json
            git add os/iso/pages-consolidation-status.json
            git commit -m 'Record consolidated Pages deployment state [skip ci]' || exit 0
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 2))
          done
          exit 1
