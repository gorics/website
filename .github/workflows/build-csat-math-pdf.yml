name: Build permanent CSAT math PDF

on:
  push:
    paths:
      - 'study/math-nje/source/**'
      - 'study/math-nje/build_pdf.py'
      - '.github/workflows/build-csat-math-pdf.yml'
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'study/math-nje/source/**'
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: permanent-csat-math-pdf
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Korean fonts and PDF dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          python -m pip install --upgrade pip
          python -m pip install reportlab

      - name: Build permanent PDF
        run: python study/math-nje/build_pdf.py

      - name: Commit generated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add study/math-nje/latest.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes"
          else
            git commit -m "build(math-nje): update permanent latest PDF"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
