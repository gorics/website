name: Verify OS Main r4x Integration

on:
  workflow_dispatch:
  push:
    paths:
      - 'os/index.html'
      - '.github/workflows/verify-os-main-r4x.yml'

permissions:
  contents: write

concurrency:
  group: verify-os-main-r4x
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate source integration
        run: |
          set -euo pipefail
          grep -q '<title>GORICS 멀티부트</title>' os/index.html
          grep -q 'href="real-multiboot/">GORICS Linux 실행' os/index.html
          grep -q 'iso/real-multiboot-status.json' os/index.html
          grep -q 'VERIFIED r4x' os/index.html
          grep -q '1024×768 GUI' os/index.html
          grep -q 'Openbox · tint2 · PCManFM · xterm' os/index.html
          python3 - <<'PY'
          from pathlib import Path
          import re
          text=Path('os/index.html').read_text()
          scripts=re.findall(r'<script>(.*?)</script>', text, flags=re.S)
          assert scripts, 'inline script missing'
          Path('/tmp/os-main-inline.js').write_text('\n'.join(scripts))
          PY
          node --check /tmp/os-main-inline.js
          python3 - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path('os/iso/real-multiboot-status.json').read_text())
          assert d.get('success') is True
          assert d.get('emulator_started') is True
          assert d.get('xorg_ready') is True
          assert d.get('gui_ready') is True
          assert d.get('graphical_canvas') is True
          PY

      - name: Wait for public Pages deployment
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/os/'
          ready=0
          for attempt in $(seq 1 120); do
            stamp="${GITHUB_RUN_ID}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 "$BASE?verify-main=$stamp" -o /tmp/public-os.html \
              && grep -q '<title>GORICS 멀티부트</title>' /tmp/public-os.html \
              && grep -q 'GORICS Linux 실행' /tmp/public-os.html \
              && grep -q 'iso/real-multiboot-status.json' /tmp/public-os.html \
              && grep -q 'VERIFIED r4x' /tmp/public-os.html \
              && curl -fsSL --max-time 60 "${BASE}iso/real-multiboot-status.json?verify-main=$stamp" -o /tmp/public-status.json; then
              python3 - <<'PY' && ready=1 && break
          import json
          from pathlib import Path
          d=json.loads(Path('/tmp/public-status.json').read_text())
          assert d.get('success') is True
          assert d.get('gui_ready') is True
          assert d.get('xorg_ready') is True
          assert d.get('graphical_canvas') is True
          PY
            fi
            echo "public OS main not ready attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1

      - name: Verify public links
        run: |
          set -euo pipefail
          curl -fsSI --max-time 60 'https://gorics.github.io/website/os/real-multiboot/' | grep -E 'HTTP/[0-9.]+ (200|304)'

      - name: Record verification result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          status=os.environ.get('JOB_STATUS','unknown')
          result={
            'success': status == 'success',
            'state': 'completed' if status == 'success' else 'failed',
            'page': 'https://gorics.github.io/website/os/',
            'main_runtime': 'https://gorics.github.io/website/os/real-multiboot/',
            'version': 'r4x',
            'job_status': status,
            'run_id': os.environ.get('GITHUB_RUN_ID'),
            'workflow_sha': os.environ.get('GITHUB_SHA'),
            'verified_at': datetime.now(timezone.utc).isoformat(),
          }
          Path('/tmp/os-main-status.json').write_text(json.dumps(result,ensure_ascii=False,indent=2)+'\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 12); do
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/os-main-status.json os/iso/os-main-r4x-status.json
            git add os/iso/os-main-r4x-status.json
            git commit -m 'Record OS main r4x integration verification [skip ci]' || exit 0
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt*3))
          done
          exit 1
