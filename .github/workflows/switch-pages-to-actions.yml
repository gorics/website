name: Switch Pages to Actions

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/switch-pages-to-actions.yml'

permissions:
  contents: write
  actions: write
  pages: write

concurrency:
  group: switch-pages-to-actions-once
  cancel-in-progress: true

jobs:
  switch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch Pages build type to workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo 'Before:'
          gh api "repos/$GITHUB_REPOSITORY/pages" | tee /tmp/pages-before.json
          gh api --method PUT "repos/$GITHUB_REPOSITORY/pages" -f build_type=workflow
          echo 'After:'
          gh api "repos/$GITHUB_REPOSITORY/pages" | tee /tmp/pages-after.json
          test "$(jq -r .build_type /tmp/pages-after.json)" = workflow
          cp /tmp/pages-after.json os/iso/pages-settings.json

      - name: Cancel stale Pages runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for workflow in static.yml deploy-gorics-direct-kernel.yml; do
            gh run list --workflow "$workflow" --limit 100 --json databaseId,status \
              --jq '.[] | select(.status == "queued" or .status == "in_progress") | .databaseId' \
              | while read -r run_id; do
                  test -n "$run_id" || continue
                  echo "cancelling stale $workflow run $run_id"
                  gh run cancel "$run_id" || true
                done
          done
          for attempt in $(seq 1 60); do
            ACTIVE=0
            for workflow in static.yml deploy-gorics-direct-kernel.yml; do
              COUNT=$(gh run list --workflow "$workflow" --limit 100 --json status \
                --jq '[.[] | select(.status == "queued" or .status == "in_progress")] | length')
              ACTIVE=$((ACTIVE + COUNT))
            done
            echo "active stale Pages runs: $ACTIVE"
            test "$ACTIVE" = 0 && break
            sleep 5
          done
          test "$ACTIVE" = 0

      - name: Deploy one workflow artifact
        id: deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BEFORE=$(gh run list --workflow static.yml --limit 1 --json databaseId --jq '.[0].databaseId // 0')
          gh workflow run static.yml --ref main
          RUN_ID=''
          for attempt in $(seq 1 30); do
            sleep 4
            CANDIDATE=$(gh run list --workflow static.yml --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')
            if test "$CANDIDATE" != 0 && test "$CANDIDATE" != "$BEFORE"; then
              RUN_ID="$CANDIDATE"
              break
            fi
          done
          test -n "$RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "workflow Pages run: $RUN_ID"
          gh run watch "$RUN_ID" --exit-status --interval 10

      - name: Verify workflow Pages source and public files
        env:
          PAGES_RUN_ID: ${{ steps.deploy.outputs.run_id }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/pages" | tee /tmp/pages-final.json
          test "$(jq -r .build_type /tmp/pages-final.json)" = workflow
          BASE='https://gorics.github.io/website'
          PAGE="$BASE/os/real-multiboot"
          READY=0
          for attempt in $(seq 1 60); do
            stamp="$GITHUB_RUN_ID-$attempt"
            if curl -fsSL --max-time 60 "$PAGE/?switch=$stamp" -o /tmp/index.html \
              && grep -q 'app.js?v=n' /tmp/index.html \
              && grep -q 'ISO page. n' /tmp/index.html \
              && curl -fsSL --max-time 60 "$PAGE/app.js?switch=$stamp" -o /tmp/app.js \
              && grep -q 'gorics-linux-gui-web-i386.iso' /tmp/app.js \
              && grep -q 'bzimage' /tmp/app.js \
              && curl -fsSL --max-time 60 "$PAGE/assets/iso-meta.json?switch=$stamp" -o /tmp/meta.json \
              && grep -q 'direct-xorg-openbox' /tmp/meta.json \
              && curl -fsSL --max-time 60 "$BASE/vendor/v86/libv86.js?switch=$stamp" -o /tmp/libv86.js \
              && test "$(stat -c %s /tmp/libv86.js)" -gt 100000 \
              && curl -fsSL --max-time 60 "$PAGE/assets/vmlinuz?switch=$stamp" -o /tmp/vmlinuz \
              && test "$(stat -c %s /tmp/vmlinuz)" -gt 1000000 \
              && curl -fsSL --max-time 90 "$PAGE/assets/initrd.img?switch=$stamp" -o /tmp/initrd.img \
              && test "$(stat -c %s /tmp/initrd.img)" -gt 10000000; then
              READY=1
              break
            fi
            echo "workflow Pages not propagated, attempt $attempt"
            sleep 10
          done
          test "$READY" = 1
          CODE=$(curl -sS --max-time 90 -r 32768-36863 -o /tmp/iso-probe.bin -w '%{http_code}' "$PAGE/assets/gorics-linux-gui-web-i386.iso?switch=$GITHUB_RUN_ID")
          test "$CODE" = 206
          test "$(stat -c %s /tmp/iso-probe.bin)" = 4096
          python3 - <<'PY'
          from pathlib import Path
          data = Path('/tmp/iso-probe.bin').read_bytes()
          assert data[1:6] == b'CD001'
          assert data[2049:2054] == b'CD001'
          assert b'EL TORITO' in data[2055:2087]
          print('workflow Pages public ISO range verified')
          PY

      - name: Record final workflow Pages state
        if: always()
        env:
          PAGES_RUN_ID: ${{ steps.deploy.outputs.run_id }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/pages" > /tmp/pages-state.json || true
          BUILD_TYPE=$(jq -r '.build_type // "unknown"' /tmp/pages-state.json 2>/dev/null || echo unknown)
          printf '{"controller_run_id":"%s","pages_run_id":"%s","build_type":"%s","expected_version":"n","loader":"same-origin-i386-direct-kernel","desktop":"direct-xorg-openbox"}\n' "$GITHUB_RUN_ID" "$PAGES_RUN_ID" "$BUILD_TYPE" > os/iso/pages-workflow-final.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/pages-settings.json os/iso/pages-workflow-final.json
          git commit -m 'Record workflow-based Pages deployment [skip ci]' || true
          git push origin HEAD:main
