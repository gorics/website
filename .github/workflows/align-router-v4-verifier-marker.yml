name: Align Router V4 Verifier Marker

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/align-router-v4-verifier-marker.yml'

permissions:
  contents: write

concurrency:
  group: align-router-v4-verifier-marker
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch and push
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 12); do
            git fetch origin main
            git checkout -B main origin/main
            python3 - <<'PY'
          from pathlib import Path
          path = Path('os/real-multiboot/chunk-router-v4.js')
          text = path.read_text()
          old = 'ISO chunk router v4 installed (fetch-backed XHR + verified multi-CDN failover)'
          new = 'ISO chunk router v4 installed (fetch-backed multi-CDN XHR + verified failover)'
          if old in text:
              path.write_text(text.replace(old, new))
          elif new not in text:
              raise SystemExit('expected v4 marker not found')
          PY
            node --check os/real-multiboot/chunk-router-v4.js
            grep -q 'fetch-backed multi-CDN' os/real-multiboot/chunk-router-v4.js
            git add os/real-multiboot/chunk-router-v4.js
            if git diff --cached --quiet; then exit 0; fi
            git commit -m 'Align v4 router marker with browser verifier'
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 3))
          done
          exit 1
