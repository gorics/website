name: DSHW Body Continuation

on:
  pull_request:
    branches: ["main"]
    paths: ["tmp/dshw_body_continuation_trigger*.txt"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        start: [2332, 2372, 2412, 2452, 2492, 2532, 2572, 2612, 2652, 2692, 2732, 2772, 2812, 2852, 2892, 2932, 2972, 3012, 3052, 3092]
    steps:
      - uses: actions/checkout@v4
      - name: Collect public DSHW post bodies
        env:
          START_PAGE: "${{ matrix.start }}"
          TARGET_ROWS: "2000"
          MAX_PAGES: "40"
          BODY_CONCURRENCY: "2"
          BODY_DELAY_MS: "1700"
          RETRY_DELAY_MS: "4500"
          MAX_RUNTIME_MS: "3120000"
        run: |
          npm init -y >/dev/null 2>&1
          npm install cheerio@1.0.0-rc.12 >/dev/null 2>&1
          node tmp/dshw_body_collector_20260627.mjs
          mv dshw_body_slow.csv "dshw_body_${START_PAGE}.csv"
          mv dshw_body_slow_log.json "dshw_body_${START_PAGE}_log.json"
      - name: Upload body artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dshw-body-cont-${{ matrix.start }}
          path: |
            dshw_body_${{ matrix.start }}.csv
            dshw_body_${{ matrix.start }}_log.json
          if-no-files-found: warn
          retention-days: 1
