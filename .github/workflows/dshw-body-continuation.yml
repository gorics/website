name: DSHW Body Continuation

on:
  pull_request:
    branches: ["main"]
    paths: ["tmp/dshw_body_continuation_trigger_20260627.txt"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        start: [1, 41, 81, 121, 1532, 1572, 1612, 1652, 1692, 1732, 1772, 1812, 1852, 1892, 1932, 1972, 2012, 2052, 2092, 2132, 2172, 2212, 2252, 2292]
    steps:
      - uses: actions/checkout@v4
      - name: Collect public DSHW post bodies
        env:
          START_PAGE: "${{ matrix.start }}"
          TARGET_ROWS: "2000"
          MAX_PAGES: "40"
          BODY_CONCURRENCY: "2"
          BODY_DELAY_MS: "1700"
          RETRY_DELAY_MS: "4500"
          MAX_RUNTIME_MS: "3120000"
        run: |
          npm init -y >/dev/null 2>&1
          npm install cheerio@1.0.0-rc.12 >/dev/null 2>&1
          node tmp/dshw_body_collector_20260627.mjs
          mv dshw_body_slow.csv "dshw_body_${START_PAGE}.csv"
          mv dshw_body_slow_log.json "dshw_body_${START_PAGE}_log.json"
      - name: Upload body artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dshw-body-cont-${{ matrix.start }}
          path: |
            dshw_body_${{ matrix.start }}.csv
            dshw_body_${{ matrix.start }}_log.json
          if-no-files-found: warn
          retention-days: 1
