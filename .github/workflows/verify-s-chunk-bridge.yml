name: Verify s Chunk Bridge GUI

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-s-chunk-bridge.yml'
      - 'os/real-multiboot/chunk-compat.js'
      - 'os/real-multiboot/index.html'
      - 'os/real-multiboot/assets/iso-meta.json'

permissions:
  contents: read

concurrency:
  group: verify-s-chunk-bridge-gui
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate loader source
        run: |
          node --check os/real-multiboot/chunk-compat.js
          node --check os/real-multiboot/app.js
          grep -q 'chunk-compat.js?v=s' os/real-multiboot/index.html
          grep -q 'ISO page. s' os/real-multiboot/index.html
          grep -q 'chunk_compatibility_bridge' os/real-multiboot/assets/iso-meta.json

      - name: Wait for public s deployment and verify assets
        run: |
          set -euo pipefail
          PAGE='https://gorics.github.io/website/os/real-multiboot'
          RAW='https://raw.githubusercontent.com/gorics/website/os-assets/os/real-multiboot/assets/v86-parts'
          READY=0
          for attempt in $(seq 1 120); do
            stamp="${GITHUB_RUN_ID}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 "$PAGE/?verify-s=$stamp" -o /tmp/index.html \
              && grep -q 'chunk-compat.js?v=s' /tmp/index.html \
              && grep -q 'ISO page. s' /tmp/index.html \
              && curl -fsSL --max-time 60 "$PAGE/chunk-compat.js?verify-s=$stamp" -o /tmp/chunk-compat.js \
              && grep -q 'v86 ISO chunk compatibility bridge installed' /tmp/chunk-compat.js \
              && curl -fsSL --max-time 60 "$PAGE/assets/iso-meta.json?verify-s=$stamp" -o /tmp/meta.json \
              && grep -q '"page_version": "s"' /tmp/meta.json; then
              READY=1
              break
            fi
            echo "public s deployment not ready attempt=$attempt"
            sleep 10
          done
          test "$READY" = 1
          node --check /tmp/chunk-compat.js

          curl -fsSL -L --max-time 90 -r 32768-36863 \
            "$RAW/gorics-linux-gui-web-i386.iso-0-16777216?verify-s=$GITHUB_RUN_ID" \
            -o /tmp/first.bin
          curl -fsSL -L --max-time 90 -r 0-15 \
            "$RAW/gorics-linux-gui-web-i386.iso-335544320-352321536?verify-s=$GITHUB_RUN_ID" \
            -o /tmp/last.bin
          python3 - <<'PY'
          from pathlib import Path
          first = Path('/tmp/first.bin').read_bytes()
          if len(first) > 4096:
              first = first[32768:36864]
          assert len(first) == 4096
          assert first[1:6] == b'CD001'
          assert first[2049:2054] == b'CD001'
          assert b'EL TORITO' in first[2055:2087]
          assert len(Path('/tmp/last.bin').read_bytes()) >= 16
          PY

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot public Linux GUI and reject sr0 failures
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?verify-s-gui=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          mkdir -p s-bridge-proof
          cat > /tmp/verify-s.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const output = 's-bridge-proof/result.json';
          const result = {
            success: false,
            state: 'starting',
            target: process.env.TARGET_URL,
            run_id: process.env.GITHUB_RUN_ID,
            version: 's',
            console: [],
            failed_requests: [],
            started_at: new Date().toISOString(),
          };
          const save = (state, extra = {}) => {
            Object.assign(result, extra, { state, updated_at: new Date().toISOString() });
            fs.writeFileSync(output, JSON.stringify(result, null, 2) + '\n');
          };
          const fatalPattern = /(I\/O error, dev sr0|SQUASHFS error|unable to find a medium containing a live file system|no usable ISO chunk format)/i;
          save('starting');

          let browser;
          let page;
          try {
            browser = await chromium.launch({
              headless: true,
              args: [
                '--no-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--disable-background-timer-throttling',
                '--disable-renderer-backgrounding',
              ],
            });
            const context = await browser.newContext({ viewport: { width: 1280, height: 900 } });
            page = await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console', message => {
              result.console.push(`${message.type()}: ${message.text()}`);
              if (result.console.length > 800) result.console.shift();
            });
            page.on('requestfailed', request => {
              result.failed_requests.push({ url: request.url(), error: request.failure()?.errorText || 'failed' });
            });

            const response = await page.goto(process.env.TARGET_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            save('page-opened', { page_http: response?.status() || null });
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              return log.includes('ISO page. s') && log.includes('v86 ISO chunk compatibility bridge installed');
            });
            save('bridge-ready');
            await page.screenshot({ path: 's-bridge-proof/00-ready.png', fullPage: true });
            await page.click('#boot-btn');
            save('boot-clicked');

            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              return log.includes('v86 chunk URL rewrite') || /I\/O error, dev sr0|SQUASHFS error/i.test(log);
            }, null, { timeout: 600000 });

            let log = await page.locator('#log').textContent() || '';
            if (fatalPattern.test(log)) throw new Error(`fatal boot log detected:\n${log.split('\n').slice(-80).join('\n')}`);
            save('chunk-rewrite-observed');

            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              if (/I\/O error, dev sr0|SQUASHFS error|unable to find a medium containing a live file system/i.test(log)) {
                throw new Error('fatal live-media error');
              }
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              return canvas
                && canvas.width >= 640
                && canvas.height >= 480
                && getComputedStyle(canvas).display !== 'none'
                && (!text || getComputedStyle(text).display === 'none')
                && document.querySelector('#screen')?.classList.contains('active');
            }, null, { timeout: 1200000 });

            await page.waitForTimeout(30000);
            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              const log = document.querySelector('#log')?.textContent || '';
              return {
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_display: text ? getComputedStyle(text).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                boot_button_text: document.querySelector('#boot-btn')?.textContent || '',
                log_tail: log.split('\n').slice(-500),
              };
            });
            log = details.log_tail.join('\n');
            if (fatalPattern.test(log)) throw new Error('fatal boot log appeared after graphical mode');
            if (!log.includes('v86 chunk URL rewrite')) throw new Error('chunk rewrite was not observed');

            await page.screenshot({ path: 's-bridge-proof/99-gui.png', fullPage: true });
            const canvas = page.locator('#screen canvas');
            if (await canvas.count()) await canvas.screenshot({ path: 's-bridge-proof/99-canvas.png' }).catch(() => {});

            const success = details.screen_active
              && details.canvas_width >= 640
              && details.canvas_height >= 480
              && details.canvas_display !== 'none'
              && details.text_display === 'none'
              && details.boot_button_text === 'Running';
            save('completed', { ...details, success, completed_at: new Date().toISOString() });
            if (!success) throw new Error('graphical desktop assertions failed');
          } catch (error) {
            let details = {};
            try {
              details = await page?.evaluate(() => {
                const log = document.querySelector('#log')?.textContent || '';
                const canvas = document.querySelector('#screen canvas');
                return {
                  canvas_width: canvas?.width || 0,
                  canvas_height: canvas?.height || 0,
                  log_tail: log.split('\n').slice(-600),
                };
              }) || {};
              await page?.screenshot({ path: 's-bridge-proof/99-failure.png', fullPage: true });
            } catch {}
            save('failed', { ...details, success: false, error: String(error?.stack || error), completed_at: new Date().toISOString() });
            throw error;
          } finally {
            await browser?.close().catch(() => {});
          }
          JS
          node --check /tmp/verify-s.mjs
          timeout --signal=TERM --kill-after=30s 25m node /tmp/verify-s.mjs 2>&1 | tee s-bridge-proof/browser.log

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s-chunk-bridge-proof-${{ github.run_id }}
          path: s-bridge-proof/
          if-no-files-found: warn
