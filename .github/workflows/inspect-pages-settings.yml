name: Inspect Pages Settings

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/inspect-pages-settings.yml'

permissions:
  contents: write
  pages: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read Pages configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/pages" > os/iso/pages-settings.json
          cat os/iso/pages-settings.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/pages-settings.json
          git commit -m 'Record GitHub Pages source settings [skip ci]' || true
          git push origin HEAD:main
