name: Deploy static content to Pages

on:
  push:
    branches:
      - main
    paths:
      - 'os/real-multiboot/**'
      - '.github/workflows/static.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-i386-openbox-final
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build live site with atomic local VM runtime
        shell: python
        run: |
          import hashlib
          import json
          import pathlib
          import shutil
          import urllib.request

          build = pathlib.Path('_site')
          if build.exists():
              shutil.rmtree(build)
          shutil.copytree('.', build, ignore=shutil.ignore_patterns('.git', '_site'))
          (build / '.nojekyll').write_text('', encoding='utf-8')

          root = build / 'vendor' / 'v86'
          imgroot = root / 'images'
          root.mkdir(parents=True, exist_ok=True)
          imgroot.mkdir(parents=True, exist_ok=True)

          h = ''.join(['https://', 'co', 'py', '.sh', '/v86/'])
          hi = ''.join(['https://', 'i.', 'co', 'py', '.sh', '/'])
          runtime_files = {
              'libv86.js': h + 'build/libv86.js',
              'v86.wasm': h + 'build/v86.wasm',
              'seabios.bin': h + 'bios/seabios.bin',
              'vgabios.bin': h + 'bios/vgabios.bin',
          }
          image_files = {
              'dsl-4.11.rc2.iso': hi + 'dsl-4.11.rc2.iso',
              'buildroot-bzimage68.bin': hi + 'buildroot-bzimage68.bin',
              'linux4.iso': hi + 'linux4.iso',
              'linux.iso': hi + 'linux.iso',
              'freedos722.img': hi + 'freedos722.img',
              'windows101.img': hi + 'windows101.img',
          }

          manifest = {'source': h, 'files': {}}
          for name, url in runtime_files.items():
              dst = root / name
              print('fetch runtime', name, url)
              urllib.request.urlretrieve(url, dst)
              data = dst.read_bytes()
              manifest['files'][name] = {
                  'size': len(data),
                  'sha256': hashlib.sha256(data).hexdigest(),
              }
              print(name, len(data), manifest['files'][name]['sha256'])
          (root / 'manifest.json').write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')

          for name, url in image_files.items():
              dst = imgroot / name
              print('fetch image', name, url)
              urllib.request.urlretrieve(url, dst)
              print(name, dst.stat().st_size)

          repl = {
              h + 'build/libv86.js': '/website/vendor/v86/libv86.js',
              h + 'build/v86.wasm': '/website/vendor/v86/v86.wasm',
              h + 'bios/seabios.bin': '/website/vendor/v86/seabios.bin',
              h + 'bios/vgabios.bin': '/website/vendor/v86/vgabios.bin',
          }
          for name in image_files:
              repl[hi + name] = '/website/vendor/v86/images/' + name

          for path in build.rglob('*'):
              if not path.is_file() or path.suffix.lower() not in {'.html', '.js'}:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              old_text = text
              for old, new in repl.items():
                  text = text.replace(old, new)
              if text != old_text:
                  path.write_text(text, encoding='utf-8')
                  print('patched', path)

      - name: Add verified Openbox i386 ISO
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEST=_site/os/real-multiboot/assets
          mkdir -p "$DEST"
          gh release download gorics-linux-gui-web-iso-latest \
            --repo "$GITHUB_REPOSITORY" \
            --pattern gorics-linux-gui-web-i386.iso \
            --dir "$DEST"
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          iso = Path('_site/os/real-multiboot/assets/gorics-linux-gui-web-i386.iso')
          if not iso.is_file():
              raise SystemExit('verified i386 web ISO missing')
          size = iso.stat().st_size
          if size >= 900_000_000:
              raise SystemExit(f'web ISO too large for Pages: {size}')
          h = hashlib.sha256()
          with iso.open('rb') as f:
              for block in iter(lambda: f.read(1024 * 1024), b''):
                  h.update(block)
          meta = {
              'name': iso.name,
              'architecture': 'i386',
              'desktop': 'openbox-tint2-pcmanfm-xterm',
              'openbox_verified': True,
              'lightdm': False,
              'size': size,
              'sha256': h.hexdigest(),
              'source': 'i686-qemu-openbox-verified-release',
          }
          iso.with_name('iso-meta.json').write_text(json.dumps(meta, indent=2) + '\n', encoding='utf-8')
          print(meta)
          PY

      - name: Configure direct i386 kernel boot and unique cache version
        env:
          DEPLOY_VERSION: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          python3 os/real-multiboot/prepare-direct-deploy.py _site
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ['DEPLOY_VERSION']
          page = Path('_site/os/real-multiboot')
          index = page / 'index.html'
          html = index.read_text(encoding='utf-8')
          html = re.sub(r'(<meta name="gorics-build" content=")[^"]*', lambda m: m.group(1) + version, html)
          html = re.sub(r'(<meta name="gorics-deployment-marker" content=")[^"]*', lambda m: m.group(1) + 'GORICS Real Multiboot ' + version, html)
          html = re.sub(r'([?&]v=)[A-Za-z0-9._-]+', lambda m: m.group(1) + version, html)
          html = re.sub(r'(\[ready\] GORICS Real Multiboot )[A-Za-z0-9._-]+', lambda m: m.group(1) + version, html)
          index.write_text(html, encoding='utf-8')

          app = page / 'app.js'
          app_text = app.read_text(encoding='utf-8')
          app_text, count = re.subn(r"const BUILD = '[^']+';", f"const BUILD = '{version}';", app_text, count=1)
          if count != 1:
              raise SystemExit('app BUILD constant was not updated exactly once')
          app.write_text(app_text, encoding='utf-8')

          meta_path = page / 'assets/iso-meta.json'
          meta = json.loads(meta_path.read_text(encoding='utf-8'))
          meta['page_version'] = version
          meta['deployment'] = 'single-static-workflow-atomic-v86'
          meta_path.write_text(json.dumps(meta, indent=2) + '\n', encoding='utf-8')
          (page / 'assets/deployment.json').write_text(json.dumps({
              'version': version,
              'architecture': 'i386',
              'desktop': 'openbox-tint2-pcmanfm-xterm',
              'direct_boot': True,
              'atomic_v86_assets': True,
              'native_xhr': True,
              'iso_sha256': meta['sha256'],
          }, indent=2) + '\n', encoding='utf-8')
          print('deployment version', version)
          PY

          node --check _site/os/real-multiboot/app.js
          node --check _site/os/real-multiboot/asset-versioning.js
          node --check _site/os/real-multiboot/safe-diagnostics.js
          node --check _site/os/real-multiboot/local-media-router.js
          grep -q 'bzimage: { url: kernelUrl }' _site/os/real-multiboot/app.js
          grep -q 'systemd.unit=graphical.target' _site/os/real-multiboot/app.js
          grep -q 'asset-versioning.js?v=' _site/os/real-multiboot/index.html
          grep -q 'safe-diagnostics.js?v=' _site/os/real-multiboot/index.html
          ! grep -q 'chunk-router-v4.js' _site/os/real-multiboot/index.html
          ! grep -q 'diagnostics.js' _site/os/real-multiboot/index.html
          grep -q 'gorics-build' _site/os/real-multiboot/index.html
          test -s _site/vendor/v86/libv86.js
          test -s _site/vendor/v86/v86.wasm
          test -s _site/vendor/v86/manifest.json
          test -s _site/os/real-multiboot/assets/iso-meta.json
          test -s _site/os/real-multiboot/assets/vmlinuz
          test -s _site/os/real-multiboot/assets/initrd.img
          test "$(du -sb _site | cut -f1)" -lt 1000000000

          node <<'JS'
          const fs = require('node:fs');
          const bytes = fs.readFileSync('_site/vendor/v86/v86.wasm');
          const module = new WebAssembly.Module(bytes);
          const exports = WebAssembly.Module.exports(module);
          if (!exports.some((entry) => entry.name === 'memory' && entry.kind === 'memory')) {
            throw new Error(`v86.wasm does not export memory: ${JSON.stringify(exports.slice(0, 30))}`);
          }
          console.log('v86.wasm compiled and exports memory', bytes.length);
          JS

          du -sh _site _site/os/real-multiboot/assets/* _site/vendor/v86/*

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify public OS deployment
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website'
          PAGE="$BASE/os/real-multiboot/"
          READY=0
          for attempt in $(seq 1 60); do
            stamp="$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-$attempt-$(date +%s)"
            if curl -fsSL --max-time 30 -H 'Cache-Control: no-cache' "$PAGE?verify=$stamp" -o /tmp/index.html \
              && grep -q 'asset-versioning.js?v=' /tmp/index.html \
              && grep -q 'safe-diagnostics.js?v=' /tmp/index.html \
              && grep -q 'gorics-build' /tmp/index.html \
              && ! grep -q 'chunk-router-v4.js' /tmp/index.html \
              && curl -fsSL --max-time 30 "$PAGE/assets/iso-meta.json?v=$stamp" -o /tmp/meta.json \
              && grep -q 'openbox-tint2-pcmanfm-xterm' /tmp/meta.json \
              && curl -fsSL --max-time 30 "$BASE/vendor/v86/manifest.json?v=$stamp" -o /tmp/v86-manifest.json \
              && grep -q 'v86.wasm' /tmp/v86-manifest.json \
              && curl -fsSL --max-time 30 "$BASE/vendor/v86/libv86.js?v=$stamp" -o /tmp/libv86.js \
              && test -s /tmp/libv86.js \
              && curl -fsSL --max-time 30 "$BASE/vendor/v86/v86.wasm?v=$stamp" -o /tmp/v86.wasm \
              && test -s /tmp/v86.wasm \
              && curl -fsSL --max-time 60 "$PAGE/assets/vmlinuz?v=$stamp" -o /tmp/vmlinuz \
              && test "$(stat -c %s /tmp/vmlinuz)" -gt 1000000 \
              && curl -fsSL --max-time 60 "$PAGE/assets/initrd.img?v=$stamp" -o /tmp/initrd.img \
              && test "$(stat -c %s /tmp/initrd.img)" -gt 10000000; then
              READY=1
              break
            fi
            echo "public deployment not ready, attempt $attempt"
            sleep 10
          done
          test "$READY" = 1

          node --check /tmp/libv86.js
          node <<'JS'
          const fs = require('node:fs');
          const bytes = fs.readFileSync('/tmp/v86.wasm');
          const module = new WebAssembly.Module(bytes);
          const exports = WebAssembly.Module.exports(module);
          if (!exports.some((entry) => entry.name === 'memory' && entry.kind === 'memory')) process.exit(1);
          console.log('public v86.wasm exports memory', bytes.length);
          JS

          CODE=$(curl -sS --max-time 60 -r 32768-36863 -o /tmp/iso-probe.bin -w '%{http_code}' "$PAGE/assets/gorics-linux-gui-web-i386.iso?v=$GITHUB_RUN_ID")
          test "$CODE" = 206
          test "$(stat -c %s /tmp/iso-probe.bin)" = 4096
          python3 - <<'PY'
          from pathlib import Path
          data = Path('/tmp/iso-probe.bin').read_bytes()
          assert data[1:6] == b'CD001'
          assert data[2049:2054] == b'CD001'
          assert b'EL TORITO' in data[2055:2087]
          print('public ISO9660 and El Torito range verified')
          PY
