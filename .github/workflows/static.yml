name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'os/iso/*-status.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          rm -rf _site
          mkdir -p _site
          git archive HEAD | tar -x -C _site
          rm -rf _site/.github _site/work _site/_site
          find _site -type f -size +100M -print -delete
          touch _site/.nojekyll
          node --check _site/os/real-multiboot/app.js
          node --check _site/os/real-multiboot/sw.js
          grep -q '20260708r1' _site/os/real-multiboot/index.html
          grep -q 'use_parts: true' _site/os/real-multiboot/app.js
          grep -q 'RUNTIME_PREFIX' _site/os/real-multiboot/sw.js
          du -sh _site

      - name: Verify release chunk inventory
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/gorics-linux-gui-iso-latest" > /tmp/release.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path('/tmp/release.json').read_text())
          assets = {item['name']: item for item in release.get('assets', [])}
          iso_name = 'gorics-linux-gui-os-amd64.iso'
          chunk = 16 * 1024 * 1024
          iso = assets.get(iso_name)
          if not iso or int(iso.get('size', 0)) <= 0:
              raise SystemExit('release ISO missing')
          size = int(iso['size'])
          parts = (size + chunk - 1) // chunk
          first = f'gorics-linux-gui-os-amd64-0-{chunk}.iso'
          last_start = (parts - 1) * chunk
          last = f'gorics-linux-gui-os-amd64-{last_start}-{last_start + chunk}.iso'
          for required in ('V86-PARTS.txt', first, last):
              if required not in assets:
                  raise SystemExit(f'missing release asset: {required}')
          print({'iso_size': size, 'parts': parts, 'first': first, 'last': last})
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify public multiboot deployment
        run: |
          BASE='https://gorics.github.io/website/os/real-multiboot'
          READY=0
          for attempt in $(seq 1 36); do
            stamp="$GITHUB_RUN_ID-$attempt"
            if curl -fsSL --max-time 30 "$BASE/?v=$stamp" -o /tmp/index.html \
              && grep -q '20260708r1' /tmp/index.html \
              && curl -fsSL --max-time 30 "$BASE/app.js?v=$stamp" -o /tmp/app.js \
              && grep -q 'resilient release-chunk boot loader' /tmp/app.js \
              && curl -fsSL --max-time 30 "$BASE/sw.js?v=$stamp" -o /tmp/sw.js \
              && grep -q 'gorics-v86-runtime-20260708r1' /tmp/sw.js; then
              READY=1
              break
            fi
            echo "public deployment not ready, attempt $attempt"
            sleep 10
          done
          test "$READY" = 1
          node --check /tmp/app.js
          node --check /tmp/sw.js
