name: Deploy static content to Pages

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact repository commit to publish
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'os/real-multiboot/deployment-r12-v86-atomic.txt'
      - '.github/workflows/static.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-visibility-safe-r19
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Assemble sanitized Pages tree
        env:
          SOURCE_SHA: ${{ inputs.source_sha || github.sha }}
          DEPLOY_VERSION: ${{ inputs.source_sha || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          rm -rf _site
          python3 - <<'PY'
          import pathlib
          import shutil

          source = pathlib.Path('.')
          target = pathlib.Path('_site')
          shutil.copytree(
              source,
              target,
              ignore=shutil.ignore_patterns('.git', '.github', '_site', 'node_modules'),
          )
          for path in target.rglob('*.log'):
              path.unlink()
          for relative in (
              'os/iso/static-pages-failure.json',
              'os/iso/pages-failure-diagnostic.json',
          ):
              path = target / relative
              if path.exists():
                  path.unlink()
          canonical_status = target / 'os/iso/r19-canonical-status.json'
          public_status = target / 'os/iso/real-multiboot-status.json'
          if not canonical_status.exists():
              raise SystemExit('isolated canonical R19 status is missing')
          shutil.copy2(canonical_status, public_status)
          (target / '.nojekyll').write_text('', encoding='utf-8')
          PY

          mkdir -p _site/vendor/v86/images _site/os/real-multiboot/assets

          download() {
            local url="$1"
            local output="$2"
            echo "download $url -> $output"
            curl -fL --retry 5 --retry-all-errors --connect-timeout 20 --max-time 900 \
              -o "$output.tmp" "$url"
            test -s "$output.tmp"
            mv "$output.tmp" "$output"
          }

          download 'https://copy.sh/v86/build/libv86.js' '_site/vendor/v86/libv86.js'
          download 'https://copy.sh/v86/build/v86.wasm' '_site/vendor/v86/v86.wasm'
          download 'https://copy.sh/v86/bios/seabios.bin' '_site/vendor/v86/seabios.bin'
          download 'https://copy.sh/v86/bios/vgabios.bin' '_site/vendor/v86/vgabios.bin'
          download 'https://i.copy.sh/buildroot-bzimage68.bin' '_site/vendor/v86/images/buildroot-bzimage68.bin'
          download 'https://i.copy.sh/linux4.iso' '_site/vendor/v86/images/linux4.iso'
          download 'https://i.copy.sh/linux.iso' '_site/vendor/v86/images/linux.iso'
          download 'https://i.copy.sh/freedos722.img' '_site/vendor/v86/images/freedos722.img'

          if gh release download gorics-linux-gui-web-iso-latest \
            --repo "$GITHUB_REPOSITORY" \
            --pattern gorics-linux-gui-web-i386.iso \
            --dir _site/os/real-multiboot/assets; then
            echo 'full ISO release found; refreshing extracted direct-boot files'
            python3 os/real-multiboot/prepare-direct-deploy.py _site
          else
            echo 'full ISO release unavailable; using repository direct-boot files and CDN ISO chunks'
            test -s _site/os/real-multiboot/assets/vmlinuz
            test -s _site/os/real-multiboot/assets/initrd.img
            test -s _site/os/real-multiboot/assets/iso-meta.json
          fi

          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import re

          version = os.environ['DEPLOY_VERSION']
          site = pathlib.Path('_site')
          page = site / 'os' / 'real-multiboot'
          index = page / 'index.html'
          app = page / 'app.js'

          html = index.read_text(encoding='utf-8')
          html = re.sub(r'([?&]v=)[A-Za-z0-9._-]+', lambda m: m.group(1) + version, html)
          html = re.sub(r'(<meta name="gorics-build" content=")[^"]*', lambda m: m.group(1) + version, html)
          html = re.sub(
              r'(<meta name="gorics-deployment-marker" content=")[^"]*',
              lambda m: m.group(1) + 'GORICS Real Multiboot ' + version,
              html,
          )
          html = re.sub(
              r'(\[ready\] GORICS Real Multiboot )[A-Za-z0-9._-]+',
              lambda m: m.group(1) + version,
              html,
          )
          index.write_text(html, encoding='utf-8')

          app_text = app.read_text(encoding='utf-8')
          app_text, count = re.subn(
              r"const BUILD = '[^']+';",
              f"const BUILD = '{version}';",
              app_text,
              count=1,
          )
          if count != 1:
              raise SystemExit('app BUILD constant was not updated exactly once')
          app.write_text(app_text, encoding='utf-8')

          runtime_root = site / 'vendor' / 'v86'
          manifest = {'version': version, 'files': {}}
          for name in ('libv86.js', 'v86.wasm', 'seabios.bin', 'vgabios.bin'):
              data = (runtime_root / name).read_bytes()
              manifest['files'][name] = {
                  'size': len(data),
                  'sha256': hashlib.sha256(data).hexdigest(),
              }
          (runtime_root / 'manifest.json').write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')

          meta_path = page / 'assets' / 'iso-meta.json'
          meta = json.loads(meta_path.read_text(encoding='utf-8'))
          meta['page_version'] = version
          meta['deployment'] = 'atomic-v86-sanitized-r19'
          meta_path.write_text(json.dumps(meta, indent=2) + '\n', encoding='utf-8')

          deployment = {
              'version': version,
              'source_sha': os.environ['SOURCE_SHA'],
              'architecture': 'i386',
              'desktop': 'openbox-tint2-pcmanfm-xterm',
              'direct_boot': True,
              'atomic_v86_assets': True,
              'sanitized_pages_tree': True,
              'isolated_canonical_status': True,
              'iso_sha256': meta['sha256'],
              'runtime_manifest': manifest,
          }
          (page / 'assets' / 'deployment.json').write_text(json.dumps(deployment, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(deployment, indent=2))
          PY

      - name: Validate assembled deployment
        run: |
          set -euo pipefail
          node --check _site/os/real-multiboot/app.js
          node --check _site/os/real-multiboot/asset-versioning.js
          node --check _site/os/real-multiboot/safe-diagnostics.js
          node --check _site/os/real-multiboot/local-media-router.js
          node --check _site/os/real-multiboot/visibility-timeout-guard.js
          grep -q 'bzimage: { url: kernelUrl }' _site/os/real-multiboot/app.js
          grep -q 'systemd.unit=graphical.target' _site/os/real-multiboot/app.js
          grep -q 'asset-versioning.js?v=' _site/os/real-multiboot/index.html
          grep -q 'safe-diagnostics.js?v=' _site/os/real-multiboot/index.html
          grep -q 'visibility-timeout-guard.js?v=' _site/os/real-multiboot/index.html
          grep -q 'gorics-build' _site/os/real-multiboot/index.html
          test ! -d _site/.github
          test -z "$(find _site -type f -name '*.log' -print -quit)"
          test -s _site/vendor/v86/libv86.js
          test -s _site/vendor/v86/v86.wasm
          test -s _site/vendor/v86/seabios.bin
          test -s _site/vendor/v86/vgabios.bin
          test -s _site/vendor/v86/manifest.json
          test -s _site/vendor/v86/images/buildroot-bzimage68.bin
          test -s _site/vendor/v86/images/linux4.iso
          test -s _site/vendor/v86/images/linux.iso
          test -s _site/vendor/v86/images/freedos722.img
          test -s _site/os/real-multiboot/assets/vmlinuz
          test -s _site/os/real-multiboot/assets/initrd.img
          test -s _site/os/real-multiboot/assets/iso-meta.json
          test -s _site/os/real-multiboot/assets/deployment.json
          cmp -s _site/os/iso/r19-canonical-status.json _site/os/iso/real-multiboot-status.json
          test "$(du -sb _site | cut -f1)" -lt 1000000000

          node <<'JS'
          const fs = require('node:fs');
          const bytes = fs.readFileSync('_site/vendor/v86/v86.wasm');
          const module = new WebAssembly.Module(bytes);
          const exports = WebAssembly.Module.exports(module);
          if (!exports.some(entry => entry.name === 'memory' && entry.kind === 'memory')) {
            throw new Error(`v86.wasm does not export memory: ${JSON.stringify(exports.slice(0, 30))}`);
          }
          console.log('v86.wasm compiled and exports memory', bytes.length);
          JS

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify exact public deployment
        env:
          SOURCE_SHA: ${{ inputs.source_sha || github.sha }}
          DEPLOY_VERSION: ${{ inputs.source_sha || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          ROOT='https://gorics.github.io/website'
          PAGE="$ROOT/os/real-multiboot"
          ready=0
          for attempt in $(seq 1 60); do
            stamp="$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-$attempt-$(date +%s)"
            if curl -fsSL --max-time 45 -H 'Cache-Control: no-cache' "$PAGE/?verify=$stamp" -o /tmp/index.html \
              && grep -q 'asset-versioning.js?v=' /tmp/index.html \
              && grep -q 'gorics-build' /tmp/index.html \
              && curl -fsSL --max-time 45 "$PAGE/assets/deployment.json?v=$stamp" -o /tmp/deployment.json \
              && grep -q "\"source_sha\": \"${SOURCE_SHA}\"" /tmp/deployment.json \
              && grep -q "\"version\": \"${DEPLOY_VERSION}\"" /tmp/deployment.json \
              && grep -q '"isolated_canonical_status": true' /tmp/deployment.json \
              && curl -fsSL --max-time 45 "$ROOT/os/iso/real-multiboot-status.json?v=$stamp" -o /tmp/public-status.json \
              && curl -fsSL --max-time 45 "$ROOT/os/iso/r19-canonical-status.json?v=$stamp" -o /tmp/canonical-status.json \
              && cmp -s /tmp/public-status.json /tmp/canonical-status.json \
              && curl -fsSL --max-time 45 "$ROOT/vendor/v86/manifest.json?v=$stamp" -o /tmp/manifest.json \
              && grep -q 'v86.wasm' /tmp/manifest.json \
              && curl -fsSL --max-time 60 "$ROOT/vendor/v86/v86.wasm?v=$stamp" -o /tmp/v86.wasm \
              && curl -fsSL --max-time 60 "$PAGE/assets/vmlinuz?v=$stamp" -o /tmp/vmlinuz \
              && curl -fsSL --max-time 90 "$PAGE/assets/initrd.img?v=$stamp" -o /tmp/initrd.img \
              && test -s /tmp/v86.wasm \
              && test "$(stat -c %s /tmp/vmlinuz)" -gt 1000000 \
              && test "$(stat -c %s /tmp/initrd.img)" -gt 10000000; then
              ready=1
              break
            fi
            echo "public deployment pending attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1

          node <<'JS'
          const fs = require('node:fs');
          const bytes = fs.readFileSync('/tmp/v86.wasm');
          const module = new WebAssembly.Module(bytes);
          if (!WebAssembly.Module.exports(module).some(entry => entry.name === 'memory' && entry.kind === 'memory')) process.exit(1);
          JS

          code=$(curl -sS --max-time 60 -r 32768-36863 -o /tmp/iso-probe.bin -w '%{http_code}' \
            'https://cdn.jsdelivr.net/gh/gorics/website@os-assets/os/real-multiboot/assets/v86-parts/gorics-linux-gui-web-i386.iso-0-16777216')
          test "$code" = 206
          test "$(stat -c %s /tmp/iso-probe.bin)" = 4096
          python3 - <<'PY'
          from pathlib import Path
          data = Path('/tmp/iso-probe.bin').read_bytes()
          assert data[1:6] == b'CD001'
          assert data[2049:2054] == b'CD001'
          assert b'EL TORITO' in data[2055:2087]
          print('public ISO9660 and El Torito range verified')
          PY
