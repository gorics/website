name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build live site with local VM runtime
        shell: python
        run: |
          import pathlib, shutil, urllib.request
          build = pathlib.Path('_site')
          if build.exists():
              shutil.rmtree(build)
          shutil.copytree('.', build, ignore=shutil.ignore_patterns('.git', '_site'))
          (build / '.nojekyll').write_text('', encoding='utf-8')
          root = build / 'vendor' / 'v86'
          root.mkdir(parents=True, exist_ok=True)
          h = ''.join(['https://','co','py','.sh','/v86/'])
          files = {
              'libv86.js': h + 'build/libv86.js',
              'v86.wasm': h + 'build/v86.wasm',
              'seabios.bin': h + 'bios/seabios.bin',
              'vgabios.bin': h + 'bios/vgabios.bin',
          }
          for name, url in files.items():
              dst = root / name
              print('fetch', name)
              urllib.request.urlretrieve(url, dst)
              print(name, dst.stat().st_size)
          repl = {
              h + 'build/libv86.js': '/website/vendor/v86/libv86.js',
              h + 'build/v86.wasm': '/website/vendor/v86/v86.wasm',
              h + 'bios/seabios.bin': '/website/vendor/v86/seabios.bin',
              h + 'bios/vgabios.bin': '/website/vendor/v86/vgabios.bin',
          }
          for path in [
              build / 'os' / 'real-multiboot' / 'app.js',
              build / 'os' / 'real-os' / 'launcher.js',
              build / 'os' / 'window' / '2' / 'app.js',
              build / 'os' / 'runtime-real-os-launcher.js',
          ]:
              if path.exists():
                  text = path.read_text(encoding='utf-8')
                  for old, new in repl.items():
                      text = text.replace(old, new)
                  path.write_text(text, encoding='utf-8')
                  print('patched', path)

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          force_orphan: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
