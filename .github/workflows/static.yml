name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build live site with local VM runtime
        shell: python
        run: |
          import pathlib, shutil, urllib.request
          build = pathlib.Path('_site')
          if build.exists():
              shutil.rmtree(build)
          shutil.copytree('.', build, ignore=shutil.ignore_patterns('.git', '_site'))
          (build / '.nojekyll').write_text('', encoding='utf-8')
          root = build / 'vendor' / 'v86'
          imgroot = root / 'images'
          root.mkdir(parents=True, exist_ok=True)
          imgroot.mkdir(parents=True, exist_ok=True)
          h = ''.join(['https://','co','py','.sh','/v86/'])
          hi = ''.join(['https://','i.','co','py','.sh','/'])
          runtime_files = {
              'libv86.js': h + 'build/libv86.js',
              'v86.wasm': h + 'build/v86.wasm',
              'seabios.bin': h + 'bios/seabios.bin',
              'vgabios.bin': h + 'bios/vgabios.bin',
          }
          image_files = {
              'dsl-4.11.rc2.iso': hi + 'dsl-4.11.rc2.iso',
              'buildroot-bzimage68.bin': hi + 'buildroot-bzimage68.bin',
              'linux4.iso': hi + 'linux4.iso',
              'freedos722.img': hi + 'freedos722.img',
              'windows101.img': hi + 'windows101.img',
          }
          for name, url in runtime_files.items():
              dst = root / name
              print('fetch runtime', name)
              urllib.request.urlretrieve(url, dst)
              print(name, dst.stat().st_size)
          for name, url in image_files.items():
              dst = imgroot / name
              print('fetch image', name)
              urllib.request.urlretrieve(url, dst)
              print(name, dst.stat().st_size)
          repl = {
              h + 'build/libv86.js': '/website/vendor/v86/libv86.js',
              h + 'build/v86.wasm': '/website/vendor/v86/v86.wasm',
              h + 'bios/seabios.bin': '/website/vendor/v86/seabios.bin',
              h + 'bios/vgabios.bin': '/website/vendor/v86/vgabios.bin',
          }
          for name in image_files:
              repl[hi + name] = '/website/vendor/v86/images/' + name
          for path in build.rglob('*'):
              if not path.is_file() or path.suffix.lower() not in {'.html', '.js'}:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              old_text = text
              for old, new in repl.items():
                  text = text.replace(old, new)
              if text != old_text:
                  path.write_text(text, encoding='utf-8')
                  print('patched', path)

      - name: Add tested browser ISO to site
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEST=_site/os/real-multiboot/assets
          mkdir -p "$DEST"
          gh release download gorics-linux-gui-web-iso-latest \
            --repo "$GITHUB_REPOSITORY" \
            --pattern gorics-linux-gui-web-i386.iso \
            --dir "$DEST"
          python3 - <<'PY'
          import hashlib, json
          from pathlib import Path
          iso = Path('_site/os/real-multiboot/assets/gorics-linux-gui-web-i386.iso')
          if not iso.is_file():
              raise SystemExit('tested i386 web ISO missing')
          size = iso.stat().st_size
          if size >= 900_000_000:
              raise SystemExit(f'web ISO too large for Pages: {size}')
          h = hashlib.sha256()
          with iso.open('rb') as f:
              for block in iter(lambda: f.read(1024 * 1024), b''):
                  h.update(block)
          meta = {
              'name': iso.name,
              'architecture': 'i386',
              'size': size,
              'sha256': h.hexdigest(),
              'source': 'i686-qemu-tested-release',
          }
          iso.with_name('iso-meta.json').write_text(
              json.dumps(meta, indent=2) + '\n', encoding='utf-8'
          )
          print(meta)
          PY
          sed -i 's/gorics-linux-gui-web-amd64.iso/gorics-linux-gui-web-i386.iso/g' _site/os/real-multiboot/app.js
          sed -i 's/?v=i/?v=k/g; s/page. i/page. k/g' _site/os/real-multiboot/index.html
          grep -q 'gorics-linux-gui-web-i386.iso' _site/os/real-multiboot/app.js
          grep -q 'app.js?v=k' _site/os/real-multiboot/index.html
          test "$(du -sb _site | cut -f1)" -lt 1000000000
          du -sh _site "$DEST"/*

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
