name: Verify Real Multiboot V6

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - 'os/real-multiboot/**'

permissions:
  contents: write

concurrency:
  group: verify-real-multiboot-v6
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium verifier
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify public assets and graphical boot
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?v6=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cat > verify-real-multiboot-v6.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const base = 'https://gorics.github.io/website';
          const pageUrl = process.env.VERIFY_URL;
          const stamp = `${process.env.GITHUB_RUN_ID}-${Date.now()}`;
          const result = {
            success: false,
            state: 'running',
            run_id: process.env.GITHUB_RUN_ID,
            run_attempt: process.env.GITHUB_RUN_ATTEMPT,
            url: pageUrl,
            architecture: 'i386',
            desktop: 'openbox-tint2-pcmanfm-xterm',
            checks: {},
            console: [],
            failed_requests: [],
            started_at: new Date().toISOString(),
          };

          const ascii = (bytes, start, length) => String.fromCharCode(...bytes.slice(start, start + length));

          async function fetchBytes(url, init = {}) {
            const response = await fetch(url, { cache: 'no-store', ...init });
            const bytes = new Uint8Array(await response.arrayBuffer());
            return { response, bytes };
          }

          function requireChecks(stage) {
            const failed = Object.entries(result.checks).filter(([, value]) => !value).map(([name]) => name);
            if (failed.length) throw new Error(`${stage} failed checks: ${failed.join(', ')}`);
          }

          let browser;
          let page;
          try {
            const indexResponse = await fetch(`${base}/os/real-multiboot/?verify=${stamp}`, { cache: 'no-store' });
            const index = await indexResponse.text();
            result.checks.index_http = indexResponse.status === 200;
            result.checks.index_multiboot = index.includes('GORICS Real Multiboot');
            result.checks.index_version = index.includes('app.js?v=n') && index.includes('ISO page. n');
            result.checks.index_responsive = index.includes('responsive-overrides.css?v=n') && index.includes('responsive.js?v=n');
            result.checks.index_presets = ['gorics', 'buildroot', 'dsl', 'tiny', 'freedos', 'buildroot-serial', 'dsl-high'].every(id => index.includes(`value="${id}"`));

            const appResponse = await fetch(`${base}/os/real-multiboot/app.js?verify=${stamp}`, { cache: 'no-store' });
            const app = await appResponse.text();
            result.checks.app_http = appResponse.status === 200;
            result.checks.app_i386 = app.includes('gorics-linux-gui-web-i386.iso');
            result.checks.app_direct_boot = app.includes('bzimage: { url: kernelUrl }') && app.includes('initrd: { url: initrdUrl }') && app.includes('systemd.unit=graphical.target');
            result.checks.app_graphical_gate = app.includes('graphicalReady') && app.includes('canvasWidth');

            const metaResponse = await fetch(`${base}/os/real-multiboot/assets/iso-meta.json?verify=${stamp}`, { cache: 'no-store' });
            const meta = await metaResponse.json();
            result.meta = meta;
            result.checks.meta_http = metaResponse.status === 200;
            result.checks.meta_identity = meta.name === 'gorics-linux-gui-web-i386.iso' && meta.architecture === 'i386';
            result.checks.meta_desktop = ['openbox-tint2-pcmanfm-xterm', 'direct-xorg-openbox'].includes(meta.desktop);
            result.checks.meta_direct = meta.direct_boot === true;
            result.checks.meta_chunks = meta.chunk_size === 16777216 && Number.isInteger(meta.parts) && meta.parts > 0 && meta.size > 0;
            result.checks.meta_boot_files = meta.kernel?.size > 1_000_000 && meta.initrd?.size > 10_000_000;

            const runtime = await fetchBytes(`${base}/vendor/v86/libv86.js?verify=${stamp}`);
            result.checks.runtime = runtime.response.status === 200 && runtime.bytes.length > 100_000;
            const wasm = await fetchBytes(`${base}/vendor/v86/v86.wasm?verify=${stamp}`, { headers: { Range: 'bytes=0-4095' } });
            result.checks.wasm = [200, 206].includes(wasm.response.status) && wasm.bytes.length >= 4096;
            const kernel = await fetchBytes(`${base}/os/real-multiboot/assets/vmlinuz?verify=${stamp}`, { headers: { Range: 'bytes=0-4095' } });
            result.checks.kernel_range = kernel.response.status === 206 && kernel.bytes.length === 4096;
            const initrd = await fetchBytes(`${base}/os/real-multiboot/assets/initrd.img?verify=${stamp}`, { headers: { Range: 'bytes=0-4095' } });
            result.checks.initrd_range = initrd.response.status === 206 && initrd.bytes.length === 4096;
            const iso = await fetchBytes(`${base}/os/real-multiboot/assets/gorics-linux-gui-web-i386.iso?verify=${stamp}`, { headers: { Range: 'bytes=32768-36863' } });
            result.checks.iso_range = iso.response.status === 206 && iso.bytes.length === 4096;
            result.checks.iso9660 = ascii(iso.bytes, 1, 5) === 'CD001';
            result.checks.el_torito = ascii(iso.bytes, 2049, 5) === 'CD001' && ascii(iso.bytes, 2055, 32).includes('EL TORITO');
            requireChecks('public preflight');

            browser = await chromium.launch({
              headless: true,
              args: ['--disable-dev-shm-usage', '--no-sandbox'],
            });
            page = await browser.newPage({
              viewport: { width: 412, height: 915 },
              userAgent: 'Mozilla/5.0 (Linux; Android 15; GORICSVerifierV6) AppleWebKit/537.36 Chrome/149 Mobile Safari/537.36',
            });
            page.setDefaultTimeout(120000);
            page.on('console', message => result.console.push(`${message.type()}: ${message.text()}`));
            page.on('pageerror', error => result.console.push(`pageerror: ${error.message}`));
            page.on('requestfailed', request => result.failed_requests.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));

            await page.goto(pageUrl, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForSelector('#boot-btn:not([disabled])');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('ready build='));
            await page.click('#boot-btn');
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              if (log.includes('[ERROR]') || log.includes('ERROR preset=')) throw new Error(log.split('\n').slice(-30).join('\n'));
              return log.includes('ISO9660 and El Torito verified');
            }, null, { timeout: 300000 });
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              if (log.includes('ERROR preset=')) throw new Error(log.split('\n').slice(-30).join('\n'));
              return log.includes('v86 runtime loaded and constructor detected') || log.includes('v86 runtime already available');
            }, null, { timeout: 300000 });
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              if (log.includes('ERROR preset=')) throw new Error(log.split('\n').slice(-40).join('\n'));
              return log.includes('emulator-started');
            }, null, { timeout: 600000 });
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              if (log.includes('ERROR preset=')) throw new Error(log.split('\n').slice(-60).join('\n'));
              const canvas = document.querySelector('#screen canvas');
              return canvas && canvas.width >= 640 && canvas.height >= 480 && getComputedStyle(canvas).display !== 'none';
            }, null, { timeout: 900000 });
            await page.waitForTimeout(10000);

            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const log = document.querySelector('#log')?.textContent || '';
              return {
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                selected_preset: document.querySelector('#os-select')?.value || '',
                boot_button_text: document.querySelector('#boot-btn')?.textContent || '',
                progress_text: document.querySelector('#progress-percent')?.textContent || '',
                log_tail: log.split('\n').slice(-240),
              };
            });
            Object.assign(result, details);
            result.checks.browser_canvas = details.canvas_width >= 640 && details.canvas_height >= 480 && details.canvas_display !== 'none';
            result.checks.browser_running = details.screen_active && details.selected_preset === 'gorics';
            requireChecks('browser graphical boot');
            result.success = true;
            result.state = 'completed';
            await page.screenshot({ path: '/tmp/real-multiboot-v6-proof.png', fullPage: true });
          } catch (error) {
            result.state = 'failed';
            result.error = error?.stack || String(error);
            if (page) {
              const log = await page.locator('#log').textContent().catch(() => '');
              result.log_tail = (log || '').split('\n').slice(-260);
              result.page_url = page.url();
              await page.screenshot({ path: '/tmp/real-multiboot-v6-proof.png', fullPage: true }).catch(() => {});
            }
          } finally {
            result.completed_at = new Date().toISOString();
            await browser?.close().catch(() => {});
            fs.writeFileSync('/tmp/real-multiboot-v6.json', JSON.stringify(result, null, 2) + '\n');
          }
          if (!result.success) process.exit(1);
          JS

          set +e
          node ./verify-real-multiboot-v6.mjs 2>&1 | tee /tmp/real-multiboot-v6.log
          VERIFY_EXIT=${PIPESTATUS[0]}
          set -e
          if test -s /tmp/real-multiboot-v6.json; then cat /tmp/real-multiboot-v6.json; fi
          exit "$VERIFY_EXIT"

      - name: Upload verification proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-multiboot-v6-${{ github.run_id }}
          path: |
            /tmp/real-multiboot-v6.json
            /tmp/real-multiboot-v6.log
            /tmp/real-multiboot-v6-proof.png
          if-no-files-found: warn

      - name: Record verification result
        if: always()
        run: |
          if test ! -s /tmp/real-multiboot-v6.json; then
            printf '{"success":false,"state":"no-result","run_id":"%s","error":"V6 verifier did not produce a result"}\n' "$GITHUB_RUN_ID" > /tmp/real-multiboot-v6.json
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/real-multiboot-v6.json os/iso/real-multiboot-v6-status.json
          git add os/iso/real-multiboot-v6-status.json
          git commit -m 'Record real multiboot V6 verification [skip ci]' || true
          git push origin HEAD:main

      - name: Require complete success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('/tmp/real-multiboot-v6.json').read_text())
          print(json.dumps(result, indent=2))
          if not result.get('success'):
              raise SystemExit('real multiboot V6 verification failed')
          PY
