name: Verify Resilient Router R3X

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-resilient-router-r3x.yml'
      - 'os/real-multiboot/index.html'
      - 'os/real-multiboot/chunk-router-v3.js'
      - 'os/real-multiboot/app.js'

permissions:
  contents: write

concurrency:
  group: verify-resilient-router-r3x
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify source syntax and wiring
        run: |
          set -euo pipefail
          node --check os/real-multiboot/chunk-router-v3.js
          node --check os/real-multiboot/app.js
          grep -q 'chunk-router-v3.js?v=20260708-r3x' os/real-multiboot/index.html
          grep -q 'ISO chunk resilient router v3 installed' os/real-multiboot/chunk-router-v3.js
          grep -q 'cdn.statically.io' os/real-multiboot/chunk-router-v3.js
          grep -q 'raw.githubusercontent.com' os/real-multiboot/chunk-router-v3.js

      - name: Wait for public r3x deployment
        run: |
          set -euo pipefail
          PAGE='https://gorics.github.io/website/os/real-multiboot/'
          READY=0
          for attempt in $(seq 1 120); do
            stamp="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 -H 'Cache-Control: no-cache' "${PAGE}?r3x=${stamp}" -o /tmp/index.html \
              && grep -q 'chunk-router-v3.js?v=20260708-r3x' /tmp/index.html \
              && curl -fsSL --max-time 60 -H 'Cache-Control: no-cache' "${PAGE}chunk-router-v3.js?r3x=${stamp}" -o /tmp/router.js \
              && grep -q 'ISO chunk resilient router v3 installed' /tmp/router.js; then
              READY=1
              break
            fi
            sleep 10
          done
          test "$READY" = 1
          node --check /tmp/router.js

      - name: Probe first and final ISO chunks
        run: |
          set -euo pipefail
          ROOTS=(
            'https://cdn.jsdelivr.net/gh/gorics/website@os-assets/os/real-multiboot/assets/v86-parts'
            'https://cdn.statically.io/gh/gorics/website/os-assets/os/real-multiboot/assets/v86-parts'
            'https://raw.githubusercontent.com/gorics/website/os-assets/os/real-multiboot/assets/v86-parts'
          )
          FIRST='gorics-linux-gui-web-i386.iso-0-16777216'
          LAST='gorics-linux-gui-web-i386.iso-335544320-352321536'
          HEALTHY=0
          for root in "${ROOTS[@]}"; do
            first_code=$(curl -sS -L --max-time 90 -r 32768-36863 -o /tmp/first.bin -w '%{http_code}' "$root/$FIRST?r3x=$GITHUB_RUN_ID" || true)
            last_code=$(curl -sS -L --max-time 90 -r 0-4095 -o /tmp/last.bin -w '%{http_code}' "$root/$LAST?r3x=$GITHUB_RUN_ID" || true)
            first_size=$(stat -c %s /tmp/first.bin 2>/dev/null || echo 0)
            last_size=$(stat -c %s /tmp/last.bin 2>/dev/null || echo 0)
            if { test "$first_code" = 200 || test "$first_code" = 206; } \
              && { test "$last_code" = 200 || test "$last_code" = 206; } \
              && test "$first_size" -ge 4096 \
              && test "$last_size" -ge 4096; then
              python3 - <<'PY'
          from pathlib import Path
          data = Path('/tmp/first.bin').read_bytes()
          if len(data) >= 36864:
              data = data[32768:36864]
          assert len(data) >= 4096
          assert data[1:6] == b'CD001'
          assert data[2049:2054] == b'CD001'
          assert b'EL TORITO' in data[2055:2087]
          PY
              echo "healthy ISO source: $root"
              HEALTHY=1
              break
            fi
            echo "source unavailable: $root first=$first_code/$first_size last=$last_code/$last_size"
          done
          test "$HEALTHY" = 1

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot public Linux GUI and reject CD-ROM errors
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?r3x-browser=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          mkdir -p /tmp/r3x-proof
          cat > /tmp/verify-r3x.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const output = '/tmp/r3x-proof/result.json';
          const fatal = /I\/O error, dev sr0|Buffer I\/O error on dev sr0|SQUASHFS error|unable to find a medium containing a live file system/i;
          const result = {
            success: false,
            state: 'starting',
            run_id: process.env.GITHUB_RUN_ID,
            target: process.env.TARGET_URL,
            started_at: new Date().toISOString(),
            console: [],
            page_errors: [],
            failed_requests: [],
          };
          const save = (state, extra = {}) => {
            Object.assign(result, extra, { state, updated_at: new Date().toISOString() });
            fs.writeFileSync(output, JSON.stringify(result, null, 2) + '\n');
          };
          save('starting');

          let browser;
          let page;
          try {
            browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-background-timer-throttling', '--disable-renderer-backgrounding'],
            });
            const context = await browser.newContext({ viewport: { width: 1280, height: 900 } });
            page = await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console', message => {
              result.console.push(`${message.type()}: ${message.text()}`);
              if (result.console.length > 1200) result.console.shift();
            });
            page.on('pageerror', error => result.page_errors.push(String(error)));
            page.on('requestfailed', request => result.failed_requests.push({
              url: request.url(),
              error: request.failure()?.errorText || 'failed',
            }));

            const response = await page.goto(process.env.TARGET_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            save('page-opened', { page_http: response?.status() || null });
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              return log.includes('20260708-r3x')
                && log.includes('ISO chunk resilient router v3 installed')
                && Boolean(document.querySelector('#boot-btn'));
            }, null, { timeout: 300000 });
            await page.screenshot({ path: '/tmp/r3x-proof/00-ready.png', fullPage: true });
            await page.click('#boot-btn');
            save('boot-clicked');

            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              if (/I\/O error, dev sr0|Buffer I\/O error on dev sr0|SQUASHFS error|unable to find a medium containing a live file system/i.test(log)) return 'fatal';
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              if (canvas
                && canvas.width >= 640
                && canvas.height >= 480
                && getComputedStyle(canvas).display !== 'none'
                && (!text || getComputedStyle(text).display === 'none')
                && log.includes('emulator-started')) return 'gui';
              return false;
            }, null, { timeout: 1200000 });

            let currentLog = await page.locator('#log').textContent() || '';
            if (fatal.test(currentLog)) throw new Error('fatal CD-ROM read error detected before GUI');
            await page.waitForTimeout(60000);
            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              const log = document.querySelector('#log')?.textContent || '';
              return {
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_display: text ? getComputedStyle(text).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                boot_button_text: document.querySelector('#boot-btn')?.textContent || '',
                stop_button_disabled: document.querySelector('#stop-btn')?.disabled ?? null,
                emulator_object_present: Boolean(window.goricsRealLinuxIso),
                router_loaded: log.includes('ISO chunk resilient router v3 installed'),
                chunk_route_observed: log.includes('ISO chunk route') || log.includes('selected ISO chunk source'),
                emulator_started: log.includes('emulator-started'),
                first_chunk_verified: log.includes('ISO9660') && log.includes('El Torito'),
                sr0_error_observed: /I\/O error, dev sr0|Buffer I\/O error on dev sr0/i.test(log),
                squashfs_error_observed: /SQUASHFS error/i.test(log),
                log_tail: log.split('\n').slice(-1000),
              };
            });
            currentLog = details.log_tail.join('\n');
            if (fatal.test(currentLog)) throw new Error('fatal CD-ROM read error detected after GUI');
            await page.screenshot({ path: '/tmp/r3x-proof/99-gui.png', fullPage: true });
            const canvas = page.locator('#screen canvas');
            if (await canvas.count()) await canvas.screenshot({ path: '/tmp/r3x-proof/99-canvas.png' }).catch(() => {});

            const success = details.canvas_width >= 640
              && details.canvas_height >= 480
              && details.canvas_display !== 'none'
              && details.text_display === 'none'
              && details.screen_active
              && details.boot_button_text === 'Running'
              && details.stop_button_disabled === false
              && details.emulator_object_present
              && details.router_loaded
              && details.chunk_route_observed
              && details.emulator_started
              && details.first_chunk_verified
              && !details.sr0_error_observed
              && !details.squashfs_error_observed;
            save('completed', { ...details, success, completed_at: new Date().toISOString() });
            if (!success) throw new Error('r3x GUI assertions failed');
          } catch (error) {
            let details = {};
            try {
              details = await page?.evaluate(() => {
                const log = document.querySelector('#log')?.textContent || '';
                const canvas = document.querySelector('#screen canvas');
                return {
                  canvas_width: canvas?.width || 0,
                  canvas_height: canvas?.height || 0,
                  log_tail: log.split('\n').slice(-1200),
                };
              }) || {};
              await page?.screenshot({ path: '/tmp/r3x-proof/99-failure.png', fullPage: true });
            } catch {}
            save('failed', { ...details, success: false, error: String(error?.stack || error), completed_at: new Date().toISOString() });
            throw error;
          } finally {
            await browser?.close().catch(() => {});
          }
          JS
          node --check /tmp/verify-r3x.mjs
          node /tmp/verify-r3x.mjs

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resilient-router-r3x-proof-${{ github.run_id }}
          path: /tmp/r3x-proof/
          if-no-files-found: warn

      - name: Record final result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if test -s /tmp/r3x-proof/result.json; then
            cp /tmp/r3x-proof/result.json /tmp/r3x-result.json
          else
            printf '{"success":false,"state":"workflow-failed-before-browser","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/r3x-result.json
          fi
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          path = Path('/tmp/r3x-result.json')
          data = json.loads(path.read_text())
          data['job_status'] = os.environ.get('JOB_STATUS')
          data['workflow_sha'] = os.environ.get('GITHUB_SHA')
          path.write_text(json.dumps(data, indent=2) + '\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 15); do
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p os/iso
            cp /tmp/r3x-result.json os/iso/resilient-router-r3x-result.json
            git add os/iso/resilient-router-r3x-result.json
            git commit -m 'Record resilient router r3x verification [skip ci]' || exit 0
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 3))
          done
          exit 1
