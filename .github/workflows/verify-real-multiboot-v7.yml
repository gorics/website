name: Verify Real Multiboot V7

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - 'os/real-multiboot/**'

permissions:
  contents: write

concurrency:
  group: verify-real-multiboot-v7
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify current public files and CDN ISO chunk
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/os/real-multiboot'
          STAMP="${GITHUB_RUN_ID}-$(date +%s)"
          curl -fsSL --max-time 60 "$BASE/?v7=$STAMP" -o /tmp/v7-index.html
          grep -q 'GORICS Real Multiboot' /tmp/v7-index.html
          grep -q 'responsive-overrides.css?v=' /tmp/v7-index.html
          grep -q 'responsive.js?v=' /tmp/v7-index.html
          for preset in gorics buildroot dsl tiny freedos buildroot-serial dsl-high; do
            grep -q "value=\"$preset\"" /tmp/v7-index.html
          done
          curl -fsSL --max-time 60 "$BASE/app.js?v7=$STAMP" -o /tmp/v7-app.js
          node --check /tmp/v7-app.js
          grep -q 'gorics-linux-gui-web-i386.iso' /tmp/v7-app.js
          grep -q 'GORICS_GUI_READY' /tmp/v7-app.js
          curl -fsSL --max-time 60 "$BASE/assets/iso-meta.json?v7=$STAMP" -o /tmp/v7-meta.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          meta=json.loads(Path('/tmp/v7-meta.json').read_text())
          assert meta['name']=='gorics-linux-gui-web-i386.iso'
          assert meta['architecture']=='i386'
          assert meta['chunk_size']==16777216
          assert meta['parts']==21
          assert meta['size']==339738624
          assert meta['kernel']['size'] > 1_000_000
          assert meta['initrd']['size'] > 10_000_000
          print(json.dumps(meta, indent=2))
          PY
          CHUNK='https://cdn.jsdelivr.net/gh/gorics/website@os-assets/os/real-multiboot/assets/v86-parts/gorics-linux-gui-web-i386-0-16777216.iso'
          curl -fsSL --retry 3 --retry-all-errors --max-time 180 "$CHUNK?v7=$STAMP" -o /tmp/v7-first-chunk.iso
          test "$(stat -c %s /tmp/v7-first-chunk.iso)" = 16777216
          python3 - <<'PY'
          from pathlib import Path
          data=Path('/tmp/v7-first-chunk.iso').read_bytes()
          assert data[32769:32774] == b'CD001'
          assert data[34817:34822] == b'CD001'
          assert b'EL TORITO' in data[34823:34855]
          print('first CDN chunk: ISO9660 and El Torito verified')
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot current GORICS GUI and verify all-device layout
        id: browser
        continue-on-error: true
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?v7-proof=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cat > verify-real-multiboot-v7.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const target = process.env.TARGET_URL;
          const startedAt = Date.now();
          const proof = '/tmp/real-multiboot-v7-proof';
          fs.mkdirSync(proof, { recursive: true });
          const result = {
            run_id: process.env.GITHUB_RUN_ID,
            target,
            started_at: new Date().toISOString(),
            success: false,
            gui_ready: false,
            xorg_ready: false,
            emulator_started: false,
            graphical_canvas: false,
            responsive: {},
            screen_sizes: [],
            console: [],
            page_errors: [],
            failed_requests: [],
            log_tail: '',
          };

          const browser = await chromium.launch({
            headless: true,
            args: [
              '--disable-dev-shm-usage',
              '--no-sandbox',
              '--disable-background-timer-throttling',
              '--disable-renderer-backgrounding',
              '--disable-backgrounding-occluded-windows',
              '--js-flags=--max-old-space-size=2048',
            ],
          });
          const context = await browser.newContext({ viewport: { width: 1440, height: 1000 }, deviceScaleFactor: 1 });
          const page = await context.newPage();
          page.setDefaultTimeout(120_000);
          page.on('console', message => {
            const text = `${message.type()}: ${message.text()}`;
            result.console.push(text);
            if (result.console.length > 1500) result.console.shift();
            console.log('[browser]', text);
          });
          page.on('pageerror', error => {
            result.page_errors.push(String(error));
            console.error('[pageerror]', error);
          });
          page.on('requestfailed', request => {
            const text = `${request.url()} :: ${request.failure()?.errorText || 'failed'}`;
            result.failed_requests.push(text);
            if (result.failed_requests.length > 600) result.failed_requests.shift();
            console.error('[requestfailed]', text);
          });

          try {
            for (const width of [320, 375, 768, 1024, 1440]) {
              await page.setViewportSize({ width, height: width < 600 ? 844 : 1000 });
              await page.goto(`${target}&layout=${width}`, { waitUntil: 'domcontentloaded', timeout: 120_000 });
              await page.waitForSelector('#boot-btn');
              const layout = await page.evaluate(() => {
                const root = document.documentElement;
                const app = document.querySelector('.iso-app');
                const panel = document.querySelector('.control-panel');
                const screen = document.querySelector('#screen-wrap');
                const rect = node => node ? ({ left: node.getBoundingClientRect().left, right: node.getBoundingClientRect().right, width: node.getBoundingClientRect().width }) : null;
                return {
                  viewport: innerWidth,
                  scroll_width: root.scrollWidth,
                  app: rect(app),
                  panel: rect(panel),
                  screen: rect(screen),
                  boot_visible: Boolean(document.querySelector('#boot-btn')?.offsetParent),
                };
              });
              layout.pass = layout.boot_visible
                && layout.scroll_width <= layout.viewport + 2
                && layout.app?.left >= -1
                && layout.app?.right <= layout.viewport + 1
                && layout.panel?.right <= layout.viewport + 1
                && layout.screen?.right <= layout.viewport + 1;
              result.responsive[String(width)] = layout;
              await page.screenshot({ path: `${proof}/layout-${width}.png`, fullPage: true });
              if (!layout.pass) throw new Error(`responsive layout failed at ${width}px: ${JSON.stringify(layout)}`);
            }

            await page.setViewportSize({ width: 1440, height: 1000 });
            const response = await page.goto(`${target}&boot=1`, { waitUntil: 'domcontentloaded', timeout: 120_000 });
            result.page_http = response?.status() || null;
            await page.waitForSelector('#boot-btn:not([disabled])', { timeout: 60_000 });
            const initial = await page.locator('#log').innerText();
            if (!initial.includes('GORICS Real Multiboot')) throw new Error(`unexpected public multiboot log: ${initial}`);
            await page.screenshot({ path: `${proof}/00-before-boot.png`, fullPage: true });
            await page.click('#boot-btn');

            let lastScreenshot = 0;
            let previousLog = '';
            const deadline = Date.now() + 18 * 60_000;
            while (Date.now() < deadline) {
              await page.waitForTimeout(5000);
              const log = await page.locator('#log').innerText().catch(() => '');
              result.log_tail = log.slice(-40_000);
              if (log !== previousLog) {
                console.log('--- LOG TAIL ---\n' + log.slice(-7000));
                previousLog = log;
              }
              if (log.includes('emulator-started')) result.emulator_started = true;
              if (log.includes('GORICS_XORG_READY')) result.xorg_ready = true;
              if (log.includes('GORICS_WEB_GUI_READY')) result.gui_ready = true;

              const details = await page.evaluate(() => {
                const canvas = document.querySelector('#screen canvas');
                const text = document.querySelector('#screen > div');
                const screen = document.querySelector('#screen');
                return {
                  canvas_width: canvas?.width || 0,
                  canvas_height: canvas?.height || 0,
                  canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                  text_display: text ? getComputedStyle(text).display : 'missing',
                  screen_active: screen?.classList.contains('active') || false,
                  stage: document.querySelector('#stage-label')?.textContent || '',
                  percent: document.querySelector('#progress-percent')?.textContent || '',
                };
              });
              result.canvas = details;
              result.graphical_canvas = details.canvas_width >= 640
                && details.canvas_height >= 480
                && details.canvas_display !== 'none'
                && details.text_display === 'none';
              result.screen_active = details.screen_active;

              const matches = [...log.matchAll(/screen-set-size\s+(\[[^\n]+\])/g)].map(match => match[1]);
              result.screen_sizes = [...new Set(matches)].slice(-20);

              if (result.gui_ready && result.xorg_ready && result.emulator_started && result.graphical_canvas && result.screen_active) {
                result.success = true;
                break;
              }
              if (/ERROR preset=|download-error|GORICS_WEB_GUI_FAILED|GORICS_XORG_FAILED|GORICS_XORG_TIMEOUT/.test(log)) {
                throw new Error('fatal marker in current multiboot browser log');
              }
              const elapsed = Date.now() - startedAt;
              if (elapsed - lastScreenshot >= 120_000) {
                lastScreenshot = elapsed;
                await page.screenshot({ path: `${proof}/progress-${Math.floor(elapsed / 1000)}s.png`, fullPage: true });
              }
            }
            if (!result.success) throw new Error('current Real Multiboot graphical Openbox readiness timeout');
            await page.waitForTimeout(15_000);
            await page.screenshot({ path: `${proof}/99-openbox-ready.png`, fullPage: true });
            const canvas = page.locator('#screen canvas');
            if (await canvas.count()) await canvas.screenshot({ path: `${proof}/99-screen-canvas.png` }).catch(() => {});
          } catch (error) {
            result.error = String(error?.stack || error);
            await page.screenshot({ path: `${proof}/99-failure.png`, fullPage: true }).catch(() => {});
          } finally {
            result.finished_at = new Date().toISOString();
            result.duration_seconds = Math.round((Date.now() - startedAt) / 1000);
            fs.writeFileSync(`${proof}/result.json`, JSON.stringify(result, null, 2) + '\n');
            fs.writeFileSync(`${proof}/log.txt`, result.log_tail || '');
            console.log(JSON.stringify(result, null, 2));
            await browser.close();
          }
          if (!result.success) process.exit(1);
          JS
          node --check verify-real-multiboot-v7.mjs
          rm -rf /tmp/real-multiboot-v7-proof
          mkdir -p /tmp/real-multiboot-v7-proof
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 22m node ./verify-real-multiboot-v7.mjs 2>&1 | tee /tmp/real-multiboot-v7-proof/runner.log

      - name: Upload V7 proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-multiboot-v7-proof-${{ github.run_id }}
          path: /tmp/real-multiboot-v7-proof/
          if-no-files-found: warn

      - name: Record V7 result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          if test -s /tmp/real-multiboot-v7-proof/result.json; then
            cp /tmp/real-multiboot-v7-proof/result.json /tmp/v7-status.json
          else
            printf '{"success":false,"state":"no-result","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/v7-status.json
          fi
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          p=Path('/tmp/v7-status.json')
          d=json.loads(p.read_text())
          d['version']='v7'
          d['job_status']=os.environ.get('JOB_STATUS')
          d['workflow_sha']=os.environ.get('GITHUB_SHA')
          p.write_text(json.dumps(d,indent=2)+'\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 15); do
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/v7-status.json os/iso/real-multiboot-v7-status.json
            git add os/iso/real-multiboot-v7-status.json
            git commit -m 'Record real multiboot V7 result [skip ci]' || break
            if git push origin HEAD:main; then break; fi
            sleep $((attempt*3))
          done

      - name: Require V7 success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path('/tmp/v7-status.json').read_text())
          print(json.dumps(d,indent=2))
          assert d.get('success') is True
          assert d.get('emulator_started') is True
          assert d.get('xorg_ready') is True
          assert d.get('gui_ready') is True
          assert d.get('graphical_canvas') is True
          assert d.get('screen_active') is True
          assert all(v.get('pass') for v in d.get('responsive',{}).values())
          PY
