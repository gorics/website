name: Verify r4x Final Openbox

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-r4x-final.yml'
      - 'os/real-multiboot/index.html'
      - 'os/real-multiboot/app.js'
      - 'os/real-multiboot/chunk-router-v4.js'
      - 'os/real-multiboot/assets/iso-meta.json'

permissions:
  contents: write

concurrency:
  group: verify-r4x-final-openbox
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record r4x verification start
        run: |
          printf '{"success":false,"state":"running","version":"r4x","run_id":"%s","started_at":"%s"}\n' "$GITHUB_RUN_ID" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/r4x-status.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/r4x-status.json os/iso/r4x-final-status.json
          git add os/iso/r4x-final-status.json
          git commit -m 'Record r4x verification start [skip ci]' || true
          git push origin HEAD:main

      - name: Wait for exact public r4x deployment
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/os/real-multiboot'
          ready=0
          for attempt in $(seq 1 120); do
            stamp="${GITHUB_RUN_ID}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 "$BASE/?r4x=$stamp" -o /tmp/index.html \
              && grep -q 'ISO page. 20260708-r4x' /tmp/index.html \
              && grep -q 'chunk-router-v4.js?v=20260708-r4x' /tmp/index.html \
              && grep -q 'app.js?v=20260708-r4x' /tmp/index.html \
              && curl -fsSL --max-time 60 "$BASE/chunk-router-v4.js?r4x=$stamp" -o /tmp/router.js \
              && grep -q 'fetch-backed multi-CDN' /tmp/router.js \
              && grep -q 'ISO9660 and El Torito verified' /tmp/router.js \
              && curl -fsSL --max-time 60 "$BASE/app.js?r4x=$stamp" -o /tmp/app.js \
              && grep -q 'fixed_chunk_size' /tmp/app.js; then
              ready=1
              break
            fi
            echo "r4x not deployed attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1
          node --check /tmp/router.js
          node --check /tmp/app.js

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Build r4x verifier
        run: |
          cp scripts/verify-public-q-v86.mjs /tmp/verify-r4x.mjs
          python3 - <<'PY'
          from pathlib import Path
          p=Path('/tmp/verify-r4x.mjs')
          s=p.read_text()
          s=s.replace("initial.includes('page. q')", "initial.includes('page. 20260708-r4x')")
          s=s.replace('00-page-q.png', '00-page-r4x.png')
          s=s.replace('public q graphical Openbox readiness timeout', 'public r4x graphical Openbox readiness timeout')
          s=s.replace("fs.mkdirSync('browser-proof'", "fs.mkdirSync('/tmp/r4x-proof'")
          s=s.replace("'browser-proof/", "'/tmp/r4x-proof/")
          p.write_text(s)
          PY
          node --check /tmp/verify-r4x.mjs

      - name: Boot current r4x Linux GUI
        id: browser
        continue-on-error: true
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?r4x-proof=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          rm -rf /tmp/r4x-proof
          mkdir -p /tmp/r4x-proof
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 22m node /tmp/verify-r4x.mjs 2>&1 | tee /tmp/r4x-proof/runner.log

      - name: Upload r4x proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r4x-final-proof-${{ github.run_id }}
          path: /tmp/r4x-proof/
          if-no-files-found: warn

      - name: Record r4x result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          if test -s /tmp/r4x-proof/result.json; then
            cp /tmp/r4x-proof/result.json /tmp/r4x-status.json
          else
            printf '{"success":false,"state":"no-result","version":"r4x","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/r4x-status.json
          fi
          python3 - <<'PY'
          import json,os
          from pathlib import Path
          p=Path('/tmp/r4x-status.json')
          d=json.loads(p.read_text())
          d['version']='r4x'
          d['job_status']=os.environ.get('JOB_STATUS')
          d['workflow_sha']=os.environ.get('GITHUB_SHA')
          p.write_text(json.dumps(d,indent=2)+'\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 12); do
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/r4x-status.json os/iso/r4x-final-status.json
            cp /tmp/r4x-status.json os/iso/real-multiboot-status.json
            git add os/iso/r4x-final-status.json os/iso/real-multiboot-status.json
            git commit -m 'Record r4x final Openbox result [skip ci]' || break
            if git push origin HEAD:main; then break; fi
            sleep $((attempt*3))
          done

      - name: Require r4x success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path('/tmp/r4x-status.json').read_text())
          print(json.dumps(d,indent=2))
          assert d.get('success') is True
          assert d.get('emulator_started') is True
          assert d.get('xorg_ready') is True
          assert d.get('gui_ready') is True
          assert d.get('graphical_canvas') is True
          PY
