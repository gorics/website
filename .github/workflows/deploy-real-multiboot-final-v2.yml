name: Deploy And Verify Real Multiboot Final V2

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-real-multiboot-final-v2.yml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DEPLOY_VERSION: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Build release-independent atomic site
        run: |
          set -o pipefail
          bash scripts/build-real-multiboot-pages-final.sh _site 2>&1 | tee /tmp/final-v2-build.log

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify exact deployment and binary compatibility
        run: |
          set -euo pipefail
          ROOT='https://gorics.github.io/website'
          PAGE="$ROOT/os/real-multiboot"
          ready=0
          for attempt in $(seq 1 90); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            if curl -fsSL --max-time 60 -H 'Cache-Control: no-cache' "$PAGE/?verify=$stamp" -o /tmp/final-v2-index.html \
              && grep -q "$DEPLOY_VERSION" /tmp/final-v2-index.html \
              && grep -q 'asset-versioning.js?v=' /tmp/final-v2-index.html \
              && grep -q 'safe-diagnostics.js?v=' /tmp/final-v2-index.html \
              && ! grep -q 'chunk-router-v4.js' /tmp/final-v2-index.html \
              && curl -fsSL --max-time 60 "$ROOT/vendor/v86/manifest.json?v=$stamp" -o /tmp/final-v2-manifest.json \
              && grep -q "$DEPLOY_VERSION" /tmp/final-v2-manifest.json \
              && curl -fsSL --max-time 60 "$ROOT/vendor/v86/libv86.js?v=$DEPLOY_VERSION" -o /tmp/final-v2-libv86.js \
              && curl -fsSL --max-time 60 "$ROOT/vendor/v86/v86.wasm?v=$DEPLOY_VERSION" -o /tmp/final-v2-v86.wasm \
              && curl -fsSL --max-time 90 "$PAGE/assets/vmlinuz?v=$DEPLOY_VERSION" -o /tmp/final-v2-vmlinuz \
              && curl -fsSL --max-time 120 "$PAGE/assets/initrd.img?v=$DEPLOY_VERSION" -o /tmp/final-v2-initrd.img; then
              ready=1
              break
            fi
            echo "public deployment pending attempt=$attempt version=$DEPLOY_VERSION"
            sleep 10
          done
          test "$ready" = 1
          test "$(stat -c %s /tmp/final-v2-vmlinuz)" = 5756864
          test "$(stat -c %s /tmp/final-v2-initrd.img)" = 30724198
          node --check /tmp/final-v2-libv86.js
          node <<'JS'
          const fs = require('node:fs');
          const bytes = fs.readFileSync('/tmp/final-v2-v86.wasm');
          const module = new WebAssembly.Module(bytes);
          const exports = WebAssembly.Module.exports(module);
          if (!exports.some(entry => entry.name === 'memory' && entry.kind === 'memory')) throw new Error('v86 memory export missing');
          console.log('public v86 JS/WASM pair parsed', bytes.length);
          JS
          code=$(curl -sS --max-time 60 -r 32768-36863 -o /tmp/final-v2-iso-probe.bin -w '%{http_code}' \
            'https://cdn.jsdelivr.net/gh/gorics/website@os-assets/os/real-multiboot/assets/v86-parts/gorics-linux-gui-web-i386.iso-0-16777216')
          test "$code" = 206
          test "$(stat -c %s /tmp/final-v2-iso-probe.bin)" = 4096
          python3 - <<'PY'
          from pathlib import Path
          data = Path('/tmp/final-v2-iso-probe.bin').read_bytes()
          assert len(data) == 4096
          assert data[1:6] == b'CD001'
          assert data[2049:2054] == b'CD001'
          assert b'EL TORITO' in data[2055:2087]
          print('ISO9660 and El Torito verified from 4 KiB range response')
          PY

      - name: Install Chromium and WebKit
        run: |
          cd /tmp
          npm init -y
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium webkit

      - name: Verify full Chromium boots and iPhone WebKit startup
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?verify=${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: node scripts/verify-real-multiboot-final.mjs

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-real-multiboot-v2-proof-${{ github.run_id }}
          path: |
            /tmp/final-v2-build.log
            /tmp/final-real-multiboot-verification.json
            /tmp/final-*.png
            /tmp/final-v2-index.html
            /tmp/final-v2-manifest.json
            /tmp/final-v2-iso-probe.bin
          if-no-files-found: warn

  record-result:
    if: always()
    needs: deploy-and-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Record V2 result
        env:
          RESULT: ${{ needs.deploy-and-verify.result }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          payload = {
            'workflow': 'Deploy And Verify Real Multiboot Final V2',
            'conclusion': os.environ['RESULT'],
            'run_id': int(os.environ['RUN_ID']),
            'head_sha': os.environ['HEAD_SHA'],
            'deploy_version': f"{os.environ['HEAD_SHA']}-{os.environ['RUN_ID']}-1",
            'run_url': os.environ['RUN_URL'],
            'recorded_at': datetime.now(timezone.utc).isoformat(),
          }
          Path('/tmp/final-v2-status.json').write_text(json.dumps(payload, indent=2) + '\n')
          print(json.dumps(payload, indent=2))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 20); do
            git reset --hard
            git clean -fd
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p os/iso
            cp /tmp/final-v2-status.json os/iso/final-atomic-multiboot-v2-status.json
            git add os/iso/final-atomic-multiboot-v2-status.json
            git commit -m 'Record final multiboot V2 result [skip ci]' || exit 0
            git push origin HEAD:main && exit 0
            sleep $((attempt * 2))
          done
          exit 1
