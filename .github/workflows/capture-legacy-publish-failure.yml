name: Capture Legacy Publisher Failure

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/capture-legacy-publish-failure.yml'

permissions:
  contents: write
  actions: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Capture failed log tail
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: '28912211791'
        run: |
          mkdir -p os/iso
          gh run view "$RUN_ID" --log-failed > /tmp/failed.log 2>&1 || true
          tail -n 800 /tmp/failed.log > os/iso/legacy-publish-failure.log
          cat os/iso/legacy-publish-failure.log
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/legacy-publish-failure.log
          git commit -m 'Record chunked Legacy OS public verification failure [skip ci]' || true
          git push origin HEAD:main
