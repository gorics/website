name: Dispatch R12 Publisher Now

on:
  workflow_dispatch: {}
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'os/real-multiboot/.trigger-r12-publisher-now'

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch artifact-first R12 publisher
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-visible-desktop-r12-v2.yml --repo "$GITHUB_REPOSITORY" --ref main
