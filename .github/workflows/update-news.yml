name: Update Legacy News JSON

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/update_news.py"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write

concurrency:
  group: legacy-news-json-update
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build public RSS news JSON
        run: python scripts/update_news.py

      - name: Commit updated legacy news data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain -- data/news.json)" ]]; then
            echo "No legacy news changes."
            exit 0
          fi

          git add data/news.json
          git commit -m "chore(news): update legacy news json"
          git push
