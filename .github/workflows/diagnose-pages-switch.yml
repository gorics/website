name: Diagnose Pages Build Type Switch

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/diagnose-pages-switch.yml'

permissions:
  contents: write
  pages: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Capture Pages API responses
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh api "repos/$GITHUB_REPOSITORY/pages" > /tmp/before.json 2>/tmp/before.err
          before_rc=$?
          gh api --method PUT "repos/$GITHUB_REPOSITORY/pages" -H 'Accept: application/vnd.github+json' -f build_type=workflow > /tmp/put.out 2>/tmp/put.err
          put_rc=$?
          gh api "repos/$GITHUB_REPOSITORY/pages" > /tmp/after.json 2>/tmp/after.err
          after_rc=$?
          set -e
          python3 - <<'PY'
          import json
          from pathlib import Path
          def text(path):
              p=Path(path)
              return p.read_text(errors='replace') if p.exists() else ''
          def parse(path):
              try: return json.loads(text(path))
              except Exception: return None
          result={
              'before_rc': int('${before_rc}'),
              'put_rc': int('${put_rc}'),
              'after_rc': int('${after_rc}'),
              'before': parse('/tmp/before.json'),
              'put_stdout': text('/tmp/put.out'),
              'put_stderr': text('/tmp/put.err'),
              'after': parse('/tmp/after.json'),
              'before_stderr': text('/tmp/before.err'),
              'after_stderr': text('/tmp/after.err'),
          }
          Path('os/iso/pages-switch-diagnostic.json').write_text(json.dumps(result,indent=2)+"\n")
          print(json.dumps(result,indent=2))
          PY
      - name: Commit diagnostic
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/pages-switch-diagnostic.json
          git commit -m 'Record Pages switch API diagnostic [skip ci]' || true
          git push origin HEAD:main
