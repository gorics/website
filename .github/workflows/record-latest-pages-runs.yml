name: Record Latest Pages Runs

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/record-latest-pages-runs.yml'

permissions:
  contents: write
  actions: read

jobs:
  record:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Query latest Pages runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --repo "$GITHUB_REPOSITORY" --workflow 'Deploy static content to Pages' --limit 25 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/runs.json
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          payload={'recorded_at':datetime.now(timezone.utc).isoformat(),'runs':json.loads(Path('/tmp/runs.json').read_text())}
          Path('/tmp/pages-latest-runs.json').write_text(json.dumps(payload,indent=2)+'\n')
          print(json.dumps(payload,indent=2))
          PY
      - name: Publish
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          cp /tmp/pages-latest-runs.json /tmp/status.json
          for attempt in $(seq 1 10); do
            git reset --hard
            git clean -fd
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p os/iso
            cp /tmp/status.json os/iso/pages-latest-runs.json
            git add os/iso/pages-latest-runs.json
            git commit -m 'Record latest Pages runs [skip ci]' || exit 0
            git push origin HEAD:main && exit 0
            sleep $((attempt*2))
          done
          exit 1
