name: Record All Workflow Runs

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/record-all-workflow-runs.yml'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Record all recent runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json name,workflowName,databaseId,status,conclusion,createdAt,updatedAt,headSha,url,event > /tmp/all-workflow-runs.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p os/iso
          cp /tmp/all-workflow-runs.json os/iso/all-workflow-runs.json
          git add os/iso/all-workflow-runs.json
          git commit -m 'Record all workflow runs [skip ci]' || exit 0
          git push origin HEAD:main

# trigger after registration
