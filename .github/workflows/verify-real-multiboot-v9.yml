name: Verify Real Multiboot V9 Unobscured Desktop

on:
  workflow_dispatch: {}
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'os/real-multiboot/.trigger-v9-overlay-proof'

permissions:
  contents: write

concurrency:
  group: verify-real-multiboot-v9
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Wait for repaired public loader
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/os/real-multiboot'
          ready=0
          for attempt in $(seq 1 120); do
            stamp="${GITHUB_RUN_ID}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 "$BASE/app.js?v9=$stamp" -o /tmp/v9-app.js \
              && grep -q '20260708-r8-overlay-complete' /tmp/v9-app.js \
              && grep -q 'function completeDisplay' /tmp/v9-app.js \
              && grep -q 'display completion trigger=' /tmp/v9-app.js \
              && curl -fsSL --max-time 60 "$BASE/?v9=$stamp" -o /tmp/v9-index.html \
              && grep -q 'GORICS Real Multiboot' /tmp/v9-index.html; then
              ready=1
              echo "repaired public loader found attempt=$attempt"
              break
            fi
            echo "waiting for repaired public loader attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1
          node --check /tmp/v9-app.js

      - name: Install Chromium verifier
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Run V9 graphical and overlay verification
        id: browser
        continue-on-error: true
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?v9-proof=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          rm -rf /tmp/real-multiboot-v9-proof
          mkdir -p /tmp/real-multiboot-v9-proof
          node --check scripts/verify_real_multiboot_v9.mjs
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 25m node scripts/verify_real_multiboot_v9.mjs 2>&1 | tee /tmp/real-multiboot-v9-proof/runner.log

      - name: Upload V9 proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-multiboot-v9-proof-${{ github.run_id }}
          path: /tmp/real-multiboot-v9-proof/
          if-no-files-found: warn

      - name: Record V9 result
        if: always()
        run: |
          if test -s /tmp/real-multiboot-v9-proof/result.json; then
            cp /tmp/real-multiboot-v9-proof/result.json /tmp/v9-status.json
          else
            printf '{"success":false,"state":"no-result","version":"v9","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/v9-status.json
          fi
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          path=Path('/tmp/v9-status.json')
          data=json.loads(path.read_text())
          data['job_status']='${{ job.status }}'
          data['workflow_sha']=os.environ.get('GITHUB_SHA')
          path.write_text(json.dumps(data, indent=2)+'\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 15); do
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/v9-status.json os/iso/real-multiboot-v9-status.json
            git add os/iso/real-multiboot-v9-status.json
            git commit -m 'Record real multiboot V9 result [skip ci]' || break
            if git push origin HEAD:main; then break; fi
            sleep $((attempt*3))
          done

      - name: Require V9 complete success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('/tmp/v9-status.json').read_text())
          print(json.dumps(data, indent=2))
          assert data.get('success') is True
          assert data.get('emulator_started') is True
          assert data.get('xorg_ready') is True
          assert data.get('gui_ready') is True
          assert data.get('graphical_canvas') is True
          assert data.get('overlay_hidden') is True
          assert data.get('controls_ready') is True
          assert data.get('completion_logged') is True
          assert all(value.get('pass') for value in data.get('responsive', {}).values())
          stable=data.get('stable_after_5s', {})
          assert stable.get('hidden') is True
          assert stable.get('aria_hidden') is True
          assert stable.get('visibility') == 'hidden'
          assert stable.get('opacity', 1) <= 0.01
          assert stable.get('progress') == '100%'
          assert stable.get('boot_text') == '실행 중'
          PY
