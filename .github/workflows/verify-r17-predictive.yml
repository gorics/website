name: Verify R17 Predictive Boot

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-r17-predictive.yml'
      - 'os/real-multiboot/predictive-prefetch.js'
      - 'os/real-multiboot/index.html'
  workflow_dispatch: {}

permissions:
  actions: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Validate predictive prefetch source
        run: |
          set -euo pipefail
          node --check os/real-multiboot/predictive-prefetch.js
          grep -q '__GORICS_PREDICTIVE_PREFETCH__' os/real-multiboot/predictive-prefetch.js
          grep -q 'assets/vmlinuz' os/real-multiboot/predictive-prefetch.js
          grep -q 'assets/initrd.img' os/real-multiboot/predictive-prefetch.js
          grep -q 'predictive-prefetch.js?v=' os/real-multiboot/index.html
          grep -q 'r17-predictive' os/real-multiboot/index.html

      - name: Wait for authoritative R17 Pages deployment
        run: |
          set -euo pipefail
          PAGE='https://gorics.github.io/website/os/real-multiboot'
          ready=0
          for attempt in $(seq 1 120); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            if curl -fsSL --max-time 60 -H 'Cache-Control: no-cache' "$PAGE/?verify-r17=$stamp" -o /tmp/r17-index.html \
              && grep -q "$GITHUB_SHA" /tmp/r17-index.html \
              && grep -q 'predictive-prefetch.js?v=' /tmp/r17-index.html \
              && curl -fsSL --max-time 60 "$PAGE/predictive-prefetch.js?v=$stamp" -o /tmp/r17-prefetch.js \
              && grep -q '__GORICS_PREDICTIVE_PREFETCH__' /tmp/r17-prefetch.js; then
              ready=1
              break
            fi
            echo "R17 deployment pending attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1
          node --check /tmp/r17-prefetch.js

      - name: Install Chromium
        run: |
          npm init -y
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify default GORICS predictive cache and startup
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?verify-r17=${{ github.sha }}-${{ github.run_id }}
        run: |
          node <<'JS'
          const fs = require('fs');
          const { chromium } = require('playwright');
          (async () => {
            const report = { url: process.env.VERIFY_URL, failedRequests: [], pageErrors: [], console: [] };
            let browser;
            let page;
            try {
              browser = await chromium.launch({ headless: true, args: ['--no-sandbox', '--disable-dev-shm-usage'] });
              page = await browser.newPage({ viewport: { width: 390, height: 844 }, isMobile: true, hasTouch: true });
              page.on('pageerror', error => report.pageErrors.push(error.message));
              page.on('requestfailed', request => report.failedRequests.push({ url: request.url(), failure: request.failure() }));
              page.on('console', message => report.console.push({ type: message.type(), text: message.text().slice(0, 2000) }));

              await page.goto(process.env.VERIFY_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
              await page.waitForFunction(() => Boolean(window.__GORICS_PREDICTIVE_PREFETCH__), null, { timeout: 30000 });
              await page.waitForFunction(() => {
                const stats = window.__GORICS_PREDICTIVE_PREFETCH__?.getStats?.();
                return stats && stats.completed >= 6 && stats.bytesWarmed >= 35 * 1024 * 1024;
              }, null, { timeout: 240000 });

              report.prefetch = await page.evaluate(() => window.__GORICS_PREDICTIVE_PREFETCH__.getStats());
              const startedAt = Date.now();
              await page.click('#boot-btn');
              await page.waitForFunction(() => Boolean(window.goricsRealMultiboot && window.__GORICS_LAST_VM_OPTIONS__), null, { timeout: 180000 });
              await page.waitForFunction(() => /emulator-started/.test(document.querySelector('#log')?.textContent || ''), null, { timeout: 180000 });
              report.boot = await page.evaluate((startedAt) => ({
                elapsedMs: Date.now() - startedAt,
                options: window.__GORICS_LAST_VM_OPTIONS__,
                stage: document.querySelector('#stage-label')?.textContent || '',
                detail: document.querySelector('#stage-detail')?.textContent || '',
                log: (document.querySelector('#log')?.textContent || '').slice(-20000),
              }), startedAt);

              const MB = 1024 * 1024;
              if (report.boot.options.memory_size > 224 * MB) throw new Error(`GORICS memory too high: ${JSON.stringify(report.boot.options)}`);
              if (report.boot.options.vga_memory_size > 12 * MB) throw new Error(`GORICS VGA too high: ${JSON.stringify(report.boot.options)}`);
              if (/RangeError: Length out of range of buffer/i.test(report.boot.log)) throw new Error('original RangeError returned');
              if (report.pageErrors.length) throw new Error(report.pageErrors.join('\n'));
              if (report.failedRequests.some(item => /vmlinuz|initrd\.img|v86\.wasm/.test(item.url || ''))) {
                throw new Error(`critical request failed: ${JSON.stringify(report.failedRequests)}`);
              }
              report.success = true;
            } catch (error) {
              report.success = false;
              report.error = { message: error.message, stack: error.stack };
              if (page) {
                report.failureState = await page.evaluate(() => ({
                  prefetch: window.__GORICS_PREDICTIVE_PREFETCH__?.getStats?.() || null,
                  options: window.__GORICS_LAST_VM_OPTIONS__ || null,
                  stage: document.querySelector('#stage-label')?.textContent || '',
                  detail: document.querySelector('#stage-detail')?.textContent || '',
                  log: (document.querySelector('#log')?.textContent || '').slice(-20000),
                })).catch(() => null);
              }
            } finally {
              fs.writeFileSync('/tmp/r17-predictive-result.json', JSON.stringify(report, null, 2));
              if (page) await page.screenshot({ path: '/tmp/r17-predictive-mobile.png', fullPage: true }).catch(() => {});
              if (browser) await browser.close();
            }
            if (!report.success) process.exit(1);
          })();
          JS

      - name: Upload R17 proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r17-predictive-${{ github.run_id }}
          path: |
            /tmp/r17-index.html
            /tmp/r17-prefetch.js
            /tmp/r17-predictive-result.json
            /tmp/r17-predictive-mobile.png
          if-no-files-found: warn
