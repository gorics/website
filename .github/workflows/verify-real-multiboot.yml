name: Verify Real Multiboot

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-real-multiboot.yml'

permissions:
  contents: write

concurrency:
  group: verify-real-multiboot
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for resilient public files
        run: |
          BASE='https://gorics.github.io/website/os/real-multiboot'
          READY=0
          for attempt in $(seq 1 60); do
            stamp="$GITHUB_RUN_ID-$attempt"
            if curl -fsSL --max-time 30 "$BASE/?verify=$stamp" -o /tmp/index.html \
              && grep -q '20260708r1' /tmp/index.html \
              && grep -q 'service worker control confirmed' /tmp/index.html \
              && curl -fsSL --max-time 30 "$BASE/app.js?verify=$stamp" -o /tmp/app.js \
              && grep -q 'resilient release-chunk boot loader' /tmp/app.js \
              && curl -fsSL --max-time 30 "$BASE/sw.js?verify=$stamp" -o /tmp/sw.js \
              && grep -q 'gorics-v86-runtime-20260708r1' /tmp/sw.js; then
              READY=1
              break
            fi
            echo "public files not ready, attempt $attempt"
            sleep 10
          done
          test "$READY" = 1
          node --check /tmp/app.js
          node --check /tmp/sw.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium verifier
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot ISO and verify graphical screen
        id: browser
        continue-on-error: true
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?browser=${{ github.run_id }}
        run: |
          cat > /tmp/verify.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const result = {
            success: false,
            run_id: process.env.GITHUB_RUN_ID,
            url: process.env.VERIFY_URL,
            started_at: new Date().toISOString(),
            console: [],
          };
          let browser;
          try {
            browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage'] });
            const page = await browser.newPage({ viewport: { width: 1280, height: 900 } });
            page.on('console', message => result.console.push(`${message.type()}: ${message.text()}`));
            page.on('pageerror', error => result.console.push(`pageerror: ${error.message}`));
            await page.goto(process.env.VERIFY_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('service worker control confirmed'), null, { timeout: 90000 });
            await page.click('#boot-btn');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('ISO manifest size='), null, { timeout: 180000 });
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('runtime ready'), null, { timeout: 180000 });
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('emulator-started'), null, { timeout: 600000 });
            await page.waitForFunction(() => {
              const canvas = document.querySelector('#screen canvas');
              return canvas && canvas.width >= 320 && canvas.height >= 200 && getComputedStyle(canvas).display !== 'none';
            }, null, { timeout: 720000 });
            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const log = document.querySelector('#log')?.textContent || '';
              return {
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                log_tail: log.split('\n').slice(-80),
              };
            });
            Object.assign(result, details, { success: true, completed_at: new Date().toISOString() });
            await page.screenshot({ path: '/tmp/real-multiboot-proof.png', fullPage: true });
          } catch (error) {
            result.error = error?.stack || String(error);
            result.completed_at = new Date().toISOString();
            try {
              const pages = browser?.contexts()?.flatMap(context => context.pages()) || [];
              const page = pages[0];
              if (page) {
                const log = await page.locator('#log').textContent().catch(() => '');
                result.log_tail = (log || '').split('\n').slice(-120);
                await page.screenshot({ path: '/tmp/real-multiboot-proof.png', fullPage: true }).catch(() => {});
              }
            } catch {}
          } finally {
            await browser?.close().catch(() => {});
            fs.writeFileSync('/tmp/real-multiboot-verification.json', JSON.stringify(result, null, 2) + '\n');
          }
          if (!result.success) process.exit(1);
          JS
          node /tmp/verify.mjs

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-multiboot-proof-${{ github.run_id }}
          path: |
            /tmp/real-multiboot-verification.json
            /tmp/real-multiboot-proof.png
          if-no-files-found: warn

      - name: Record verification result
        if: always()
        run: |
          if test ! -s /tmp/real-multiboot-verification.json; then
            printf '{"success":false,"run_id":"%s","error":"verification did not produce a result"}\n' "$GITHUB_RUN_ID" > /tmp/real-multiboot-verification.json
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/real-multiboot-verification.json os/iso/real-multiboot-status.json
          git add os/iso/real-multiboot-status.json
          git commit -m "Record real multiboot browser verification [skip ci]" || true
          git push origin HEAD:main

      - name: Require browser success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('/tmp/real-multiboot-verification.json').read_text())
          print(json.dumps(result, indent=2))
          if not result.get('success'):
              raise SystemExit('browser verification failed')
          PY
