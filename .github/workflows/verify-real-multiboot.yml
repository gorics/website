name: Verify Real Multiboot

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-real-multiboot.yml'

permissions:
  contents: write

concurrency:
  group: verify-real-multiboot
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record verification start
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          printf '{"success":false,"state":"running","run_id":"%s","architecture":"i386","desktop":"openbox-tint2-pcmanfm-xterm","started_at":"%s"}\n' "$GITHUB_RUN_ID" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > os/iso/real-multiboot-status.json
          git add os/iso/real-multiboot-status.json
          git commit -m "Record real multiboot verification start [skip ci]" || true
          git push origin HEAD:main

      - name: Verify direct i386 public files
        id: public
        continue-on-error: true
        run: |
          BASE='https://gorics.github.io/website'
          PAGE="$BASE/os/real-multiboot"
          READY=0
          for attempt in $(seq 1 30); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            if curl -fsSL --max-time 30 "$PAGE/?verify=$stamp" -o /tmp/index.html \
              && grep -q 'app.js?v=n' /tmp/index.html \
              && curl -fsSL --max-time 30 "$PAGE/app.js?verify=$stamp" -o /tmp/app.js \
              && grep -q 'bzimage: { url: kernelUrl }' /tmp/app.js \
              && grep -q 'gorics-linux-gui-web-i386.iso' /tmp/app.js \
              && curl -fsSL --max-time 30 "$PAGE/assets/iso-meta.json?verify=$stamp" -o /tmp/meta.json \
              && grep -q 'openbox-tint2-pcmanfm-xterm' /tmp/meta.json \
              && curl -fsSL --max-time 30 "$BASE/vendor/v86/libv86.js?verify=$stamp" -o /tmp/libv86.js \
              && test "$(stat -c %s /tmp/libv86.js)" -gt 100000 \
              && curl -fsSL --max-time 30 -r 0-4095 "$PAGE/assets/vmlinuz?verify=$stamp" -o /tmp/vmlinuz-probe \
              && test "$(stat -c %s /tmp/vmlinuz-probe)" = 4096 \
              && curl -fsSL --max-time 30 -r 0-4095 "$PAGE/assets/initrd.img?verify=$stamp" -o /tmp/initrd-probe \
              && test "$(stat -c %s /tmp/initrd-probe)" = 4096; then
              READY=1
              break
            fi
            echo "direct i386 files not ready, attempt $attempt"
            sleep 10
          done
          test "$READY" = 1
          node --check /tmp/app.js
          python3 - <<'PY'
          import json
          from pathlib import Path
          meta = json.loads(Path('/tmp/meta.json').read_text())
          assert meta['name'] == 'gorics-linux-gui-web-i386.iso'
          assert meta['architecture'] == 'i386'
          assert meta['desktop'] in {'openbox-tint2-pcmanfm-xterm', 'direct-xorg-openbox'}
          assert meta.get('direct_boot') is True
          assert meta.get('complete_ui_verified') is True
          assert meta['size'] > 0
          assert meta['kernel']['size'] > 1_000_000
          assert meta['initrd']['size'] > 10_000_000
          print(json.dumps(meta, indent=2))
          PY
          CODE=$(curl -sS --max-time 90 -r 32768-36863 -o /tmp/iso-probe.bin -w '%{http_code}' "$PAGE/assets/gorics-linux-gui-web-i386.iso?verify=$GITHUB_RUN_ID")
          test "$CODE" = 206
          test "$(stat -c %s /tmp/iso-probe.bin)" = 4096
          python3 - <<'PY'
          from pathlib import Path
          data = Path('/tmp/iso-probe.bin').read_bytes()
          assert data[1:6] == b'CD001'
          assert data[2049:2054] == b'CD001'
          assert b'EL TORITO' in data[2055:2087]
          print('public ISO9660 and El Torito verified')
          PY

      - name: Setup Node
        if: steps.public.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium verifier
        if: steps.public.outcome == 'success'
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot ISO and verify graphical screen
        if: steps.public.outcome == 'success'
        id: browser
        continue-on-error: true
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?browser=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cat > /tmp/verify.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const result = {
            success: false,
            state: 'browser-running',
            architecture: 'i386',
            desktop: 'openbox-tint2-pcmanfm-xterm',
            boot_mode: 'direct-kernel-initrd-plus-iso',
            run_id: process.env.GITHUB_RUN_ID,
            url: process.env.VERIFY_URL,
            started_at: new Date().toISOString(),
            console: [],
            failed_requests: [],
          };
          let browser;
          let page;
          try {
            browser = await chromium.launch({
              headless: true,
              args: ['--disable-dev-shm-usage', '--no-sandbox', '--disable-gpu'],
            });
            page = await browser.newPage({
              viewport: { width: 412, height: 915 },
              userAgent: 'Mozilla/5.0 (Linux; Android 15; GORICSVerifier) AppleWebKit/537.36 Chrome/149 Mobile Safari/537.36',
            });
            page.setDefaultTimeout(120000);
            page.on('console', message => result.console.push(`${message.type()}: ${message.text()}`));
            page.on('pageerror', error => result.console.push(`pageerror: ${error.message}`));
            page.on('requestfailed', request => result.failed_requests.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));
            await page.goto(process.env.VERIFY_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('ready: keyboard, touch and pointer bridge installed'));
            await page.click('#boot-btn');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('ISO9660 and El Torito verified'), null, { timeout: 240000 });
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('runtime loaded'), null, { timeout: 240000 });
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('emulator-started'), null, { timeout: 600000 });
            await page.waitForFunction(() => {
              const canvas = document.querySelector('#screen canvas');
              return canvas && canvas.width >= 320 && canvas.height >= 200 && getComputedStyle(canvas).display !== 'none';
            }, null, { timeout: 900000 });
            await page.waitForTimeout(15000);
            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const log = document.querySelector('#log')?.textContent || '';
              const textScreen = document.querySelector('#screen > div');
              return {
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_display: textScreen ? getComputedStyle(textScreen).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                boot_button_text: document.querySelector('#boot-btn')?.textContent || '',
                log_tail: log.split('\n').slice(-160),
              };
            });
            Object.assign(result, details, {
              success: details.screen_active && details.canvas_width >= 320 && details.canvas_height >= 200 && details.canvas_display !== 'none',
              state: 'completed',
              completed_at: new Date().toISOString(),
            });
            await page.screenshot({ path: '/tmp/real-multiboot-proof.png', fullPage: true });
          } catch (error) {
            result.state = 'failed';
            result.error = error?.stack || String(error);
            result.completed_at = new Date().toISOString();
            if (page) {
              const log = await page.locator('#log').textContent().catch(() => '');
              result.log_tail = (log || '').split('\n').slice(-200);
              result.page_url = page.url();
              await page.screenshot({ path: '/tmp/real-multiboot-proof.png', fullPage: true }).catch(() => {});
            }
          } finally {
            await browser?.close().catch(() => {});
            fs.writeFileSync('/tmp/real-multiboot-verification.json', JSON.stringify(result, null, 2) + '\n');
          }
          if (!result.success) process.exit(1);
          JS

          set +e
          node --check /tmp/verify.mjs > /tmp/browser-verifier.log 2>&1
          CHECK_EXIT=$?
          if test "$CHECK_EXIT" = 0; then
            node /tmp/verify.mjs >> /tmp/browser-verifier.log 2>&1
            BROWSER_EXIT=$?
          else
            BROWSER_EXIT=$CHECK_EXIT
          fi
          set -e
          if test ! -s /tmp/real-multiboot-verification.json; then
            python3 - "$BROWSER_EXIT" <<'PY'
          import json, os, sys
          from pathlib import Path
          log = Path('/tmp/browser-verifier.log').read_text(errors='replace') if Path('/tmp/browser-verifier.log').exists() else ''
          result = {
              'success': False,
              'state': 'process-exited-without-result',
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'architecture': 'i386',
              'desktop': 'openbox-tint2-pcmanfm-xterm',
              'browser_exit_code': int(sys.argv[1]),
              'browser_log_tail': log.splitlines()[-200:],
          }
          Path('/tmp/real-multiboot-verification.json').write_text(json.dumps(result, indent=2) + '\n')
          PY
          fi
          cat /tmp/browser-verifier.log || true
          exit "$BROWSER_EXIT"

      - name: Create fallback result
        if: always()
        run: |
          if test ! -s /tmp/real-multiboot-verification.json; then
            printf '{"success":false,"state":"failed","run_id":"%s","architecture":"i386","desktop":"openbox-tint2-pcmanfm-xterm","public_files_outcome":"%s","error":"browser verification did not run or produce a result"}\n' "$GITHUB_RUN_ID" "${{ steps.public.outcome }}" > /tmp/real-multiboot-verification.json
          fi

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-multiboot-proof-${{ github.run_id }}
          path: |
            /tmp/real-multiboot-verification.json
            /tmp/real-multiboot-proof.png
            /tmp/browser-verifier.log
            /tmp/index.html
            /tmp/app.js
            /tmp/meta.json
          if-no-files-found: warn

      - name: Record verification result
        if: always()
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/real-multiboot-verification.json os/iso/real-multiboot-status.json
          git add os/iso/real-multiboot-status.json
          git commit -m "Record real multiboot browser verification [skip ci]" || true
          git push origin HEAD:main

      - name: Require browser success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('/tmp/real-multiboot-verification.json').read_text())
          print(json.dumps(result, indent=2))
          if not result.get('success'):
              raise SystemExit('browser verification failed')
          PY
