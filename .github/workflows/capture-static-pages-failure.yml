name: Capture Static Pages Failure

on:
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/capture-static-pages-failure.yml'
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'os/real-multiboot/.trigger-capture-static-failure'

permissions:
  contents: write
  actions: read

jobs:
  capture:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Capture latest failed static deployment log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow static.yml --status failure --limit 1 --json databaseId --jq '.[0].databaseId')
          export RUN_ID
          test -n "$RUN_ID"
          set +e
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/static-pages-failed.log 2>&1
          view_code=$?
          set -e
          tail -n 500 /tmp/static-pages-failed.log > os/iso/static-pages-failure.log
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          run_id=int(os.environ['RUN_ID'])
          text=Path('os/iso/static-pages-failure.log').read_text(errors='replace')
          Path('os/iso/static-pages-failure.json').write_text(json.dumps({
              'run_id': run_id,
              'log_tail': text,
          }, indent=2)+'\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/static-pages-failure.log os/iso/static-pages-failure.json
          git commit -m 'Record static Pages failure tail [skip ci]' || true
          git push origin HEAD:main
          test "$view_code" = 0
