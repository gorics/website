name: Fix and Verify GORICS q GUI

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-legacy-chunked-v6.yml'

permissions:
  contents: write

concurrency:
  group: fix-verify-gorics-q-gui
  cancel-in-progress: true

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix graphical screen activation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for filename in ('os/real-multiboot/app.js', 'os/real-multiboot/app-legacy-chunked.js'):
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              text = text.replace(
                  "screen.innerHTML = '<div style=\"white-space:pre;font:14px monospace;line-height:14px\"></div><canvas style=\"display:none\"></canvas>';\n  }",
                  "screen.innerHTML = '<div style=\"white-space:pre;font:14px monospace;line-height:14px\"></div><canvas style=\"display:none\"></canvas>';\n    screen.classList.add('active');\n  }",
              )
              text = text.replace(
                  "if (screen) screen.innerHTML = '';\n    setState('idle');",
                  "if (screen) { screen.innerHTML = ''; screen.classList.remove('active'); }\n    setState('idle');",
              )
              text = text.replace(
                  'v86 started with legacy Pages same-origin chunks and direct i386 Openbox boot',
                  'v86 started with external os-assets chunks and direct i386 Openbox boot',
              )
              if "screen.classList.add('active')" not in text or "screen.classList.remove('active')" not in text:
                  raise SystemExit(f'screen activation patch failed: {filename}')
              path.write_text(text, encoding='utf-8')
          PY
          node --check os/real-multiboot/app.js
          node --check os/real-multiboot/app-legacy-chunked.js
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add os/real-multiboot/app.js os/real-multiboot/app-legacy-chunked.js
          git commit -m 'Fix q graphical screen activation' || true
          git push origin HEAD:main

      - name: Wait for fixed q deployment and verify assets
        run: |
          BASE='https://gorics.github.io/website'
          PAGE="$BASE/os/real-multiboot"
          READY=0
          for attempt in $(seq 1 120); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            if curl -fsSL --max-time 60 "$PAGE/?fixed-q=$stamp" -o /tmp/index.html \
              && grep -q 'app.js?v=q' /tmp/index.html \
              && grep -q 'ISO page. q' /tmp/index.html \
              && curl -fsSL --max-time 60 "$PAGE/app.js?fixed-q=$stamp" -o /tmp/app.js \
              && grep -q "screen.classList.add('active')" /tmp/app.js \
              && grep -q 'raw.githubusercontent.com/gorics/website/os-assets' /tmp/app.js \
              && grep -q 'use_parts: true' /tmp/app.js \
              && curl -fsSL --max-time 60 "$PAGE/assets/iso-meta.json?fixed-q=$stamp" -o /tmp/meta.json; then
              python3 - <<'PY' && READY=1 && break
          import json
          from pathlib import Path
          meta = json.loads(Path('/tmp/meta.json').read_text())
          assert meta['name'] == 'gorics-linux-gui-web-i386.iso'
          assert meta['architecture'] == 'i386'
          assert meta['page_version'] == 'q'
          assert meta['chunked'] is True
          assert meta['direct_boot'] is True
          assert meta['complete_ui_verified'] is True
          assert meta['parts'] == 21
          assert meta['kernel']['size'] > 1_000_000
          assert meta['initrd']['size'] > 10_000_000
          PY
            fi
            echo "fixed q not ready attempt=$attempt"
            sleep 10
          done
          test "$READY" = 1
          node --check /tmp/app.js
          CHUNK='https://raw.githubusercontent.com/gorics/website/os-assets/os/real-multiboot/assets/v86-parts/gorics-linux-gui-web-i386.iso-0-16777216'
          CODE=$(curl -sS -L --max-time 90 -r 32768-36863 -o /tmp/chunk-probe -w '%{http_code}' "$CHUNK")
          test "$CODE" = 206
          python3 - <<'PY'
          from pathlib import Path
          data = Path('/tmp/chunk-probe').read_bytes()
          assert len(data) == 4096
          assert data[1:6] == b'CD001'
          assert data[2049:2054] == b'CD001'
          assert b'EL TORITO' in data[2055:2087]
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot q i386 Linux and verify graphical desktop
        id: browser
        continue-on-error: true
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?gui=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cat > verify-q-gui.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const output = '/tmp/q-gui-status.json';
          const result = {
            success: false,
            state: 'starting',
            run_id: process.env.GITHUB_RUN_ID,
            version: 'q',
            architecture: 'i386',
            desktop: 'openbox-tint2-pcmanfm-xterm',
            mode: 'legacy-pages-external-chunks-direct-kernel',
            url: process.env.VERIFY_URL,
            started_at: new Date().toISOString(),
            console: [],
            failed_requests: [],
          };
          const save = (state, extra = {}) => {
            Object.assign(result, extra, { state, updated_at: new Date().toISOString() });
            fs.writeFileSync(output, JSON.stringify(result, null, 2) + '\n');
          };
          save('starting');
          let browser;
          let page;
          try {
            browser = await chromium.launch({ headless: true, args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu'] });
            const context = await browser.newContext({ viewport: { width: 1280, height: 900 } });
            page = await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console', message => {
              result.console.push(`${message.type()}: ${message.text()}`);
              if (result.console.length > 500) result.console.shift();
            });
            page.on('pageerror', error => result.console.push(`pageerror: ${error.message}`));
            page.on('requestfailed', request => result.failed_requests.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));
            page.on('crash', () => save('page-crashed'));

            await page.goto(process.env.VERIFY_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              return log.includes('ISO page. q') && log.includes('legacy Pages chunked i386 Openbox loader installed');
            });
            save('loader-ready');
            await page.click('#boot-btn');
            save('boot-clicked');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('ISO size='), null, { timeout: 180000 });
            save('metadata-loaded');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('ISO9660 and El Torito verified'), null, { timeout: 300000 });
            save('external-chunk-verified');
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              return log.includes('kernel available') && log.includes('initrd available') && log.includes('runtime available') && log.includes('wasm available');
            }, null, { timeout: 300000 });
            save('boot-files-verified');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('emulator-started'), null, { timeout: 600000 });
            save('emulator-started');
            await page.waitForFunction(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              return canvas
                && canvas.width >= 640
                && canvas.height >= 480
                && getComputedStyle(canvas).display !== 'none'
                && (!text || getComputedStyle(text).display === 'none')
                && document.querySelector('#screen')?.classList.contains('active');
            }, null, { timeout: 900000 });
            save('graphical-desktop-visible');
            await page.waitForTimeout(60000);

            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              const log = document.querySelector('#log')?.textContent || '';
              const keyboard = document.querySelector('#keyboard-btn');
              return {
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_display: text ? getComputedStyle(text).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                boot_button_text: document.querySelector('#boot-btn')?.textContent || '',
                stop_button_disabled: document.querySelector('#stop-btn')?.disabled ?? null,
                keyboard_button_present: Boolean(keyboard),
                keyboard_button_disabled: keyboard?.disabled ?? null,
                emulator_object_present: Boolean(window.goricsRealLinuxIso),
                log_tail: log.split('\n').slice(-360),
              };
            });
            await page.screenshot({ path: '/tmp/q-gui-proof.png', fullPage: true });
            const success = details.screen_active
              && details.canvas_width >= 640
              && details.canvas_height >= 480
              && details.canvas_display !== 'none'
              && details.text_display === 'none'
              && details.boot_button_text === 'Running'
              && details.stop_button_disabled === false
              && details.keyboard_button_present
              && details.keyboard_button_disabled === false
              && details.emulator_object_present;
            save('completed', { ...details, success, completed_at: new Date().toISOString() });
          } catch (error) {
            let details = {};
            try {
              details = await page?.evaluate(() => {
                const canvas = document.querySelector('#screen canvas');
                const text = document.querySelector('#screen > div');
                const log = document.querySelector('#log')?.textContent || '';
                return {
                  canvas_width: canvas?.width || 0,
                  canvas_height: canvas?.height || 0,
                  canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                  text_display: text ? getComputedStyle(text).display : 'missing',
                  screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                  page_url: location.href,
                  log_tail: log.split('\n').slice(-400),
                };
              }) || {};
              await page?.screenshot({ path: '/tmp/q-gui-proof.png', fullPage: true });
            } catch {}
            save('failed', { ...details, success: false, error: error?.stack || String(error), completed_at: new Date().toISOString() });
          } finally {
            await browser?.close().catch(() => {});
          }
          if (!result.success) process.exit(1);
          JS
          node --check verify-q-gui.mjs
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 28m node verify-q-gui.mjs 2>&1 | tee /tmp/q-gui-browser.log

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: q-gui-proof-${{ github.run_id }}
          path: |
            /tmp/q-gui-status.json
            /tmp/q-gui-proof.png
            /tmp/q-gui-browser.log
            /tmp/index.html
            /tmp/app.js
            /tmp/meta.json
          if-no-files-found: warn

      - name: Record result
        if: always()
        run: |
          if test ! -s /tmp/q-gui-status.json; then
            printf '{"success":false,"state":"no-result","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/q-gui-status.json
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/q-gui-status.json os/iso/q-gui-status.json
          cp /tmp/q-gui-status.json os/iso/real-multiboot-status.json
          git add os/iso/q-gui-status.json os/iso/real-multiboot-status.json
          git commit -m 'Record q graphical desktop verification [skip ci]' || true
          git push origin HEAD:main

      - name: Require success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('/tmp/q-gui-status.json').read_text())
          print(json.dumps(result, indent=2))
          if not result.get('success'):
              raise SystemExit('q graphical desktop verification failed')
          PY
