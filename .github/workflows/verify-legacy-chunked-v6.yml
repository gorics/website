name: Verify Legacy Chunked GUI V6

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-legacy-chunked-v6.yml'

permissions:
  contents: write

concurrency:
  group: verify-legacy-chunked-v6
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for Legacy Pages version p and verify assets
        run: |
          BASE='https://gorics.github.io/website'
          PAGE="$BASE/os/real-multiboot"
          READY=0
          for attempt in $(seq 1 120); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            if curl -fsSL --max-time 60 "$PAGE/?v6=$stamp" -o /tmp/index.html \
              && grep -q 'app.js?v=p' /tmp/index.html \
              && grep -q 'ISO page. p' /tmp/index.html \
              && curl -fsSL --max-time 60 "$PAGE/app.js?v6=$stamp" -o /tmp/app.js \
              && grep -q 'legacy Pages chunked loader p' /tmp/app.js \
              && grep -q 'use_parts: true' /tmp/app.js \
              && curl -fsSL --max-time 60 "$PAGE/assets/iso-meta.json?v6=$stamp" -o /tmp/meta.json; then
              python3 - <<'PY' && READY=1 && break
          import json
          from pathlib import Path
          meta = json.loads(Path('/tmp/meta.json').read_text())
          assert meta['name'] == 'gorics-linux-gui-web-i386.iso'
          assert meta['architecture'] == 'i386'
          assert meta['legacy_pages'] is True
          assert meta['chunked'] is True
          assert meta['direct_boot'] is True
          assert meta['complete_ui_verified'] is True
          assert meta['parts'] == 21
          assert meta['chunk_size'] == 16777216
          assert meta['kernel']['size'] > 1_000_000
          assert meta['initrd']['size'] > 10_000_000
          PY
            fi
            echo "version p not ready attempt=$attempt"
            sleep 10
          done
          test "$READY" = 1
          node --check /tmp/app.js
          curl -fsSL --max-time 60 "$BASE/vendor/v86/libv86.js?v6=$GITHUB_RUN_ID" -o /tmp/libv86.js
          test "$(stat -c %s /tmp/libv86.js)" -gt 100000
          test "$(curl -sS -L --max-time 60 -r 0-4095 -o /tmp/kernel-probe -w '%{http_code}' "$PAGE/assets/vmlinuz?v6=$GITHUB_RUN_ID")" = 206
          test "$(stat -c %s /tmp/kernel-probe)" = 4096
          test "$(curl -sS -L --max-time 60 -r 0-4095 -o /tmp/initrd-probe -w '%{http_code}' "$PAGE/assets/initrd.img?v6=$GITHUB_RUN_ID")" = 206
          test "$(stat -c %s /tmp/initrd-probe)" = 4096
          CHUNK="$PAGE/assets/v86-parts/gorics-linux-gui-web-i386.iso-0-16777216?v6=$GITHUB_RUN_ID"
          CODE=$(curl -sS -L --max-time 90 -r 32768-36863 -o /tmp/chunk-probe -w '%{http_code}' "$CHUNK")
          test "$CODE" = 206
          python3 - <<'PY'
          from pathlib import Path
          data = Path('/tmp/chunk-probe').read_bytes()
          assert len(data) == 4096
          assert data[1:6] == b'CD001'
          assert data[2049:2054] == b'CD001'
          assert b'EL TORITO' in data[2055:2087]
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot chunked i386 Linux and verify graphical desktop
        id: browser
        continue-on-error: true
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?v6=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cat > verify-legacy-v6.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const output = '/tmp/legacy-chunked-v6-status.json';
          const result = {
            success: false,
            state: 'starting',
            run_id: process.env.GITHUB_RUN_ID,
            version: 'p',
            architecture: 'i386',
            desktop: 'openbox-tint2-pcmanfm-xterm',
            mode: 'legacy-pages-same-origin-chunked-direct-kernel',
            url: process.env.VERIFY_URL,
            started_at: new Date().toISOString(),
            console: [],
            failed_requests: [],
          };
          const save = (state, extra = {}) => {
            Object.assign(result, extra, { state, updated_at: new Date().toISOString() });
            fs.writeFileSync(output, JSON.stringify(result, null, 2) + '\n');
          };
          save('starting');
          let browser;
          let page;
          try {
            browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu'],
            });
            const context = await browser.newContext({
              viewport: { width: 412, height: 915 },
              userAgent: 'Mozilla/5.0 (Linux; Android 15; GORICSV6) AppleWebKit/537.36 Chrome/149 Mobile Safari/537.36',
            });
            page = await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console', message => {
              result.console.push(`${message.type()}: ${message.text()}`);
              if (result.console.length > 500) result.console.shift();
            });
            page.on('pageerror', error => result.console.push(`pageerror: ${error.message}`));
            page.on('requestfailed', request => result.failed_requests.push({
              url: request.url(),
              error: request.failure()?.errorText || 'unknown',
            }));
            page.on('crash', () => save('page-crashed'));

            await page.goto(process.env.VERIFY_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              return log.includes('ISO page. p') && log.includes('legacy Pages chunked loader p');
            });
            save('loader-ready');
            await page.click('#boot-btn');
            save('boot-clicked');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('metadata loaded size='), null, { timeout: 180000 });
            save('metadata-loaded');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('chunk size='), null, { timeout: 180000 });
            save('chunk-layout-verified');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('emulator-started'), null, { timeout: 600000 });
            save('emulator-started');
            await page.waitForFunction(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              return canvas
                && canvas.width >= 800
                && canvas.height >= 600
                && getComputedStyle(canvas).display !== 'none'
                && (!text || getComputedStyle(text).display === 'none');
            }, null, { timeout: 900000 });
            save('graphical-desktop-visible');
            await page.waitForTimeout(30000);

            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              const log = document.querySelector('#log')?.textContent || '';
              const keyboard = document.querySelector('#keyboard-btn');
              return {
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_display: text ? getComputedStyle(text).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                boot_button_text: document.querySelector('#boot-btn')?.textContent || '',
                stop_button_disabled: document.querySelector('#stop-btn')?.disabled ?? null,
                keyboard_button_present: Boolean(keyboard),
                keyboard_button_disabled: keyboard?.disabled ?? null,
                emulator_object_present: Boolean(window.goricsRealLinuxIso),
                log_tail: log.split('\n').slice(-300),
              };
            });
            await page.screenshot({ path: '/tmp/legacy-chunked-v6-proof.png', fullPage: true });
            const success = details.screen_active
              && details.canvas_width >= 800
              && details.canvas_height >= 600
              && details.canvas_display !== 'none'
              && details.text_display === 'none'
              && details.boot_button_text === 'Running'
              && details.stop_button_disabled === false
              && details.keyboard_button_present
              && details.keyboard_button_disabled === false
              && details.emulator_object_present;
            save('completed', { ...details, success, completed_at: new Date().toISOString() });
          } catch (error) {
            let details = {};
            try {
              details = await page?.evaluate(() => {
                const canvas = document.querySelector('#screen canvas');
                const text = document.querySelector('#screen > div');
                const log = document.querySelector('#log')?.textContent || '';
                return {
                  canvas_width: canvas?.width || 0,
                  canvas_height: canvas?.height || 0,
                  canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                  text_display: text ? getComputedStyle(text).display : 'missing',
                  page_url: location.href,
                  log_tail: log.split('\n').slice(-320),
                };
              }) || {};
              await page?.screenshot({ path: '/tmp/legacy-chunked-v6-proof.png', fullPage: true });
            } catch {}
            save('failed', {
              ...details,
              success: false,
              error: error?.stack || String(error),
              completed_at: new Date().toISOString(),
            });
          } finally {
            await browser?.close().catch(() => {});
          }
          if (!result.success) process.exit(1);
          JS
          node --check verify-legacy-v6.mjs
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 25m node verify-legacy-v6.mjs 2>&1 | tee /tmp/legacy-chunked-v6-browser.log

      - name: Upload V6 proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-chunked-v6-proof-${{ github.run_id }}
          path: |
            /tmp/legacy-chunked-v6-status.json
            /tmp/legacy-chunked-v6-proof.png
            /tmp/legacy-chunked-v6-browser.log
            /tmp/index.html
            /tmp/app.js
            /tmp/meta.json
          if-no-files-found: warn

      - name: Record V6 result
        if: always()
        run: |
          if test ! -s /tmp/legacy-chunked-v6-status.json; then
            printf '{"success":false,"state":"no-result","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/legacy-chunked-v6-status.json
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/legacy-chunked-v6-status.json os/iso/legacy-chunked-v6-status.json
          cp /tmp/legacy-chunked-v6-status.json os/iso/real-multiboot-status.json
          git add os/iso/legacy-chunked-v6-status.json os/iso/real-multiboot-status.json
          git commit -m 'Record final Legacy Pages GUI verification [skip ci]' || true
          git push origin HEAD:main

      - name: Require V6 success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('/tmp/legacy-chunked-v6-status.json').read_text())
          print(json.dumps(result, indent=2))
          if not result.get('success'):
              raise SystemExit('Legacy chunked GUI V6 verification failed')
          PY
