name: Verify r3z Final GUI

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-r3z-final.yml'
      - 'os/real-multiboot/index.html'
      - 'os/real-multiboot/app.js'
      - 'os/real-multiboot/chunk-router-v3.js'
      - 'os/real-multiboot/assets/iso-meta.json'

permissions:
  contents: write

concurrency:
  group: verify-r3z-final-gui
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for exact public r3z deployment
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/os/real-multiboot'
          ready=0
          for attempt in $(seq 1 120); do
            stamp="${GITHUB_RUN_ID}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 "$BASE/?r3z=$stamp" -o /tmp/index.html \
              && grep -q 'ISO page. 20260708-r3z' /tmp/index.html \
              && grep -q 'chunk-router-v3.js?v=20260708-r3z' /tmp/index.html \
              && grep -q 'app.js?v=20260708-r3z' /tmp/index.html \
              && grep -q 'ISO9660 and El Torito verified' /tmp/index.html \
              && curl -fsSL --max-time 60 "$BASE/chunk-router-v3.js?r3z=$stamp" -o /tmp/router.js \
              && grep -q 'jsDelivr -> Statically -> raw GitHub' /tmp/router.js \
              && curl -fsSL --max-time 60 "$BASE/app.js?r3z=$stamp" -o /tmp/app.js \
              && grep -q 'selected ISO chunk source' /tmp/app.js; then
              ready=1
              break
            fi
            echo "r3z not deployed attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1
          node --check /tmp/router.js
          node --check /tmp/app.js

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot r3z and verify complete Openbox GUI
        id: browser
        continue-on-error: true
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?r3z-proof=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          mkdir -p r3z-proof
          cat > /tmp/verify-r3z.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const out='r3z-proof/result.json';
          const result={success:false,state:'starting',run_id:process.env.GITHUB_RUN_ID,target:process.env.TARGET_URL,started_at:new Date().toISOString(),console:[],page_errors:[],failed_requests:[],screen_sizes:[]};
          const save=(state,extra={})=>{Object.assign(result,extra,{state,updated_at:new Date().toISOString()});fs.writeFileSync(out,JSON.stringify(result,null,2)+'\n');};
          const fatal=/I\/O error, dev sr0|Buffer I\/O error on dev sr0|SQUASHFS error|unable to find a medium containing a live file system|GORICS_WEB_GUI_FAILED|GORICS_XORG_FAILED|GORICS_XORG_TIMEOUT|download-error|ERROR /i;
          save('starting');
          let browser,page;
          try{
            browser=await chromium.launch({headless:true,args:['--no-sandbox','--disable-dev-shm-usage','--disable-background-timer-throttling','--disable-renderer-backgrounding','--disable-backgrounding-occluded-windows','--js-flags=--max-old-space-size=2048']});
            const context=await browser.newContext({viewport:{width:1440,height:1000},deviceScaleFactor:1});
            page=await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console',m=>{result.console.push(`${m.type()}: ${m.text()}`);if(result.console.length>1200)result.console.shift();});
            page.on('pageerror',e=>result.page_errors.push(String(e)));
            page.on('requestfailed',r=>{result.failed_requests.push({url:r.url(),error:r.failure()?.errorText||'failed'});if(result.failed_requests.length>600)result.failed_requests.shift();});

            const response=await page.goto(process.env.TARGET_URL,{waitUntil:'domcontentloaded',timeout:120000});
            save('page-opened',{page_http:response?.status()||null});
            await page.waitForFunction(()=>{const log=document.querySelector('#log')?.textContent||'';return log.includes('ISO page. 20260708-r3z')&&log.includes('ISO chunk CDN router installed');},null,{timeout:300000});
            save('router-ready');
            await page.screenshot({path:'r3z-proof/00-ready.png',fullPage:true});
            await page.click('#boot-btn');
            save('boot-clicked');

            const deadline=Date.now()+20*60_000;
            let lastShot=0;
            while(Date.now()<deadline){
              await page.waitForTimeout(5000);
              const details=await page.evaluate(()=>{
                const log=document.querySelector('#log')?.textContent||'';
                const canvas=document.querySelector('#screen canvas');
                const text=document.querySelector('#screen > div');
                return {log,canvas_width:canvas?.width||0,canvas_height:canvas?.height||0,canvas_display:canvas?getComputedStyle(canvas).display:'missing',text_display:text?getComputedStyle(text).display:'missing',screen_active:document.querySelector('#screen')?.classList.contains('active')||false,boot_button_text:document.querySelector('#boot-btn')?.textContent||'',stop_button_disabled:document.querySelector('#stop-btn')?.disabled??null,emulator_object_present:Boolean(window.goricsRealLinuxIso)};
              });
              result.log_tail=details.log.split('\n').slice(-1000);
              result.emulator_started=details.log.includes('emulator-started');
              result.cdn_route_observed=details.log.includes('ISO chunk routed to CDN');
              result.iso_records_verified=details.log.includes('ISO9660 and El Torito verified');
              result.xorg_ready=details.log.includes('GORICS_XORG_READY');
              result.gui_ready=details.log.includes('GORICS_WEB_GUI_READY');
              result.graphical_canvas=details.canvas_width>=640&&details.canvas_height>=480&&details.canvas_display!=='none'&&details.text_display==='none';
              result.canvas={width:details.canvas_width,height:details.canvas_height,display:details.canvas_display,text_display:details.text_display};
              result.screen_active=details.screen_active;
              result.boot_button_text=details.boot_button_text;
              result.stop_button_disabled=details.stop_button_disabled;
              result.emulator_object_present=details.emulator_object_present;
              result.screen_sizes=[...new Set([...result.screen_sizes,...[...details.log.matchAll(/screen-set-size\s+(\[[^\n]+\])/g)].map(m=>m[1])])].slice(-30);
              if(fatal.test(details.log))throw new Error('fatal boot marker detected');
              if(result.emulator_started&&result.cdn_route_observed&&result.iso_records_verified&&result.xorg_ready&&result.gui_ready&&result.graphical_canvas&&details.screen_active&&details.boot_button_text==='Running'&&details.stop_button_disabled===false&&details.emulator_object_present){result.success=true;break;}
              if(Date.now()-lastShot>120000){lastShot=Date.now();await page.screenshot({path:`r3z-proof/progress-${Math.floor((Date.now()-Date.parse(result.started_at))/1000)}s.png`,fullPage:true});}
            }
            if(!result.success)throw new Error('r3z complete Openbox readiness timeout');
            await page.waitForTimeout(30000);
            await page.screenshot({path:'r3z-proof/99-openbox-ready.png',fullPage:true});
            const canvas=page.locator('#screen canvas');
            if(await canvas.count())await canvas.screenshot({path:'r3z-proof/99-canvas.png'}).catch(()=>{});
            save('completed',{success:true,completed_at:new Date().toISOString()});
          }catch(error){
            result.error=String(error?.stack||error);
            try{const log=await page?.locator('#log').textContent()||'';result.log_tail=log.split('\n').slice(-1200);await page?.screenshot({path:'r3z-proof/99-failure.png',fullPage:true});}catch{}
            save('failed',{success:false,completed_at:new Date().toISOString()});
          }finally{await browser?.close().catch(()=>{});}
          if(!result.success)process.exit(1);
          JS
          node --check /tmp/verify-r3z.mjs
          timeout --signal=TERM --kill-after=30s 25m node /tmp/verify-r3z.mjs 2>&1 | tee r3z-proof/runner.log

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r3z-final-proof-${{ github.run_id }}
          path: r3z-proof/
          if-no-files-found: warn

      - name: Record final result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if test ! -s r3z-proof/result.json; then
            mkdir -p r3z-proof
            printf '{"success":false,"state":"no-result","version":"r3z","run_id":"%s"}\n' "$GITHUB_RUN_ID" > r3z-proof/result.json
          fi
          python3 - <<'PY'
          import json,os
          from pathlib import Path
          p=Path('r3z-proof/result.json')
          d=json.loads(p.read_text())
          d['version']='r3z'
          d['job_status']=os.environ.get('JOB_STATUS')
          d['workflow_sha']=os.environ.get('GITHUB_SHA')
          p.write_text(json.dumps(d,indent=2)+'\n')
          PY
          cp r3z-proof/result.json /tmp/r3z-result.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 12); do
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/r3z-result.json os/iso/r3z-final-result.json
            cp /tmp/r3z-result.json os/iso/real-multiboot-status.json
            git add os/iso/r3z-final-result.json os/iso/real-multiboot-status.json
            git commit -m 'Record r3z final GUI verification [skip ci]' || break
            if git push origin HEAD:main; then break; fi
            sleep $((attempt*3))
          done

      - name: Require success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path('/tmp/r3z-result.json').read_text())
          print(json.dumps(d,indent=2))
          assert d.get('success') is True
          for key in ('emulator_started','cdn_route_observed','iso_records_verified','xorg_ready','gui_ready','graphical_canvas','screen_active','emulator_object_present'):
              assert d.get(key) is True,(key,d.get(key))
          assert d.get('boot_button_text')=='Running'
          assert d.get('stop_button_disabled') is False
          PY
