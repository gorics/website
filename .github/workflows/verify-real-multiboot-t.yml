name: Verify real multiboot t

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-real-multiboot-t.yml'
      - 'os/real-multiboot/index.html'
      - 'os/real-multiboot/chunk-compat.js'
      - 'os/real-multiboot/app.js'
      - 'os/real-multiboot/assets/iso-meta.json'

permissions:
  contents: write

concurrency:
  group: verify-real-multiboot-t
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for Pages version t
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/os/real-multiboot'
          ready=0
          for attempt in $(seq 1 120); do
            stamp="${GITHUB_RUN_ID}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 "$BASE/?verify-t=$stamp" -o /tmp/index.html \
              && grep -q 'ISO page. t' /tmp/index.html \
              && grep -q 'chunk-compat.js?v=t' /tmp/index.html \
              && grep -q 'app.js?v=t' /tmp/index.html \
              && curl -fsSL --max-time 60 "$BASE/chunk-compat.js?verify-t=$stamp" -o /tmp/chunk-compat.js \
              && grep -q 'cdn.jsdelivr.net/gh/gorics/website@os-assets' /tmp/chunk-compat.js \
              && grep -q 'raw GitHub fallback' /tmp/chunk-compat.js \
              && curl -fsSL --max-time 60 "$BASE/assets/iso-meta.json?verify-t=$stamp" -o /tmp/meta.json; then
              python3 - <<'PY' && ready=1 && break
          import json
          from pathlib import Path
          meta=json.loads(Path('/tmp/meta.json').read_text())
          assert meta['page_version']=='t'
          assert meta['architecture']=='i386'
          assert meta['parts']==21
          assert meta['chunk_size']==16777216
          assert meta['chunk_source']=='jsdelivr-os-assets-primary'
          PY
            fi
            echo "Pages t not ready attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1
          node --check /tmp/chunk-compat.js

      - name: Verify primary CDN ISO boot records
        run: |
          set -euo pipefail
          URL='https://cdn.jsdelivr.net/gh/gorics/website@os-assets/os/real-multiboot/assets/v86-parts/gorics-linux-gui-web-i386.iso-0-16777216'
          code=$(curl -sS -L --retry 5 --retry-all-errors --max-time 180 -D /tmp/headers.txt -r 32768-36863 -o /tmp/probe.bin -w '%{http_code}' "$URL?verify=${GITHUB_RUN_ID}")
          bytes=$(stat -c %s /tmp/probe.bin)
          echo "CDN HTTP=$code bytes=$bytes"
          cat /tmp/headers.txt
          test "$code" = 206 -o "$code" = 200
          python3 - <<'PY'
          from pathlib import Path
          data=Path('/tmp/probe.bin').read_bytes()
          if len(data)>=36864:
              data=data[32768:36864]
          assert len(data)==4096, len(data)
          assert data[1:6]==b'CD001'
          assert data[2049:2054]==b'CD001'
          assert b'EL TORITO' in data[2055:2087]
          print('CDN ISO9660 and El Torito records verified')
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot public Linux GUI
        id: browser
        continue-on-error: true
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?verify-gui-t=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          mkdir -p real-multiboot-t-proof
          cat > verify-real-multiboot-t.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const output='real-multiboot-t-proof/result.json';
          const result={success:false,state:'starting',run_id:process.env.GITHUB_RUN_ID,target:process.env.TARGET_URL,version:'t',started_at:new Date().toISOString(),console:[],page_errors:[],failed_requests:[]};
          const save=(state,extra={})=>{Object.assign(result,extra,{state,updated_at:new Date().toISOString()});fs.writeFileSync(output,JSON.stringify(result,null,2)+'\n');};
          save('starting');
          let browser,page;
          try {
            browser=await chromium.launch({headless:true,args:['--no-sandbox','--disable-dev-shm-usage','--disable-gpu','--disable-background-timer-throttling','--disable-renderer-backgrounding']});
            const context=await browser.newContext({viewport:{width:1280,height:900}});
            page=await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console',m=>{result.console.push(`${m.type()}: ${m.text()}`);if(result.console.length>600)result.console.shift();});
            page.on('pageerror',e=>result.page_errors.push(String(e)));
            page.on('requestfailed',r=>result.failed_requests.push({url:r.url(),error:r.failure()?.errorText||'failed'}));
            const response=await page.goto(process.env.TARGET_URL,{waitUntil:'domcontentloaded',timeout:120000});
            save('page-opened',{page_http:response?.status()||null});
            await page.waitForFunction(()=>{const log=document.querySelector('#log')?.textContent||'';return log.includes('ISO page. t')&&log.includes('ISO chunk CDN router installed');});
            save('router-ready');
            await page.screenshot({path:'real-multiboot-t-proof/00-page.png',fullPage:true});
            await page.click('#boot-btn');
            save('boot-clicked');
            await page.waitForFunction(()=>document.querySelector('#log')?.textContent.includes('ISO9660 and El Torito verified'),null,{timeout:300000});
            save('iso-verified');
            await page.waitForFunction(()=>document.querySelector('#log')?.textContent.includes('emulator-started'),null,{timeout:600000});
            save('emulator-started');
            await page.waitForFunction(()=>{const c=document.querySelector('#screen canvas');const t=document.querySelector('#screen > div');return c&&c.width>=640&&c.height>=480&&getComputedStyle(c).display!=='none'&&(!t||getComputedStyle(t).display==='none');},null,{timeout:900000});
            await page.waitForTimeout(30000);
            const details=await page.evaluate(()=>{const c=document.querySelector('#screen canvas');const t=document.querySelector('#screen > div');const log=document.querySelector('#log')?.textContent||'';return {canvas_width:c?.width||0,canvas_height:c?.height||0,canvas_display:c?getComputedStyle(c).display:'missing',text_display:t?getComputedStyle(t).display:'missing',boot_button_text:document.querySelector('#boot-btn')?.textContent||'',stop_button_disabled:document.querySelector('#stop-btn')?.disabled??null,emulator_object_present:Boolean(window.goricsRealLinuxIso),log_tail:log.split('\n').slice(-450)};});
            await page.screenshot({path:'real-multiboot-t-proof/99-gui.png',fullPage:true});
            const canvas=page.locator('#screen canvas');
            if(await canvas.count())await canvas.screenshot({path:'real-multiboot-t-proof/99-canvas.png'}).catch(()=>{});
            const success=details.canvas_width>=640&&details.canvas_height>=480&&details.canvas_display!=='none'&&details.text_display==='none'&&details.boot_button_text==='Running'&&details.stop_button_disabled===false&&details.emulator_object_present;
            save('completed',{...details,success,completed_at:new Date().toISOString()});
          } catch(error) {
            let details={};
            try {details=await page?.evaluate(()=>{const c=document.querySelector('#screen canvas');const t=document.querySelector('#screen > div');const log=document.querySelector('#log')?.textContent||'';return {canvas_width:c?.width||0,canvas_height:c?.height||0,canvas_display:c?getComputedStyle(c).display:'missing',text_display:t?getComputedStyle(t).display:'missing',page_url:location.href,log_tail:log.split('\n').slice(-450)};})||{};await page?.screenshot({path:'real-multiboot-t-proof/99-failure.png',fullPage:true});}catch{}
            save('failed',{...details,error:String(error?.stack||error),completed_at:new Date().toISOString()});
          } finally {await browser?.close().catch(()=>{});}
          if(!result.success)process.exit(1);
          JS
          timeout --signal=TERM --kill-after=30s 27m node verify-real-multiboot-t.mjs 2>&1 | tee real-multiboot-t-proof/browser.log

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-multiboot-t-proof-${{ github.run_id }}
          path: real-multiboot-t-proof/
          if-no-files-found: warn

      - name: Record result
        if: always()
        run: |
          if test -s real-multiboot-t-proof/result.json; then
            cp real-multiboot-t-proof/result.json /tmp/result.json
          else
            printf '{"success":false,"state":"no-result","version":"t","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/result.json
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/result.json os/iso/real-multiboot-status.json
          git add os/iso/real-multiboot-status.json
          git commit -m 'Record multiboot t GUI verification [skip ci]' || true
          git push origin HEAD:main
          python3 - <<'PY'
          import json
          from pathlib import Path
          result=json.loads(Path('os/iso/real-multiboot-status.json').read_text())
          assert result.get('success') is True, result
          PY
