name: Verify Current Multiboot GUI

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-current-multiboot.yml'

permissions:
  contents: write

concurrency:
  group: verify-current-multiboot-gui
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot current public multiboot
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?current-proof=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          mkdir -p /tmp/current-proof
          cat > /tmp/verify-current.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const output = '/tmp/current-proof/result.json';
          const result = {
            success: false,
            state: 'starting',
            run_id: process.env.GITHUB_RUN_ID,
            target: process.env.TARGET_URL,
            started_at: new Date().toISOString(),
            console: [],
            page_errors: [],
            failed_requests: [],
          };
          const save = (state, extra = {}) => {
            Object.assign(result, extra, { state, updated_at: new Date().toISOString() });
            fs.writeFileSync(output, JSON.stringify(result, null, 2) + '\n');
          };
          const fatal = /I\/O error, dev sr0|Buffer I\/O error on dev sr0|SQUASHFS error|unable to find a medium containing a live file system/i;
          save('starting');

          let browser;
          let page;
          try {
            browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-background-timer-throttling', '--disable-renderer-backgrounding'],
            });
            const context = await browser.newContext({ viewport: { width: 1280, height: 900 } });
            page = await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console', message => {
              result.console.push(`${message.type()}: ${message.text()}`);
              if (result.console.length > 1000) result.console.shift();
            });
            page.on('pageerror', error => result.page_errors.push(String(error)));
            page.on('requestfailed', request => result.failed_requests.push({
              url: request.url(),
              error: request.failure()?.errorText || 'failed',
            }));

            const response = await page.goto(process.env.TARGET_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            save('page-opened', { page_http: response?.status() || null });
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              return Boolean(document.querySelector('#boot-btn')) && log.includes('ISO chunk CDN router installed');
            }, null, { timeout: 300000 });
            const initial = await page.locator('#log').textContent() || '';
            save('router-ready', { initial_marker: initial.split('\n')[0] || '' });
            await page.screenshot({ path: '/tmp/current-proof/00-ready.png', fullPage: true });
            await page.click('#boot-btn');
            save('boot-clicked');

            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              if (/I\/O error, dev sr0|Buffer I\/O error on dev sr0|SQUASHFS error|unable to find a medium containing a live file system/i.test(log)) return 'fatal';
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              if (log.includes('ISO chunk routed to CDN')
                && canvas
                && canvas.width >= 640
                && canvas.height >= 480
                && getComputedStyle(canvas).display !== 'none'
                && (!text || getComputedStyle(text).display === 'none')) return 'gui';
              return false;
            }, null, { timeout: 1200000 });

            let currentLog = await page.locator('#log').textContent() || '';
            if (fatal.test(currentLog)) throw new Error('fatal CD-ROM read error detected');
            await page.waitForTimeout(45000);

            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              const log = document.querySelector('#log')?.textContent || '';
              return {
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_display: text ? getComputedStyle(text).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                boot_button_text: document.querySelector('#boot-btn')?.textContent || '',
                stop_button_disabled: document.querySelector('#stop-btn')?.disabled ?? null,
                emulator_object_present: Boolean(window.goricsRealLinuxIso),
                emulator_started: log.includes('emulator-started'),
                cdn_route_observed: log.includes('ISO chunk routed to CDN'),
                first_chunk_verified: log.includes('ISO9660 and El Torito verified'),
                sr0_error_observed: /I\/O error, dev sr0|Buffer I\/O error on dev sr0/i.test(log),
                squashfs_error_observed: /SQUASHFS error/i.test(log),
                log_tail: log.split('\n').slice(-800),
              };
            });
            currentLog = details.log_tail.join('\n');
            if (fatal.test(currentLog)) throw new Error('fatal CD-ROM read error appeared after GUI transition');

            await page.screenshot({ path: '/tmp/current-proof/99-gui.png', fullPage: true });
            const canvas = page.locator('#screen canvas');
            if (await canvas.count()) await canvas.screenshot({ path: '/tmp/current-proof/99-canvas.png' }).catch(() => {});

            const success = details.canvas_width >= 640
              && details.canvas_height >= 480
              && details.canvas_display !== 'none'
              && details.text_display === 'none'
              && details.screen_active
              && details.boot_button_text === 'Running'
              && details.stop_button_disabled === false
              && details.emulator_object_present
              && details.emulator_started
              && details.cdn_route_observed
              && details.first_chunk_verified
              && !details.sr0_error_observed
              && !details.squashfs_error_observed;
            save('completed', { ...details, success, completed_at: new Date().toISOString() });
            if (!success) throw new Error('current multiboot GUI assertions failed');
          } catch (error) {
            let details = {};
            try {
              details = await page?.evaluate(() => {
                const log = document.querySelector('#log')?.textContent || '';
                const canvas = document.querySelector('#screen canvas');
                return {
                  canvas_width: canvas?.width || 0,
                  canvas_height: canvas?.height || 0,
                  log_tail: log.split('\n').slice(-900),
                };
              }) || {};
              await page?.screenshot({ path: '/tmp/current-proof/99-failure.png', fullPage: true });
            } catch {}
            save('failed', { ...details, success: false, error: String(error?.stack || error), completed_at: new Date().toISOString() });
            throw error;
          } finally {
            await browser?.close().catch(() => {});
          }
          JS
          node --check /tmp/verify-current.mjs
          node /tmp/verify-current.mjs

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: current-multiboot-proof-${{ github.run_id }}
          path: /tmp/current-proof/
          if-no-files-found: warn

      - name: Record current result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if test ! -s /tmp/current-proof/result.json; then
            mkdir -p /tmp/current-proof
            printf '{"success":false,"state":"workflow-failed-before-browser","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/current-proof/result.json
          fi
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          p=Path('/tmp/current-proof/result.json')
          d=json.loads(p.read_text())
          d['job_status']=os.environ.get('JOB_STATUS')
          d['workflow_sha']=os.environ.get('GITHUB_SHA')
          p.write_text(json.dumps(d,indent=2)+'\n')
          PY
          cp /tmp/current-proof/result.json /tmp/current-result.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 12); do
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p os/iso
            cp /tmp/current-result.json os/iso/current-multiboot-result.json
            git add os/iso/current-multiboot-result.json
            git commit -m 'Record current multiboot GUI verification [skip ci]' || exit 0
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 3))
          done
          exit 1
