name: Verify Public q v86 Boot

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-public-q-v86.yml'
      - 'scripts/verify-public-q-v86.mjs'

permissions:
  contents: write
  actions: read

concurrency:
  group: verify-public-q-v86
  cancel-in-progress: true

jobs:
  browser-boot:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.57.0
          npx playwright install --with-deps chromium

      - name: Boot public i386 Openbox in v86
        id: browser
        continue-on-error: true
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?v=q-browser-${{ github.run_id }}
        run: |
          rm -rf browser-proof
          mkdir -p browser-proof
          node scripts/verify-public-q-v86.mjs

      - name: Upload browser proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gorics-public-q-v86-proof
          path: browser-proof/
          if-no-files-found: warn
          retention-days: 14

      - name: Record browser verification
        if: always()
        run: |
          if test ! -s browser-proof/result.json; then
            printf '{"success":false,"error":"browser result missing","run_id":"%s"}\n' "$GITHUB_RUN_ID" > browser-proof-result.json
          else
            cp browser-proof/result.json browser-proof-result.json
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp browser-proof-result.json os/iso/public-q-browser-result.json
          git add os/iso/public-q-browser-result.json
          git commit -m 'Record public q Chromium v86 boot result [skip ci]' || true
          git push origin HEAD:main
          python3 - <<'PY'
          import json
          from pathlib import Path
          result=json.loads(Path('os/iso/public-q-browser-result.json').read_text())
          assert result.get('success') is True
          assert result.get('gui_ready') is True
          assert result.get('xorg_ready') is True
          assert result.get('emulator_started') is True
          assert result.get('graphical_canvas') is True
          PY
