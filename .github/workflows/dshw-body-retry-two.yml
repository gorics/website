name: DSHW Body Retry Two

on:
  pull_request:
    branches: ["main"]
    paths: ["tmp/dshw_body_retry_trigger_20260627.txt"]

permissions:
  contents: read
  actions: read

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Retry two public post bodies
        run: |
          npm init -y >/dev/null 2>&1
          npm install cheerio@1.0.0-rc.12 >/dev/null 2>&1
          cat > retry_two.mjs <<'NODE'
          import fs from "node:fs";
          import { load } from "cheerio";
          const posts=["135303","134820"];
          const clean=s=>String(s??"").replace(/\u00a0/g," ").replace(/[ \t]+/g," ").replace(/\n\s+/g,"\n").replace(/\n{3,}/g,"\n\n").trim();
          const abs=u=>{u=String(u??"").trim();if(!u)return"";if(u.startsWith("//"))return"https:"+u;if(u.startsWith("/"))return"https://gall.dcinside.com"+u;return u;};
          const sleep=ms=>new Promise(r=>setTimeout(r,ms));
          function parseBody(html){const $=load(html,{decodeEntities:false});let body=$(".write_div").first();if(!body.length)body=$(".view_content_wrap .write_div, .view_content, #container .writing_view_box").first();const page_title=clean($("title").text());if(!body.length)return{body_status:"no_body_node",body_text:"",body_html:"",attachment_urls_json:"[]",outbound_urls_json:"[]",page_title};body.find("script,style").remove();const body_html=(body.html()||"").trim(),body_text=clean(body.text()),media=[],links=[];body.find("img,video,audio,source").each((_,el)=>{const u=abs($(el).attr("src")||$(el).attr("data-original")||$(el).attr("data-src")||"");if(u)media.push(u);});body.find("a[href]").each((_,el)=>{const u=abs($(el).attr("href")||"");if(u)links.push(u);});return{body_status:body_text||body_html?"captured":"empty_body_node",body_text,body_html,attachment_urls_json:JSON.stringify([...new Set(media)]),outbound_urls_json:JSON.stringify([...new Set(links)]),page_title};}
          const rows=[];
          for(const post_no of posts){let result={post_no,body_status:"error",body_http_status:"0"};for(let attempt=1;attempt<=4;attempt++){try{const url=`https://gall.dcinside.com/mgallery/board/view/?id=dshw&no=${post_no}`;const r=await fetch(url,{headers:{"user-agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36","accept-language":"ko-KR,ko;q=0.9"}});const text=await r.text();result={post_no,...parseBody(text),body_http_status:String(r.status),body_crawled_at:new Date().toISOString()};if(result.body_status==="captured")break;}catch(e){result={post_no,body_status:e?.name||String(e),body_http_status:"0",body_crawled_at:new Date().toISOString()};}await sleep(4000*attempt);}rows.push(result);}
          fs.writeFileSync("dshw_body_retry_two.json",JSON.stringify(rows,null,2));
          console.log(JSON.stringify(rows.map(r=>({post_no:r.post_no,status:r.body_status,chars:r.body_text?.length||0}))));
          if(rows.some(r=>r.body_status!=="captured"))process.exitCode=2;
          NODE
          node retry_two.mjs
      - name: Upload body retry artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dshw-body-retry-two
          retention-days: 1
          path: dshw_body_retry_two.json
