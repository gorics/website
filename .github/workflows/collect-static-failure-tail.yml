name: Collect Static Failure Tail

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/collect-static-failure-tail.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      COLLECTOR_NONCE: '20260710-2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Capture latest failed static logs
        run: |
          set -euo pipefail
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow static.yml --branch main --limit 20 --json databaseId,conclusion,createdAt --jq '[.[] | select(.conclusion == "failure")][0].databaseId')
          test -n "$run_id"
          gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/static-failed.log 2>&1 || true
          RUN_ID="$run_id" python3 - <<'PY'
          import json, os
          from pathlib import Path
          text = Path('/tmp/static-failed.log').read_text(errors='replace')
          result = {
              'run_id': os.environ['RUN_ID'],
              'tail': text.splitlines()[-260:],
          }
          Path('os/iso/static-failure-tail.json').write_text(json.dumps(result, indent=2) + '\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add os/iso/static-failure-tail.json
          git commit -m 'chore(os): capture static failure tail [skip ci]' || true
          git push origin HEAD:main
