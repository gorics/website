name: Verify Unified Real Multiboot

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'os/real-multiboot/**'
      - '.github/workflows/static.yml'
      - '.github/workflows/verify-unified-multiboot.yml'

permissions:
  contents: read

concurrency:
  group: verify-unified-real-multiboot-stable
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate native XHR source and seven presets
        run: |
          set -euo pipefail
          grep -q 'GORICS Real Multiboot' os/real-multiboot/index.html
          grep -q 'id="os-select"' os/real-multiboot/index.html
          grep -q 'id="loading-overlay"' os/real-multiboot/index.html
          grep -q 'id="boot-steps"' os/real-multiboot/index.html
          grep -q 'meta name="gorics-build"' os/real-multiboot/index.html
          grep -q 'asset-versioning.js' os/real-multiboot/index.html
          grep -q 'safe-diagnostics.js' os/real-multiboot/index.html
          ! grep -q 'chunk-router-v4.js' os/real-multiboot/index.html
          ! grep -q 'src="./diagnostics.js' os/real-multiboot/index.html
          for preset in gorics buildroot dsl tiny freedos buildroot-serial dsl-high; do
            grep -q "value=\"$preset\"" os/real-multiboot/index.html
          done
          grep -q 'graphicalReady' os/real-multiboot/app.js
          grep -q 'wasm_path: wasm' os/real-multiboot/app.js
          grep -q 'safe diagnostics installed without replacing XMLHttpRequest' os/real-multiboot/safe-diagnostics.js
          grep -q '__GORICS_ATOMIC_ASSETS__' os/real-multiboot/asset-versioning.js
          node --check os/real-multiboot/app.js
          node --check os/real-multiboot/asset-versioning.js
          node --check os/real-multiboot/safe-diagnostics.js
          node --check os/real-multiboot/local-media-router.js

      - name: Wait for matching public deployment
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/os/real-multiboot'
          ready=0
          for attempt in $(seq 1 120); do
            stamp="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 -H 'Cache-Control: no-cache' "$BASE/?verify=$stamp" -o /tmp/public-index.html \
              && grep -q 'asset-versioning.js?v=' /tmp/public-index.html \
              && grep -q 'safe-diagnostics.js?v=' /tmp/public-index.html \
              && grep -q 'meta name="gorics-build"' /tmp/public-index.html \
              && ! grep -q 'chunk-router-v4.js' /tmp/public-index.html \
              && curl -fsSL --max-time 60 "$BASE/asset-versioning.js?verify=$stamp" -o /tmp/public-asset-versioning.js \
              && grep -q '__GORICS_ATOMIC_ASSETS__' /tmp/public-asset-versioning.js \
              && curl -fsSL --max-time 60 "$BASE/safe-diagnostics.js?verify=$stamp" -o /tmp/public-safe-diagnostics.js \
              && grep -q '__GORICS_SAFE_DIAGNOSTICS__' /tmp/public-safe-diagnostics.js \
              && curl -fsSL --max-time 60 "$BASE/app.js?verify=$stamp" -o /tmp/public-app.js \
              && grep -q 'graphicalReady' /tmp/public-app.js; then
              ready=1
              echo "public deployment ready attempt=$attempt"
              break
            fi
            echo "public deployment pending attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1
          node --check /tmp/public-asset-versioning.js
          node --check /tmp/public-safe-diagnostics.js
          node --check /tmp/public-app.js

      - name: Verify essential public assets
        run: |
          set -euo pipefail
          ROOT='https://gorics.github.io/website'
          stamp="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date +%s)"
          for path in \
            vendor/v86/libv86.js \
            vendor/v86/v86.wasm \
            vendor/v86/seabios.bin \
            vendor/v86/vgabios.bin \
            vendor/v86/manifest.json \
            os/real-multiboot/assets/iso-meta.json \
            os/real-multiboot/assets/vmlinuz \
            os/real-multiboot/assets/initrd.img; do
            code=$(curl -sS -L --max-time 120 -r 0-4095 -o "/tmp/$(basename "$path").probe" -w '%{http_code}' "$ROOT/$path?verify=$stamp")
            case "$code" in 200|206) ;; *) echo "bad HTTP $code for $path"; exit 1;; esac
            test -s "/tmp/$(basename "$path").probe"
            echo "asset OK status=$code path=$path"
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium and WebKit
        run: |
          cd /tmp
          npm init -y
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium webkit

      - name: Boot Chromium and WebKit
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?verify=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cat > /tmp/verify-unified.mjs <<'JS'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';

          const result = {
            success: false,
            state: 'running',
            run_id: process.env.GITHUB_RUN_ID,
            run_attempt: process.env.GITHUB_RUN_ATTEMPT,
            url: process.env.VERIFY_URL,
            started_at: new Date().toISOString(),
            browsers: {},
          };

          async function snapshot(page, name) {
            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              const log = document.querySelector('#log')?.textContent || '';
              return {
                selected: document.querySelector('#os-select')?.value,
                state_text: document.querySelector('#boot-btn')?.textContent,
                stage: document.querySelector('#stage-label')?.textContent,
                progress: document.querySelector('#progress-percent')?.textContent,
                overlay_hidden: document.querySelector('#loading-overlay')?.classList.contains('hidden'),
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_length: text?.textContent?.length || 0,
                text_display: text ? getComputedStyle(text).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                log_tail: log.split('\n').slice(-400),
              };
            });
            await page.screenshot({ path: `/tmp/${name}.png`, fullPage: true });
            return details;
          }

          function assertNoRuntimeMismatch(lines) {
            const text = lines.join('\n');
            if (/Length out of range of buffer|RangeError|wasm.*mismatch|unhandled rejection.*Uint8Array/i.test(text)) {
              throw new Error(`v86 runtime mismatch detected:\n${text.slice(-12000)}`);
            }
          }

          async function bootPreset(page, name, timeout, requireGui) {
            await page.selectOption('#os-select', name);
            await page.click('#boot-btn');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('emulator-started'), null, { timeout });
            await page.waitForFunction(() => {
              const progress = document.querySelector('#progress-percent')?.textContent;
              const hidden = document.querySelector('#loading-overlay')?.classList.contains('hidden');
              const running = document.querySelector('#boot-btn')?.textContent === '실행 중';
              return progress === '100%' && hidden && running;
            }, null, { timeout });
            const details = await snapshot(page, `unified-${name}`);
            assertNoRuntimeMismatch(details.log_tail);
            const canvasReady = details.canvas_display !== 'none' && details.canvas_display !== 'missing' && details.canvas_width >= (requireGui ? 640 : 320) && details.canvas_height >= (requireGui ? 480 : 200);
            const textReady = !requireGui && details.text_length > 0 && details.text_display !== 'none' && details.text_display !== 'missing';
            if (!details.screen_active || details.progress !== '100%' || !details.overlay_hidden || !(canvasReady || textReady)) {
              throw new Error(`${name} display assertion failed ${JSON.stringify(details)}`);
            }
            await page.click('#stop-btn');
            await page.waitForFunction(() => document.querySelector('#progress-percent')?.textContent === '0%');
            return details;
          }

          async function runChromium() {
            const browserResult = { success: false, console: [], failed_requests: [], boots: {} };
            const browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage', '--no-sandbox', '--disable-gpu'] });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
            page.setDefaultTimeout(120000);
            page.on('console', (message) => browserResult.console.push(`${message.type()}: ${message.text()}`));
            page.on('pageerror', (error) => browserResult.console.push(`pageerror: ${error.message}`));
            page.on('requestfailed', (request) => browserResult.failed_requests.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));
            try {
              await page.goto(process.env.VERIFY_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
              await page.waitForSelector('#os-select');
              const presets = await page.locator('#os-select option').evaluateAll((options) => options.map((option) => option.value));
              const expected = ['gorics', 'buildroot', 'dsl', 'tiny', 'freedos', 'buildroot-serial', 'dsl-high'];
              if (JSON.stringify(presets) !== JSON.stringify(expected)) throw new Error(`preset mismatch ${JSON.stringify(presets)}`);
              browserResult.boots.buildroot = await bootPreset(page, 'buildroot', 600000, false);
              browserResult.boots.gorics = await bootPreset(page, 'gorics', 1100000, true);
              browserResult.success = true;
            } catch (error) {
              browserResult.error = error?.stack || String(error);
              browserResult.failure_snapshot = await snapshot(page, 'chromium-failure').catch(() => null);
              throw error;
            } finally {
              await browser.close();
            }
            return browserResult;
          }

          async function runWebKit() {
            const browserResult = { success: false, console: [], failed_requests: [] };
            const browser = await webkit.launch({ headless: true });
            const context = await browser.newContext({ ...devices['iPhone 13'], locale: 'ko-KR', timezoneId: 'Asia/Seoul' });
            const page = await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console', (message) => browserResult.console.push(`${message.type()}: ${message.text()}`));
            page.on('pageerror', (error) => browserResult.console.push(`pageerror: ${error.message}`));
            page.on('requestfailed', (request) => browserResult.failed_requests.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));
            try {
              await page.goto(`${process.env.VERIFY_URL}&webkit=1`, { waitUntil: 'domcontentloaded', timeout: 120000 });
              await page.selectOption('#os-select', 'gorics');
              await page.click('#boot-btn');
              await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('emulator-started'), null, { timeout: 700000 });
              const details = await snapshot(page, 'webkit-gorics-started');
              assertNoRuntimeMismatch(details.log_tail);
              if (!details.screen_active) throw new Error(`WebKit VM screen was not attached ${JSON.stringify(details)}`);
              browserResult.details = details;
              browserResult.success = true;
            } catch (error) {
              browserResult.error = error?.stack || String(error);
              browserResult.failure_snapshot = await snapshot(page, 'webkit-failure').catch(() => null);
              throw error;
            } finally {
              await browser.close();
            }
            return browserResult;
          }

          try {
            result.browsers.chromium = await runChromium();
            result.browsers.webkit = await runWebKit();
            result.success = true;
            result.state = 'completed';
          } catch (error) {
            result.state = 'failed';
            result.error = error?.stack || String(error);
          } finally {
            result.completed_at = new Date().toISOString();
            fs.writeFileSync('/tmp/unified-multiboot-result.json', JSON.stringify(result, null, 2) + '\n');
          }
          if (!result.success) process.exit(1);
          JS
          node --check /tmp/verify-unified.mjs
          node /tmp/verify-unified.mjs | tee /tmp/browser-verifier.log
          cat /tmp/unified-multiboot-result.json

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-multiboot-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/unified-multiboot-result.json
            /tmp/browser-verifier.log
            /tmp/verify-unified.mjs
            /tmp/unified-*.png
            /tmp/chromium-*.png
            /tmp/webkit-*.png
            /tmp/public-index.html
            /tmp/public-app.js
            /tmp/public-asset-versioning.js
            /tmp/public-safe-diagnostics.js
          if-no-files-found: warn

      - name: Require successful boots
        if: always()
        run: |
          test -s /tmp/unified-multiboot-result.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path('/tmp/unified-multiboot-result.json').read_text())
          assert result.get('success') is True, result.get('error')
          chromium = result['browsers']['chromium']
          webkit = result['browsers']['webkit']
          assert chromium.get('success') is True
          assert chromium['boots']['buildroot']['progress'] == '100%'
          assert chromium['boots']['gorics']['canvas_width'] >= 640
          assert chromium['boots']['gorics']['canvas_height'] >= 480
          assert webkit.get('success') is True
          print('Chromium full boots and WebKit GORICS startup passed')
          PY
