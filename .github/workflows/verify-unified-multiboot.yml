name: Verify Unified Real Multiboot

on:
  workflow_dispatch:
  push:
    paths:
      - 'os/real-multiboot/index.html'
      - 'os/real-multiboot/styles.css'
      - 'os/real-multiboot/responsive-overrides.css'
      - 'os/real-multiboot/app.js'
      - 'os/real-multiboot/responsive.js'
      - 'os/real-multiboot/chunk-router-v4.js'
      - '.github/workflows/verify-unified-multiboot.yml'

permissions:
  contents: write

concurrency:
  group: verify-unified-real-multiboot
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate source and seven presets
        run: |
          set -euo pipefail
          grep -q 'GORICS Real Multiboot' os/real-multiboot/index.html
          grep -q 'id="os-select"' os/real-multiboot/index.html
          grep -q 'id="loading-overlay"' os/real-multiboot/index.html
          grep -q 'id="boot-steps"' os/real-multiboot/index.html
          grep -q 'data-step="display"' os/real-multiboot/index.html
          for preset in gorics buildroot dsl tiny freedos buildroot-serial dsl-high; do
            grep -q "value=\"$preset\"" os/real-multiboot/index.html
          done
          grep -q "const BUILD = '20260708-r6multiboot'" os/real-multiboot/app.js
          grep -q "window.goricsRealMultiboot = vm" os/real-multiboot/app.js
          grep -q "display ready preset=" os/real-multiboot/app.js
          grep -q "stage step=" os/real-multiboot/app.js
          node --check os/real-multiboot/app.js
          node --check os/real-multiboot/responsive.js
          node --check os/real-multiboot/chunk-router-v4.js

      - name: Wait for GitHub Pages deployment
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/os/real-multiboot'
          ready=0
          for attempt in $(seq 1 90); do
            stamp="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 "$BASE/?verify=$stamp" -o /tmp/public-index.html \
              && grep -q 'id="os-select"' /tmp/public-index.html \
              && grep -q 'id="loading-overlay"' /tmp/public-index.html \
              && grep -q 'value="dsl-high"' /tmp/public-index.html \
              && curl -fsSL --max-time 60 "$BASE/app.js?verify=$stamp" -o /tmp/public-app.js \
              && grep -q "20260708-r6multiboot" /tmp/public-app.js \
              && grep -q "window.goricsRealMultiboot = vm" /tmp/public-app.js; then
              ready=1
              echo "public deployment ready attempt=$attempt"
              break
            fi
            echo "public deployment pending attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1
          node --check /tmp/public-app.js

      - name: Verify public runtime and boot media
        run: |
          set -euo pipefail
          ROOT='https://gorics.github.io/website'
          PAGE="$ROOT/os/real-multiboot"
          curl -fsSL --max-time 60 "$PAGE/assets/iso-meta.json?verify=$GITHUB_RUN_ID" -o /tmp/iso-meta.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          meta=json.loads(Path('/tmp/iso-meta.json').read_text())
          assert meta['name']=='gorics-linux-gui-web-i386.iso'
          assert meta['architecture']=='i386'
          assert meta['size']>300_000_000
          assert meta['parts']>=20
          assert meta['chunk_size']==16*1024*1024
          print(json.dumps(meta, indent=2))
          PY
          for path in vendor/v86/libv86.js vendor/v86/v86.wasm vendor/v86/seabios.bin vendor/v86/vgabios.bin os/real-multiboot/assets/vmlinuz os/real-multiboot/assets/initrd.img; do
            code=$(curl -sS -L --max-time 90 -r 0-4095 -o "/tmp/$(basename "$path").probe" -w '%{http_code}' "$ROOT/$path?verify=$GITHUB_RUN_ID")
            test "$code" = 200 -o "$code" = 206
            test -s "/tmp/$(basename "$path").probe"
            echo "asset OK status=$code path=$path bytes=$(stat -c %s "/tmp/$(basename "$path").probe")"
          done
          FIRST='https://cdn.jsdelivr.net/gh/gorics/website@os-assets/os/real-multiboot/assets/v86-parts/gorics-linux-gui-web-i386.iso-0-16777216'
          curl -fsSL --max-time 120 -r 32768-36863 "$FIRST?verify=$GITHUB_RUN_ID" -o /tmp/iso-descriptor.bin
          python3 - <<'PY'
          from pathlib import Path
          data=Path('/tmp/iso-descriptor.bin').read_bytes()
          if len(data)>4096:
              data=data[32768:36864]
          assert len(data)==4096, len(data)
          assert data[1:6]==b'CD001'
          assert data[2049:2054]==b'CD001'
          assert b'EL TORITO' in data[2055:2087]
          print('GORICS ISO9660 and El Torito descriptors verified')
          PY
          for url in \
            https://i.copy.sh/buildroot-bzimage68.bin \
            https://i.copy.sh/linux4.iso \
            https://i.copy.sh/linux.iso \
            https://i.copy.sh/freedos722.img; do
            code=$(curl -sS -L --max-time 120 -r 0-1023 -o /tmp/external-media.probe -w '%{http_code}' "$url")
            test "$code" = 200 -o "$code" = 206
            test -s /tmp/external-media.probe
            echo "external media OK status=$code url=$url bytes=$(stat -c %s /tmp/external-media.probe)"
          done

      - name: Setup browser verifier
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot Buildroot then GORICS on public page
        id: browser
        continue-on-error: true
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?verify=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cat > /tmp/verify-unified.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const result = {
            success: false,
            state: 'running',
            run_id: process.env.GITHUB_RUN_ID,
            run_attempt: process.env.GITHUB_RUN_ATTEMPT,
            url: process.env.VERIFY_URL,
            started_at: new Date().toISOString(),
            presets_found: [],
            boots: {},
            console: [],
            failed_requests: [],
          };
          let browser;
          let page;

          async function snapshot(name) {
            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              const log = document.querySelector('#log')?.textContent || '';
              return {
                selected: document.querySelector('#os-select')?.value,
                state_text: document.querySelector('#boot-btn')?.textContent,
                stage: document.querySelector('#stage-label')?.textContent,
                progress: document.querySelector('#progress-percent')?.textContent,
                overlay_hidden: document.querySelector('#loading-overlay')?.classList.contains('hidden'),
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_length: text?.textContent?.length || 0,
                text_display: text ? getComputedStyle(text).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                log_tail: log.split('\n').slice(-220),
              };
            });
            await page.screenshot({ path: `/tmp/${name}.png`, fullPage: true });
            return details;
          }

          async function bootPreset(name, timeout) {
            await page.selectOption('#os-select', name);
            await page.waitForFunction(value => document.querySelector('#os-select')?.value === value, name);
            await page.click('#boot-btn');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('emulator-started'), null, { timeout });
            await page.waitForFunction(() => {
              const progress = document.querySelector('#progress-percent')?.textContent;
              const hidden = document.querySelector('#loading-overlay')?.classList.contains('hidden');
              const running = document.querySelector('#boot-btn')?.textContent === '실행 중';
              return progress === '100%' && hidden && running;
            }, null, { timeout });
            const details = await snapshot(`unified-${name}`);
            const displayed = (details.canvas_width >= 320 && details.canvas_height >= 200 && details.canvas_display !== 'none') ||
              (details.text_length > 0 && details.text_display !== 'none');
            if (!details.screen_active || details.progress !== '100%' || !details.overlay_hidden || !displayed) {
              throw new Error(`${name} display assertion failed: ${JSON.stringify(details)}`);
            }
            result.boots[name] = { success: true, ...details };
            await page.click('#stop-btn');
            await page.waitForFunction(() => document.querySelector('#progress-percent')?.textContent === '0%');
          }

          try {
            browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage', '--no-sandbox', '--disable-gpu'] });
            page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
            page.setDefaultTimeout(120000);
            page.on('console', message => result.console.push(`${message.type()}: ${message.text()}`));
            page.on('pageerror', error => result.console.push(`pageerror: ${error.message}`));
            page.on('requestfailed', request => result.failed_requests.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));
            await page.goto(process.env.VERIFY_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForSelector('#os-select');
            result.presets_found = await page.locator('#os-select option').evaluateAll(options => options.map(option => option.value));
            const expected = ['gorics', 'buildroot', 'dsl', 'tiny', 'freedos', 'buildroot-serial', 'dsl-high'];
            if (JSON.stringify(result.presets_found) !== JSON.stringify(expected)) throw new Error(`preset mismatch ${JSON.stringify(result.presets_found)}`);
            await bootPreset('buildroot', 600000);
            await bootPreset('gorics', 1100000);
            result.success = true;
            result.state = 'completed';
            result.completed_at = new Date().toISOString();
          } catch (error) {
            result.state = 'failed';
            result.error = error?.stack || String(error);
            result.completed_at = new Date().toISOString();
            if (page) {
              result.failure_snapshot = await snapshot('unified-failure').catch(() => null);
            }
          } finally {
            await browser?.close().catch(() => {});
            fs.writeFileSync('/tmp/unified-multiboot-result.json', JSON.stringify(result, null, 2) + '\n');
          }
          if (!result.success) process.exit(1);
          JS
          node --check /tmp/verify-unified.mjs
          node /tmp/verify-unified.mjs

      - name: Ensure browser result exists
        if: always()
        run: |
          if test ! -s /tmp/unified-multiboot-result.json; then
            printf '{"success":false,"state":"no-result","run_id":"%s","error":"browser verifier did not produce a result"}\n' "$GITHUB_RUN_ID" > /tmp/unified-multiboot-result.json
          fi
          cat /tmp/unified-multiboot-result.json

      - name: Upload verification proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-multiboot-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/unified-multiboot-result.json
            /tmp/unified-*.png
            /tmp/public-index.html
            /tmp/public-app.js
            /tmp/iso-meta.json
          if-no-files-found: warn

      - name: Publish latest verification status
        if: always()
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 8); do
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/unified-multiboot-result.json os/iso/unified-multiboot-status.json
            git add os/iso/unified-multiboot-status.json
            git commit -m 'Record unified multiboot verification result [skip ci]' || exit 0
            if git push origin HEAD:main; then exit 0; fi
            echo "status push conflict attempt=$attempt"
            sleep $((attempt * 3))
          done
          exit 1

      - name: Require successful consecutive boots
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          result=json.loads(Path('/tmp/unified-multiboot-result.json').read_text())
          assert result.get('success') is True, result.get('error')
          assert result.get('boots', {}).get('buildroot', {}).get('success') is True
          assert result.get('boots', {}).get('gorics', {}).get('success') is True
          print('Buildroot and GORICS consecutive public boots passed')
          PY
