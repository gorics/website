name: Force Real Multiboot deploy

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - 'os/real-multiboot/**'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Record deployment dispatch
        run: |
          printf 'status=dispatched\nsource=%s\nrun_id=%s\nsha=%s\n' \
            "${{ github.event_name }}" \
            "${{ github.run_id }}" \
            "${{ github.sha }}" \
            > os/real-multiboot/deploy-status.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add os/real-multiboot/deploy-status.txt
          git commit -m 'chore(multiboot): record Pages dispatch [skip ci]' || true
          git push origin HEAD:main

      - name: Dispatch Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: 'main'
            });

      - name: Verify public responsive deployment
        shell: bash
        run: |
          set +e
          PAGE='https://gorics.github.io/website/os/real-multiboot/'
          STATUS=failed
          DETAIL='responsive page not observed'
          for attempt in $(seq 1 90); do
            URL="${PAGE}?verify=${GITHUB_RUN_ID}-${attempt}"
            if curl -fsSL --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "$URL" -o /tmp/multiboot-index.html \
              && grep -q 'GORICS Real Multiboot' /tmp/multiboot-index.html \
              && grep -q 'responsive-overrides.css?v=n' /tmp/multiboot-index.html \
              && grep -q 'responsive.js?v=n' /tmp/multiboot-index.html; then
              STATUS=deployed
              DETAIL="responsive page verified on attempt ${attempt}"
              break
            fi
            echo "responsive deployment not visible, attempt ${attempt}"
            sleep 10
          done

          git fetch origin main
          git reset --hard origin/main
          printf 'status=%s\ndetail=%s\nsource=%s\nrun_id=%s\nsha=%s\n' \
            "$STATUS" \
            "$DETAIL" \
            "${{ github.event_name }}" \
            "${{ github.run_id }}" \
            "${{ github.sha }}" \
            > os/real-multiboot/deploy-status.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add os/real-multiboot/deploy-status.txt
          git commit -m "chore(multiboot): record Pages ${STATUS} [skip ci]" || true
          git push origin HEAD:main
          test "$STATUS" = deployed

      - name: Dispatch graphical V5 boot verification
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'verify-real-multiboot-v5.yml',
              ref: 'main'
            });
