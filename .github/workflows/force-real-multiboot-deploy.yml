name: Deploy and Verify Real Multiboot

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'os/real-multiboot/**'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: deploy-real-multiboot-canonical
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Record deployment dispatch
        run: |
          printf 'status=dispatched\nsource=%s\nrun_id=%s\nsha=%s\n' \
            "${{ github.event_name }}" \
            "${{ github.run_id }}" \
            "${{ github.sha }}" \
            > os/real-multiboot/deploy-status.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add os/real-multiboot/deploy-status.txt
          git commit -m 'chore(multiboot): record Pages dispatch [skip ci]' || true
          git push origin HEAD:main

      - name: Dispatch canonical Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: 'main'
            });

      - name: Verify public R19 deployment
        shell: bash
        run: |
          set +e
          PAGE='https://gorics.github.io/website/os/real-multiboot/'
          STATUS=failed
          DETAIL='R19 page not observed'
          for attempt in $(seq 1 120); do
            STAMP="${GITHUB_RUN_ID}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 30 "${PAGE}?verify=${STAMP}" -o /tmp/multiboot-index.html \
              && grep -q 'r19-stable-runtime-cache-safe-local-media-pointer-calibration' /tmp/multiboot-index.html \
              && grep -q 'responsive-overrides.css?v=' /tmp/multiboot-index.html \
              && grep -q 'pointer-calibration.js?v=' /tmp/multiboot-index.html \
              && curl -fsSL --max-time 30 "${PAGE}performance-mode.js?verify=${STAMP}" -o /tmp/performance-mode.js \
              && grep -q 'logCapChars: 120000' /tmp/performance-mode.js; then
              STATUS=deployed
              DETAIL="R19 deployment verified on attempt ${attempt}"
              break
            fi
            echo "R19 deployment not visible, attempt ${attempt}/120"
            sleep 10
          done
          set -e

          git fetch origin main --depth=1
          git checkout -B deploy-status origin/main
          printf 'status=%s\ndetail=%s\nsource=%s\nrun_id=%s\nsha=%s\n' \
            "$STATUS" \
            "$DETAIL" \
            "${{ github.event_name }}" \
            "${{ github.run_id }}" \
            "${{ github.sha }}" \
            > os/real-multiboot/deploy-status.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add os/real-multiboot/deploy-status.txt
          git commit -m "chore(multiboot): record Pages ${STATUS} [skip ci]" || true
          git push origin HEAD:main
          test "$STATUS" = deployed

      - name: Dispatch canonical R19 graphical verification
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'verify-real-multiboot-r19-v2.yml',
              ref: 'main'
            });
