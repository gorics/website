name: Force Real Multiboot deploy

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - 'os/real-multiboot/**'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Record deployment dispatch
        run: |
          printf 'status=dispatched\nsource=%s\nrun_id=%s\nsha=%s\n' \
            "${{ github.event_name }}" \
            "${{ github.run_id }}" \
            "${{ github.sha }}" \
            > os/real-multiboot/deploy-status.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add os/real-multiboot/deploy-status.txt
          git commit -m 'chore(multiboot): record Pages dispatch [skip ci]' || true
          git push origin HEAD:main

      - name: Dispatch Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: 'main'
            });
