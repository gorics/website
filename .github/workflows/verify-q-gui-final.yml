name: Verify q GUI Final

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-q-gui-final.yml'

permissions:
  contents: write

concurrency:
  group: verify-q-gui-final
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for fixed q deployment
        run: |
          BASE='https://gorics.github.io/website/os/real-multiboot'
          READY=0
          for attempt in $(seq 1 120); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            if curl -fsSL --max-time 60 "$BASE/?final-q=$stamp" -o /tmp/index.html \
              && grep -q 'app.js?v=q' /tmp/index.html \
              && grep -q 'ISO page. q' /tmp/index.html \
              && curl -fsSL --max-time 60 "$BASE/app.js?final-q=$stamp" -o /tmp/app.js \
              && grep -q "screen.classList.add('active')" /tmp/app.js \
              && grep -q 'raw.githubusercontent.com/gorics/website/os-assets' /tmp/app.js \
              && grep -q 'use_parts: true' /tmp/app.js \
              && curl -fsSL --max-time 60 "$BASE/assets/iso-meta.json?final-q=$stamp" -o /tmp/meta.json; then
              python3 - <<'PY' && READY=1 && break
          import json
          from pathlib import Path
          m=json.loads(Path('/tmp/meta.json').read_text())
          assert m['name']=='gorics-linux-gui-web-i386.iso'
          assert m['architecture']=='i386'
          assert m['page_version']=='q'
          assert m['chunked'] is True
          assert m['direct_boot'] is True
          assert m['complete_ui_verified'] is True
          assert m['parts']==21
          PY
            fi
            echo "fixed q not ready attempt=$attempt"
            sleep 10
          done
          test "$READY" = 1
          node --check /tmp/app.js

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot public q Linux GUI
        id: browser
        continue-on-error: true
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?final-gui=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          mkdir -p q-final-proof
          cat > verify-q-final.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const output='q-final-proof/result.json';
          const result={
            success:false,
            state:'starting',
            run_id:process.env.GITHUB_RUN_ID,
            target:process.env.TARGET_URL,
            version:'q',
            architecture:'i386',
            desktop:'openbox-tint2-pcmanfm-xterm',
            mode:'legacy-pages-external-chunks-direct-kernel',
            started_at:new Date().toISOString(),
            console:[],
            page_errors:[],
            failed_requests:[],
          };
          const save=(state,extra={})=>{
            Object.assign(result,extra,{state,updated_at:new Date().toISOString()});
            fs.writeFileSync(output,JSON.stringify(result,null,2)+'\n');
          };
          save('starting');
          let browser;
          let page;
          try{
            browser=await chromium.launch({headless:true,args:['--no-sandbox','--disable-dev-shm-usage','--disable-gpu','--disable-background-timer-throttling','--disable-renderer-backgrounding']});
            const context=await browser.newContext({viewport:{width:1280,height:900}});
            page=await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console',m=>{
              result.console.push(`${m.type()}: ${m.text()}`);
              if(result.console.length>500)result.console.shift();
            });
            page.on('pageerror',e=>result.page_errors.push(String(e)));
            page.on('requestfailed',r=>result.failed_requests.push({url:r.url(),error:r.failure()?.errorText||'failed'}));
            page.on('crash',()=>save('page-crashed'));

            const response=await page.goto(process.env.TARGET_URL,{waitUntil:'domcontentloaded',timeout:120000});
            save('page-opened',{page_http:response?.status()||null});
            await page.waitForFunction(()=>{
              const log=document.querySelector('#log')?.textContent||'';
              return log.includes('ISO page. q')&&log.includes('legacy Pages chunked i386 Openbox loader installed');
            });
            save('loader-ready');
            await page.screenshot({path:'q-final-proof/00-page-q.png',fullPage:true});
            await page.click('#boot-btn');
            save('boot-clicked');

            await page.waitForFunction(()=>document.querySelector('#log')?.textContent.includes('ISO size='),null,{timeout:180000});
            save('metadata-loaded');
            await page.waitForFunction(()=>document.querySelector('#log')?.textContent.includes('ISO9660 and El Torito verified'),null,{timeout:300000});
            save('chunk-verified');
            await page.waitForFunction(()=>{
              const log=document.querySelector('#log')?.textContent||'';
              return log.includes('kernel available')&&log.includes('initrd available')&&log.includes('runtime available')&&log.includes('wasm available');
            },null,{timeout:300000});
            save('boot-files-verified');
            await page.waitForFunction(()=>document.querySelector('#log')?.textContent.includes('emulator-started'),null,{timeout:600000});
            save('emulator-started');
            await page.waitForFunction(()=>{
              const canvas=document.querySelector('#screen canvas');
              const text=document.querySelector('#screen > div');
              return canvas&&canvas.width>=640&&canvas.height>=480&&getComputedStyle(canvas).display!=='none'&&(!text||getComputedStyle(text).display==='none')&&document.querySelector('#screen')?.classList.contains('active');
            },null,{timeout:900000});
            save('graphical-desktop-visible');
            await page.waitForTimeout(60000);

            const details=await page.evaluate(()=>{
              const canvas=document.querySelector('#screen canvas');
              const text=document.querySelector('#screen > div');
              const log=document.querySelector('#log')?.textContent||'';
              const keyboard=document.querySelector('#keyboard-btn');
              return {
                canvas_width:canvas?.width||0,
                canvas_height:canvas?.height||0,
                canvas_display:canvas?getComputedStyle(canvas).display:'missing',
                text_display:text?getComputedStyle(text).display:'missing',
                screen_active:document.querySelector('#screen')?.classList.contains('active')||false,
                boot_button_text:document.querySelector('#boot-btn')?.textContent||'',
                stop_button_disabled:document.querySelector('#stop-btn')?.disabled??null,
                keyboard_button_present:Boolean(keyboard),
                keyboard_button_disabled:keyboard?.disabled??null,
                emulator_object_present:Boolean(window.goricsRealLinuxIso),
                log_tail:log.split('\n').slice(-400),
              };
            });
            await page.screenshot({path:'q-final-proof/99-gui.png',fullPage:true});
            const canvas=page.locator('#screen canvas');
            if(await canvas.count())await canvas.screenshot({path:'q-final-proof/99-canvas.png'}).catch(()=>{});
            const success=details.screen_active&&details.canvas_width>=640&&details.canvas_height>=480&&details.canvas_display!=='none'&&details.text_display==='none'&&details.boot_button_text==='Running'&&details.stop_button_disabled===false&&details.keyboard_button_present&&details.keyboard_button_disabled===false&&details.emulator_object_present;
            save('completed',{...details,success,completed_at:new Date().toISOString()});
          }catch(error){
            let details={};
            try{
              details=await page?.evaluate(()=>{
                const canvas=document.querySelector('#screen canvas');
                const text=document.querySelector('#screen > div');
                const log=document.querySelector('#log')?.textContent||'';
                return {canvas_width:canvas?.width||0,canvas_height:canvas?.height||0,canvas_display:canvas?getComputedStyle(canvas).display:'missing',text_display:text?getComputedStyle(text).display:'missing',page_url:location.href,log_tail:log.split('\n').slice(-450)};
              })||{};
              await page?.screenshot({path:'q-final-proof/99-failure.png',fullPage:true});
            }catch{}
            save('failed',{...details,success:false,error:String(error?.stack||error),completed_at:new Date().toISOString()});
          }finally{
            await browser?.close().catch(()=>{});
          }
          if(!result.success)process.exit(1);
          JS
          node --check verify-q-final.mjs
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 28m node verify-q-final.mjs 2>&1 | tee q-final-proof/browser.log

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: q-final-gui-proof-${{ github.run_id }}
          path: q-final-proof/
          if-no-files-found: warn

      - name: Record result
        if: always()
        run: |
          if test ! -s q-final-proof/result.json; then
            printf '{"success":false,"state":"no-result","run_id":"%s"}\n' "$GITHUB_RUN_ID" > q-final-proof-result.json
          else
            cp q-final-proof/result.json q-final-proof-result.json
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp q-final-proof-result.json os/iso/q-final-gui-result.json
          cp q-final-proof-result.json os/iso/real-multiboot-status.json
          git add os/iso/q-final-gui-result.json os/iso/real-multiboot-status.json
          git commit -m 'Record final q GUI browser verification [skip ci]' || true
          git push origin HEAD:main
          python3 - <<'PY'
          import json
          from pathlib import Path
          result=json.loads(Path('os/iso/q-final-gui-result.json').read_text())
          assert result.get('success') is True
          PY
