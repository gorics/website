# Manual trigger: 2026-06-13T20:18:00+09:00
name: Hourly Hot News Update

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scripts/update-hot-news.mjs'
      - 'scripts/update-financial-news.mjs'
      - '.github/workflows/hourly-hot-news.yml'
      - 'news/data.json'
      - 'news/news/data.json'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate privacy-redacted hot news
        run: node scripts/update-hot-news.mjs

      - name: Add legacy-compatible news schema
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'news/data.json';
          const payload = JSON.parse(fs.readFileSync(path, 'utf8'));
          const toLegacy = (x) => ({
            id: x.id,
            title: x.title,
            link: x.url,
            source: x.source?.name || '원문',
            theme: x.categoryName || x.category || '종합 핫뉴스',
            published_at: x.publishedAt,
            summary: x.description || '',
            tags: [x.categoryName || x.category || '뉴스'],
            score: x.score || 0
          });
          const items = (payload.allItems || []).map(toLegacy);
          payload.generated_at = payload.generatedAt;
          payload.items = items;
          payload.theme_order = (payload.categories || []).map((c) => c.name);
          payload.themes = {};
          for (const c of payload.categories || []) {
            payload.themes[c.name] = (payload.byCategory?.[c.id] || []).map(toLegacy);
          }
          fs.writeFileSync(path, JSON.stringify(payload, null, 2) + '\n');
          fs.mkdirSync('news/news', { recursive: true });
          fs.copyFileSync(path, 'news/news/data.json');
          NODE

      - name: Generate privacy-redacted financial news
        run: node scripts/update-financial-news.mjs

      - name: Commit generated news files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news/index.html news/data.json news/news/data.json news/feed.xml news/financial/index.html news/financial/data.json news/financial/feed.xml
          if git diff --cached --quiet; then
            echo "No news changes to commit."
          else
            git commit -m "chore(news): hourly hot news update"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
