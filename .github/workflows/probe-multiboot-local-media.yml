name: Probe Multiboot Local Media

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/probe-multiboot-local-media.yml'
      - 'os/real-multiboot/local-media-router.js'
      - 'os/real-multiboot/index.html'

permissions:
  contents: write

concurrency:
  group: probe-multiboot-local-media
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for router deployment
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website'
          ready=0
          for attempt in $(seq 1 90); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            if curl -fsSL --max-time 45 "$BASE/os/real-multiboot/?probe=$stamp" -o /tmp/index.html \
              && grep -q 'local-media-router.js' /tmp/index.html \
              && curl -fsSL --max-time 45 "$BASE/os/real-multiboot/local-media-router.js?probe=$stamp" -o /tmp/router.js \
              && grep -q '20260708-r10-local-media' /tmp/router.js; then
              ready=1
              break
            fi
            sleep 8
          done
          test "$ready" = 1
          node --check /tmp/router.js

      - name: Probe same-origin boot images
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/vendor/v86/images'
          : > /tmp/local-media-probe.txt
          for image in buildroot-bzimage68.bin linux4.iso freedos722.img; do
            code=$(curl -sS -L --max-time 120 -r 0-4095 -o "/tmp/$image.probe" -w '%{http_code}' "$BASE/$image?probe=$GITHUB_RUN_ID")
            bytes=$(stat -c %s "/tmp/$image.probe" 2>/dev/null || echo 0)
            printf '%s status=%s bytes=%s\n' "$image" "$code" "$bytes" | tee -a /tmp/local-media-probe.txt
            case "$code" in 200|206) ;; *) exit 1;; esac
            test "$bytes" -gt 0
          done

      - name: Publish probe result
        if: always()
        run: |
          set -euo pipefail
          success=false
          state=failed
          if test -s /tmp/router.js && test -s /tmp/buildroot-bzimage68.bin.probe; then
            success=true
            state=completed
          fi
          python3 - "$success" "$state" <<'PY'
          import json, os, sys
          from pathlib import Path
          result={
            'success': sys.argv[1]=='true',
            'state': sys.argv[2],
            'run_id': os.environ['GITHUB_RUN_ID'],
            'checked_at': __import__('datetime').datetime.now(__import__('datetime').timezone.utc).isoformat(),
            'probe': Path('/tmp/local-media-probe.txt').read_text(errors='replace').splitlines() if Path('/tmp/local-media-probe.txt').exists() else [],
          }
          Path('/tmp/local-media-status.json').write_text(json.dumps(result,indent=2)+'\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 8); do
            git reset --hard
            git clean -fd
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/local-media-status.json os/iso/local-media-status.json
            git add os/iso/local-media-status.json
            git commit -m 'Record local multiboot media probe [skip ci]' || exit 0
            git push origin HEAD:main && exit 0
            sleep $((attempt*2))
          done
          exit 1

      - name: Require successful probe
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          result=json.loads(Path('/tmp/local-media-status.json').read_text())
          assert result['success'] is True, result
          print(result)
          PY
