name: Fix q Runtime Threshold Final

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-q-runtime-threshold-final.yml'

permissions:
  contents: write
  actions: write

concurrency:
  group: fix-q-runtime-threshold-final
  cancel-in-progress: true

jobs:
  fix-and-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply exact runtime threshold fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          old = "['runtime', runtime, 100_000],"
          new = "['runtime', runtime, 50_000],"
          for filename in ('os/real-multiboot/app.js', 'os/real-multiboot/app-legacy-chunked.js'):
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              if old in text:
                  text = text.replace(old, new, 1)
              if new not in text:
                  raise SystemExit(f'runtime threshold fix missing: {filename}')
              if "screen.classList.add('active')" not in text:
                  raise SystemExit(f'screen active fix missing: {filename}')
              path.write_text(text, encoding='utf-8')
          PY
          node --check os/real-multiboot/app.js
          node --check os/real-multiboot/app-legacy-chunked.js
          grep -q "\['runtime', runtime, 50_000\]" os/real-multiboot/app.js
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add os/real-multiboot/app.js os/real-multiboot/app-legacy-chunked.js
          git commit -m 'Lower q v86 runtime validation threshold to actual file size' || true
          git push origin HEAD:main

      - name: Wait for fixed public q loader
        run: |
          PAGE='https://gorics.github.io/website/os/real-multiboot'
          READY=0
          for attempt in $(seq 1 120); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            if curl -fsSL --max-time 60 "$PAGE/?runtime-final=$stamp" -o /tmp/index.html \
              && grep -q 'app.js?v=q' /tmp/index.html \
              && curl -fsSL --max-time 60 "$PAGE/app.js?runtime-final=$stamp" -o /tmp/app.js \
              && grep -q "\['runtime', runtime, 50_000\]" /tmp/app.js \
              && grep -q "screen.classList.add('active')" /tmp/app.js; then
              READY=1
              break
            fi
            echo "fixed q runtime threshold not propagated attempt=$attempt"
            sleep 10
          done
          test "$READY" = 1
          node --check /tmp/app.js

      - name: Dispatch final GUI verifier
        id: verifier
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BEFORE=$(gh run list --workflow verify-q-gui-final.yml --limit 1 --json databaseId --jq '.[0].databaseId // 0')
          gh workflow run verify-q-gui-final.yml --ref main
          RUN_ID=''
          for attempt in $(seq 1 30); do
            sleep 4
            CANDIDATE=$(gh run list --workflow verify-q-gui-final.yml --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')
            if test "$CANDIDATE" != 0 && test "$CANDIDATE" != "$BEFORE"; then
              RUN_ID="$CANDIDATE"
              break
            fi
          done
          test -n "$RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "final verifier run=$RUN_ID"

      - name: Record final verifier ID
        env:
          FINAL_RUN_ID: ${{ steps.verifier.outputs.run_id }}
        run: |
          printf '{"state":"dispatched","runtime_threshold":50000,"public_runtime_size":93547,"final_run_id":"%s"}\n' "$FINAL_RUN_ID" > /tmp/q-runtime-final.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/q-runtime-final.json os/iso/q-runtime-fix-status.json
          git add os/iso/q-runtime-fix-status.json
          git commit -m 'Record final q runtime fix verifier [skip ci]' || true
          git push origin HEAD:main
