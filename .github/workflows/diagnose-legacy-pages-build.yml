name: Diagnose Legacy Pages Build

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/diagnose-legacy-pages-build.yml'

permissions:
  contents: write
  pages: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Capture Pages site and builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/pages-diag
          gh api "repos/$GITHUB_REPOSITORY/pages" > /tmp/pages-diag/site.json 2> /tmp/pages-diag/site.err || true
          gh api "repos/$GITHUB_REPOSITORY/pages/builds/latest" > /tmp/pages-diag/latest.json 2> /tmp/pages-diag/latest.err || true
          gh api "repos/$GITHUB_REPOSITORY/pages/builds?per_page=10" > /tmp/pages-diag/builds.json 2> /tmp/pages-diag/builds.err || true
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('/tmp/pages-diag')
          def load(name):
              path = root / name
              try:
                  return json.loads(path.read_text())
              except Exception:
                  return {'raw': path.read_text(errors='replace') if path.exists() else ''}

          result = {
              'site': load('site.json'),
              'site_error': (root / 'site.err').read_text(errors='replace'),
              'latest_build': load('latest.json'),
              'latest_error': (root / 'latest.err').read_text(errors='replace'),
              'builds': load('builds.json'),
              'builds_error': (root / 'builds.err').read_text(errors='replace'),
          }
          Path('os/iso/legacy-pages-build-diagnostic.json').write_text(json.dumps(result, indent=2) + '\n')
          print(json.dumps(result, indent=2))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/pages-diag/site.json /tmp/pages-site.json || true
          git add os/iso/legacy-pages-build-diagnostic.json
          git commit -m 'Record legacy Pages build diagnostic [skip ci]' || true
          git push origin HEAD:main
