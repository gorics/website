name: Patch Static Pages Serialization Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-static-pages-serialization-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Patch canonical Pages workflow
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.github/workflows/static.yml';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            let text = Buffer.from(current.data.content, 'base64').toString('utf8');
            text = text.replace('  cancel-in-progress: true\n', '  cancel-in-progress: false\n');
            text = text.replace(
              /url:\s*\$\{\{\s*steps\.deployment\.outputs\.page_url\s*\}\}/,
              'url: https://gorics.github.io/website/'
            );
            const original = `      - name: Deploy to GitHub Pages
                    id: deployment
                    uses: actions/deploy-pages@v4`;
            const normalizedOriginal = original.replace(/^ {20}/gm, '');
            const replacement = `      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before Pages deployment retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - name: Retry GitHub Pages deployment
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before final Pages deployment retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 150

      - name: Final GitHub Pages deployment retry
        id: deployment_final
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v4`;
            if (!text.includes(normalizedOriginal)) {
              throw new Error('canonical deploy-pages block not found exactly once');
            }
            text = text.replace(normalizedOriginal, replacement);
            if (!text.includes('cancel-in-progress: false') || !text.includes('Final GitHub Pages deployment retry')) {
              throw new Error('static Pages serialization patch validation failed');
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: 'fix(os): serialize and retry Pages deployment',
              content: Buffer.from(text).toString('base64'),
              branch: 'main',
              sha: current.data.sha
            });
