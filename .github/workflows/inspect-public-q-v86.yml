name: Inspect Public q v86 Run

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/inspect-public-q-v86.yml'

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record latest run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --workflow verify-public-q-v86.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/runs.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          runs=json.loads(Path('/tmp/runs.json').read_text())
          Path('os/iso/public-q-v86-run.json').write_text(json.dumps({'latest':runs[0] if runs else None,'runs':runs},indent=2)+"\n")
          print(json.dumps(runs,indent=2))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/public-q-v86-run.json
          git commit -m 'Record public q v86 verification run [skip ci]' || true
          git push origin HEAD:main

# refresh: repository-path verifier