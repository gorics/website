name: Trigger static Pages deploy

on:
  push:
    branches:
      - main
    paths:
      - 'os/real-multiboot/**'
      - '.github/workflows/trigger-static-pages.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: trigger-static-pages
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Pages workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: context.ref.replace('refs/heads/', '')
            });
