name: Publish OS Status to Pages

on:
  push:
    branches: [main]
    paths:
      - 'os/iso/r19-canonical-status.json'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: publish-os-status-to-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Enable and dispatch pinned Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.enableWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml'
            });
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: 'main',
              inputs: { source_sha: context.sha }
            });
