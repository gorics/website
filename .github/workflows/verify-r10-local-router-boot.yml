name: Verify R10 Local Router Boot

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-r10-local-router-boot.yml'
      - 'os/real-multiboot/index.html'
      - 'os/real-multiboot/local-media-router.js'

permissions:
  contents: write

concurrency:
  group: verify-r10-local-router-boot
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 38
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for exact R10 public deployment and media
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website'
          ready=0
          for attempt in $(seq 1 120); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            html_ok=0
            router_ok=0
            media_ok=0
            if curl -fsSL --max-time 45 "$BASE/os/real-multiboot/?r10=$stamp" -o /tmp/r10-index.html \
              && grep -q '20260708-r10-local-media' /tmp/r10-index.html \
              && grep -q 'local-media-router.js' /tmp/r10-index.html; then html_ok=1; fi
            if curl -fsSL --max-time 45 "$BASE/os/real-multiboot/local-media-router.js?r10=$stamp" -o /tmp/r10-router.js \
              && grep -q '20260708-r10-local-media' /tmp/r10-router.js; then router_ok=1; fi
            code=$(curl -sS -L --max-time 90 -r 0-4095 -o /tmp/buildroot-local.probe -w '%{http_code}' "$BASE/vendor/v86/images/buildroot-bzimage68.bin?r10=$stamp" || true)
            bytes=$(stat -c %s /tmp/buildroot-local.probe 2>/dev/null || echo 0)
            case "$code" in 200|206) if test "$bytes" -gt 0; then media_ok=1; fi;; esac
            echo "attempt=$attempt html=$html_ok router=$router_ok media=$media_ok code=$code bytes=$bytes"
            if test "$html_ok" = 1 && test "$router_ok" = 1 && test "$media_ok" = 1; then ready=1; break; fi
            sleep 8
          done
          test "$ready" = 1
          node --check /tmp/r10-router.js

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install browser verifier
        run: |
          cd /tmp
          npm init -y
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot Buildroot and GORICS from deployed R10
        id: boot
        continue-on-error: true
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?r10verify=${{ github.run_id }}
        run: |
          cat > /tmp/verify-r10.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const result={success:false,state:'running',run_id:process.env.GITHUB_RUN_ID,url:process.env.VERIFY_URL,started_at:new Date().toISOString(),boots:{},console:[],failed_requests:[]};
          const save=()=>fs.writeFileSync('/tmp/r10-router-boot-result.json',JSON.stringify(result,null,2)+'\n');
          let browser,page;
          async function snap(name){
            const data=await page.evaluate(()=>{const c=document.querySelector('#screen canvas');const t=document.querySelector('#screen>div');const l=document.querySelector('#log')?.textContent||'';return{selected:document.querySelector('#os-select')?.value,state:document.querySelector('#boot-btn')?.textContent,stage:document.querySelector('#stage-label')?.textContent,progress:document.querySelector('#progress-percent')?.textContent,overlay_hidden:document.querySelector('#loading-overlay')?.classList.contains('hidden'),canvas_width:c?.width||0,canvas_height:c?.height||0,canvas_display:c?getComputedStyle(c).display:'missing',text_length:t?.textContent?.length||0,text_display:t?getComputedStyle(t).display:'missing',router:globalThis.__GORICS_LOCAL_MEDIA_ROUTER__||null,log_tail:l.split('\n').slice(-320)}});
            await page.screenshot({path:`/tmp/${name}.png`,fullPage:true});return data;
          }
          async function boot(name,timeout,gui){
            await page.selectOption('#os-select',name);await page.click('#boot-btn');
            await page.waitForFunction(()=>document.querySelector('#log')?.textContent.includes('emulator-started'),null,{timeout});
            await page.waitForFunction(()=>document.querySelector('#progress-percent')?.textContent==='100%'&&document.querySelector('#loading-overlay')?.classList.contains('hidden')&&document.querySelector('#boot-btn')?.textContent==='실행 중',null,{timeout});
            const d=await snap(`r10-${name}`);const canvas=d.canvas_display!=='none'&&d.canvas_display!=='missing'&&d.canvas_width>=(gui?640:320)&&d.canvas_height>=(gui?480:200);const text=!gui&&d.text_length>0&&d.text_display!=='none'&&d.text_display!=='missing';
            if(!d.router||!(canvas||text))throw new Error(`${name} assertion failed ${JSON.stringify(d)}`);
            result.boots[name]={success:true,...d};save();await page.click('#stop-btn');await page.waitForFunction(()=>document.querySelector('#progress-percent')?.textContent==='0%');
          }
          try{
            browser=await chromium.launch({headless:true,args:['--no-sandbox','--disable-dev-shm-usage','--disable-gpu']});page=await browser.newPage({viewport:{width:1440,height:1000}});page.setDefaultTimeout(120000);page.on('console',m=>result.console.push(`${m.type()}: ${m.text()}`));page.on('pageerror',e=>result.console.push(`pageerror: ${e.message}`));page.on('requestfailed',r=>result.failed_requests.push({url:r.url(),error:r.failure()?.errorText||'unknown'}));
            await page.goto(process.env.VERIFY_URL,{waitUntil:'domcontentloaded',timeout:120000});await page.waitForFunction(()=>globalThis.__GORICS_LOCAL_MEDIA_ROUTER__?.build==='20260708-r10-local-media');
            await boot('buildroot',420000,false);await boot('gorics',1100000,true);result.success=true;result.state='completed';result.completed_at=new Date().toISOString();
          }catch(e){result.state='failed';result.error=e?.stack||String(e);result.completed_at=new Date().toISOString();if(page)result.failure=await snap('r10-failure').catch(()=>null);}finally{await browser?.close().catch(()=>{});save();}
          if(!result.success)process.exit(1);
          JS
          set +e
          node /tmp/verify-r10.mjs > /tmp/r10-browser.log 2>&1
          code=$?
          if test ! -s /tmp/r10-router-boot-result.json; then printf '{"success":false,"state":"browser-process-failed","run_id":"%s","exit_code":%s}\n' "$GITHUB_RUN_ID" "$code" > /tmp/r10-router-boot-result.json; fi
          cat /tmp/r10-browser.log || true
          cat /tmp/r10-router-boot-result.json
          exit "$code"

      - name: Publish result
        if: always()
        run: |
          set -euo pipefail
          if test ! -s /tmp/r10-router-boot-result.json; then printf '{"success":false,"state":"preflight-failed","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/r10-router-boot-result.json; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 10); do
            git reset --hard
            git clean -fd
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/r10-router-boot-result.json os/iso/r10-router-boot-status.json
            git add os/iso/r10-router-boot-status.json
            git commit -m 'Record R10 local router boot result [skip ci]' || exit 0
            git push origin HEAD:main && exit 0
            sleep $((attempt*2))
          done
          exit 1

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r10-local-router-boot-${{ github.run_id }}
          path: |
            /tmp/r10-router-boot-result.json
            /tmp/r10-browser.log
            /tmp/r10-*.png
            /tmp/r10-index.html
            /tmp/r10-router.js
            /tmp/buildroot-local.probe
          if-no-files-found: warn

      - name: Require real boots
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          r=json.loads(Path('/tmp/r10-router-boot-result.json').read_text())
          assert r.get('success') is True, r.get('error') or r
          assert r['boots']['buildroot']['success'] is True
          assert r['boots']['gorics']['success'] is True
          print('R10 Buildroot and GORICS real boots passed')
          PY
