name: Run Overlay Fix V8 Chain

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - 'os/real-multiboot/.trigger-overlay-v8-chain'

permissions:
  contents: read
  actions: write

concurrency:
  group: run-overlay-fix-v8-chain
  cancel-in-progress: false

jobs:
  orchestrate:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Dispatch atomic loader repair
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run apply-multiboot-overlay-completion-fix.yml --repo "$GITHUB_REPOSITORY" --ref main

      - name: Wait for repaired loader commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ready=0
          for attempt in $(seq 1 90); do
            CONTENT=$(gh api "repos/$GITHUB_REPOSITORY/contents/os/real-multiboot/app.js?ref=main" --jq .content | tr -d '\n' | base64 -d)
            if grep -q '20260708-r8-overlay-complete' <<<"$CONTENT" \
              && grep -q 'function completeDisplay' <<<"$CONTENT" \
              && grep -q 'display completion trigger=' <<<"$CONTENT"; then
              ready=1
              echo "repaired loader committed attempt=$attempt"
              break
            fi
            echo "waiting for repair attempt=$attempt"
            sleep 5
          done
          test "$ready" = 1

      - name: Dispatch final Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run static.yml --repo "$GITHUB_REPOSITORY" --ref main

      - name: Dispatch V8 unobscured desktop verification
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run verify-real-multiboot-v8.yml --repo "$GITHUB_REPOSITORY" --ref main
