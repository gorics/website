name: Capture R12 Publisher Failure

on:
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/capture-r12-publisher-failure.yml'

permissions:
  contents: write
  actions: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Capture failed publisher log tail
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: '28919162232'
        run: |
          set +e
          gh run view "$FAILED_RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/publisher-failed.log 2>&1
          code=$?
          set -e
          tail -n 300 /tmp/publisher-failed.log > os/iso/r12-publisher-failure.log
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          text=Path('os/iso/r12-publisher-failure.log').read_text(errors='replace')
          Path('os/iso/r12-publisher-failure.json').write_text(json.dumps({
            'run_id': int(os.environ['FAILED_RUN_ID']),
            'log_tail': text,
          }, indent=2)+'\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/r12-publisher-failure.log os/iso/r12-publisher-failure.json
          git commit -m 'Record R12 publisher failure tail [skip ci]' || true
          git push origin HEAD:main
          exit "$code"
