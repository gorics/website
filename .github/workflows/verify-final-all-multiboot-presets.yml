name: Verify Final All Multiboot Presets

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-final-all-multiboot-presets.yml'

permissions:
  contents: write

concurrency:
  group: verify-final-all-multiboot-presets
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for a complete current public deployment
        run: |
          set -euo pipefail
          ROOT='https://gorics.github.io/website'
          PAGE="$ROOT/os/real-multiboot"
          ready=0
          for attempt in $(seq 1 180); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            html=0; app=0; router=0; runtime=0; media=0
            if curl -fsSL --max-time 60 -H 'Cache-Control: no-cache' "$PAGE/?final=$stamp" -o /tmp/final-index.html \
              && grep -q 'id="os-select"' /tmp/final-index.html \
              && grep -q 'id="loading-overlay"' /tmp/final-index.html \
              && grep -q 'local-media-router.js' /tmp/final-index.html \
              && grep -q 'asset-versioning.js' /tmp/final-index.html \
              && grep -q 'safe-diagnostics.js' /tmp/final-index.html; then html=1; fi
            if curl -fsSL --max-time 60 "$PAGE/app.js?final=$stamp" -o /tmp/final-app.js \
              && grep -q 'const presets' /tmp/final-app.js \
              && grep -q 'displaySnapshot' /tmp/final-app.js \
              && grep -q 'emulator-started' /tmp/final-app.js; then app=1; fi
            if curl -fsSL --max-time 60 "$PAGE/local-media-router.js?final=$stamp" -o /tmp/final-router.js \
              && grep -q '__GORICS_LOCAL_MEDIA_ROUTER__' /tmp/final-router.js; then router=1; fi
            code=$(curl -sS -L --max-time 90 -r 0-4095 -o /tmp/v86-wasm.probe -w '%{http_code}' "$ROOT/vendor/v86/v86.wasm?final=$stamp" || true)
            case "$code" in 200|206) test -s /tmp/v86-wasm.probe && runtime=1;; esac
            media=1
            for image in buildroot-bzimage68.bin linux4.iso linux.iso freedos722.img; do
              code=$(curl -sS -L --max-time 120 -r 0-4095 -o "/tmp/$image.probe" -w '%{http_code}' "$ROOT/vendor/v86/images/$image?final=$stamp" || true)
              bytes=$(stat -c %s "/tmp/$image.probe" 2>/dev/null || echo 0)
              case "$code" in 200|206) test "$bytes" -gt 0 || media=0;; *) media=0;; esac
            done
            echo "attempt=$attempt html=$html app=$app router=$router runtime=$runtime media=$media"
            if test "$html" = 1 && test "$app" = 1 && test "$router" = 1 && test "$runtime" = 1 && test "$media" = 1; then
              ready=1
              break
            fi
            sleep 10
          done
          test "$ready" = 1
          node --check /tmp/final-app.js
          node --check /tmp/final-router.js

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          cd /tmp
          npm init -y
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot every preset in one public browser session
        id: browser
        continue-on-error: true
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?final-all=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cat > /tmp/verify-final-all.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const cases = [
            ['buildroot', 420000, 'text'],
            ['buildroot-serial', 420000, 'text'],
            ['freedos', 420000, 'text'],
            ['tiny', 600000, 'display'],
            ['dsl', 720000, 'display'],
            ['dsl-high', 720000, 'display'],
            ['gorics', 1100000, 'gui'],
          ];
          const result = {
            success: false,
            state: 'running',
            run_id: process.env.GITHUB_RUN_ID,
            run_attempt: process.env.GITHUB_RUN_ATTEMPT,
            target: process.env.TARGET_URL,
            started_at: new Date().toISOString(),
            expected: cases.map(([name]) => name),
            boots: {},
            console: [],
            failed_requests: [],
          };
          const save = () => fs.writeFileSync('/tmp/final-all-presets-result.json', JSON.stringify(result, null, 2) + '\n');
          let browser;
          let page;

          async function snapshot(name) {
            const data = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              const log = document.querySelector('#log')?.textContent || '';
              const overlay = document.querySelector('#loading-overlay');
              return {
                selected: document.querySelector('#os-select')?.value,
                button: document.querySelector('#boot-btn')?.textContent,
                stage: document.querySelector('#stage-label')?.textContent,
                detail: document.querySelector('#stage-detail')?.textContent,
                progress: document.querySelector('#progress-percent')?.textContent,
                overlay_hidden: overlay?.classList.contains('hidden') || false,
                overlay_visibility: overlay ? getComputedStyle(overlay).visibility : 'missing',
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_length: text?.textContent?.length || 0,
                text_display: text ? getComputedStyle(text).display : 'missing',
                text_tail: (text?.textContent || '').slice(-3000),
                router_build: globalThis.__GORICS_LOCAL_MEDIA_ROUTER__?.build || null,
                log_tail: log.split('\n').slice(-500),
              };
            });
            await page.screenshot({ path: `/tmp/final-${name}.png`, fullPage: true });
            return data;
          }

          function assertNoFatal(data, name) {
            const all = `${data.log_tail.join('\n')}\n${data.text_tail}`;
            if (/RangeError|Length out of range of buffer|wasm.*mismatch|kernel panic|VFS: Unable to mount root/i.test(all)) {
              throw new Error(`${name}: fatal runtime/boot signature detected`);
            }
          }

          async function bootPreset(name, timeout, kind) {
            await page.selectOption('#os-select', name);
            await page.waitForFunction(value => document.querySelector('#os-select')?.value === value, name);
            await page.click('#boot-btn');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('emulator-started'), null, { timeout });
            await page.waitForFunction(() => {
              const overlay = document.querySelector('#loading-overlay');
              return document.querySelector('#progress-percent')?.textContent === '100%' &&
                document.querySelector('#boot-btn')?.textContent === '실행 중' &&
                overlay?.classList.contains('hidden');
            }, null, { timeout });
            if (kind === 'gui') {
              await page.waitForFunction(() => {
                const canvas = document.querySelector('#screen canvas');
                return canvas && getComputedStyle(canvas).display !== 'none' && canvas.width >= 640 && canvas.height >= 480;
              }, null, { timeout: 300000 });
            }
            const data = await snapshot(name);
            assertNoFatal(data, name);
            const canvasVisible = data.canvas_display !== 'none' && data.canvas_display !== 'missing' && data.canvas_width >= 320 && data.canvas_height >= 200;
            const textVisible = data.text_display !== 'none' && data.text_display !== 'missing' && data.text_length > 0;
            const guiVisible = data.canvas_display !== 'none' && data.canvas_display !== 'missing' && data.canvas_width >= 640 && data.canvas_height >= 480;
            if (data.progress !== '100%' || data.button !== '실행 중' || !data.overlay_hidden) {
              throw new Error(`${name}: completion state failed ${JSON.stringify(data)}`);
            }
            if (kind === 'gui' && !guiVisible) throw new Error(`${name}: GUI canvas missing ${JSON.stringify(data)}`);
            if (kind !== 'gui' && !(canvasVisible || textVisible)) throw new Error(`${name}: no visible VM output ${JSON.stringify(data)}`);
            result.boots[name] = { success: true, kind, ...data };
            save();
            await page.click('#stop-btn');
            await page.waitForFunction(() => document.querySelector('#progress-percent')?.textContent === '0%' && document.querySelector('#boot-btn')?.textContent === '선택 OS 부팅', null, { timeout: 120000 });
          }

          try {
            browser = await chromium.launch({ headless: true, args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu'] });
            page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
            page.setDefaultTimeout(120000);
            page.on('console', message => result.console.push(`${message.type()}: ${message.text()}`));
            page.on('pageerror', error => result.console.push(`pageerror: ${error.message}`));
            page.on('requestfailed', request => result.failed_requests.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));
            await page.goto(process.env.TARGET_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForSelector('#os-select');
            const options = await page.locator('#os-select option').evaluateAll(nodes => nodes.map(node => node.value));
            for (const [name] of cases) if (!options.includes(name)) throw new Error(`missing preset ${name}`);
            for (const [name, timeout, kind] of cases) await bootPreset(name, timeout, kind);
            result.success = true;
            result.state = 'completed';
          } catch (error) {
            result.state = 'failed';
            result.error = error?.stack || String(error);
            if (page) result.failure = await snapshot('failure').catch(() => null);
          } finally {
            result.completed_at = new Date().toISOString();
            await browser?.close().catch(() => {});
            save();
          }
          if (!result.success) process.exit(1);
          JS
          set +e
          node --check /tmp/verify-final-all.mjs > /tmp/final-all-runner.log 2>&1
          code=$?
          if test "$code" = 0; then
            node /tmp/verify-final-all.mjs >> /tmp/final-all-runner.log 2>&1
            code=$?
          fi
          if test ! -s /tmp/final-all-presets-result.json; then
            printf '{"success":false,"state":"browser-process-failed","run_id":"%s","exit_code":%s}\n' "$GITHUB_RUN_ID" "$code" > /tmp/final-all-presets-result.json
          fi
          cat /tmp/final-all-runner.log || true
          cat /tmp/final-all-presets-result.json
          exit "$code"

      - name: Ensure and publish result
        if: always()
        run: |
          set -euo pipefail
          if test ! -s /tmp/final-all-presets-result.json; then
            printf '{"success":false,"state":"preflight-failed","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/final-all-presets-result.json
          fi
          cp /tmp/final-all-presets-result.json /tmp/status.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 15); do
            git reset --hard
            git clean -fd
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p os/iso
            cp /tmp/status.json os/iso/final-all-multiboot-presets-status.json
            git add os/iso/final-all-multiboot-presets-status.json
            git commit -m 'Record final all-multiboot-presets result [skip ci]' || exit 0
            git push origin HEAD:main && exit 0
            sleep $((attempt * 2))
          done
          exit 1

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-all-multiboot-presets-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/final-all-presets-result.json
            /tmp/final-all-runner.log
            /tmp/final-*.png
            /tmp/final-index.html
            /tmp/final-app.js
            /tmp/final-router.js
          if-no-files-found: warn

      - name: Require all seven boots
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          result=json.loads(Path('/tmp/final-all-presets-result.json').read_text())
          assert result.get('success') is True, result.get('error') or result
          for name in ['buildroot','buildroot-serial','freedos','tiny','dsl','dsl-high','gorics']:
              assert result.get('boots',{}).get(name,{}).get('success') is True, name
          print('All seven public multiboot presets passed')
          PY
