name: Deploy Final Multiboot Stable

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/deploy-final-multiboot-stable.yml'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: final-multiboot-stable-deployment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble release-independent public tree
        env:
          DEPLOY_VERSION: stable-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          rm -rf _site
          python3 - <<'PY'
          import pathlib, shutil
          source=pathlib.Path('.')
          target=pathlib.Path('_site')
          shutil.copytree(source,target,ignore=shutil.ignore_patterns('.git','_site'))
          (target/'.nojekyll').write_text('',encoding='utf-8')
          PY
          mkdir -p _site/vendor/v86/images
          download(){
            local url="$1" output="$2"
            curl -fL --retry 6 --retry-all-errors --connect-timeout 20 --max-time 900 -o "$output.tmp" "$url"
            test -s "$output.tmp"
            mv "$output.tmp" "$output"
          }
          download 'https://copy.sh/v86/build/libv86.js' '_site/vendor/v86/libv86.js'
          download 'https://copy.sh/v86/build/v86.wasm' '_site/vendor/v86/v86.wasm'
          download 'https://copy.sh/v86/bios/seabios.bin' '_site/vendor/v86/seabios.bin'
          download 'https://copy.sh/v86/bios/vgabios.bin' '_site/vendor/v86/vgabios.bin'
          download 'https://i.copy.sh/buildroot-bzimage68.bin' '_site/vendor/v86/images/buildroot-bzimage68.bin'
          download 'https://i.copy.sh/linux4.iso' '_site/vendor/v86/images/linux4.iso'
          download 'https://i.copy.sh/linux.iso' '_site/vendor/v86/images/linux.iso'
          download 'https://i.copy.sh/freedos722.img' '_site/vendor/v86/images/freedos722.img'

          python3 - <<'PY'
          import hashlib,json,os,pathlib,re
          site=pathlib.Path('_site')
          page=site/'os'/'real-multiboot'
          version=os.environ['DEPLOY_VERSION']
          index=page/'index.html'
          app=page/'app.js'
          for required in [index,app,page/'local-media-router.js',page/'asset-versioning.js',page/'safe-diagnostics.js',page/'assets'/'vmlinuz',page/'assets'/'initrd.img',page/'assets'/'iso-meta.json']:
              if not required.is_file() or required.stat().st_size==0: raise SystemExit(f'missing {required}')
          html=index.read_text(encoding='utf-8')
          html=re.sub(r'([?&]v=)[A-Za-z0-9._-]+',lambda m:m.group(1)+version,html)
          html=re.sub(r'(<meta name="gorics-build" content=")[^"]*',lambda m:m.group(1)+version,html)
          html=re.sub(r'(<meta name="gorics-deployment-marker" content=")[^"]*',lambda m:m.group(1)+'GORICS Real Multiboot '+version,html)
          html=re.sub(r'(\[ready\] GORICS Real Multiboot )[A-Za-z0-9._-]+',lambda m:m.group(1)+version,html)
          index.write_text(html,encoding='utf-8')
          source=app.read_text(encoding='utf-8')
          source,count=re.subn(r"const BUILD = '[^']+';",f"const BUILD = '{version}';",source,count=1)
          if count!=1: raise SystemExit('BUILD replacement failed')
          for marker in ['readiness=strict','Files send via emulator appear in','Welcome to FreeDOS',"presetKey === 'dsl'",'bzimage: { url: kernelUrl }']:
              if marker not in source: raise SystemExit(f'app marker missing {marker}')
          app.write_text(source,encoding='utf-8')
          runtime=site/'vendor'/'v86'
          manifest={'version':version,'files':{}}
          for name in ['libv86.js','v86.wasm','seabios.bin','vgabios.bin']:
              data=(runtime/name).read_bytes()
              manifest['files'][name]={'size':len(data),'sha256':hashlib.sha256(data).hexdigest()}
          (runtime/'manifest.json').write_text(json.dumps(manifest,indent=2)+'\n',encoding='utf-8')
          meta_path=page/'assets'/'iso-meta.json'
          meta=json.loads(meta_path.read_text(encoding='utf-8'))
          meta['page_version']=version
          meta['deployment']='stable-release-independent-direct-boot'
          meta_path.write_text(json.dumps(meta,indent=2)+'\n',encoding='utf-8')
          (page/'assets'/'deployment.json').write_text(json.dumps({'version':version,'strict_readiness':True,'release_independent':True,'runtime_manifest':manifest},indent=2)+'\n',encoding='utf-8')
          PY

      - name: Validate assembled tree
        run: |
          set -euo pipefail
          node --check _site/os/real-multiboot/app.js
          node --check _site/os/real-multiboot/local-media-router.js
          node --check _site/os/real-multiboot/asset-versioning.js
          node --check _site/os/real-multiboot/safe-diagnostics.js
          grep -q 'readiness=strict' _site/os/real-multiboot/app.js
          grep -q 'Files send via emulator appear in' _site/os/real-multiboot/app.js
          grep -q 'local-media-router.js?v=' _site/os/real-multiboot/index.html
          test "$(stat -c %s _site/os/real-multiboot/assets/vmlinuz)" -gt 1000000
          test "$(stat -c %s _site/os/real-multiboot/assets/initrd.img)" -gt 10000000
          test "$(du -sb _site | cut -f1)" -lt 1000000000
          node <<'JS'
          const fs=require('node:fs');
          const bytes=fs.readFileSync('_site/vendor/v86/v86.wasm');
          const module=new WebAssembly.Module(bytes);
          if(!WebAssembly.Module.exports(module).some(x=>x.name==='memory'&&x.kind==='memory')) throw new Error('v86 memory export missing');
          JS

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy stable Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify exact public stable build
        env:
          DEPLOY_VERSION: stable-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          ROOT='https://gorics.github.io/website'
          PAGE="$ROOT/os/real-multiboot"
          ready=0
          for attempt in $(seq 1 100); do
            stamp="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            if curl -fsSL --max-time 60 -H 'Cache-Control: no-cache' "$PAGE/?stable=$stamp" -o /tmp/stable-index.html \
              && grep -q "$DEPLOY_VERSION" /tmp/stable-index.html \
              && grep -q 'local-media-router.js' /tmp/stable-index.html \
              && curl -fsSL --max-time 60 "$PAGE/app.js?stable=$stamp" -o /tmp/stable-app.js \
              && grep -q 'readiness=strict' /tmp/stable-app.js \
              && grep -q 'Files send via emulator appear in' /tmp/stable-app.js \
              && curl -fsSL --max-time 60 "$ROOT/vendor/v86/manifest.json?stable=$stamp" -o /tmp/stable-manifest.json \
              && grep -q "$DEPLOY_VERSION" /tmp/stable-manifest.json; then
              ready=1
              break
            fi
            sleep 8
          done
          test "$ready" = 1
          node --check /tmp/stable-app.js

      - name: Publish stable deployment result
        if: always()
        env:
          RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json,os
          from datetime import datetime,timezone
          from pathlib import Path
          payload={'success':os.environ['RESULT']=='success','status':os.environ['RESULT'],'run_id':os.environ['GITHUB_RUN_ID'],'run_attempt':os.environ['GITHUB_RUN_ATTEMPT'],'head_sha':os.environ['GITHUB_SHA'],'recorded_at':datetime.now(timezone.utc).isoformat()}
          Path('/tmp/final-stable-deploy-status.json').write_text(json.dumps(payload,indent=2)+'\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          cp /tmp/final-stable-deploy-status.json /tmp/status.json
          for attempt in $(seq 1 12); do
            git reset --hard
            git clean -fd
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p os/iso
            cp /tmp/status.json os/iso/final-stable-deploy-status.json
            git add os/iso/final-stable-deploy-status.json
            git commit -m 'Record final stable multiboot deployment [skip ci]' || break
            git push origin HEAD:main && break
            sleep $((attempt*2))
          done

      - name: Dispatch strict seven-preset verification
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run verify-final-all-multiboot-presets.yml --repo "$GITHUB_REPOSITORY" --ref main
