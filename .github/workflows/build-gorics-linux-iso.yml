name: Build Gorics Linux GUI ISO

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-gorics-linux-iso.yml'
      - 'os/iso/**'

permissions:
  contents: write
  actions: read

jobs:
  build-gorics-linux-gui-iso:
    name: Build real Linux GUI ISO
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build inside Debian live-build container
        run: |
          docker run --privileged --rm \
            -v "$PWD:/work" \
            -w /work \
            debian:bookworm \
            bash -lc 'apt-get update && apt-get install -y --no-install-recommends sudo live-build xorriso isolinux syslinux-common squashfs-tools debootstrap ca-certificates wget && bash os/iso/build-gorics-linux-gui-iso.sh'
          sudo chown -R "$USER:$USER" out build || true

      - name: Show ISO result
        run: |
          ls -lh out/
          sha256sum out/*.iso | tee out/SHA256SUMS.txt

      - name: Split ISO for v86 web loading
        run: |
          python3 - <<'PY'
          from pathlib import Path

          chunk_size = 16 * 1024 * 1024
          iso = next(Path('out').glob('*.iso'))
          parts = Path('out/v86-parts')
          parts.mkdir(parents=True, exist_ok=True)
          size = iso.stat().st_size
          count = 0
          with iso.open('rb') as src:
              start = 0
              while start < size:
                  data = src.read(chunk_size)
                  if len(data) < chunk_size:
                      data += bytes(chunk_size - len(data))
                  end = start + chunk_size
                  target = parts / f'{iso.stem}-{start}-{end}{iso.suffix}'
                  target.write_bytes(data)
                  start = end
                  count += 1
          (parts / 'V86-PARTS.txt').write_text(
              f'iso={iso.name}\nsize={size}\nchunk_size={chunk_size}\nparts={count}\n',
              encoding='utf-8'
          )
          print((parts / 'V86-PARTS.txt').read_text())
          PY
          ls -lh out/v86-parts | head
          echo "chunk count: $(find out/v86-parts -type f | wc -l)"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorics-linux-gui-iso
          path: |
            out/*.iso
            out/SHA256SUMS.txt
            out/v86-parts/V86-PARTS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish latest ISO release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: gorics-linux-gui-iso-latest
        run: |
          gh release delete "$TAG" -y || true
          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "$TAG"
          gh release create "$TAG" out/*.iso out/SHA256SUMS.txt out/v86-parts/* \
            --title "GORICS Linux GUI OS ISO Latest" \
            --notes "Real Debian-based Linux GUI ISO with v86 web-loading chunks."
