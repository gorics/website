name: Record R12 Pipeline Now

on:
  workflow_dispatch: {}
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'os/real-multiboot/.trigger-record-r12-pipeline'

permissions:
  contents: write
  actions: read

jobs:
  record:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Record build publisher Pages and V10 runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for spec in \
            build:build-gorics-openbox-i386.yml \
            publisher:publish-visible-desktop-r12-v2.yml \
            pages:static.yml \
            v10:verify-real-multiboot-v10.yml; do
            key=${spec%%:*}
            workflow=${spec#*:}
            gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --limit 10 \
              --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url,event \
              > "/tmp/${key}.json"
          done
          python3 - <<'PY'
          import json
          from pathlib import Path
          result={key:json.loads(Path(f'/tmp/{key}.json').read_text()) for key in ('build','publisher','pages','v10')}
          Path('os/iso/r12-pipeline-runs.json').write_text(json.dumps(result,indent=2)+'\n')
          print(json.dumps(result,indent=2))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/r12-pipeline-runs.json
          git commit -m 'Record current R12 pipeline runs [skip ci]' || true
          git push origin HEAD:main
