name: Verify Real Multiboot V10 Visible Pixels

on:
  workflow_dispatch: {}
  workflow_run:
    workflows:
      - Publish Visible Desktop R12 V2
    types: [completed]

permissions:
  contents: write

concurrency:
  group: verify-real-multiboot-v10
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Wait for public R12 loader and versioned CDN chunk
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/os/real-multiboot'
          CHUNK='https://cdn.jsdelivr.net/gh/gorics/website@os-assets/os/real-multiboot/assets/v86-parts/gorics-linux-gui-web-i386-r12-0-16777216.iso'
          ready=0
          for attempt in $(seq 1 150); do
            stamp="${GITHUB_RUN_ID}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 "$BASE/app.js?v10=$stamp" -o /tmp/v10-app.js \
              && grep -q '20260708-r12-visible-desktop' /tmp/v10-app.js \
              && grep -q 'gorics-linux-gui-web-i386-r12.iso' /tmp/v10-app.js \
              && curl -fsSL --max-time 60 "$BASE/assets/iso-meta.json?v10=$stamp" -o /tmp/v10-meta.json \
              && grep -q 'GORICS_VISIBLE_WINDOW_READY' /tmp/v10-meta.json \
              && curl -fsSL --retry 2 --retry-all-errors --max-time 120 "$CHUNK?v10=$stamp" -o /tmp/v10-first-chunk.iso \
              && python3 scripts/verify_iso_boot_chunk.py /tmp/v10-first-chunk.iso; then
              ready=1
              echo "public R12 and versioned chunk observed attempt=$attempt"
              break
            fi
            echo "waiting for R12 public deployment attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1
          node --check /tmp/v10-app.js

      - name: Install Chromium verifier
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Run visible-pixel graphical verification
        id: browser
        continue-on-error: true
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?v10-proof=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          rm -rf /tmp/real-multiboot-v10-proof
          mkdir -p /tmp/real-multiboot-v10-proof
          node --check scripts/verify_real_multiboot_v10.mjs
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 28m node scripts/verify_real_multiboot_v10.mjs 2>&1 | tee /tmp/real-multiboot-v10-proof/runner.log

      - name: Upload V10 proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-multiboot-v10-proof-${{ github.run_id }}
          path: /tmp/real-multiboot-v10-proof/
          if-no-files-found: warn

      - name: Record V10 result
        if: always()
        run: |
          if test -s /tmp/real-multiboot-v10-proof/result.json; then
            cp /tmp/real-multiboot-v10-proof/result.json /tmp/v10-status.json
          else
            printf '{"success":false,"state":"no-result","version":"v10","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/v10-status.json
          fi
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          path=Path('/tmp/v10-status.json')
          data=json.loads(path.read_text())
          data['job_status']='${{ job.status }}'
          data['workflow_sha']=os.environ.get('GITHUB_SHA')
          path.write_text(json.dumps(data, indent=2)+'\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 15); do
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/v10-status.json os/iso/real-multiboot-v10-status.json
            git add os/iso/real-multiboot-v10-status.json
            git commit -m 'Record real multiboot V10 result [skip ci]' || break
            if git push origin HEAD:main; then break; fi
            sleep $((attempt*3))
          done

      - name: Require visible-pixel success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('/tmp/v10-status.json').read_text())
          print(json.dumps(data, indent=2))
          assert data.get('success') is True
          assert data.get('emulator_started') is True
          assert data.get('xorg_ready') is True
          assert data.get('mapped_window_ready') is True
          assert data.get('gui_ready') is True
          assert data.get('graphical_canvas') is True
          assert data.get('pixel_content_ready') is True
          assert data.get('overlay_hidden') is True
          assert data.get('controls_ready') is True
          assert data.get('completion_logged') is True
          assert all(value.get('pass') for value in data.get('responsive', {}).values())
          pixels=data.get('ui',{}).get('pixels',{})
          assert pixels.get('unique_colors',0) >= 12
          assert pixels.get('luma_range',0) >= 80
          assert pixels.get('non_dominant_ratio',0) >= 0.05
          PY
