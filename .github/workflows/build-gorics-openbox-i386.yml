# Terminal + internet rebuild trigger: R18 20260708.
name: Build GORICS Direct Openbox i386 ISO

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-gorics-openbox-i386.yml'
      - 'os/iso/build-gorics-web-iso.sh'
      - 'scripts/patch_gorics_terminal_network.py'
      - 'os/real-multiboot/local-media-router.js'

permissions:
  contents: write

concurrency:
  group: gorics-openbox-i386
  cancel-in-progress: true

jobs:
  build-test-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record start
        run: |
          printf '{"state":"running","desktop":"direct-xorg-openbox-terminal-network","run_id":"%s","commit":"%s"}\n' "$GITHUB_RUN_ID" "$GITHUB_SHA" > os/iso/openbox-i386-status.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add os/iso/openbox-i386-status.json
          git commit -m 'Record Openbox ISO build start [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Prepare clean i386 source with terminal and internet
        run: |
          set -euo pipefail
          sed -i 's/gorics-linux-gui-web-amd64.iso/gorics-linux-gui-web-i386.iso/g' os/iso/build-gorics-web-iso.sh
          sed -i 's/--architectures amd64/--architectures i386/g' os/iso/build-gorics-web-iso.sh
          sed -i 's/linux-image-amd64/linux-image-686-pae/g' os/iso/build-gorics-web-iso.sh
          sed -i 's/systemctl mask e2scrub_reap.service e2scrub_all.service NetworkManager-wait-online.service/systemctl mask e2scrub_reap.service e2scrub_reap.timer e2scrub_all.service e2scrub_all.timer NetworkManager-wait-online.service/' os/iso/build-gorics-web-iso.sh
          sed -i '/systemctl mask e2scrub_reap.service/a rm -f /etc/systemd/system/timers.target.wants/e2scrub_all.timer /etc/systemd/system/multi-user.target.wants/e2scrub_reap.service 2>/dev/null || true' os/iso/build-gorics-web-iso.sh
          python3 scripts/patch_gorics_terminal_network.py
          bash -n os/iso/build-gorics-web-iso.sh
          grep -q 'gorics-x.service' os/iso/build-gorics-web-iso.sh
          grep -q 'GORICS_VISIBLE_WINDOW_READY' os/iso/build-gorics-web-iso.sh
          grep -q 'GORICS Control Center' os/iso/build-gorics-web-iso.sh
          grep -q 'panel_background_id = 0' os/iso/build-gorics-web-iso.sh
          grep -q 'e2scrub_all.timer' os/iso/build-gorics-web-iso.sh
          grep -q 'TERMINAL.desktop' os/iso/build-gorics-web-iso.sh
          grep -q 'launcher_item_app = /root/Desktop/TERMINAL.desktop' os/iso/build-gorics-web-iso.sh
          grep -q 'gorics-network.service' os/iso/build-gorics-web-iso.sh
          grep -q 'GORICS_NETWORK_LINK_READY' os/iso/build-gorics-web-iso.sh
          grep -q 'GORICS_DNS_READY' os/iso/build-gorics-web-iso.sh
          grep -q 'GORICS_INTERNET_READY' os/iso/build-gorics-web-iso.sh

      - name: Build ISO
        run: |
          docker run --privileged --rm -v "$PWD:/work" -w /work debian:bookworm \
            bash -lc 'apt-get update && apt-get install -y --no-install-recommends sudo live-build xorriso isolinux syslinux-common squashfs-tools debootstrap ca-certificates wget xz-utils && bash os/iso/build-gorics-web-iso.sh'
          sudo chown -R "$USER:$USER" out-web build || true
          test -s out-web/gorics-linux-gui-web-i386.iso

      - name: Verify terminal, mapped Openbox window and real network
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y xorriso qemu-system-x86 squashfs-tools
          ISO=out-web/gorics-linux-gui-web-i386.iso
          xorriso -indev "$ISO" -report_el_torito plain | tee out-web/el-torito-report.txt
          sha256sum "$ISO" | tee out-web/SHA256SUMS.txt
          xorriso -osirrox on -indev "$ISO" -extract /live/vmlinuz out-web/vmlinuz
          xorriso -osirrox on -indev "$ISO" -extract /live/initrd.img out-web/initrd.img
          xorriso -osirrox on -indev "$ISO" -extract /live/filesystem.squashfs out-web/filesystem.squashfs
          unsquashfs -cat out-web/filesystem.squashfs root/Desktop/TERMINAL.desktop > out-web/TERMINAL.desktop
          unsquashfs -cat out-web/filesystem.squashfs etc/systemd/system/gorics-network.service > out-web/gorics-network.service
          unsquashfs -cat out-web/filesystem.squashfs usr/local/bin/gorics-network-check > out-web/gorics-network-check
          unsquashfs -cat out-web/filesystem.squashfs root/.config/tint2/tint2rc > out-web/tint2rc
          grep -q '^Exec=lxterminal$' out-web/TERMINAL.desktop
          grep -q 'launcher_item_app = /root/Desktop/TERMINAL.desktop' out-web/tint2rc
          grep -q 'NetworkManager.service' out-web/gorics-network.service
          grep -q 'GORICS_NETWORK_LINK_READY' out-web/gorics-network-check
          grep -q 'GORICS_DNS_READY' out-web/gorics-network-check
          grep -q 'GORICS_INTERNET_READY' out-web/gorics-network-check
          qemu-system-i386 -machine pc -cpu pentium3,+pae -accel tcg -m 512 -smp 1 \
            -kernel out-web/vmlinuz -initrd out-web/initrd.img \
            -append 'boot=live components live-media=/dev/sr0 username=user hostname=gorics-web systemd.unit=graphical.target console=ttyS0,115200n8' \
            -cdrom "$ISO" -nic user,model=virtio-net-pci -nographic -monitor none -no-reboot >out-web/qemu-serial.log 2>&1 &
          PID=$!
          GUI_READY=0
          NET_READY=0
          for second in $(seq 1 480); do
            if grep -q 'GORICS_VISIBLE_WINDOW_READY' out-web/qemu-serial.log 2>/dev/null \
              && grep -q 'GORICS_WEB_GUI_READY' out-web/qemu-serial.log 2>/dev/null; then
              GUI_READY=1
            fi
            if grep -q 'GORICS_NETWORK_LINK_READY' out-web/qemu-serial.log 2>/dev/null \
              && grep -q 'GORICS_DNS_READY' out-web/qemu-serial.log 2>/dev/null \
              && grep -q 'GORICS_INTERNET_READY' out-web/qemu-serial.log 2>/dev/null; then
              NET_READY=1
            fi
            test "$GUI_READY" = 1 && test "$NET_READY" = 1 && break
            grep -q 'GORICS_WEB_GUI_FAILED' out-web/qemu-serial.log 2>/dev/null && break
            kill -0 "$PID" 2>/dev/null || break
            sleep 1
          done
          sleep 5
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true
          tail -n 700 out-web/qemu-serial.log
          test "$GUI_READY" = 1
          test "$NET_READY" = 1
          grep -q 'GORICS_XORG_READY' out-web/qemu-serial.log
          grep -q 'GORICS_VISIBLE_WINDOW_READY' out-web/qemu-serial.log
          grep -q 'GORICS_WEB_GUI_READY' out-web/qemu-serial.log
          grep -q 'GORICS Control Center' out-web/qemu-serial.log
          grep -q 'GORICS_NETWORK_LINK_READY' out-web/qemu-serial.log
          grep -q 'GORICS_DNS_READY' out-web/qemu-serial.log
          grep -q 'GORICS_INTERNET_READY' out-web/qemu-serial.log
          ! grep -q 'GORICS_WEB_GUI_FAILED' out-web/qemu-serial.log
          ! grep -q 'Starting lightdm.service' out-web/qemu-serial.log
          ! grep -q 'requires an x86-64 CPU' out-web/qemu-serial.log
          ! grep -Eqi 'FAILED.*e2scrub|Failed to start .*e2scrub|e2scrub_all.*failed' out-web/qemu-serial.log

      - name: Upload verified ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorics-visible-i386-${{ github.run_id }}
          path: |
            out-web/gorics-linux-gui-web-i386.iso
            out-web/SHA256SUMS.txt
            out-web/el-torito-report.txt
            out-web/qemu-serial.log
            out-web/TERMINAL.desktop
            out-web/gorics-network.service
            out-web/gorics-network-check
            out-web/tint2rc
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

      - name: Publish convenience release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: gorics-linux-gui-web-iso-latest
        run: |
          set +e
          for attempt in $(seq 1 5); do
            gh release delete "$TAG" -y --cleanup-tag || true
            git push origin ":refs/tags/$TAG" || true
            git tag -f "$TAG" "$GITHUB_SHA"
            git push -f origin "refs/tags/$TAG"
            if gh release create "$TAG" \
              out-web/gorics-linux-gui-web-i386.iso \
              out-web/SHA256SUMS.txt \
              out-web/el-torito-report.txt \
              out-web/qemu-serial.log \
              --title 'GORICS Direct Openbox i386 ISO' \
              --notes 'Verified Openbox desktop with visible Terminal launcher, NetSurf browser, NetworkManager DHCP, DNS and outbound HTTP Internet access. The Actions artifact is the canonical publisher input.'; then
              exit 0
            fi
            sleep $((attempt*15))
          done
          echo 'release publishing failed after retries; canonical Actions artifact remains available' >&2
          exit 1

      - name: Record verified artifact success
        run: |
          SIZE=$(stat -c %s out-web/gorics-linux-gui-web-i386.iso)
          SHA=$(cut -d' ' -f1 out-web/SHA256SUMS.txt)
          printf '{"state":"success","desktop":"direct-xorg-openbox-terminal-network","run_id":"%s","commit":"%s","size":%s,"sha256":"%s","openbox_ready":true,"mapped_window_ready":true,"terminal_ready":true,"network_link_ready":true,"dns_ready":true,"internet_ready":true,"lightdm":false,"e2scrub_clean":true,"artifact":"gorics-visible-i386-%s"}\n' "$GITHUB_RUN_ID" "$GITHUB_SHA" "$SIZE" "$SHA" "$GITHUB_RUN_ID" > os/iso/openbox-i386-status.json
          git restore os/iso/build-gorics-web-iso.sh
          git add os/iso/openbox-i386-status.json
          git commit -m 'Record terminal and network ISO success [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
