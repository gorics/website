name: Find Automatic Pages Runs

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/find-automatic-pages-runs.yml'

permissions:
  contents: write
  actions: read

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: List all recent workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --limit 250 --json databaseId,workflowName,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/runs.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          runs=json.loads(Path('/tmp/runs.json').read_text())
          keywords=('page','jekyll','build and deployment','multiboot','v7')
          relevant=[r for r in runs if any(k in (r.get('workflowName') or '').lower() for k in keywords)]
          result={'relevant':relevant,'all_names':sorted(set(r.get('workflowName') or '' for r in runs))}
          Path('os/iso/automatic-pages-runs.json').write_text(json.dumps(result,indent=2)+"\n")
          print(json.dumps(result,indent=2))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/automatic-pages-runs.json
          git commit -m 'Record automatic Pages and multiboot workflow runs [skip ci]' || true
          git push origin HEAD:main

# one-shot inspection for Pages and current Real Multiboot verification runs
