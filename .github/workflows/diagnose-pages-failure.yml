name: Diagnose Pages Failure

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/diagnose-pages-failure.yml'

permissions:
  contents: write
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture failed run log tail
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: '28919002947'
        run: |
          set -euo pipefail
          gh run view "$FAILED_RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/pages-failed.log 2>&1 || true
          tail -n 260 /tmp/pages-failed.log > /tmp/pages-failed-tail.log
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          lines=Path('/tmp/pages-failed-tail.log').read_text(errors='replace').splitlines()
          payload={'run_id':int(os.environ['FAILED_RUN_ID']),'captured_at':datetime.now(timezone.utc).isoformat(),'tail':lines}
          Path('/tmp/pages-failure-diagnostic.json').write_text(json.dumps(payload,indent=2)+'\n')
          print('\n'.join(lines))
          PY

      - name: Publish diagnostic
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          cp /tmp/pages-failure-diagnostic.json /tmp/status.json
          for attempt in $(seq 1 10); do
            git reset --hard
            git clean -fd
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p os/iso
            cp /tmp/status.json os/iso/pages-failure-diagnostic.json
            git add os/iso/pages-failure-diagnostic.json
            git commit -m 'Record Pages failure diagnostic [skip ci]' || exit 0
            git push origin HEAD:main && exit 0
            sleep $((attempt * 2))
          done
          exit 1
