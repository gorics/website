name: Superseded v86 Chunk Migration

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/migrate-iso-chunks-to-assets-branch.yml'

permissions:
  contents: read

concurrency:
  group: repair-v86-iso-chunks
  cancel-in-progress: true

jobs:
  superseded:
    runs-on: ubuntu-latest
    steps:
      - run: echo 'Superseded by fix-v86-chunk-filenames.yml'
