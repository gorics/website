name: Inspect GORICS Finalizer

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/inspect-gorics-finalizer.yml'

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record all real multiboot runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --workflow finalize-gorics-pages.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/finalizer.json
          gh run list --workflow static.yml --limit 20 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/static.json
          gh run list --workflow verify-real-multiboot-v4.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/v4.json
          gh run list --workflow switch-pages-to-actions.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/switch.json
          gh run list --workflow publish-legacy-os-assets.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/legacy.json
          gh run list --workflow verify-source-fallback.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/fallback.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          def read(path):
              return json.loads(Path(path).read_text())
          finalizer = read('/tmp/finalizer.json')
          static = read('/tmp/static.json')
          v4 = read('/tmp/v4.json')
          switch = read('/tmp/switch.json')
          legacy = read('/tmp/legacy.json')
          fallback = read('/tmp/fallback.json')
          result = {
              'latest': finalizer[0] if finalizer else None,
              'runs': finalizer,
              'latest_static': static[0] if static else None,
              'static_runs': static,
              'latest_v4': v4[0] if v4 else None,
              'v4_runs': v4,
              'latest_switch': switch[0] if switch else None,
              'switch_runs': switch,
              'latest_legacy': legacy[0] if legacy else None,
              'legacy_runs': legacy,
              'latest_source_fallback': fallback[0] if fallback else None,
              'source_fallback_runs': fallback,
          }
          Path('os/iso/finalizer-run-status.json').write_text(json.dumps(result, indent=2) + '\n')
          print(json.dumps(result, indent=2))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/finalizer-run-status.json
          git commit -m 'Record complete real multiboot run status [skip ci]' || true
          git push origin HEAD:main

# inspector includes legacy asset publisher and source fallback GUI verifier
