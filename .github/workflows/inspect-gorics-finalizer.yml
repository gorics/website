name: Inspect GORICS Finalizer

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/inspect-gorics-finalizer.yml'

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record final deployment and verification runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --workflow publish-legacy-os-assets-v2.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/publisher.json
          gh run list --workflow verify-legacy-chunked-v6.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/v6.json
          gh run list --workflow diagnose-legacy-pages-build.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/pages_diag.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          def read(path):
              return json.loads(Path(path).read_text())
          publisher = read('/tmp/publisher.json')
          v6 = read('/tmp/v6.json')
          pages_diag = read('/tmp/pages_diag.json')
          result = {
              'latest_legacy_v2': publisher[0] if publisher else None,
              'legacy_v2_runs': publisher,
              'latest_v6': v6[0] if v6 else None,
              'v6_runs': v6,
              'latest_pages_diagnostic': pages_diag[0] if pages_diag else None,
              'pages_diagnostic_runs': pages_diag,
          }
          Path('os/iso/finalizer-run-status.json').write_text(json.dumps(result, indent=2) + '\n')
          print(json.dumps(result, indent=2))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/finalizer-run-status.json
          git commit -m 'Record V6 and legacy Pages build status [skip ci]' || true
          git push origin HEAD:main
