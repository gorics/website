name: Inspect GORICS Finalizer

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/inspect-gorics-finalizer.yml'

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record finalizer static V3 and Pages switch runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --workflow finalize-gorics-pages.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/finalizer.json
          gh run list --workflow static.yml --limit 20 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/static.json
          gh run list --workflow verify-real-multiboot-v3.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/v3.json
          gh run list --workflow switch-pages-to-actions.yml --limit 10 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url > /tmp/switch.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          finalizer = json.loads(Path('/tmp/finalizer.json').read_text())
          static = json.loads(Path('/tmp/static.json').read_text())
          v3 = json.loads(Path('/tmp/v3.json').read_text())
          switch = json.loads(Path('/tmp/switch.json').read_text())
          result = {
              'latest': finalizer[0] if finalizer else None,
              'runs': finalizer,
              'latest_static': static[0] if static else None,
              'static_runs': static,
              'latest_v3': v3[0] if v3 else None,
              'v3_runs': v3,
              'latest_switch': switch[0] if switch else None,
              'switch_runs': switch,
          }
          Path('os/iso/finalizer-run-status.json').write_text(json.dumps(result, indent=2) + '\n')
          print(json.dumps(result, indent=2))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          git add os/iso/finalizer-run-status.json
          git commit -m 'Record Pages switch run status [skip ci]' || true
          git push origin HEAD:main

# refreshed with Pages build type switch status