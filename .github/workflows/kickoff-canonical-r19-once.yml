name: Kick Off Canonical R19 Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/kickoff-canonical-r19-once.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: kickoff-canonical-r19-once
  cancel-in-progress: true

jobs:
  kickoff:
    runs-on: ubuntu-latest
    env:
      AUDIT_KICKOFF: '20260710-final-direct-main-3'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Record observable kickoff marker
        run: |
          mkdir -p os/iso
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          result = {
              'state': 'canonical-dispatch-started',
              'workflow': os.environ.get('GITHUB_WORKFLOW'),
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'run_attempt': os.environ.get('GITHUB_RUN_ATTEMPT'),
              'source_sha': os.environ.get('GITHUB_SHA'),
              'kickoff': os.environ.get('AUDIT_KICKOFF'),
          }
          Path('os/iso/canonical-kickoff-status.json').write_text(json.dumps(result, indent=2) + '\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add os/iso/canonical-kickoff-status.json
          git commit -m 'chore(os): record canonical kickoff [skip ci]' || true
          git push origin HEAD:main

      - name: Enable canonical workflows and dispatch final chain
        uses: actions/github-script@v7
        with:
          script: |
            for (const workflow_id of [
              'static.yml',
              'verify-real-multiboot-r19-v2.yml',
              'force-real-multiboot-deploy.yml'
            ]) {
              await github.rest.actions.enableWorkflow({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id
              });
            }
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'force-real-multiboot-deploy.yml',
              ref: 'main'
            });
