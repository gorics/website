name: Verify Current OS Main

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-os-main-current.yml'

permissions:
  contents: write

concurrency:
  group: verify-current-os-main
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate current source
        run: |
          set -euo pipefail
          grep -q '<title>GORICS 멀티부트</title>' os/index.html
          grep -q 'GORICS Linux 실행' os/index.html
          grep -q 'iso/real-multiboot-status.json' os/index.html
          grep -q 'VERIFIED r4x' os/index.html
          grep -q '1024×768 GUI' os/index.html
          grep -q 'Openbox · tint2 · PCManFM · xterm' os/index.html
          python3 - <<'PY'
          import json,re
          from pathlib import Path
          html=Path('os/index.html').read_text()
          scripts=re.findall(r'<script>(.*?)</script>',html,re.S)
          assert scripts
          Path('/tmp/os-main.js').write_text('\n'.join(scripts))
          status=json.loads(Path('os/iso/real-multiboot-status.json').read_text())
          for key in ('success','emulator_started','xorg_ready','gui_ready','graphical_canvas'):
              assert status.get(key) is True,(key,status.get(key))
          PY
          node --check /tmp/os-main.js

      - name: Wait for public deployment
        run: |
          set -euo pipefail
          BASE='https://gorics.github.io/website/os/'
          ready=0
          for attempt in $(seq 1 120); do
            stamp="${GITHUB_RUN_ID}-${attempt}-$(date +%s)"
            if curl -fsSL --max-time 60 "$BASE?current-main=$stamp" -o /tmp/public.html \
              && grep -q '<title>GORICS 멀티부트</title>' /tmp/public.html \
              && grep -q 'GORICS Linux 실행' /tmp/public.html \
              && grep -q 'VERIFIED r4x' /tmp/public.html \
              && grep -q 'iso/real-multiboot-status.json' /tmp/public.html \
              && curl -fsSL --max-time 60 "${BASE}iso/real-multiboot-status.json?current-main=$stamp" -o /tmp/status.json \
              && curl -fsSI --max-time 60 "${BASE}real-multiboot/?current-main=$stamp" | grep -Eq 'HTTP/[0-9.]+ (200|304)'; then
              python3 - <<'PY' && ready=1 && break
          import json
          from pathlib import Path
          d=json.loads(Path('/tmp/status.json').read_text())
          for key in ('success','emulator_started','xorg_ready','gui_ready','graphical_canvas'):
              assert d.get(key) is True,(key,d.get(key))
          PY
            fi
            echo "public main not ready attempt=$attempt"
            sleep 10
          done
          test "$ready" = 1

      - name: Record current result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json,os
          from datetime import datetime,timezone
          from pathlib import Path
          ok=os.environ.get('JOB_STATUS')=='success'
          Path('/tmp/result.json').write_text(json.dumps({
            'success':ok,
            'state':'completed' if ok else 'failed',
            'page':'https://gorics.github.io/website/os/',
            'main_runtime':'https://gorics.github.io/website/os/real-multiboot/',
            'version':'r4x',
            'run_id':os.environ.get('GITHUB_RUN_ID'),
            'workflow_sha':os.environ.get('GITHUB_SHA'),
            'verified_at':datetime.now(timezone.utc).isoformat(),
          },ensure_ascii=False,indent=2)+'\n')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 12); do
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/result.json os/iso/os-main-r4x-status.json
            git add os/iso/os-main-r4x-status.json
            git commit -m 'Record current OS main verification [skip ci]' || exit 0
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt*3))
          done
          exit 1
