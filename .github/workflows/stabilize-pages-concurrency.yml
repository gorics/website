name: Stabilize Pages Deployment Concurrency

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/stabilize-pages-concurrency.yml'

permissions:
  contents: write

concurrency:
  group: stabilize-pages-deployment-concurrency
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Disable destructive Pages cancellation
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 12); do
            git reset --hard
            git clean -fd
            git fetch origin main
            git checkout -B main origin/main
            python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/static.yml')
          text = path.read_text(encoding='utf-8')
          old = '  group: pages-i386-openbox-final\n  cancel-in-progress: true\n'
          new = '  group: pages-i386-openbox-final\n  cancel-in-progress: false\n'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('Pages concurrency block not found')
          path.write_text(text, encoding='utf-8')
          PY
            grep -A2 '^concurrency:' .github/workflows/static.yml | grep -q 'cancel-in-progress: false'
            git add .github/workflows/static.yml
            if git diff --cached --quiet; then exit 0; fi
            git commit -m 'fix(pages): let queued multiboot deployments finish'
            git push origin HEAD:main && exit 0
            sleep $((attempt * 2))
          done
          exit 1
