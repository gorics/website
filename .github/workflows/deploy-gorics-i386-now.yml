name: Deploy GORICS i386 Openbox Now

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/deploy-gorics-i386-now.yml'

permissions:
  contents: write
  actions: write

concurrency:
  group: gorics-pages-orchestrator
  cancel-in-progress: true

jobs:
  dispatch-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record deployment start
        run: |
          printf '{"state":"dispatching","orchestrator_run_id":"%s","page_version":"n","loader":"same-origin-i386-direct-kernel","desktop":"direct-xorg-openbox"}\n' "$GITHUB_RUN_ID" > os/iso/pages-deploy-status.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add os/iso/pages-deploy-status.json
          git commit -m "Record i386 Pages deployment start [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Dispatch Pages workflow
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BEFORE_ID=$(gh run list --workflow static.yml --limit 1 --json databaseId --jq '.[0].databaseId // 0')
          gh workflow run static.yml --ref main
          RUN_ID=''
          for attempt in $(seq 1 24); do
            sleep 5
            CANDIDATE=$(gh run list --workflow static.yml --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')
            if test "$CANDIDATE" != "0" && test "$CANDIDATE" != "$BEFORE_ID"; then
              RUN_ID="$CANDIDATE"
              break
            fi
          done
          test -n "$RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Pages run: $RUN_ID"
          gh run watch "$RUN_ID" --exit-status --interval 10

      - name: Record deployment result
        if: always()
        env:
          PAGES_RUN_ID: ${{ steps.pages.outputs.run_id }}
          PAGES_OUTCOME: ${{ steps.pages.outcome }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          printf '{"state":"%s","orchestrator_run_id":"%s","pages_run_id":"%s","page_version":"n","loader":"same-origin-i386-direct-kernel","desktop":"direct-xorg-openbox","public_self_test":true}\n' "$PAGES_OUTCOME" "$GITHUB_RUN_ID" "$PAGES_RUN_ID" > os/iso/pages-deploy-status.json
          git add os/iso/pages-deploy-status.json
          git commit -m "Record i386 Pages deployment result [skip ci]" || true
          git push origin HEAD:main
          test "$PAGES_OUTCOME" = success

