name: Report Final V3 Status

on:
  workflow_run:
    workflows: ['Deploy And Verify Real Multiboot Final V3']
    types: [completed]

permissions:
  actions: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Report deployment result without repository commit
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_STATUS: ${{ github.event.workflow_run.conclusion }}
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          body=$(cat <<EOF
          R16 최종 배포 실행 완료

          - run: $RUN_ID
          - conclusion: $RUN_STATUS
          - head: $RUN_SHA
          - url: $RUN_URL
          - recorded: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          )
          gh issue comment 134 --repo "$GITHUB_REPOSITORY" --body "$body"
