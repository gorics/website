name: Apply Visible Desktop Patch

on:
  workflow_dispatch: {}
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'os/real-multiboot/.trigger-visible-desktop-rebuild'

permissions:
  contents: write
  actions: write

concurrency:
  group: apply-visible-desktop-patch
  cancel-in-progress: false

jobs:
  patch:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply visible desktop source repair
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          python3 scripts/patch_gorics_visible_desktop.py
          bash -n os/iso/build-gorics-web-iso.sh
          grep -q 'GORICS_VISIBLE_WINDOW_READY' os/iso/build-gorics-web-iso.sh
          grep -q 'GORICS Control Center' os/iso/build-gorics-web-iso.sh
          grep -q 'panel_background_id = 0' os/iso/build-gorics-web-iso.sh
          git diff --check

      - name: Commit build source repair
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add os/iso/build-gorics-web-iso.sh
          if ! git diff --cached --quiet; then
            git commit -m 'fix(os): render visible Openbox desktop and window'
            for attempt in $(seq 1 15); do
              if git push origin HEAD:main; then break; fi
              sleep $((attempt*3))
              git fetch origin main
              git rebase origin/main
            done
          else
            echo 'visible desktop source already patched'
          fi

      - name: Confirm patched source on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            CONTENT=$(gh api "repos/$GITHUB_REPOSITORY/contents/os/iso/build-gorics-web-iso.sh?ref=main" --jq .content | tr -d '\n' | base64 -d)
            if grep -q 'GORICS_VISIBLE_WINDOW_READY' <<<"$CONTENT" \
              && grep -q 'GORICS Control Center' <<<"$CONTENT"; then
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Dispatch clean i386 ISO rebuild
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build-gorics-openbox-i386.yml --repo "$GITHUB_REPOSITORY" --ref main
