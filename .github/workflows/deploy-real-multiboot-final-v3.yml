name: Deploy And Verify Real Multiboot Final V3

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: final-v3-pages
  cancel-in-progress: true

jobs:
  deploy-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DEPLOY_VERSION: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout immutable current source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Wait for branch Pages deployment to finish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          seen=0
          for attempt in $(seq 1 72); do
            gh run list --repo "$GITHUB_REPOSITORY" --commit "$GITHUB_SHA" --limit 100 \
              --json workflowName,status,databaseId,event > /tmp/current-sha-runs.json
            count=$(jq '[.[] | select(.workflowName == "pages-build-deployment")] | length' /tmp/current-sha-runs.json)
            pending=$(jq '[.[] | select(.workflowName == "pages-build-deployment" and .status != "completed")] | length' /tmp/current-sha-runs.json)
            if [ "$count" -gt 0 ]; then seen=1; fi
            echo "branch Pages wait attempt=$attempt seen=$seen count=$count pending=$pending"
            if [ "$seen" = 1 ] && [ "$pending" = 0 ]; then break; fi
            sleep 5
          done
          if [ "$seen" != 1 ]; then
            echo 'branch Pages run was not observed; applying conservative grace period'
            sleep 45
          fi
          sleep 20

      - name: Build atomic R16 ultra site
        run: |
          set -o pipefail
          bash scripts/build-real-multiboot-pages-final.sh _site 2>&1 | tee /tmp/final-v3-build.log
          node --check _site/os/real-multiboot/performance-mode.js
          node --check _site/os/real-multiboot/safe-diagnostics.js
          grep -q 'performance-mode.css?v=' _site/os/real-multiboot/index.html
          grep -q 'performance-mode.js?v=' _site/os/real-multiboot/index.html
          grep -q 'r16-preflight-cache' _site/os/real-multiboot/index.html
          grep -q 'maxCharacters' _site/os/real-multiboot/performance-mode.js
          grep -q 'memoryCap' _site/os/real-multiboot/performance-mode.js
          grep -q 'isoProbeWarm' _site/os/real-multiboot/performance-mode.js
          grep -q 'constructorPoll' _site/os/real-multiboot/performance-mode.js
          grep -q '__GORICS_LAST_VM_OPTIONS__' _site/os/real-multiboot/performance-mode.js
          grep -q 'native fetch and XMLHttpRequest preserved' _site/os/real-multiboot/safe-diagnostics.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy final Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify exact public R16 deployment
        run: |
          set -euo pipefail
          ROOT='https://gorics.github.io/website'
          PAGE="$ROOT/os/real-multiboot"
          READY=0
          for attempt in $(seq 1 90); do
            STAMP="$GITHUB_RUN_ID-$attempt-$(date +%s)"
            if curl -fsSL --max-time 60 -H 'Cache-Control: no-cache' "$PAGE/?verify=$STAMP" -o /tmp/final-v3-index.html \
              && grep -q "$DEPLOY_VERSION" /tmp/final-v3-index.html \
              && grep -q 'r16-preflight-cache' /tmp/final-v3-index.html \
              && curl -fsSL --max-time 60 "$PAGE/performance-mode.js?v=$DEPLOY_VERSION" -o /tmp/final-v3-performance.js \
              && grep -q 'constructorPoll' /tmp/final-v3-performance.js \
              && grep -q '__GORICS_LAST_VM_OPTIONS__' /tmp/final-v3-performance.js \
              && curl -fsSL --max-time 60 "$PAGE/app.js?v=$DEPLOY_VERSION" -o /tmp/final-v3-app.js \
              && grep -q '/website/vendor/v86/images/buildroot-bzimage68.bin' /tmp/final-v3-app.js \
              && ! grep -q 'https://i.copy.sh/' /tmp/final-v3-app.js \
              && curl -fsSL --max-time 60 "$ROOT/vendor/v86/manifest.json?v=$STAMP" -o /tmp/final-v3-manifest.json \
              && grep -q "$DEPLOY_VERSION" /tmp/final-v3-manifest.json \
              && grep -q 'guest_images' /tmp/final-v3-manifest.json; then
              READY=1
              break
            fi
            echo "public R16 deployment pending attempt=$attempt version=$DEPLOY_VERSION"
            sleep 10
          done
          test "$READY" = 1
          node --check /tmp/final-v3-app.js
          node --check /tmp/final-v3-performance.js

          for image in buildroot-bzimage68.bin linux4.iso linux.iso freedos722.img; do
            code=$(curl -sS -L --max-time 120 -r 0-4095 \
              -o "/tmp/final-v3-$image.probe" -w '%{http_code}' \
              "$ROOT/vendor/v86/images/$image?v=$DEPLOY_VERSION")
            case "$code" in 200|206) ;; *) echo "guest image HTTP $code: $image"; exit 1;; esac
            test -s "/tmp/final-v3-$image.probe"
          done

          curl -fsSL --max-time 60 "$PAGE/assets/iso-meta.json?v=$DEPLOY_VERSION" -o /tmp/final-v3-iso-meta.json
          curl -fsSL --max-time 90 "$PAGE/assets/vmlinuz?v=$DEPLOY_VERSION" -o /tmp/final-v3-vmlinuz
          curl -fsSL --max-time 120 "$PAGE/assets/initrd.img?v=$DEPLOY_VERSION" -o /tmp/final-v3-initrd.img
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          meta = json.loads(Path('/tmp/final-v3-iso-meta.json').read_text())
          assert meta['architecture'] == 'i386'
          assert meta.get('release') == 'r12-visible-desktop' or meta.get('release_version') == 'r12'
          assert meta.get('name') == 'gorics-linux-gui-web-i386-r12.iso'
          for path_name, key in (('final-v3-vmlinuz', 'kernel'), ('final-v3-initrd.img', 'initrd')):
              data = (Path('/tmp') / path_name).read_bytes()
              expected = meta[key]
              assert len(data) == int(expected['size'])
              assert hashlib.sha256(data).hexdigest() == expected['sha256']
          print('public R16 assets verified')
          PY

      - name: Install Chromium smoke browser
        run: |
          npm init -y
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify mobile R16 VM startup and memory limits
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?verify=${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          node <<'JS'
          const fs = require('fs');
          const { chromium } = require('playwright');
          const report = { url: process.env.VERIFY_URL, console: [], pageErrors: [], failedRequests: [] };
          (async () => {
            let browser;
            let page;
            try {
              browser = await chromium.launch({ headless: true, args: ['--no-sandbox', '--disable-dev-shm-usage'] });
              page = await browser.newPage({ viewport: { width: 390, height: 844 }, isMobile: true, hasTouch: true });
              page.on('console', message => report.console.push({ type: message.type(), text: message.text().slice(0, 2000) }));
              page.on('pageerror', error => report.pageErrors.push(error.message));
              page.on('requestfailed', request => report.failedRequests.push({ url: request.url(), failure: request.failure() }));
              page.on('response', response => {
                if (response.status() >= 400 && /vendor\/v86|real-multiboot/.test(response.url())) {
                  report.failedRequests.push({ url: response.url(), status: response.status() });
                }
              });

              await page.goto(process.env.VERIFY_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
              await page.waitForFunction(() => Boolean(window.__GORICS_PERFORMANCE_MODE__), null, { timeout: 30000 });
              report.initial = await page.evaluate(() => ({
                build: document.querySelector('meta[name="gorics-build"]')?.content,
                performance: {
                  build: window.__GORICS_PERFORMANCE_MODE__.build,
                  profile: window.__GORICS_PERFORMANCE_MODE__.profile,
                  isCompact: window.__GORICS_PERFORMANCE_MODE__.isCompact,
                  constructorPoll: window.__GORICS_PERFORMANCE_MODE__.constructorPoll,
                  cachedPreflights: window.__GORICS_PERFORMANCE_MODE__.cachedPreflights(),
                },
                diagnostics: Boolean(window.__GORICS_SAFE_DIAGNOSTICS__),
                atomic: Boolean(window.__GORICS_ATOMIC_ASSETS__),
                localMedia: Boolean(window.__GORICS_LOCAL_MEDIA_ROUTER__),
              }));
              if (!report.initial.build.includes(process.env.GITHUB_SHA || report.initial.build)) {
                console.log('build marker', report.initial.build);
              }
              if (!report.initial.performance.isCompact || !report.initial.performance.constructorPoll) throw new Error(JSON.stringify(report.initial));
              if (!report.initial.diagnostics || !report.initial.atomic || !report.initial.localMedia) throw new Error(JSON.stringify(report.initial));

              await page.selectOption('#os-select', 'buildroot');
              const startedAt = Date.now();
              await page.click('#boot-btn');
              await page.waitForFunction(() => Boolean(window.goricsRealMultiboot), null, { timeout: 180000 });
              await page.waitForFunction(() => Boolean(window.__GORICS_LAST_VM_OPTIONS__), null, { timeout: 30000 });
              await page.waitForFunction(() => {
                const log = document.querySelector('#log')?.textContent || '';
                return /emulator-started/.test(log) || /부팅 실패/.test(document.querySelector('#stage-label')?.textContent || '');
              }, null, { timeout: 180000 });

              report.result = await page.evaluate((startedAt) => ({
                elapsedMs: Date.now() - startedAt,
                options: window.__GORICS_LAST_VM_OPTIONS__,
                stage: document.querySelector('#stage-label')?.textContent || '',
                detail: document.querySelector('#stage-detail')?.textContent || '',
                log: (document.querySelector('#log')?.textContent || '').slice(-16000),
              }), startedAt);
              const MB = 1024 * 1024;
              if (report.result.options.memory_size > 112 * MB) throw new Error(`Buildroot memory too high: ${JSON.stringify(report.result)}`);
              if (report.result.options.vga_memory_size > 4 * MB) throw new Error(`Buildroot VGA too high: ${JSON.stringify(report.result)}`);
              if (!/emulator-started/.test(report.result.log)) throw new Error(`Buildroot did not start: ${JSON.stringify(report.result)}`);
              if (/RangeError: Length out of range of buffer/i.test(report.result.log)) throw new Error('original RangeError returned');
              if (report.failedRequests.some(item => /buildroot-bzimage68\.bin/.test(item.url || '') && Number(item.status || 0) >= 400)) {
                throw new Error(`Buildroot image failed: ${JSON.stringify(report.failedRequests)}`);
              }
              if (report.pageErrors.length) throw new Error(report.pageErrors.join('\n'));
              report.success = true;
            } catch (error) {
              report.success = false;
              report.error = { message: error.message, stack: error.stack };
              if (page) {
                report.failureState = await page.evaluate(() => ({
                  options: window.__GORICS_LAST_VM_OPTIONS__ || null,
                  vm: Boolean(window.goricsRealMultiboot),
                  stage: document.querySelector('#stage-label')?.textContent || '',
                  detail: document.querySelector('#stage-detail')?.textContent || '',
                  log: (document.querySelector('#log')?.textContent || '').slice(-20000),
                })).catch(() => null);
              }
            } finally {
              fs.writeFileSync('/tmp/final-v3-performance-result.json', JSON.stringify(report, null, 2));
              if (page) await page.screenshot({ path: '/tmp/final-v3-performance-mobile.png', fullPage: true }).catch(() => {});
              if (browser) await browser.close();
            }
            if (!report.success) process.exit(1);
          })();
          JS

      - name: Verify deployment remains final after stabilization
        run: |
          set -euo pipefail
          sleep 30
          curl -fsSL --max-time 60 -H 'Cache-Control: no-cache' \
            "https://gorics.github.io/website/os/real-multiboot/?stable=$GITHUB_RUN_ID-$(date +%s)" \
            -o /tmp/final-v3-stable-index.html
          grep -q "$DEPLOY_VERSION" /tmp/final-v3-stable-index.html
          curl -fsSL --max-time 60 -r 0-4095 \
            "https://gorics.github.io/website/vendor/v86/images/buildroot-bzimage68.bin?v=$DEPLOY_VERSION" \
            -o /tmp/final-v3-stable-buildroot.probe
          test -s /tmp/final-v3-stable-buildroot.probe

      - name: Upload V3 R16 proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-real-multiboot-r16-${{ github.run_id }}
          path: |
            /tmp/final-v3-build.log
            /tmp/current-sha-runs.json
            /tmp/final-v3-index.html
            /tmp/final-v3-stable-index.html
            /tmp/final-v3-app.js
            /tmp/final-v3-performance.js
            /tmp/final-v3-manifest.json
            /tmp/final-v3-iso-meta.json
            /tmp/final-v3-performance-result.json
            /tmp/final-v3-performance-mobile.png
          if-no-files-found: warn
