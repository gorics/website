name: Collect Pages Deployments

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/collect-pages-deployments.yml'
  workflow_dispatch:

permissions:
  pages: write
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      COLLECTOR_NONCE: '20260710-1'
    steps:
      - name: Collect Pages deployment state
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const response = await github.request('GET /repos/{owner}/{repo}/pages/deployments', {
              owner,
              repo,
              per_page: 100
            });
            const raw = Array.isArray(response.data) ? response.data : (response.data?.deployments || []);
            const deployments = raw.map(item => ({
              id: item.id,
              status: item.status,
              pages_build_version: item.pages_build_version,
              created_at: item.created_at,
              updated_at: item.updated_at,
              error: item.error || null,
              page_url: item.page_url || null
            }));
            const path = 'os/iso/pages-deployments-diagnostic.json';
            let sha;
            try {
              const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
              sha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const output = {
              collected_at: new Date().toISOString(),
              collector_run_id: context.runId,
              count: deployments.length,
              deployments
            };
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: 'chore(os): collect Pages deployment state [skip ci]',
              content: Buffer.from(JSON.stringify(output, null, 2) + '\n').toString('base64'),
              branch: 'main',
              ...(sha ? { sha } : {})
            });
