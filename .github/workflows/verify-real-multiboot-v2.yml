name: Verify Real Multiboot V2

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-real-multiboot-v2.yml'

permissions:
  contents: write

concurrency:
  group: verify-real-multiboot-v2
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record start
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          printf '{"success":false,"state":"v2-starting","run_id":"%s","architecture":"i386","desktop":"openbox-tint2-pcmanfm-xterm","started_at":"%s"}\n' "$GITHUB_RUN_ID" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > os/iso/real-multiboot-status.json
          git add os/iso/real-multiboot-status.json
          git commit -m "Record V2 multiboot verification start [skip ci]" || true
          git push origin HEAD:main

      - name: Verify public boot assets
        run: |
          BASE='https://gorics.github.io/website'
          PAGE="$BASE/os/real-multiboot"
          stamp="$GITHUB_RUN_ID-$(date +%s)"
          curl -fsSL --max-time 60 "$PAGE/?v=$stamp" -o /tmp/index.html
          grep -q 'app.js?v=n' /tmp/index.html
          curl -fsSL --max-time 60 "$PAGE/app.js?v=$stamp" -o /tmp/app.js
          grep -q 'bzimage: { url: kernelUrl }' /tmp/app.js
          grep -q 'gorics-linux-gui-web-i386.iso' /tmp/app.js
          grep -q 'VM profile memory=' /tmp/app.js
          curl -fsSL --max-time 60 "$PAGE/assets/iso-meta.json?v=$stamp" -o /tmp/meta.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          m = json.loads(Path('/tmp/meta.json').read_text())
          assert m['name'] == 'gorics-linux-gui-web-i386.iso'
          assert m['architecture'] == 'i386'
          assert m['desktop'] == 'openbox-tint2-pcmanfm-xterm'
          assert m['direct_boot'] is True
          assert m['complete_ui_verified'] is True
          assert m['kernel']['size'] > 1_000_000
          assert m['initrd']['size'] > 10_000_000
          print(json.dumps(m, indent=2))
          PY
          curl -fsSL --max-time 60 "$BASE/vendor/v86/libv86.js?v=$stamp" -o /tmp/libv86.js
          test "$(stat -c %s /tmp/libv86.js)" -gt 100000
          test "$(curl -sS --max-time 60 -r 0-4095 -o /tmp/kernel-probe -w '%{http_code}' "$PAGE/assets/vmlinuz?v=$stamp")" = 206
          test "$(stat -c %s /tmp/kernel-probe)" = 4096
          test "$(curl -sS --max-time 60 -r 0-4095 -o /tmp/initrd-probe -w '%{http_code}' "$PAGE/assets/initrd.img?v=$stamp")" = 206
          test "$(stat -c %s /tmp/initrd-probe)" = 4096
          test "$(curl -sS --max-time 90 -r 32768-36863 -o /tmp/iso-probe -w '%{http_code}' "$PAGE/assets/gorics-linux-gui-web-i386.iso?v=$stamp")" = 206
          python3 - <<'PY'
          from pathlib import Path
          d = Path('/tmp/iso-probe').read_bytes()
          assert len(d) == 4096
          assert d[1:6] == b'CD001'
          assert d[2049:2054] == b'CD001'
          assert b'EL TORITO' in d[2055:2087]
          PY
          node --check /tmp/app.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot and verify GUI
        id: browser
        continue-on-error: true
        env:
          VERIFY_URL: https://gorics.github.io/website/os/real-multiboot/?v2=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cat > /tmp/verify-v2.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const path = '/tmp/real-multiboot-verification.json';
          const result = {
            success: false,
            state: 'node-started',
            run_id: process.env.GITHUB_RUN_ID,
            architecture: 'i386',
            desktop: 'openbox-tint2-pcmanfm-xterm',
            boot_mode: 'direct-kernel-initrd-plus-iso',
            url: process.env.VERIFY_URL,
            started_at: new Date().toISOString(),
            console: [],
            failed_requests: [],
          };
          const save = (state, extra = {}) => {
            Object.assign(result, extra, { state, updated_at: new Date().toISOString() });
            fs.writeFileSync(path, JSON.stringify(result, null, 2) + '\n');
          };
          save('node-started');

          let browser;
          let page;
          try {
            save('launching-chromium');
            browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu', '--no-zygote'],
            });
            save('chromium-launched');
            const context = await browser.newContext({
              viewport: { width: 412, height: 915 },
              userAgent: 'Mozilla/5.0 (Linux; Android 15; GORICSVerifierV2) AppleWebKit/537.36 Chrome/149 Mobile Safari/537.36',
            });
            page = await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console', message => {
              result.console.push(`${message.type()}: ${message.text()}`);
              if (result.console.length > 300) result.console.shift();
            });
            page.on('pageerror', error => result.console.push(`pageerror: ${error.message}`));
            page.on('requestfailed', request => result.failed_requests.push({
              url: request.url(),
              error: request.failure()?.errorText || 'unknown',
            }));
            page.on('crash', () => save('page-crashed'));

            save('opening-page');
            await page.goto(process.env.VERIFY_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            save('page-opened', { page_url: page.url() });
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('ready: keyboard, touch and pointer bridge installed'));
            save('loader-ready');
            await page.click('#boot-btn');
            save('boot-clicked');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('ISO9660 and El Torito verified'), null, { timeout: 240000 });
            save('iso-verified');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('runtime loaded'), null, { timeout: 240000 });
            save('runtime-loaded');
            await page.waitForFunction(() => document.querySelector('#log')?.textContent.includes('emulator-started'), null, { timeout: 600000 });
            save('emulator-started');
            await page.waitForFunction(() => {
              const canvas = document.querySelector('#screen canvas');
              return canvas && canvas.width >= 320 && canvas.height >= 200 && getComputedStyle(canvas).display !== 'none';
            }, null, { timeout: 900000 });
            save('graphical-canvas-visible');
            await page.waitForTimeout(15000);
            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              const log = document.querySelector('#log')?.textContent || '';
              return {
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_display: text ? getComputedStyle(text).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                boot_button_text: document.querySelector('#boot-btn')?.textContent || '',
                log_tail: log.split('\n').slice(-180),
              };
            });
            await page.screenshot({ path: '/tmp/real-multiboot-proof.png', fullPage: true });
            save('completed', {
              ...details,
              success: details.screen_active && details.canvas_width >= 320 && details.canvas_height >= 200 && details.canvas_display !== 'none',
              completed_at: new Date().toISOString(),
            });
          } catch (error) {
            let logTail = [];
            try {
              const log = await page?.locator('#log').textContent();
              logTail = (log || '').split('\n').slice(-220);
              await page?.screenshot({ path: '/tmp/real-multiboot-proof.png', fullPage: true });
            } catch {}
            save('failed', {
              success: false,
              error: error?.stack || String(error),
              log_tail: logTail,
              completed_at: new Date().toISOString(),
            });
          } finally {
            await browser?.close().catch(() => {});
          }
          if (!result.success) process.exit(1);
          JS

          set +e
          node --check /tmp/verify-v2.mjs > /tmp/browser-v2.log 2>&1
          CHECK=$?
          if test "$CHECK" = 0; then
            timeout --signal=TERM --kill-after=30s 22m node /tmp/verify-v2.mjs >> /tmp/browser-v2.log 2>&1
            EXIT=$?
          else
            EXIT=$CHECK
          fi
          set -e
          if test ! -s /tmp/real-multiboot-verification.json; then
            printf '{"success":false,"state":"node-never-started","run_id":"%s","browser_exit_code":%s}\n' "$GITHUB_RUN_ID" "$EXIT" > /tmp/real-multiboot-verification.json
          fi
          cat /tmp/browser-v2.log || true
          exit "$EXIT"

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-multiboot-v2-proof-${{ github.run_id }}
          path: |
            /tmp/real-multiboot-verification.json
            /tmp/real-multiboot-proof.png
            /tmp/browser-v2.log
            /tmp/index.html
            /tmp/app.js
            /tmp/meta.json
          if-no-files-found: warn

      - name: Record result
        if: always()
        run: |
          if test ! -s /tmp/real-multiboot-verification.json; then
            printf '{"success":false,"state":"no-result","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/real-multiboot-verification.json
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/real-multiboot-verification.json os/iso/real-multiboot-status.json
          git add os/iso/real-multiboot-status.json
          git commit -m "Record V2 multiboot verification result [skip ci]" || true
          git push origin HEAD:main

      - name: Require success
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          r = json.loads(Path('/tmp/real-multiboot-verification.json').read_text())
          print(json.dumps(r, indent=2))
          if not r.get('success'):
              raise SystemExit('V2 browser verification failed')
          PY

# final verification trigger after stale Pages runs were cancelled
