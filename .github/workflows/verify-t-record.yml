name: Verify t CDN Router and Record

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-t-record.yml'
      - 'os/real-multiboot/chunk-compat.js'
      - 'os/real-multiboot/index.html'
      - 'os/real-multiboot/assets/iso-meta.json'

permissions:
  contents: write

concurrency:
  group: verify-t-cdn-router
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Boot public t GUI
        env:
          TARGET_URL: https://gorics.github.io/website/os/real-multiboot/?verify-t=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          mkdir -p /tmp/t-proof
          cat > /tmp/verify-t.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const output = '/tmp/t-proof/result.json';
          const result = {
            success: false,
            state: 'starting',
            version: 't',
            run_id: process.env.GITHUB_RUN_ID,
            target: process.env.TARGET_URL,
            started_at: new Date().toISOString(),
            console: [],
            failed_requests: [],
          };
          const save = (state, extra = {}) => {
            Object.assign(result, extra, { state, updated_at: new Date().toISOString() });
            fs.writeFileSync(output, JSON.stringify(result, null, 2) + '\n');
          };
          const fatal = /I\/O error, dev sr0|Buffer I\/O error on dev sr0|SQUASHFS error|unable to find a medium containing a live file system/i;
          save('starting');

          let browser;
          let page;
          try {
            browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-background-timer-throttling', '--disable-renderer-backgrounding'],
            });
            const context = await browser.newContext({ viewport: { width: 1280, height: 900 } });
            page = await context.newPage();
            page.setDefaultTimeout(120000);
            page.on('console', message => {
              result.console.push(`${message.type()}: ${message.text()}`);
              if (result.console.length > 800) result.console.shift();
            });
            page.on('requestfailed', request => result.failed_requests.push({
              url: request.url(),
              error: request.failure()?.errorText || 'failed',
            }));

            const response = await page.goto(process.env.TARGET_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
            save('page-opened', { page_http: response?.status() || null });
            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              return log.includes('ISO page. t') && log.includes('ISO chunk CDN router installed');
            }, null, { timeout: 300000 });
            save('router-ready');
            await page.click('#boot-btn');
            save('boot-clicked');

            await page.waitForFunction(() => {
              const log = document.querySelector('#log')?.textContent || '';
              if (/I\/O error, dev sr0|Buffer I\/O error on dev sr0|SQUASHFS error|unable to find a medium containing a live file system/i.test(log)) {
                throw new Error('fatal ISO read error');
              }
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              return log.includes('ISO chunk routed to CDN')
                && canvas
                && canvas.width >= 640
                && canvas.height >= 480
                && getComputedStyle(canvas).display !== 'none'
                && (!text || getComputedStyle(text).display === 'none')
                && document.querySelector('#screen')?.classList.contains('active');
            }, null, { timeout: 1200000 });

            await page.waitForTimeout(45000);
            const details = await page.evaluate(() => {
              const canvas = document.querySelector('#screen canvas');
              const text = document.querySelector('#screen > div');
              const log = document.querySelector('#log')?.textContent || '';
              return {
                canvas_width: canvas?.width || 0,
                canvas_height: canvas?.height || 0,
                canvas_display: canvas ? getComputedStyle(canvas).display : 'missing',
                text_display: text ? getComputedStyle(text).display : 'missing',
                screen_active: document.querySelector('#screen')?.classList.contains('active') || false,
                boot_button_text: document.querySelector('#boot-btn')?.textContent || '',
                cdn_route_observed: log.includes('ISO chunk routed to CDN'),
                sr0_error_observed: /I\/O error, dev sr0|Buffer I\/O error on dev sr0/i.test(log),
                squashfs_error_observed: /SQUASHFS error/i.test(log),
                log_tail: log.split('\n').slice(-600),
              };
            });
            if (fatal.test(details.log_tail.join('\n'))) throw new Error('fatal ISO read error after graphical desktop');
            await page.screenshot({ path: '/tmp/t-proof/gui.png', fullPage: true });
            const success = details.canvas_width >= 640
              && details.canvas_height >= 480
              && details.canvas_display !== 'none'
              && details.text_display === 'none'
              && details.screen_active
              && details.boot_button_text === 'Running'
              && details.cdn_route_observed
              && !details.sr0_error_observed
              && !details.squashfs_error_observed;
            save('completed', { ...details, success, completed_at: new Date().toISOString() });
            if (!success) throw new Error('graphical desktop assertions failed');
          } catch (error) {
            let details = {};
            try {
              details = await page?.evaluate(() => {
                const log = document.querySelector('#log')?.textContent || '';
                const canvas = document.querySelector('#screen canvas');
                return {
                  canvas_width: canvas?.width || 0,
                  canvas_height: canvas?.height || 0,
                  log_tail: log.split('\n').slice(-700),
                };
              }) || {};
              await page?.screenshot({ path: '/tmp/t-proof/failure.png', fullPage: true });
            } catch {}
            save('failed', { ...details, success: false, error: String(error?.stack || error), completed_at: new Date().toISOString() });
            throw error;
          } finally {
            await browser?.close().catch(() => {});
          }
          JS
          node --check /tmp/verify-t.mjs
          node /tmp/verify-t.mjs

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t-cdn-router-proof-${{ github.run_id }}
          path: /tmp/t-proof/
          if-no-files-found: warn

      - name: Record result on main
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if test ! -s /tmp/t-proof/result.json; then
            mkdir -p /tmp/t-proof
            printf '{"success":false,"state":"workflow-failed-before-browser","version":"t","run_id":"%s"}\n' "$GITHUB_RUN_ID" > /tmp/t-proof/result.json
          fi
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          p = Path('/tmp/t-proof/result.json')
          d = json.loads(p.read_text())
          d['job_status'] = os.environ.get('JOB_STATUS')
          d['workflow_sha'] = os.environ.get('GITHUB_SHA')
          p.write_text(json.dumps(d, indent=2) + '\n')
          PY
          cp /tmp/t-proof/result.json /tmp/t-result.json
          git config user.name github-actions
          git config user.email github-actions@github.com
          for attempt in $(seq 1 12); do
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p os/iso
            cp /tmp/t-result.json os/iso/t-cdn-router-result.json
            git add os/iso/t-cdn-router-result.json
            git commit -m 'Record t CDN router GUI verification [skip ci]' || exit 0
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 3))
          done
          exit 1
